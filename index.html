suring responsible uses of AI in terms of transparency and data use in generating insights. From automated investment strategies to personalized financial advice, agentic AI promises efficiency, scale, and precision, but firms have struggled to integrate it safely, ethically, and profitably.\n\nThis session brings together financial sector leaders from the public and private sector to explore what works, what doesn’t, and why. Panelists will discuss how to deploy AI to drive tangible outcomes, improve decision-making, and deliver smarter, more personalized wealth experiences — while navigating regulatory, operational, and ethical constraints.","AI 正在轉型財富管理，但真正的挑戰在於將複雜的技術轉化為可衡量的客戶價值，並在洞察生成的透明度與資料運用上確保 AI 的負責任應用。從自動化投資策略到個人化財務建議，代理式 AI 承諾帶來效率、規模與精準度，然而企業在安全、合乎倫理且獲利地整合 AI 方面仍面臨重重挑戰。\n\n本場次匯聚來自公私部門的金融業領導者，共同探討哪些方法有效、哪些無效，以及其中原因。與談人將討論如何部署 AI 以推動切實成果、提升決策品質，並在監管、營運與倫理限制下，提供更智慧、更個人化的財富管理體驗。"],"agnd309-from-soaring-heights-to-crushing-lows":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心甄選的創辦人故事，飽含未曾公開的洞見與啟發。傑出的新創創辦人走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd202-genius-clarity-mica-and-more-building-compliant-scalable-and-global-digital-asset-operations-in-an-age-of-fragmentation":["The global digital asset ecosystem is at a pivotal moment. The passage of the GENIUS and Clarity Acts in the U.S. has provided much-needed regulatory clarity and enforceable standards for stablecoins and other digital assets, while Europe’s MiCA framework and forward-looking Asia-Pacific policies continue to influence how firms innovate responsibly across borders.\n\nThis session brings together regulators and industry leaders to assess the real-world impact of these landmark regulations, explore points of convergence and divergence across jurisdictions, and discuss the practical challenges of building compliant digital asset operations that can scale globally, quickly.","全球數位資產生態系統正處於關鍵轉折點。美國 GENIUS 法案與 Clarity 法案的通過，為穩定幣及其他數位資產提供了亟需的監管明確性與可執行標準；而歐洲的 MiCA 框架與前瞻性的亞太政策，持續影響企業如何在跨境場景中負責任地創新。\n\n本場次匯聚監管機構與業界領導者，共同評估這些里程碑式法規的實際影響，探索各司法管轄區之間的趨同與分歧，並討論如何在實務層面建構能夠快速全球化擴展的合規數位資產業務。"],"agnd282-making-the-impossible-inevitable":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心甄選的創辦人故事，飽含未曾公開的洞見與啟發。傑出的新創創辦人走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd268-the-art-of-not-dying-survival-strategy":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心甄選的創辦人故事，飽含未曾公開的洞見與啟發。傑出的新創創辦人走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd199-innovating-financial-supervision-with-suptech":["In this keynote, FINMA Chair Marlene Amstad explores how supervisory authorities are leveraging SupTech to enhance oversight, strengthen data-driven decision-making, and respond to emerging risks in real time. Drawing on insights from a recent survey of supervisors, the speech will highlight how technology is reshaping the future of financial supervision.","在本場主題演講中，FINMA 主席 Marlene Amstad 探討監理機構如何運用 SupTech 強化監督職能、深化數據驅動決策，並即時應對新興風險。演講將援引近期一項針對監管人員的調查洞見，闡明科技如何重塑金融監理的未來。"],"agnd169-the-future-of-an-ai-enabled-career-in-the-financial-sector-for-young-talent":["AI is reshaping the way we work. How can young talents be a part of an AI-enabled financial sector? What are some of the opportunities available for them to pursue a meaningful and exciting career in the financial sector? Join our panel of FI and HR leaders to explore how AI is re-shaping the financial sector and learn about how young talents can prepare themselves.","AI 正在重塑我們的工作方式。年輕人才如何融入 AI 賦能的金融產業？他們有哪些機會可以在金融領域追求有意義且令人振奮的職涯？歡迎加入我們由金融機構與人力資源領導人組成的座談小組，共同探討 AI 如何重塑金融業，並了解年輕人才應如何為此做好準備。"],"agnd201-agentic-ai-in-insurance-revolution-or-risk":["Join us for a thought-provoking discussion on the future of insurance with Agentic AI. As the industry considers adopting autonomous AI systems, expert panelists will go head-to-head, weighing the pros (enhanced customer experience, operational efficiency) against the cons (regulatory risks, accountability, and potential customer alienation) of wide scale adoption of Agentic AI within insurance.","加入我們，就 Agentic AI 對保險業未來的影響展開一場發人深省的討論。在業界評估導入自主 AI 系統之際，各方專家小組成員將針鋒相對，深入權衡在保險業大規模採用 Agentic AI 的利與弊——包括提升客戶體驗、強化營運效率等優點，以及監理風險、責任歸屬，乃至潛在的客戶疏離等隱憂。"],"agnd272-the-geopolitical-board-game-capital-code-creators-and-country-what-policymakers-must-prioritise":["Why this dialogue matters now:\n\nGeopolitics are making the policymaker's balancing act harder than ever. The intense US-China rivalry is forcing other nations to navigate the \"Sovereignty Dilemma\" - making complex choices about partnerships, supply chains, and data flows. At the same time, the global competition for a small pool of elite AI experts has given rise to \"Talent Nationalism,\" forcing countries to create aggressive policies to attract these \"Creators\" without alienating their local workforce.\n\nWhat you will walk away with:\n\nA sophisticated understanding of how geopolitics directly impacts tangible decisions in the fintech ecosystem. Policymakers will gain strategic insights on how to craft practical policies on foreign investment, talent visas, and critical infrastructure to build a resilient and competitive technological future.","為何這場對話在當下至關重要：\n\n地緣政治使政策制定者的平衡之道愈加艱難。激烈的美中競爭迫使其他國家在「主權兩難」中穿行，在夥伴關係、供應鏈及資料流通等議題上做出複雜抉擇。與此同時，全球對少數頂尖 AI 人才的激烈爭奪催生了「人才民族主義」，各國不得不制定積極的政策吸引這些「創造者」，同時又須避免引發本地勞動力的不滿。\n\n您將帶走的收穫：\n\n深入理解地緣政治如何直接左右金融科技生態系中的具體決策。政策制定者將獲得策略洞見，學習如何在外人直接投資、人才簽證及關鍵基礎設施等層面制定務實政策，以建構具韌性且競爭力強的科技未來。"],"agnd123-the-next-generation-financial-institution-value-propositions-business-models-and-tech-stacks":["As traditional financial institutions adapt in response to emerging technologies – from the advent of digital currencies to AI and embedded finance – they are increasingly rethinking their value proposition, business models, and approaches to infrastructure and partnerships with new players.\n\nIn this high-level dialogue, leaders from financial institutions will discuss how to best navigate technological disruptions, shifting customer expectations, and the evolving regulatory landscape in anticipation of the next decade of finance.","隨著傳統金融機構因應新興技術而調整——從數位貨幣的崛起，到 AI 與嵌入式金融的發展——它們正日益重新審視自身的價值主張、商業模式，以及與新興參與者在基礎設施建設與合作上的策略。\n\n在這場高層對話中，金融機構領導人將共同探討如何最有效地應對科技顛覆、客戶期望的轉移，以及未來十年金融業不斷演變的監管環境。"],"agnd138-navigating-the-digital-frontier-facilitating-responsible-innovation-in-asset-tokenisation-in-capital-markets":["The advent of distributed ledger technology (DLT) and tokenisation is gradually changing how capital market products are being issued and traded, and how activities along the capital markets value chain are conducted.\n\nAs a tokenised ecosystem emerges, regulators globally have recognised the need for clear legal and regulatory frameworks to unlock the full potential of these transformative technologies. A transition to a DLT-based global market infrastructure also entails navigating cross-jurisdictional systems and frameworks that call for close collaboration between industry stakeholders and regulators to design and promote interoperability with safe and resilient infrastructures.\n\nThis panel will explore how the existing ecosystem could accommodate the unique characteristics of DLT and tokenisation in the capital markets and discuss on:","分散式帳本技術（DLT）與代幣化的興起，正逐步改變資本市場產品的發行與交易方式，以及資本市場價值鏈上各項業務的運作模式。\n\n隨著代幣化生態系逐漸成形，全球監管機構已意識到需要建立清晰的法律與監理框架，以充分釋放這些變革性技術的潛力。向以 DLT 為基礎的全球市場基礎設施過渡，同時也涉及跨司法管轄系統與框架的協調，有賴業界利害關係人與監管機構攜手合作，設計並推動具備安全、穩健基礎設施的互通性。\n\n本場座談將探討現有生態系如何因應 DLT 與代幣化在資本市場中的獨特特性，並就以下議題展開討論："],"agnd583-panel-the-still-unsolved-digital-passport-problem-navigating-the-fractured-interoperability-regulatory-challenge":["Why this dialogue matters now?\n\nFor any fintech with regional ambitions, they need one thing above all else - cross-border digital passport. The rise of \"Digital Borders\" and divergent policymaking - from payments to data privacy to digital assets - has created a complex compliance maze. A product that is perfectly legal in Singapore may be unviable in Indonesia or India. This creates the \"Sovereignty Puzzle\" for fintechs trying to build a single, scalable platform and for FIs trying to deploy solutions consistently across their regional footprint.\n\nWhat you'll walk away with:\n\nA strategic map for regional expansion. Fintechs will gain a clearer understanding of the fragmented regulatory landscape and how to build for it, while FIs will learn how to better assess a startup's ability to operate and scale effectively across complex \"Digital Borders.\"","為何這場對話在當下至關重要？\n\n對任何懷抱區域布局雄心的金融科技業者而言，最迫切的需求莫過於跨境數位通行證。「數位邊界」的興起與各地政策的分歧——涵蓋支付、資料隱私乃至數位資產——形成了錯綜複雜的合規迷宮。在新加坡完全合法的產品，在印尼或印度可能寸步難行。這為試圖打造單一、可擴展平台的金融科技業者，以及希望在區域版圖內一致部署解決方案的金融機構，帶來了「主權難題」。\n\n您將帶走的收穫：\n\n一幅清晰的區域擴張策略地圖。金融科技業者將更深刻理解碎片化的監管環境，學習如何針對此環境構建產品；金融機構則將學會更有效地評估新創企業能否在複雜的「數位邊界」中有效營運並實現規模擴張。"],"agnd288-blockchain-ai-convergence-emerging-applications-frontier-efforts-and-new-business-models":["The next innovation cycle in finance will be dominated by the increasing convergence of emerging technologies like AI, tokenization and the blockchain, much as the convergence of cloud technologies, smartphones, and web applications defined digital finance in the 2010s.\n\nThis session will explore the next frontier of digital finance by spotlighting the emerging applications of blockchain technology to AI and vice-versa, from the potential of blockchain to counter AI’s “black box” problem to the deployment of AI agents on-chain, the frontier leaders pioneering these efforts, and the emerging business models that will leverage this convergence.","金融業下一輪創新週期，將由 AI、代幣化與區塊鏈等新興技術的加速融合所主導——正如雲端技術、智慧型手機與網路應用程式的匯流，定義了 2010 年代數位金融的面貌。\n\n本場議程將深入探索數位金融的下一個前沿，聚焦於區塊鏈技術與 AI 相互賦能的新興應用——從區塊鏈如何破解 AI「黑箱」問題，到在鏈上部署 AI 代理，以及引領這一浪潮的前沿領導者，還有將充分借助此融合趨勢的新興商業模式。"],"agnd70-building-trustworthy-digital-money-infrastructures-for-a-global-economy":["Explore how tokenised money, CBDCs and public blockchains can evolve from pilots into trusted, large-scale financial infrastructures. This dialogue brings together innovators in open networks with central banks actively experimenting with digital currencies.","探討代幣化貨幣、CBDC 與公共區塊鏈如何從試驗計畫演進為值得信賴的大規模金融基礎設施。本場對話匯聚了在開放網路領域的創新者，以及正積極試驗數位貨幣的各國央行。"],"agnd211-my-network-is-your-network-accelerating-access-through-network-of-networks":["The future payments landscape will achieve unprecedented connectivity not through more or larger single networks, but through a network of networks — where networks compete to collaborate, and multiverse, multichain partnerships enable next generation solutions.\n\nJoin us to see Mastercard, Swift, and Nexus unpack how collaborations can be realised, the rules and risks that form the foundation of good partnership, and the benefits the inter linkage of multilateral platforms can unlock. This panel will explore what governance and commercial models are necessary to fast track the interoperability of the world’s most interconnected networks.","未來的支付格局將實現前所未有的互聯互通——這一目標並非依賴更多或規模更大的單一網路，而是透過「網路的網路」來達成：各網路在競爭中尋求協作，多元、多鏈的夥伴關係催生下一代解決方案。\n\n歡迎加入我們，聆聽 Mastercard、Swift 與 Nexus 深入拆解協作如何落地，構成優質夥伴關係的規則與風險為何，以及多邊平台互聯互通所能釋放的種種效益。本場座談將深入探討需要哪些治理與商業模式，才能加速推動全球互聯程度最高的各大網路之間的互通性。"],"agnd555-gftn-regional-networking-market-insights-hour-connecting-fintech-ecosystems-around-the-world-europe":["This session brings together key players from the Europe ecosystem including regulators, sponsors, exhibitors, and industry partners to explore opportunities and build meaningful connections.\n\nThe session opens with insights into regional market trends, emerging opportunities, and collaboration themes, followed by an informal networking hour over alcohol where you can foster direct relationships with decision-makers and the GFTN team.\n\nWhether you're exploring market entry, developing strategic partnerships, or identifying investment opportunities, the GFTN Regional Networking Hour provides direct access to the right stakeholders in one collaborative space.\n\nRegister Here","本場議程匯聚歐洲生態系的核心參與者，包括監管機構、贊助商、展商及產業夥伴，共同探索合作機會並建立有意義的連結。\n\n議程首先聚焦區域市場趨勢、新興機遇與合作主題，隨後進入輕鬆的交流時光，佐以飲品，讓您與決策者及 GFTN 團隊直接建立關係。\n\n無論您正在評估市場進入策略、拓展策略夥伴關係，或尋找投資機會，GFTN 區域交流時光都能讓您在一個協作空間中直接接觸到合適的利害關係人。\n\n立即報名"],"agnd525-frontier-stage-day-2-wrap-up":["Watch this space for more information!","更多資訊即將公布，敬請期待！"],"agnd325-impact-stage-day-2-wrap-up":["Watch this space for more information!","更多資訊即將公布，敬請期待！"],"agnd729-finmonda-demo":["Witness the start of the new digital GFTN Solution: FinMonda. From market intelligence, strategy creation and collaboration, GFTN now provides a unique digital solution for the network","親眼見證 GFTN 全新數位解決方案 FinMonda 的誕生。從市場情報、策略制定到協同合作，GFTN 現為旗下網路提供獨一無二的數位解決方案。"],"agnd315-welcome-to-singapore-fintech-festival-2025-day-3":["Join us as we kick off the day's sessions on the Festival Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the future of FinTech.","歡迎加入我們，在 Festival Stage 展開今日精彩議程，匯聚深刻洞見、突破性理念，以及正在塑造 FinTech 未來的啟發性聲音。"],"agnd237-mastering-web-architecture":["Hear from Dr. Roy Fielding, a leading pioneer of Open-Source, Software Architecture, and the World Wide Web whose innovative approach to web architecture continues to influence the development of modern financial innovation, from embedded finance to open banking efforts.","聆聽 Roy Fielding 博士的精彩分享。他是開源技術、軟體架構與全球資訊網領域的先驅，其對網路架構的創新思維持續影響著現代金融創新的發展，從嵌入式金融到開放銀行皆然。"],"agnd732-next-gen-leaders-ama-session-3":["This AMA session offers an open, conversational platform for Next Gen Leaders to engage directly with leading experts in fintech and digital finance. It aims to provide participants with a rare opportunity to ask candid questions, gain real-world insights, and explore emerging trends shaping the industry. By fostering authentic dialogue between rising talent and established thought leaders, the session seeks to deepen understanding of leadership and innovation while inspiring participants to navigate their own paths in the evolving financial landscape.\n\nPlease note that is this an exclusive, closed-door session for the inaugural cohort of Next Gen Leaders. This session is not open to public. To learn more about the programme, visit the website here.","本場 AMA 議程提供一個開放、對話式的平台，讓 Next Gen Leaders 能直接與金融科技及數位金融領域的頂尖專家互動。本議程旨在為學員提供難得的機會，暢所欲言地提出問題、獲取實戰洞見，並探索形塑產業走向的新興趨勢。藉由促進新興人才與資深思想領袖之間的真誠對話，本議程致力於深化對領導力與創新的理解，同時激勵學員在不斷演進的金融領域中開拓自己的道路。\n\n請注意，本場議程為首屆 Next Gen Leaders 計畫的專屬閉門會議，不對外開放。如欲進一步了解本計畫，請至官方網站查閱。"],"agnd175-steering-the-global-future":["Join leading global experts as they discuss the current state and future outlook of fintech, exploring macroeconomic trends, regulatory evolution, AI integration, and the sector’s role in driving inclusive, sustainable financial innovation worldwide.","邀請全球頂尖專家共聚一堂，探討金融科技的現況與未來展望，深入剖析總體經濟趨勢、監管環境的演變、AI 的融合應用，以及金融業在推動普惠、永續金融創新方面的全球角色。"],"agnd529-nus-start-up-pitch-showcase-10-ventures-advancing-ai-industry-and-sustainability":["Ten NUS-affiliated start-ups presented clear, investor-oriented cases across AI automation and insights (Qallix, Ajentik, Reflective AI, Genue), infrastructure and industrial operations (GroundVision, BETEKK, Spacejot), supply-chain resiliency (Polar Cold), and circular energy solutions (reXtore, EcoVolt). Each team articulated the pain points, target customer profiles, and repeatable use cases, alongside defensibility rooted in domain data, integration moats, and potential IP. Go-to-market plans emphasized B2B pilots, channel partners, and land-and-expand strategies, with monetization models spanning SaaS, usage-based pricing, and hardware-plus-service bundles. The cohort highlighted measurable outcomes—cost reduction, risk mitigation, and sustainability gains—and near-term milestones in product validation and commercial scaling, positioning the ventures for disciplined deployment of capital and attractive pathways to scale.\n\nRegistration here.","十家 NUS 關係企業在本次展示中，針對各自的目標投資人提出清晰有力的論述，涵蓋 AI 自動化與洞察（Qallix、Ajentik、Reflective AI、Genue）、基礎設施與工業營運（GroundVision、BETEKK、Spacejot）、供應鏈韌性（Polar Cold），以及循環能源解決方案（reXtore、EcoVolt）等領域。各團隊清楚闡述痛點、目標客戶輪廓與可複製的應用場景，並說明以專業領域資料、整合護城河及潛在知識產權為基礎的競爭壁壘。市場推進計畫著重 B2B 試驗、通路夥伴與「立足再擴張」策略，商業化模式涵蓋 SaaS、按使用量計費，以及軟硬體整合服務套裝。這批新創企業強調可量化的成果——包括降低成本、控管風險及提升永續效益——並設定了產品驗證與商業規模化的近期里程碑，為有紀律的資本部署與具吸引力的擴張路徑奠定基礎。\n\n立即報名。"],"agnd504-beyond-the-horizon-tomorrows-investment-thesis-for-a-changing-world":["As technology, capital, and consumer behavior evolve in real time, new growth frontiers are emerging across Asia and beyond. In this keynote, Vijay Shekhar Sharma shares his vision for the next wave of innovation and what it will take for entrepreneurs and investors to build enduring companies in an era of rapid transformation.","隨著科技、資本與消費者行為即時演進，全新的成長前沿正在亞洲及其他地區不斷湧現。在本場主題演講中，Vijay Shekhar Sharma 將分享他對下一波創新浪潮的願景，以及創業家和投資人在快速轉型時代打造長青企業所需具備的條件。"],"agnd358-middle-east-a-re-imagined-economy":["This leadership conversation will explore how key financial centres in the Gulf envision their role in anchoring the growth economy in the Middle East and Africa, and the strategies that will anchor resilience, innovation and diversification. Focusing on regional and cross border opportunities, the discussion will highlight pathways for driving sustainable development and unlocking new engines of prosperity across the region and beyond.","本場領導力對話將探討海灣地區主要金融中心如何定位自身在錨定中東與非洲成長經濟中的角色，以及確保韌性、推動創新與多元化發展的策略。對話聚焦區域與跨境機遇，深入探討推動永續發展、在整個地區乃至更廣泛範圍解鎖新繁榮引擎的路徑。"],"agnd482-democratizing-bill-payments-through-a-centralized-payment-platform-powered-by-npci":["Discover how NBBL is redefining India’s bill payments landscape—transforming a once-fragmented system into a unified, inclusive digital utility. Hear firsthand how banks, fintechs, and central regulatory authorities are collaborating to build the consumer trust, drive innovation, and spark ideas on the future of interoperable payments.","了解 NBBL 如何重新定義印度的帳單支付格局——將一個曾經高度分散的系統轉型為統一、普惠的數位公共服務。聆聽銀行、金融科技業者與中央監管機構如何協力建立消費者信任、驅動創新，並就互通性支付的未來激盪出嶄新思路。"],"agnd528-the-knowledge-engine-for-fintech-research-a-masterclass-on-alfin":["Introducing ALFIN: GFTN’s AI-powered knowledge engine that transforms the way banks, fintechs, and policymakers uncover market insights and craft data-driven strategies.\n\nBuilt for professionals who demand rigor, ALFIN draws upon practitioner intelligence from GFTN’s global network to synthesize verifiable research, regulatory updates, and competitive analytics into actionable insights. Unlike generic AI tools, ALFIN combines speed with analytical depth, enabling users to explore complex financial questions through transparent and collaborative conversations.\n\nJoin us for a live demonstration of ALFIN in action and discover how it empowers institutions to move from fragmented data to strategic clarity — making smarter, faster, and more confident decisions in SME and broader financial markets.\n\nRegistration here.","隆重介紹 ALFIN：GFTN 推出的 AI 驅動知識引擎，徹底改變銀行、金融科技業者與政策制定者挖掘市場洞見、制定資料驅動策略的方式。\n\nALFIN 專為要求嚴謹的專業人士而生，汲取 GFTN 全球網路的實踐者智慧，將可查核的研究成果、監管動態與競爭分析整合為可付諸行動的洞見。有別於通用型 AI 工具，ALFIN 兼顧速度與分析深度，讓使用者透過透明且協作式的對話，深入探索複雜的金融議題。\n\n歡迎加入我們的 ALFIN 現場示範，親身感受它如何協助機構從碎片化資料邁向策略清晰——在 SME 及更廣泛的金融市場中做出更明智、更迅速、更有信心的決策。\n\n立即報名。"],"agnd483-the-quantum-safe-roadmap-the-post-quantum-readiness-playbook-powered-by-st-engineering":["Quantum disruption demands more than awareness - it calls for a playbook. The session shares a roadmap to quantum-safe readiness: from cryptography discovery and risk intelligence to migration strategies, ecosystem coordination, and compliance. Practical approaches to help leaders chart a resilient path into the post-quantum era.","量子技術的顛覆性衝擊不僅需要認知，更需要一套完整的行動指南。本場議程將分享邁向量子安全就緒的路線圖：從密碼學盤點與風險情報，到遷移策略、生態系協調與法規遵循。提供切實可行的方法，協助領導者在後量子時代規劃出一條穩健的前行之路。"],"agnd359-asean-perspectives-from-finance-leaders":["ASEAN’s growth markets are defining the next frontier of global finance. This session brings together leading voices to share perspectives on unlocking opportunities, driving innovation, and navigating challenges across the region as financial ecosystems expand to support sustainable growth and deeper economic integration in the decade ahead.","ASEAN 的成長市場正在定義全球金融的下一個前沿。本場議程匯聚各方領袖，分享如何在整個地區釋放機遇、推動創新並應對挑戰，同時在未來十年推進金融生態系的擴張，以支持永續成長與更深層的經濟整合。"],"agnd300-book-signing-the-catalysts-the-accelerating-forces-forging-the-new-world-financial-order-by-amanda-wick":["Come meet Author and Speaker Amanda Wick and purchase a discounted and signed copy of her new book, \"The Catalysts.\" The first ten people in line will receive a free copy!\n\nIn _The Catalysts: The Accelerating Forces Forging the New World Financial Order_, Amanda Wick explores the forces reshaping global finance and the impending shift away from U.S. economic dominance. Drawing from her experiences in government and international advisory roles, Wick highlights catalysts like political turmoil, cryptocurrency, and tribalism, arguing they’re collectively accelerating the rise of a new financial order. Her book provides a timely, essential guide for policymakers and advisors navigating this evolving landscape, offering insights into the opportunities and risks of a rapidly transforming global economy.","歡迎與作者兼演講者 Amanda Wick 面對面交流，並以優惠價格購買她的親簽新書《The Catalysts》。排隊前十名將獲贈一冊！\n\n在《The Catalysts: The Accelerating Forces Forging the New World Financial Order》中，Amanda Wick 深入探討重塑全球金融的各股力量，以及美國經濟主導地位即將面臨的轉移。書中援引她在政府與國際顧問職務中的豐富經歷，點出政治動盪、加密貨幣與部落主義等催化劑，論證這些力量正共同加速一個新金融秩序的崛起。這本書為政策制定者與顧問在應對這一演變格局時提供了及時且不可或缺的指引，深入分析快速轉型的全球經濟所蘊含的機遇與風險。"],"agnd442-how-public-cbdcs-and-private-stablecoins-will-redefine-global-commerce":["As digital currencies reshape the global financial landscape, this session will examine the evolving dynamics between public Central Bank Digital Currencies (CBDCs) and private stablecoins. It explores a future where public CBDCs, issued by central banks, provide the foundational layer of trust and final settlement and private, well-regulated stablecoins will operate as the innovative second layer, driving user-facing applications and competitive use cases\n\nThe presentation will also explore the imperatives for payment solution providers as they prepare for the next wave of transformation with future-ready infrastructures that are compatible with a more inclusive and efficient global payments ecosystem.","隨著數位貨幣重塑全球金融格局，本場議程將審視公共央行數位貨幣（CBDC）與私人穩定幣之間不斷演變的動態關係。探討一個未來圖景：由央行發行的公共 CBDC 提供信任的基礎層與最終結算功能，而受妥善監管的私人穩定幣則作為創新的第二層運行，驅動面向用戶的應用與具競爭力的使用場景。\n\n本場演講亦將探討支付解決方案提供商的必要準備，為下一波轉型浪潮打造面向未來的基礎設施，使其與更具普惠性與效率的全球支付生態系相容。"],"agnd818-scaling-beyond-setup-pathways-from-singapore-to-global-markets":["This session brings together three dynamic perspectives on growth, investment, and scaling success in SEA. It explores how companies can navigate the path from private to public markets and leverage listing opportunities for sustainable growth; showcases real-world digital business exits and emerging investment opportunities in the online economy; and shares how strategic collaboration is powering Asia’s next generation of scalable, investment-ready businesses. Together, these insights provide a comprehensive view of the ecosystem driving the region’s next wave of innovation and business growth.\n\nSpeakers:","本場議程匯聚三個在東南亞成長、投資與規模化成功方面的動態視角。議程探討企業如何從私人市場邁向公開市場，並藉助上市機遇實現永續成長；展示真實的數位業務退出案例與線上經濟中的新興投資機遇；並分享策略協作如何驅動亞洲下一代可擴展、具投資吸引力的企業發展。這些洞見共同構成了一幅全面圖景，呈現推動區域下一波創新與業務成長的生態系面貌。\n\n演講嘉賓："],"agnd438-from-days-to-seconds-transforming-securities-trading-through-blockchain":["Learn from the world’s first live blockchain-based OTC securities market — a transformation that reduced settlement times from days to seconds and enabled 24/5 trading hours. The Director General of the Securities Market Department at the Financial Regulatory Commission of Mongolia shares firsthand insights on navigating capital market transformation, regulatory frameworks, technological barriers, and market participant challenges in this pioneering implementation.","向全球首個上線的區塊鏈場外證券市場取經——這場變革將結算時間從數天壓縮至數秒，並實現每週五天、全天候的交易。蒙古金融監管委員會證券市場部總局長將親身分享在這項先驅實踐中，如何應對資本市場轉型、監管框架、技術壁壘，以及市場參與者挑戰的第一手洞見。"],"agnd709-leading-the-future-of-payments-with-ai-and-stablecoins-powered-by-dtcpay":["As AI and stablecoins reshape global payments, dtcpay explores how businesses can leverage these technologies to simplify cross-border transactions, strengthen security, and boost efficiency. The session shares real-world insights on integrating stablecoin payments (with AI), addressing compliance and scalability challenges, and driving smarter, faster, and more inclusive digital payments.","隨著 AI 與穩定幣重塑全球支付格局，dtcpay 探討企業如何善用這些技術，簡化跨境交易、強化安全性並提升效率。本場議程分享整合穩定幣支付（結合 AI）的實戰洞見，探討如何應對合規與規模化挑戰，並推動更智慧、更迅速、更具普惠性的數位支付發展。"],"agnd417-beyond-the-ledger-how-tokenization-is-transforming-banking-powered-by-fireblocks":["The rise of tokenisation and digital assets is transforming banking—enabling faster payments, greater liquidity, and new financial products.\n\nIn this session, Tim Way of Fireblocks and Shawn Chan of Singapore Gulf Bank explore how emerging tech is reshaping banking, from digital asset custody to tokenised deposits and programmable money.","代幣化與數位資產的興起正在重塑銀行業——實現更快速的支付、更高的流動性，以及全新的金融產品。\n\n在本場次中，Fireblocks 的 Tim Way 與 Singapore Gulf Bank 的 Shawn Chan 將共同探討新興科技如何重塑銀行業，涵蓋數位資產托管、代幣化存款到可程式化貨幣等多個面向。"],"agnd361-japans-fintech-frontier-investing-in-innovation-and-inclusion-across-asia":["As Japan deepens its engagement with the fast-evolving FinTech and InsurTech ecosystems across Asia, a new wave of cross-border collaboration is reshaping the region’s financial landscape. This panel explores how Japanese investors and financial institutions are supporting technology-driven innovation in payments, digital lending, insurance, and financial infrastructure across APAC - and how these partnerships are advancing financial inclusion, resilience, and trust.\n\nThe session will unpack what’s driving Japan’s growing footprint in the region and what this means for the next chapter of digital finance in Asia.","隨著日本深化與亞洲快速演進的 FinTech 及 InsurTech 生態系的合作，新一波跨境協作正在重塑亞太地區的金融格局。本場座談探討日本投資機構與金融機構如何支持 APAC 地區在支付、數位借貸、保險及金融基礎設施領域的科技驅動創新，以及這些夥伴關係如何促進金融普及、韌性與信任的提升。\n\n本場次將深入剖析日本在亞洲佈局持續擴大的驅動力，並解讀這對亞洲數位金融下一章意味著什麼。"],"agnd686-exploration-and-practice-of-fintech-for-small-and-micro-enterprises-powered-by-mybank":["Over the past decade, MYbank has been dedicated to serving small and micro business customers and has continuously strengthened the application of AI in its financial services.\n\nIn this presentation we will introduce MYbank’s in-house AI Credit-Expert Large Languange Model, which comprises an Intelligent Product-Research Assistant and an Intelligent Due-Diligence Assistant. The model possesses deep knowledge of more than 100 industry sectors and boosts loan approval efficiency by over three times, forming a new “310” credit model.","過去十年來，MYbank 致力於服務小微企業客戶，並持續強化 AI 在金融服務中的應用。\n\n本次演講將介紹 MYbank 自主研發的「AI 信貸專家大型語言模型」，該模型包含智慧產品研究助理與智慧盡職調查助理。此模型具備逾 100 個行業領域的深度知識，可將貸款審批效率提升三倍以上，形成全新的「310」信貸模式。"],"agnd819-from-banker-to-global-vc-an-a-m-a-session-with-anju-patwardhan-by-tie-singapore":["Watch this space for more information.","敬請期待更多相關資訊。"],"agnd362-india-engineering-growth-across-the-global-south":["India’s double engine policy of digitalisation and diplomacy is turbo charging the country's economic growth, finance, technology, and global leadership. Building on its G20 Presidency, India is leveraging its national digital public infrastructure, bold reforms, and green innovation to drive inclusive growth at home and champion the priorities of the Global South abroad. This session explores how India’s policy vision, leadership in global diplomacy, startup success, and economic and political partnerships abroad are positioning it as engine of growth for 1.4 billion people and one of the key architects of a more inclusive, innovative, and sustainable global order.","印度以數位化與外交為雙引擎的政策方針，正全力推動其經濟成長、金融發展、科技進步與全球領導力。在 G20 主席國任期的基礎上，印度正透過國家數位公共基礎設施、大膽的改革政策及綠色創新，推動國內包容性成長，並在海外為全球南方的優先議題發聲。本場次探討印度的政策願景、在全球外交中的領導地位、新創生態系的成就，以及海外的經濟與政治夥伴關係，如何使其成為 14 億人口的成長引擎，並成為構建一個更包容、更創新、更永續全球秩序的重要推手。"],"agnd317-welcome-to-futurematters-stage-day-3":["The FutureMatters Stage is a dedicated stage designed to foster interactive and thought-provoking conversations around potential futures, emerging signals, and long-term trends that will define the next decade.\n\nPanelists will explore which of today’s long-term trends will continue to ripple forward into the next decade, and which will fizzle out as mere fads; tee up the weak signals that the audience should pay closer attention to in the coming years; and explore how to manage the unexpected. Expect conversations that are rooted in deep systems analysis yet engaged with uncomfortable unknowns.","FutureMatters 舞台是一個專屬舞台，旨在圍繞潛在未來、新興訊號及未來十年的長期趨勢，促進互動性與啟發性的對話。\n\n座談嘉賓將探討當今哪些長期趨勢將持續延伸至下一個十年，哪些將曇花一現；提前點出觀眾未來幾年應更密切關注的微弱訊號；並探索如何應對意外挑戰。期待這些對話根植於深度系統分析，同時正視令人不安的未知因素。"],"agnd404-singhacks-award-ceremony-agentic-ai-in-financial-services-hackathon-powered-by-tenity":["Over an intensive weekend, 100+ participants co-built with FIs to test agentic-AI in financial services. This award ceremony features finalist demos, jury insights, and the reveal of category and grand-prize winners. See which solutions move on to partner pilots.","經過緊湊的週末黑客松，逾 100 名參賽者與金融機構共同打造並測試金融服務中的 agentic AI 應用。本頒獎典禮將呈現決賽入圍者的成果展示、評審洞見，並揭曉各類別獎項及大獎得主，一探哪些解決方案將進入合作夥伴試點階段。"],"agnd291-china-scaling-ai-across-fintech-and-embedded-finance-conducted-in-mandarin":["China has emerged as one of the world’s most ambitious AI powerhouses, with massive government backing, vast data resources and ecosystem-driven innovation. From super-app platforms and cross-border finance networks to breakthroughs in robotic applications, China is redefining how financial services are designed, delivered and scaled.  \n\nThis panel featuring leading ecosystem players will discuss how platform-first models are compounding network effects that fuel AI at scale, AI's role in compliance, payments and systemic risk management across China’s expanding cross-border flows, the impact of agentic robotics and their integration with digital AI agents in banking operations, how Chinese fintechs balance rapid financial inclusion with responsible AI governance amidst rising global expectations, and address questions such as: Can China’s ecosystem-led model align with emerging global AI interoperability standards?","中國已躍升為全球最具企圖心的 AI 強國之一，背後有龐大的政府支持、豐富的資料資源，以及生態系驅動的創新能量。從超級應用平台、跨境金融網絡，到機器人應用領域的突破，中國正重新定義金融服務的設計、交付與規模化方式。\n\n本場次邀集生態系領頭業者，討論以下議題：平台優先模式如何透過網絡效應推動大規模 AI 發展；AI 在中國日益擴大的跨境業務中於合規、支付及系統性風險管理方面的角色；agentic 機器人的影響及其與銀行營運數位 AI 代理人的整合；中國金融科技業者如何在快速推動金融普及與負責任 AI 治理之間取得平衡；以及探討：中國的生態系主導模式能否與新興全球 AI 互通標準接軌？"],"agnd113-innovating-responsibly-ai-governance-as-a-competitive-advantage":["As artificial intelligence continues to transform the financial services landscape, the imperative for effective regulation and governance frameworks has never been more critical. This panel brings together regulators, financial institutions, and industry experts participating in Project MindForge to explore the evolving landscape of AI regulation and governance.\n\nKey areas of discussion will include:","隨著人工智慧持續改變金融服務業的面貌，建立有效監管與治理框架的迫切性從未如此重要。本場座談匯聚參與 Project MindForge 的監管機構、金融機構及業界專家，共同探討 AI 監管與治理的演進趨勢。\n\n主要討論議題包括："],"agnd514-mastering-start-up-foundations-legal-and-economic-essentials-for-founders":["Join Cooley for a comprehensive masterclass designed to empower first-time and experienced founders with the essential knowledge to navigate the critical early stages of funding and building a start-up.\n\nGain important insights into how to secure working capital but still maintain the flexibility you need to operate and scale your business. Through an interactive walkthrough of core concepts such as founder rights, protections, and term sheets, participants will develop a practical understanding of:\n\nRegistration here.","加入 Cooley 舉辦的全方位大師班，為初次及資深創辦人提供必備知識，協助您順利應對新創公司融資與建構初期的關鍵階段。\n\n深入了解如何取得營運資金，同時保有營運與規模擴張所需的靈活彈性。透過互動式講解，涵蓋創辦人權利、保護機制與投資條款清單等核心概念，參與者將建立以下方面的實務理解：\n\n報名請點此。"],"agnd220-pay-it-forward":["At the heart of SFF is a powerful, interconnected community. \"Pay It Forward\" nurtures the next generation of FinTech leaders through shared knowledge and collaboration.\n\nGain insights from experienced mentors and gain practical advice on building a career in:\n\nCheck out the full list of participating mentors here.\n\nRegister for a 1:1, 20-minute mentorship meeting here. Walk-in meetings not guaranteed.","SFF 的核心是一個緊密相連、充滿活力的社群。「Pay It Forward」透過知識共享與協作，培育下一代 FinTech 領袖。\n\n從資深導師獲取洞見，並獲得在以下領域發展職涯的實務建議：\n\n查看全部參與導師名單請點此。\n\n報名 1 對 1、20 分鐘導師會面請點此。現場報名不保證名額。"],"agnd326-welcome-to-impact-stage-day-3":["Join us as we kick off the day's sessions on the Impact Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the future of FinTech.","歡迎加入 Impact 舞台今日場次的開幕，匯聚深刻的對話、突破性的觀點，以及塑造 FinTech 未來的啟發聲音。"],"agnd714-from-spark-to-engine-the-mechanics-of-innovation-led-growth":["This session will focus on how innovation drives sustained economic growth. The discussion will examine how technological progress especially the willingness to embrace continual change has transformed living standards worldwide and remains key for long-term prosperity. Key insights include the importance of “creative destruction,” where new technologies replace old ones, and the need for institutions that reward experimentation and openness to new ideas. Baig will reflect on what these findings mean for emerging markets and how AI and digital innovation can help countries achieve inclusive, lasting growth.","本場次聚焦於創新如何推動持續性的經濟成長。討論將探討科技進步——尤其是擁抱持續變革的意願——如何改變全球生活水準，並成為長期繁榮的關鍵。核心洞見包括「創造性破壞」的重要性（新科技取代舊科技），以及鼓勵實驗、開放新想法的制度建設之必要性。Baig 將反思這些發現對新興市場的意義，以及 AI 與數位創新如何協助各國實現包容性、可持續的成長。"],"agnd76-welcome-to-founders-stage-day-3-the-enterprise-buyers-day":["The Enterprise Buyers Day: How Buying Behaviour of Financial Institutions is Changing in an AI-First World\n\nJoin us as we kick off the day's sessions on the Founders Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the next wave of entrepreneurship.","企業買家日：AI 優先世界中金融機構採購行為的轉變\n\n歡迎加入 Founders 舞台今日場次的開幕，匯聚深刻的對話、突破性的觀點，以及塑造下一波創業浪潮的啟發聲音。"],"agnd233-moving-beyond-pilots-in-agentic-ai-pitfalls-scaling-and-the-commercial-case":["Financial institutions are increasingly experimenting with agentic AI, with pilots in algorithmic trading, credit risk assessment, and hyper-personalised services showing promise.\nThis session brings together leading voices from banks, fintechs, and technology providers, to share lessons from real-world implementations, and discuss strategies for scaling AI pilots, integrating AI within existing financial infrastructures, and managing operational and regulatory concerns.","金融機構正越來越積極地試驗 agentic AI，在演算法交易、信用風險評估及超個人化服務等領域的試點展現出令人期待的成果。\n本場次匯聚來自銀行、金融科技公司及技術供應商的領袖人物，分享真實場景的實施經驗，並探討規模化 AI 試點、將 AI 整合至現有金融基礎設施，以及管理營運與監管挑戰的策略。"],"agnd363-singapore-sustainability-spotlight-views-from-the-ground-pacing-singapores-sustainable-future":["Singapore’s recent extension of mandatory climate reporting and assurance timelines has sparked both relief and reflection. While it offers smaller listcos more time to prepare, it also casts a spotlight on the national net zero effort, and raises questions on how the wider business community should prioritise sustainability en route to the 2030 Singapore Green Plan milestone.\n\nHow should companies interpret the recent change in pace? Are national authorities deprioritising net zero in favour of focusing on more pressing economic concerns? Will businesses that embark on sustainability face increasingly diminishing returns? This session convenes senior leaders to discuss these latest developments and consider the longer-term direction for Singapore’s low carbon transition.","新加坡近期延長強制氣候報告與鑑證時程的決定，引發了業界的反思與討論。此舉固然為規模較小的上市公司爭取了更多準備時間，但也將國家淨零努力攤在聚光燈下，並引發外界對商業社群如何在邁向 2030 新加坡綠色計劃里程碑的路上優先推動永續發展的質疑。\n\n企業應如何解讀這一步調的轉變？國家主管機關是否正將淨零議題的優先順序讓位給更迫切的經濟考量？致力於永續發展的企業是否將面臨越來越低的邊際報酬？本場次邀集資深領導者，共同討論最新發展，並展望新加坡低碳轉型的長期方向。"],"agnd273-fireside-chat-with-globe-telecom-ceo-in-an-ai-first-world-what-do-major-enterprise-buyers-want-from-startups-now":["In this engaging Fireside Chat, Carl Cruz, President of Globe Telecom, shares his insights on the evolving landscape of enterprise buying in an AI-driven world. As corporations shift from traditional procurement to co-creating solutions with startups, Carl explores the key factors now driving this change. Drawing on his experience leading major enterprises across diverse sectors, he offers valuable lessons for startups seeking to navigate the complexities of partnering with large enterprises like Globe, and shares his vision for the future of enterprise buying in 2030.","在這場精彩的爐邊對話中，Globe Telecom 總裁 Carl Cruz 分享了他對 AI 驅動世界中企業採購生態演變的深刻見解。隨著企業從傳統採購模式轉向與新創公司共創解決方案，Carl 深入探討了推動這一轉變的關鍵因素。憑藉其在多元行業領頭企業的領導經驗，他為尋求與 Globe 等大型企業建立夥伴關係的新創公司提供了寶貴建議，並分享了他對 2030 年企業採購未來的願景。"],"agnd304-welcome-to-frontier-stage-day-3":["Join us as we kick off the day's sessions on the Frontier Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the future of FinTech.","歡迎加入 Frontier 舞台今日場次的開幕，匯聚深刻的對話、突破性的觀點，以及塑造 FinTech 未來的啟發聲音。"],"agnd297-welcome-to-catalyst-stage-day-3":["Young people. Fresh talent. New ideas. The Catalyst Stage is a platform for emerging ideas and bold thinkers on the cusp of overturning orthodoxies and changing the face of finance. \nThis will be a space where the next generation of talent and changemakers take the spotlight, sharing their ideas and solutions that will shape tomorrow. This is where cutting-edge ideas gain industry visibility, with the goal of being adopted and scaled.\nHere, we will explore how technology, including AI, is transforming work, society, and humanity. Discussions will probe the impact of technology on work, human potential, and wellbeing, pushing boundaries and inviting audiences to see the future from new perspectives – not just from leaders or C-suites, but from new talent, managers, and the youth. \nFinally, it is also a stage of recognition. The stage celebrates the young talent making their mark and the influential female leaders shaping the industry, reinforcing that leadership, vision, and innovation are powered by people as much as by ideas. \nThe Catalyst Stage is where the next wave of talent and ideas ready to shape the future will take the spotlight.","年輕世代。新鮮人才。嶄新思維。Catalyst 舞台是新興創意與大膽思想家的平台，這些人正站在顛覆傳統、改變金融面貌的前沿。\n這裡是下一代人才與變革推動者展現自我的舞台，分享他們足以塑造明日的想法與解決方案。這是尖端創意獲得產業能見度的所在，目標是被採納並加以規模化推廣。\n在這裡，我們將探討科技——包括 AI——如何改變工作、社會與人類。對話將深入探討科技對工作、人類潛能與福祉的影響，突破既有邊界，邀請觀眾以全新視角看待未來——不僅僅是來自領導者或高管的視角，更來自新進人才、基層主管與年輕世代。\n此外，這也是一個表彰的舞台，專門彰顯嶄露頭角的年輕人才以及深刻影響產業的傑出女性領袖，強調領導力、願景與創新的驅動力，來自於人，一如來自於理念。\nCatalyst 舞台，是下一波準備好塑造未來的人才與創意，最耀眼的登場之處。"],"agnd509-time-to-act-quantum-computing-at-an-inflection-point-and-its-implications":["Against a backdrop of rapid advancements in quantum computing, financial institutions are exploring how quantum algorithms are paving the way for new frontiers in risk modeling, optimisation, and encryption. At the same time, quantum presents a unique challenge to current cryptographic methods and addressing this appropriately is critical. \n\nFor these institutions, quantum presents both new business opportunities as well as new risk considerations to bear in mind.\n\nThis session will dive into where the technology stands today and how you can leverage these advancements to differentiate your business while preparing to ensure your systems are quantum-safe.","在量子運算快速進展的背景下，金融機構正積極探索量子演算法如何在風險建模、最佳化與加密領域開拓新境界。與此同時，量子運算也對現有加密方法構成獨特挑戰，妥善應對至關重要。\n\n對金融機構而言，量子運算既帶來新的商業機遇，也帶來需要審慎考量的新風險因素。\n\n本場次將深入探討該技術的當前進展，以及如何善用這些突破來差異化您的業務，同時確保系統具備量子安全防護能力。"],"agnd407-an-efficient-equal-and-entrepreneurial-world-needs-fintech-why":["Fintech is the catalyst for a better world, spurring on growth, reducing inequality, creating solutions for healthcare, education, and ageing, and supporting a more sustainable world.\n\nThis keynote session by Dr. Amlan Roy will cover how fintech will be critical to unlocking a more efficient, equal, and entrepreneurial world, with an emphasis on the role of Big Data, AI, and ML in driving the next bound of change.","金融科技是推動更美好世界的催化劑，驅動成長、縮小不平等，為醫療、教育與高齡化議題創造解決方案，並支持更永續的世界發展。\n\n本場 Dr. Amlan Roy 的主題演講將闡述金融科技如何成為解鎖更高效、更平等、更具創業精神世界的關鍵，著重探討大數據、AI 及 ML 在推動下一波變革中的核心角色。"],"agnd711-from-being-a-nuclear-physicist-to-a-portfolio-manager-from-financial-inclusion-to-agentic-inclusion":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載從未公開的洞見與啟發。傑出的新創公司創辦人走上「黃色圓圈」，敞開心扉分享他們的個人掙扎與挑戰，讓這些故事成為其他創業者學習、鼓舞與激勵的源泉。"],"agnd733-meet-alfin-your-intelligent-insights-engine-for-the-financial-industry":["ALFIN is more than an AI intelligence engine, it's the central brain for financial intelligence. It’s the outcome of ten years of industry innovation, collective intelligence, and relentless refinement. Join us at this session to learn more about how ALFIN can help you turn ideas into intelligence.","ALFIN 不僅是一個 AI 智慧引擎，更是金融情報的核心大腦。它是十年行業創新、集體智慧與不懈精進的成果結晶。歡迎參加本場次，深入了解 ALFIN 如何協助您將想法轉化為情報洞見。"],"agnd537-investor-hours-startup-meets-investor-reception":["Investor Hours is your chance to connect directly with the startup community. Founders, secure your pitch spot to showcase your startup to interested investors, gain valuable feedback and explore funding possibilities. Investors, engage with ambitious founders and discover potential investment opportunities. Join us for insightful discussions and meaningful connections that can shape the future of your ventures.","Investor Hours 是您直接與新創社群建立連結的絕佳機會。創辦人可搶先預約展示位，向有興趣的投資人展示您的新創事業，獲取寶貴反饋並探索融資可能性。投資人則可與充滿抱負的創辦人交流，發掘潛在投資機會。歡迎加入這場充滿洞見的對話與有意義的連結，共同塑造您的事業未來。"],"agnd519-the-fintech-founders-playbook-scaling-across-borders-powered-by-amazon":["The curation of content and speakers was wholly managed by Amazon and does not reflect the views of the organisers or its staff.\n\nBuilding across borders? Here’s your playbook.\n\nFor fintechs, scaling is no longer just about product and capital - it's also navigating a complex, ever-shifting maze of global regulations. Get it wrong, and it costs you growth. Get it right, and you have a competitive advantage.\n\nThis AWS-curated session skips the fluff. Hear from founders and operators who’ve done it - the hard way - and learn how a compliance-first mindset can give you an edge when scaling across markets.\n\nPresented By:\n\nModerated By: Venkatesh Naidu, External Engagement Lead, APAC Public Policy, Amazon Web Services","本場次的內容規劃與講者遴選全程由 Amazon 主導，不代表主辦單位或其員工的立場。\n\n正在跨境擴張？這是您的作戰手冊。\n\n對金融科技公司而言，規模化不再只關乎產品與資本——還需要穿越錯綜複雜、瞬息萬變的全球法規迷宮。走錯一步，成長代價高昂；走對一步，合規即成為競爭優勢。\n\n本場 AWS 精選場次直指核心。聆聽親身實踐的創辦人與營運者分享他們——以艱辛方式學到的——經驗，了解以合規優先的思維如何在跨市場擴張時為您帶來競爭優勢。\n\n主辦單位：\n\n主持人：Venkatesh Naidu，Amazon Web Services 亞太區公共政策對外事務負責人"],"agnd188-sfa-presents-10-years-10-voices-shaping-the-future-of-fintech":["To honour the women whose leadership and vision have driven the growth of Singapore’s FinTech ecosystem over the past decade, the Women in FinTech (WIF) Subcommittee at the Singapore FinTech Association (SFA) proudly launches _10 Years, 10 Voices: Shaping the Future of FinTech_ - a first-of-its-kind initiative celebrating 10 outstanding women who have made a lasting impact on Singapore’s fintech ecosystem.\n\nThese honourees represent the diversity and dynamism of the industry - founders, leaders, investors, policy shapers, and ecosystem builders - women whose influence extends beyond professional success to the inspiration, mentorship, and opportunities they have created for others.\n\nSelected honourees will:\n\nThis campaign is more than a recognition of achievements - it is a celebration of resilience, innovation, and inclusive leadership that will continue to shape the future of fintech in Singapore and beyond.","為表彰過去十年來以領導力與遠見推動新加坡 FinTech 生態系成長的女性，新加坡金融科技協會（SFA）旗下的「女性金融科技（WIF）」小組委員會自豪地推出 _10 Years, 10 Voices: Shaping the Future of FinTech_——這是首創性的計劃，表彰 10 位對新加坡金融科技生態系留下深遠影響的傑出女性。\n\n這些受表彰者代表業界的多元性與活力——涵蓋創辦人、領袖、投資人、政策推動者與生態系建構者——她們的影響力超越個人的職業成就，延伸至她們為他人所創造的啟發、導師資源與發展機會。\n\n入選者將：\n\n這項計劃不只是對成就的肯定——它是對韌性、創新與包容性領導力的禮讚，這股力量將持續塑造新加坡及全球金融科技的未來。"],"agnd145-layer-1-summit-closing-session-key-announcements-and-summit-takeaways":["The closing session for the Layer 1 Summit will feature a curated review of the significant announcements and collaborative initiatives that emerged through the summit. We'll distill the key takeaways and conclude with a forward-looking perspective on how these announcements and insights translate into concrete next steps for the community, ensuring the momentum generated at this summit continues long after we depart.","Layer 1 Summit 閉幕場次將精選回顧峰會期間浮現的重要公告與合作倡議。我們將提煉關鍵洞見，並以前瞻性視角作結，探討這些公告與見解如何轉化為社群的具體下一步行動，確保本次峰會所凝聚的動能在會後持續延伸。"],"agnd281-how-becoming-an-underdog-become-my-superpower":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載從未公開的洞見與啟發。傑出的新創公司創辦人走上「黃色圓圈」，敞開心扉分享他們的個人掙扎與挑戰，讓這些故事成為其他創業者學習、鼓舞與激勵的源泉。"],"agnd139-smaller-models-embodied-applications-and-novel-approaches-preparing-for-the-next-wave-of-ai-innovation":["The era of agentic AI is just the beginning. The next wave of AI innovations promises to redefine how financial services are designed, delivered, and scaled. These include small language models, which promise greater reliability for financial services; swarm AI that leverages collective intelligence, embodied AI in physical financial devices, and the looming spectre of AGI.\n\nThis session brings together leading voices from fintech and technology, to explore the long-term opportunities and challenges of next-generation AI in financial services. Panelists will discuss how these innovations can drive smarter, faster, and more resilient systems, the role AI will play in complex financial environments, and what ethical, regulatory, and operational considerations must be addressed in a post-agentic era.","Agentic AI 的時代只是個開端。下一波 AI 創新浪潮有望重新定義金融服務的設計、交付與規模化方式。這些創新包括：為金融服務提供更高可靠性的小型語言模型、運用集體智慧的群集 AI、應用於實體金融設備的具身 AI，以及逼近視野的 AGI 議題。\n\n本場次匯聚金融科技與科技領域的頂尖聲音，探討次世代 AI 在金融服務領域的長期機遇與挑戰。座談嘉賓將討論這些創新如何打造更智慧、更快速、更具韌性的系統，AI 在複雜金融環境中的角色定位，以及在後 agentic 時代必須應對的倫理、監管與營運考量。"],"agnd545-singapore-sustainability-spotlight-more-green-bees-how-singapores-queen-bees-are-stepping-up-to-mobilise-sme-value-chains":["SMEs are the backbone of the economy and essential to driving meaningful decarbonisation across industries and value chains. Yet many SMEs remain on the sustainability sidelines and struggle to see the benefits of going green amidst other competing business and operational priorities.\n\nLarger organisations are uniquely positioned to change this narrative by virtue of their business influence and buying power. These ‘Queen Bees’ can play pivotal roles in connecting SME partners and suppliers to green solutions, incentivising green behaviours through procurements and supply chain access, and uplifting SMEs by partnering the public and private sectors to drive collective recognition of good performers.\n\nThis session brings together leading Queen Bees to share their initiatives to generate ecosystem-wide impacts, and insights from walking the sustainability journey with SMEs.","SME 是經濟的支柱，對推動各產業與價值鏈的實質去碳化不可或缺。然而，許多 SME 仍遊走於永續發展的邊緣，在面對其他商業與營運優先事項的競爭壓力下，難以看見走向綠色轉型的實際效益。\n\n大型企業憑藉其商業影響力與採購力，擁有改變此一局面的獨特優勢。這些「女王蜂」企業可以扮演關鍵角色：協助中小型供應商與合作夥伴接軌綠色解決方案、透過採購與供應鏈准入激勵綠色行為，並攜手公私部門共同推動對績優企業的集體肯定。\n\n本場次匯集業界領先的「女王蜂」企業，分享各自推動生態系整體影響力的舉措，以及與 SME 共同踐行永續旅程的寶貴洞見。"],"agnd203-payments-2035-reimagining-the-value-chain":["The global payments stack is being rapidly redefined by blockchain-based settlement, embedded finance, digital wallets, and real-time rails. From e-commerce giants to global banks, big tech platforms, and fintechs, both traditional and emerging players are redefining how money can move across borders, platforms, and experiences. In 10 years, what will payments look like at every step of the value chain, from initiation to settlement?\n\nThis panel session will explore how emerging technologies are reshaping, and will continue to reshape, the payments value chain, where the opportunities for monetization will lie in the future of payments, what a favourable policy environment will look like, and what an inclusive payments ecosystem will look like in the coming decade.","全球支付架構正被區塊鏈結算、嵌入式金融、數位錢包與即時支付軌道迅速重塑。從電商巨頭到全球性銀行、大型科技平台與金融科技公司，傳統與新興業者都在重新定義資金跨境流動、跨平台流通與使用體驗的方式。展望十年後，從發起到結算的每一個支付環節將呈現何種面貌？\n\n本場小組討論將探討新興技術如何重塑——並將持續重塑——支付價值鏈，未來的支付生態中商業化機會將落在何處，什麼樣的政策環境最有利於發展，以及未來十年一個具包容性的支付生態系統將呈現何種風貌。"],"agnd734-finmonda-demo":["Witness the start of the new digital GFTN Solution: FinMonda. From market intelligence, strategy creation and collaboration, GFTN now provides a unique digital solution for the network","親眼見證 GFTN 全新數位解決方案 FinMonda 的誕生。涵蓋市場情報、策略制定與協作功能，GFTN 現為其網絡提供一套獨特的數位化解決方案。"],"agnd126-silent-crisis-prioritising-organisational-wellbeing-in-the-age-of-machines":["In an era defined by digital acceleration, the very technologies designed to empower us are also quietly eroding our mental well-being. With the rise of remote work, AI productivity tools, and 24/7 connectivity, the boundaries between work and life have all but disappeared. Many workers now find themselves overwhelmed, isolated, and constantly \"on”, with little room to rest, disconnect, or recover.\n\nAlthough wellness initiatives have gained traction, many still frame wellbeing as an individual issue rather than a structural one. Research from The University of Oxford's Wellbeing Research Centre had found that individual-level wellbeing interventions, while popular, deliver little benefits and may even cause harm.\n\nIncreasingly, evidence points towards organisation-wide approaches as the more effective path forward. Singapore-registered IPC, WorkWell Leaders, for example, found that organisational wellbeing is the single most important driver of organisational performance, out of more than 200 factors studied.\n\nThis panel brings together experts to explore how companies can rethink culture, strengthen organisational well-being and unlock sustainable performance.","在數位化加速發展的時代，那些原本設計來賦能我們的技術，卻也正悄悄侵蝕著我們的心理健康。隨著遠端工作、AI 生產力工具與全天候網路連結的普及，工作與生活之間的界線幾乎已蕩然無存。許多工作者如今深感不堪重負、孤立無援，幾乎隨時處於「待機」狀態，幾乎沒有喘息、脫離與恢復的空間。\n\n儘管職場健康促進計畫日益受到重視，許多計畫仍將身心健康視為個人問題，而非結構性問題。牛津大學身心健康研究中心的研究發現，個人層面的健康干預措施雖然廣受歡迎，但實際效益甚微，甚至可能造成反效果。\n\n越來越多的證據指向組織層面的整體介入方式，才是更有效的前進路徑。例如，在新加坡登記的公益機構 WorkWell Leaders 發現，在逾 200 個研究因素中，組織健康是驅動組織績效的單一最重要因素。\n\n本場小組討論匯集各方專家，共同探討企業如何重新思考組織文化、強化整體健康，並釋放永續績效的潛力。"],"agnd271-the-rise-of-a-borderless-generation":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載未曾公開的洞見與啟發。傑出新創創辦人走上「黃圈」，坦然分享他們的個人挫折與挑戰，讓這些故事成為其他創業者學習、鼓勵與汲取靈感的來源。"],"agnd328-intelligent-infrastructure-rewiring-the-foundations-of-banking-for-ai-readiness":["AI is no longer just powering chatbots or credit scoring, but also fast becoming the new operating system of modern banking. However, realizing the potential of AI-ready infrastructure demands robust data foundations, new engineering cultures, and strong governance frameworks.\n\nIn this dialogue, leaders from banking and fintech infrastructure will discuss how AI can reshape the very architecture of financial institutions, what it takes to move from experimentation to systemic transformation, and what AI-native banking could look like in the decade ahead.","AI 已不再只是驅動聊天機器人或信用評分的工具，而是迅速成為現代銀行業的新作業系統。然而，要實現 AI 就緒基礎設施的潛力，需要穩健的資料基礎、全新的工程文化，以及完善的治理框架。\n\n在本場對話中，來自銀行業與金融科技基礎設施領域的領導者將探討 AI 如何重塑金融機構的核心架構，從實驗走向系統性轉型需要具備哪些條件，以及 AI 原生銀行業在未來十年可能呈現的樣貌。"],"agnd283-safe-doesnt-fly":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載未曾公開的洞見與啟發。傑出新創創辦人走上「黃圈」，坦然分享他們的個人挫折與挑戰，讓這些故事成為其他創業者學習、鼓勵與汲取靈感的來源。"],"agnd144-from-cash-to-capital-unlocking-sme-inclusion-and-growth-through-innovation":["Payments and financial innovation is transforming small business growth, but the real challenge lies in turning breakthrough technologies into measurable solutions for SMEs facing high cross-border fees, delayed payment cycles, inadequate risk protection, and limited access to formal banking.\n\nThis session brings together leaders from payment innovators, insurers, traditional banks, and technology platforms to explore what works, what doesn't, and why. Panelists will discuss how to deploy stablecoins, embedded finance, and digital protection solutions through interoperable payment infrastructure to deliver tangible cost savings, instant settlements, and greater resilience for SMEs while creating sustainable business models that can scale across emerging markets.","支付與金融創新正在改變小型企業的成長軌跡，但真正的挑戰在於如何將突破性技術轉化為能解決 SME 實際問題的可量化方案——包括高昂的跨境費用、延遲的付款週期、不足的風險保障，以及有限的正規銀行管道。\n\n本場次匯集來自支付創新業者、保險公司、傳統銀行與科技平台的領導者，共同探討哪些方法行之有效、哪些尚有不足，以及背後的原因。與談者將討論如何透過可互通的支付基礎設施，部署穩定幣、嵌入式金融與數位保障解決方案，為 SME 帶來實質的成本節省、即時結算與更強的韌性，同時打造可在新興市場規模化的永續商業模式。"],"agnd735-meet-alfin-your-intelligent-insights-engine-for-the-financial-industry":["ALFIN is more than an AI intelligence engine, it's the central brain for financial intelligence. It’s the outcome of ten years of industry innovation, collective intelligence, and relentless refinement. Join us at this session to learn more about how ALFIN can help you turn ideas into intelligence.","ALFIN 不僅是一個 AI 智能引擎，更是金融智能的核心大腦。它是十年產業創新、集體智慧與不懈精進的成果結晶。歡迎蒞臨本場次，深入了解 ALFIN 如何協助您將想法轉化為智能洞見。"],"agnd321-policymakers-dialogue-building-trust-stability-and-innovation-in-the-next-era-of-money":["As central banks around the world experiment with CBDCs, tokenised deposits, and stablecoin regulation, the global monetary system is entering a decisive phase of transformation. The stakes are high: innovation must be balanced with resilience, while trust must be safeguarded in a digital era where technology is evolving faster than governance.\n\nThis high-level dialogue brings together central bank governors to share perspectives on the future of money. The discussion will explore how CBDCs and digital money can coexist with traditional banking, what forms of cross-border cooperation are needed to avoid fragmentation, and how policymakers can ensure innovation strengthens rather than undermines financial stability and systemic trust.","隨著全球各央行積極試驗 CBDC、代幣化存款與穩定幣監管，全球貨幣體系正步入決定性的變革階段。局勢之重大不容小覷：創新必須與韌性取得平衡，而在技術演進速度遠超治理能力的數位時代，信任的守護更是至關重要。\n\n本場高階對話匯集各央行總裁，共同分享對貨幣未來的前瞻洞見。討論將深入探討 CBDC 與數位貨幣如何與傳統銀行業共存、需要哪些形式的跨境合作以避免體系碎裂化，以及政策制定者如何確保創新能強化而非削弱金融穩定與系統性信任。"],"agnd125-capacity-building-at-scale-empowering-the-next-billion-talents-of-the-global-south":["As the future of work rapidly evolves, traditional job-focused upskilling is no longer enough. This session explores strategies to equip the next billion people with entrepreneurial and innovation skills, preparing them to create opportunities in a disrupted global job landscape. Experts will share actionable approaches, technology-driven solutions and partnership models to help participants foster creativity, resilience and self-driven growth at scale.","隨著未來工作形態的快速演變，以職位為導向的傳統提升技能方式已不再足夠。本場次探討如何為全球南方下一個十億人才配備創業精神與創新能力，使他們有能力在動盪的全球就業環境中自行開創機會。專家將分享可付諸實踐的策略、科技驅動的解決方案，以及能協助參與者在規模化之下培育創造力、韌性與自驅成長的合作模式。"],"agnd284-the-art-of-eating-glass":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載未曾公開的洞見與啟發。傑出新創創辦人走上「黃圈」，坦然分享他們的個人挫折與挑戰，讓這些故事成為其他創業者學習、鼓勵與汲取靈感的來源。"],"agnd287-tokenization-and-treasury-practical-opportunities-in-liquidity-settlement-and-fx-flows":["Tokenization is no longer just a promise: it’s starting to move real money. From tokenized deposits to on-chain settlement experiments, the potential for faster liquidity, lower FX costs, and 24/7 treasury operations is taking shape. Yet adoption remains uneven, with corporate treasurers cautious about regulatory uncertainty, fragmented platforms, and the readiness of custody and interoperability solutions.\n\nThis session will ask: where is tokenization already delivering tangible benefits in liquidity, settlement, and FX flows, and where is it still stuck in the pilot stage? Panelists will explore the playbooks and roadblocks shaping adoption, offering a candid look at what’s ready for treasurers and financial institutions now and what must change before tokenization becomes the backbone of global value flows.","代幣化已不再只是一個承諾，而是開始真正驅動真實資金的流動。從代幣化存款到鏈上結算實驗，加速流動性、降低外匯成本，以及實現 24/7 全天候財資操作的潛力正逐步成形。然而，採用進程仍參差不齊，企業財務主管對監管不確定性、平台碎裂化，以及託管與互通性解決方案的成熟度仍持謹慎態度。\n\n本場次將提出這樣的問題：代幣化在流動性、結算與外匯流通方面已在哪些領域切實兌現了效益？又在哪些領域仍停留於試驗階段？與談者將深入探討形塑採用進程的實戰方法與現實障礙，坦誠評估當前哪些領域已為財務主管與金融機構做好準備，以及在代幣化真正成為全球價值流通骨幹之前，還有哪些方面亟需改變。"],"agnd276-hustle-with-heart-why-founders-should-build-with-purpose":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載未曾公開的洞見與啟發。傑出新創創辦人走上「黃圈」，坦然分享他們的個人挫折與挑戰，讓這些故事成為其他創業者學習、鼓勵與汲取靈感的來源。"],"agnd275-coding-for-disruption-the-power-of-meritocracy":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載未曾公開的洞見與啟發。傑出新創創辦人走上「黃圈」，坦然分享他們的個人挫折與挑戰，讓這些故事成為其他創業者學習、鼓勵與汲取靈感的來源。"],"agnd556-gftn-regional-networking-market-insights-hour-connecting-fintech-ecosystems-around-the-world-asean-central-asia-corridor":["This session brings together key players from the ASEAN and Central Asia ecosystem including regulators, sponsors, exhibitors, and industry partners to explore opportunities and build meaningful connections.\n\nThe session opens with insights into regional market trends, emerging opportunities, and collaboration themes, followed by an informal networking hour over alcohol where you can foster direct relationships with decision-makers and the GFTN team.\n\nWhether you're exploring market entry, developing strategic partnerships, or identifying investment opportunities, the GFTN Regional Networking Hour provides direct access to the right stakeholders in one collaborative space.\n\nRegister Here","本場次匯集 ASEAN 與中亞生態系的重要參與者，包括監管機構、贊助商、參展商及產業夥伴，共同探索合作機會並建立有意義的連結。\n\n場次開場將帶來區域市場趨勢、新興機遇與合作主題的精闢洞見，隨後進入輕鬆的酒會交流時段，讓您與決策者及 GFTN 團隊直接建立關係。\n\n無論您正在評估市場進入策略、尋求戰略夥伴關係，或鎖定投資機會，GFTN 區域交流時段都能讓您在同一個協作空間中直接接觸到合適的關鍵利益相關者。\n\n立即報名"],"agnd292-cross-border-at-crossroads-building-seamless-low-cost-global-remittance-solutions-that-work":["Cross-border payments and remittances remain one of the most important — and stubbornly complex — areas of financial services. Despite a decade of innovation, friction remains around cost, speed, compliance, and access. But new entrants, super-app ecosystems, and embedded finance are reshaping the field, while insurers and fintechs are beginning to play a bigger role in protecting and enabling flows.\n\nThis session brings together leaders from fintech, payments, and insurance to explore how the remittance and payments landscape is evolving. From the rise of wallet-based ecosystems in Asia to new corridors linking emerging markets, and from risk management to financial inclusion, the panel will debate where progress is real, where barriers remain, and what it will take to finally deliver truly seamless, low-cost global payments.","跨境支付與匯款始終是金融服務中最重要、也最頑固複雜的領域之一。儘管業界已歷經十年創新，圍繞成本、速度、合規與可及性的阻力依然存在。然而，新進業者、超級 App 生態系與嵌入式金融正在重塑這一領域，保險業與金融科技公司也開始在保障與促進資金流通方面扮演更重要的角色。\n\n本場次匯集來自金融科技、支付與保險業的領導者，共同探討匯款與支付格局的演變走向。從亞洲錢包生態系的崛起到連結新興市場的新興支付通道，從風險管理到普惠金融，與談者將就進展的真實程度、現存障礙，以及最終實現真正無縫、低成本全球支付所需的條件，展開深度辯論。"],"agnd713-kevins-untold-founder-story":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載未曾公開的洞見與啟發。傑出新創創辦人走上「黃圈」，坦然分享他們的個人挫折與挑戰，讓這些故事成為其他創業者學習、鼓勵與汲取靈感的來源。"],"agnd128-fostering-startup-energy-in-large-institutions":["Organisations face a critical tension: the startup energy that attracts top talent - speed, experimentation, risk-taking - often clashes with corporate necessities like governance, controls, and operational consistency. As competition for talented individuals intensifies, how can leaders navigate this trade-off without sacrificing either agility or stability?\n\nDrawing on real-world examples, panelists will share actionable strategies for attracting entrepreneurial talent, developing future innovators, and strategically leveraging corporate resources to stay competitive as disruptive technology reshapes the skills landscape.","大型組織面臨一個核心矛盾：能吸引頂尖人才的新創精神——速度、實驗精神與承擔風險的意願——往往與企業必要的治理、內控及營運一致性相互衝突。隨著搶奪優秀人才的競爭日益激烈，領導者如何在不犧牲敏捷性或穩定性的前提下，妥善駕馭這一取捨？\n\n與談者將以真實案例為基礎，分享吸引創業型人才、培育未來創新者的可行策略，以及如何在顛覆性技術重塑技能格局之際，善用企業資源保持競爭優勢。"],"agnd340-policymakers-dialogue-shaping-the-future-of-inclusive-digital-finance":["Digital financial services are redefining the boundaries of finance, opening unprecedented opportunities for SMEs, households, and entire economies to participate in growth. Across regions, the pace of innovation is remarkable. The growth of mobile finance ecosystems, fintech acceleration and instant payment network, advances in open banking and digital identity, and refreshing approaches to inclusion and interoperability. Together, these experiences show that the future of finance is increasingly digital, interconnected, and inclusive.\n \nLeadership today requires more than embracing innovation but also for shaping it responsibly. As digital systems expand across borders, policymakers face the challenge of ensuring that these gains are sustainable, affordable, and resilient to shocks, whether financial, technological, or geopolitical. The task ahead is to enable innovation that deepens trust, strengthens financial integrity, and truly reaches the last mile.\n \nPolicymakers are uniquely positioned to lead this transformation, being in the unique position of being the architects of the next generation of financial systems have to enable systems that must blend efficiency with equity, and innovation with inclusion. By building robust digital public infrastructure, enabling safe data exchange, and fostering open yet accountable innovation, public sector leaders can help ensure that digital finance becomes a force for shared prosperity.\n \nThis dialogue will focus on how government leaders are reimagining inclusive finance for the digital era, drawing lessons from their diverse experiences, exploring how digital tools can strengthen SME resilience and household financial health, and identifying opportunities for collaboration that can accelerate inclusive growth across regions.","數位金融服務正在重新定義金融的邊界，為 SME、家庭與整體經濟提供參與成長的前所未有的機遇。各地區的創新步伐令人矚目：行動金融生態系的蓬勃發展、金融科技加速器與即時支付網路的普及、開放銀行與數位身分的進步，以及在包容性與互通性方面令人耳目一新的探索。這些經驗共同揭示：金融的未來正日益走向數位化、互聯互通與普惠共融。\n \n當今的領導力不只在於擁抱創新，更在於負責任地引領創新方向。隨著數位體系跨越國界延伸，政策制定者面臨確保這些成果能夠永續、可負擔，並能抵禦各類衝擊（無論是金融、技術或地緣政治層面）的挑戰。未來的任務，是推動一種能深化信任、強化金融誠信，且真正觸達最末端受益者的創新。\n \n政策制定者肩負引領這一轉型的獨特使命，作為下一代金融體系的架構師，他們必須打造兼顧效率與公平、創新與包容的系統。透過建設穩健的數位公共基礎設施、促進安全的資料交換，以及推動開放且負責任的創新，公共部門領導者能夠確保數位金融成為共同繁榮的驅動力。\n \n本場對話將聚焦於政府領導者如何為數位時代重新構想普惠金融，汲取各方多元經驗的啟示，探討數位工具如何強化 SME 韌性與家庭財務健康，並尋找能夠加速各地區包容性成長的合作機遇。"],"agnd207-programmable-capital-markets-mainstream-infrastructure-and-long-term-opportunities-for-blockchain":["Ten years ago, blockchain was a disruptive idea just beginning to pique interest. Today, it underpins trillion-dollar markets, redefines asset custody, powers cross-border payments, and challenges the way trust is built in finance. But has it delivered on its promise — and where does it go from here?\n\nThis session invites industry leaders and innovators to critically examine blockchain’s journey so far, separating hype from hard-won progress. Together, panelists will explore scenarios for the next decade: from becoming mainstream financial infrastructure to the advent of programmable capital markets — and the risks, opportunities, and policy shifts that will shape the road ahead.","十年前，區塊鏈還只是一個剛開始引發關注的顛覆性構想。如今，它已支撐起兆美元規模的市場、重新定義資產託管方式、驅動跨境支付，並挑戰金融信任的建構模式。但它是否真正兌現了昔日的承諾？接下來又將走向何方？\n\n本場次邀請業界領袖與創新者對區塊鏈迄今的發展歷程進行批判性審視，剝離炒作成分，正視來之不易的真實進展。與談者將共同探討未來十年的多種情境：從成為主流金融基礎設施，到可程式化資本市場的到來——以及將塑造前進道路的風險、機遇與政策轉變。"],"agnd274-panel-ai-on-trial-what-ai-will-banks-pay-for-separating-enterprise-grade-value-from-a-gpt-wrapper":["Why this matters now:\n\nEvery financial institution is being inundated with pitches for \"AI-powered\" solutions. This has created a severe case of \"Diligence Fatigue\" among buyers, who struggle to differentiate between genuinely transformative AI and simple products wrapped in a thin layer of commodity generative AI. For fintechs, this means the bar for proving value has never been higher. This session is a frank conversation about what FIs are actually willing to buy, implement, and pay for in the AI space.\n\nWhat you'll walk away with:\n\nA crystal-clear understanding of the criteria that separate a successful AI sale from a failed one. Fintechs will learn how to refine their product and pitch, while buyers will gain a framework for assessing and de-risking the flood of AI solutions on the market.","為何此刻格外重要：\n\n每一家金融機構都正被「AI 賦能」解決方案的推銷所淹沒。這已在買方之間引發嚴重的「盡職調查疲勞」，他們難以區分真正具變革性的 AI 與僅以薄薄一層通用生成式 AI 包裝的普通產品。對金融科技公司而言，這意味著證明自身價值的門檻從未如此之高。本場次是一場坦誠的對話，直指金融機構在 AI 領域真正願意購買、部署並付費的究竟是什麼。\n\n您將帶走：\n\n對區分 AI 銷售成敗的關鍵評判標準，形成清晰透徹的理解。金融科技公司將學習如何精煉產品定位與銷售論述，而買方則將獲得一套評估市場上大量 AI 解決方案並進行去風險化的實用框架。"],"agnd119-preparing-for-q-day-quantum-migration-for-payments-core-banking-and-financial-services":["Quantum computers could one day break today’s encryption, putting financial data, payments, and digital assets at risk. This panel unpacks the coming “Q‑Day,” when migration to quantum‑safe systems becomes urgent, and explores how businesses, governments, and technology providers can prepare now to ensure security, trust, and resilience.","量子電腦有朝一日可能破解現有加密體系，使金融資料、支付系統與數位資產面臨風險。本場小組討論將深入剖析即將到來的「Q-Day」——屆時遷移至量子安全體系將成為迫切需求——並探討企業、政府與科技供應商如何從現在開始未雨綢繆，確保安全性、信任與韌性。"],"agnd164-road-to-net-zero-reviving-momentum-mobilising-capabilities-and-financing-the-transition":["As global emissions continue to rise, the goal of net-zero by 2050 seems to be an increasingly difficult goal to achieve. This session will dive deep into the question of whether net-zero emissions can truly be achieved in the coming years, the measures and solutions that leaders and organisations can take to support and revive flagging net-zero momentum, and how the financial sector can mobilise capital and capabilities toward a net-zero, climate-resilient, and socially inclusive future.","隨著全球排放量持續攀升，2050 年達到淨零的目標似乎愈發難以實現。本場次將深度探討淨零排放在未來數年內是否真的可能實現、領導者與組織可採取哪些措施與解決方案來支撐並重振疲軟的淨零動能，以及金融部門如何動員資本與能力，共同邁向淨零、氣候韌性與社會包容的未來。"],"agnd190-bridging-gaps-building-foundations-digital-public-infrastructure-and-social-protection-for-inclusive-growth":["As digital public infrastructure becomes the backbone of inclusive finance, the next frontier lies in extending its reach to social protection, pensions, and insurance ecosystems. By linking digital identity, payments, and data platforms with new policy and product designs, governments and financial institutions can unlock powerful pathways for resilience and long-term security.\n\nThis session will bring together leaders from the public and private sector to discuss how digital foundations can enable access to savings, pensions, and insurance for underserved populations.\n\nThe discussion will explore:","隨著數位公共基礎設施成為普惠金融的支柱，下一個前沿在於將其觸角延伸至社會保障、退休金與保險生態系。透過將數位身分、支付與資料平台與全新的政策及產品設計相結合，政府與金融機構得以開闢強大的韌性與長期保障路徑。\n\n本場次將匯集公私部門領導者，共同探討數位基礎如何為弱勢族群提供儲蓄、退休金與保險的管道。\n\n討論將深入探索："],"agnd526-frontier-stage-day-3-wrap-up":["Watch this space for more information!","敬請期待更多資訊！"],"agnd213-new-financial-corridors-stability-innovation-and-connectivity":["As global financial networks evolve amid technological and geopolitical shifts, new financial corridors are emerging to connect markets, capital, and innovation ecosystems. Central banks and regulators play a pivotal role in shaping these linkages, balancing the imperatives of financial stability, regulatory integrity, and technological progress.\n\nThis session convenes central bank leaders to discuss how digital transformation, regulatory innovation, and cross-border collaboration are redefining financial connectivity. The dialogue will explore how digital public infrastructure, tokenised assets, and cross-border payment linkages can strengthen resilience, transparency, and inclusion across regions.","隨著全球金融網絡在技術與地緣政治的雙重變局中持續演進，連結市場、資本與創新生態系的新金融通道正應運而生。央行與監管機構在塑造這些連結方面扮演關鍵角色，需在金融穩定、監管誠信與技術進步的多重要求之間取得平衡。\n\n本場次匯集各央行領導者，共同探討數位轉型、監管創新與跨境合作如何重新定義金融互聯互通。對話將深入探索數位公共基礎設施、代幣化資產與跨境支付連結，如何跨區域強化韌性、透明度與包容性。"],"agnd327-impact-stage-day-3-wrap-up":["Watch this space for more information!","敬請期待更多資訊！"],"agnd305-the-founders-rock-":["You don't want to miss this one-of-a-kind industry networking where founders, regulators, and business leaders will jam together on stage to wrap up and celebrate this milestone SFF with a BANG!","這場獨一無二的業界交流活動絕對不容錯過——創辦人、監管機構與企業領袖將同台共演，為這個具里程碑意義的 SFF 畫下震撼人心的句號，一同狂歡慶賀！"]};
</script>
