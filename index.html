<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agenda · Singapore FinTech Festival 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SFF 2025 Agenda — Apple Calendar inspired
   Light + dark themes via CSS custom properties.
   ============================================================ */

:root {
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          "Helvetica Neue", "PingFang TC", "PingFang SC", "Noto Sans TC",
          "Microsoft JhengHei", system-ui, sans-serif;

  /* surfaces */
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface-2: #fbfbfd;
  --surface-hover: #f2f2f5;

  /* text */
  --text-strong: #1d1d1f;
  --text: #43434a;
  --text-soft: #86868b;
  --text-faint: #aeaeb2;

  /* lines */
  --separator: rgba(60, 60, 67, 0.10);
  --separator-strong: rgba(60, 60, 67, 0.18);
  --hairline: rgba(60, 60, 67, 0.07);

  /* interactive */
  --accent: #0a84ff;
  --accent-soft: rgba(10, 132, 255, 0.12);

  /* shape */
  --radius-chip: 7px;
  --radius-card: 16px;
  --radius-pill: 980px;

  /* layout (overridden inline by tweaks) */
  --gutter-w: 60px;
  --head-h: 56px;
  --shadow-pop: 0 1px 2px rgba(0,0,0,.04), 0 12px 40px rgba(0,0,0,.16);
  --shadow-chip: 0 6px 20px rgba(0,0,0,.14);

  color-scheme: light;
}

[data-theme="dark"] {
  --bg: #000000;
  --surface: #1c1c1e;
  --surface-2: #161618;
  --surface-hover: #2a2a2c;

  --text-strong: #f5f5f7;
  --text: #d6d6da;
  --text-soft: #98989d;
  --text-faint: #6c6c70;

  --separator: rgba(120, 120, 128, 0.28);
  --separator-strong: rgba(120, 120, 128, 0.42);
  --hairline: rgba(120, 120, 128, 0.16);

  --accent: #0a84ff;
  --accent-soft: rgba(10, 132, 255, 0.22);

  --shadow-pop: 0 1px 2px rgba(0,0,0,.3), 0 16px 48px rgba(0,0,0,.55);
  --shadow-chip: 0 8px 26px rgba(0,0,0,.5);

  color-scheme: dark;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-strong);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-variant-numeric: tabular-nums;
}
#root { height: 100%; }

/* ---------- track colors ---------- */
.tk-DA { --c: #2f6fe0; }
.tk-NT { --c: #0e9fb3; }
.tk-SF { --c: #df4d47; }
.tk-BG { --c: #c2952a; }
.tk-AQ { --c: #6a5ae0; }
.tk-TT { --c: #db5793; }
.tk-SU { --c: #2fa15a; }
.tk-EE { --c: #e2743a; }
.tk-OT { --c: #8a8a8e; }

/* ============================================================
   App shell
   ============================================================ */
.app { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--separator);
}
.brand { display: flex; flex-direction: column; gap: 1px; margin-right: auto; }
.brand .t1 {
  font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
  color: var(--text-strong);
}
.brand .t2 { font-size: 12px; color: var(--text-soft); letter-spacing: .01em; }

/* segmented control (Apple style) */
.seg {
  display: inline-flex; background: var(--surface-hover);
  border-radius: 9px; padding: 2px; gap: 2px;
}
.seg button {
  font: inherit; font-size: 13px; font-weight: 500;
  border: none; background: transparent; color: var(--text);
  padding: 5px 14px; border-radius: 7px; cursor: pointer;
  transition: background .15s, color .15s; white-space: nowrap;
}
.seg button.on {
  background: var(--surface);
  color: var(--text-strong);
  box-shadow: 0 1px 2px rgba(0,0,0,.12), 0 1px 1px rgba(0,0,0,.04);
}
[data-theme="dark"] .seg button.on { background: #48484a; }

.icon-btn {
  width: 34px; height: 34px; border-radius: 9px; border: none;
  background: var(--surface-hover); color: var(--text);
  cursor: pointer; font-size: 16px; display: grid; place-items: center;
  transition: background .15s;
}
.icon-btn:hover { background: var(--separator-strong); }

.reg-btn {
  font: inherit; font-size: 13px; font-weight: 600;
  background: var(--accent); color: #fff; text-decoration: none;
  padding: 7px 16px; border-radius: var(--radius-pill);
}

/* ---------- day selector ---------- */
.daybar {
  display: flex; align-items: stretch; gap: 8px;
  padding: 12px 24px; background: var(--surface);
  border-bottom: 1px solid var(--separator);
  overflow-x: auto;
}
.day {
  flex: 0 0 auto; min-width: 116px;
  border: 1px solid var(--separator-strong); background: transparent;
  border-radius: 12px; padding: 8px 14px; cursor: pointer; text-align: left;
  font: inherit; color: var(--text); transition: background .15s, border-color .15s;
  display: flex; flex-direction: column; gap: 2px;
}
.day:hover { background: var(--surface-hover); }
.day .dn { font-size: 12px; font-weight: 500; color: var(--text-soft); }
.day .dd { font-size: 16px; font-weight: 600; color: var(--text-strong); letter-spacing: -0.01em; }
.day .dl { font-size: 11px; color: var(--text-soft); }
.day.on {
  background: var(--accent); border-color: var(--accent);
}
.day.on .dn, .day.on .dd, .day.on .dl { color: #fff; }
.day.on .dn, .day.on .dl { color: rgba(255,255,255,.82); }

/* ---------- legend ---------- */
.legend {
  display: flex; flex-wrap: wrap; align-items: center; gap: 7px 16px;
  padding: 10px 24px; background: var(--surface-2);
  border-bottom: 1px solid var(--separator);
  font-size: 12px; color: var(--text-soft);
}
.legend .lg { display: inline-flex; align-items: center; gap: 6px; }
.legend .dot { width: 9px; height: 9px; border-radius: 3px; background: var(--c); display: inline-block; }
.legend .sep { margin-left: auto; }
.legend .mk { display: inline-flex; align-items: center; gap: 5px; }

/* ============================================================
   Calendar (grid) view
   ============================================================ */
.scroll { flex: 1; overflow: auto; background: var(--surface); position: relative; }

.cal { display: grid; position: relative; }

.corner {
  position: sticky; top: 0; left: 0; z-index: 45;
  height: var(--head-h); background: var(--surface);
  border-right: 1px solid var(--separator);
  border-bottom: 1px solid var(--separator-strong);
}
.colhead {
  position: sticky; top: 0; z-index: 30;
  height: var(--head-h); background: var(--surface);
  border-bottom: 1px solid var(--separator-strong);
  border-left: 1px solid var(--separator);
  padding: 8px 10px; display: flex; flex-direction: column; justify-content: center;
  gap: 1px; overflow: hidden;
}
.colhead .code { font-size: 13px; font-weight: 650; color: var(--text-strong); letter-spacing: -0.01em; }
.colhead .name {
  font-size: 11px; color: var(--text-soft); line-height: 1.25;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.gutter {
  position: sticky; left: 0; z-index: 20;
  background: var(--surface);
  border-right: 1px solid var(--separator);
}
.hourlabel {
  position: absolute; right: 8px;
  font-size: 11px; font-weight: 500; color: var(--text-soft);
  letter-spacing: 0.01em;
}

.colbody {
  position: relative;
  border-left: 1px solid var(--separator);
  background-repeat: repeat;
}

/* event chip */
.ev {
  position: absolute;
  height: var(--h);
  border-radius: var(--radius-chip);
  padding: 4px 7px 4px 8px;
  overflow: hidden; cursor: pointer;
  border-left: 3px solid var(--c);
  background: color-mix(in srgb, var(--c) 13%, var(--surface));
  color: var(--text-strong);
  box-shadow: 0 0 0 1px var(--surface);
  transition: box-shadow .14s ease, transform .14s ease;
  display: flex; flex-direction: column; gap: 1px;
}
.ev:hover {
  height: auto; min-height: var(--h);
  z-index: 60; box-shadow: var(--shadow-chip);
  transform: translateY(-1px);
}
.ev .etm {
  font-size: 10.5px; font-weight: 500; color: var(--text-soft);
  white-space: nowrap; line-height: 1.2;
}
.ev .ett {
  font-size: 12px; font-weight: 600; line-height: 1.28; letter-spacing: -0.005em;
  color: var(--text-strong);
  display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden;
  -webkit-line-clamp: var(--lines, 2);
}
.ev:hover .ett { -webkit-line-clamp: unset; }
.ev .mk { position: absolute; top: 4px; right: 5px; font-size: 9.5px; opacity: .8; }

/* color intensity variants */
[data-ci="subtle"] .ev { background: color-mix(in srgb, var(--c) 7%, var(--surface)); }
[data-ci="vivid"]  .ev { background: color-mix(in srgb, var(--c) 24%, var(--surface)); }
[data-ci="vivid"]  .ev .ett { color: color-mix(in srgb, var(--c) 62%, var(--text-strong)); }
[data-ci="vivid"]  .ev .etm { color: color-mix(in srgb, var(--c) 45%, var(--text-soft)); }

.empty {
  padding: 70px 24px; text-align: center; color: var(--text-soft); font-size: 14px;
}

/* ============================================================
   List / Agenda view
   ============================================================ */
.list { flex: 1; overflow: auto; background: var(--bg); }
.list-inner { max-width: 860px; margin: 0 auto; padding: 18px 20px 80px; }

.hourgroup { margin-top: 10px; }
.hourgroup-h {
  position: sticky; top: 0; z-index: 5;
  font-size: 12px; font-weight: 600; color: var(--text-soft);
  letter-spacing: 0.04em; padding: 12px 4px 8px;
  background: linear-gradient(var(--bg) 70%, transparent);
}

.litem {
  display: grid; grid-template-columns: 78px 1fr; gap: 14px;
  background: var(--surface); border: 1px solid var(--separator);
  border-radius: 14px; padding: 13px 16px; margin-bottom: 8px;
  cursor: pointer; transition: border-color .14s, box-shadow .14s, transform .14s;
}
.litem:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); transform: translateY(-1px); }
[data-theme="dark"] .litem:hover { box-shadow: 0 4px 16px rgba(0,0,0,.4); }
.litem .ltime { display: flex; flex-direction: column; gap: 2px; border-left: 3px solid var(--c); padding-left: 10px; }
.litem .ltime .s { font-size: 14px; font-weight: 600; color: var(--text-strong); }
.litem .ltime .e { font-size: 12px; color: var(--text-soft); }
.litem .ltime .dur { font-size: 10.5px; color: var(--text-faint); margin-top: 1px; }
.litem .lbody { min-width: 0; }
.litem .ltitle { font-size: 14.5px; font-weight: 600; line-height: 1.34; letter-spacing: -0.01em; color: var(--text-strong); }
.litem .lmeta { margin-top: 5px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px; font-size: 12px; color: var(--text-soft); }
.litem .lmeta .tk { display: inline-flex; align-items: center; gap: 5px; }
.litem .lmeta .tk .dot { width: 8px; height: 8px; border-radius: 2.5px; background: var(--c); }
.litem .lmeta .room { font-weight: 500; color: var(--text); }
.litem .lspk { margin-top: 6px; font-size: 12px; color: var(--text-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ============================================================
   Modal (event detail popover)
   ============================================================ */
.ov {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.32); backdrop-filter: blur(6px);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 7vh 16px 40px; overflow-y: auto;
  opacity: 0; pointer-events: none; transition: opacity .18s ease;
}
.ov.show { opacity: 1; pointer-events: auto; }
.modal {
  width: 100%; max-width: 540px; background: var(--surface);
  border-radius: var(--radius-card); box-shadow: var(--shadow-pop);
  border-top: 4px solid var(--c);
  padding: 26px 26px 24px; position: relative;
  transform: translateY(10px) scale(.98); transition: transform .2s cubic-bezier(.2,.7,.2,1);
}
.ov.show .modal { transform: none; }
.modal-grab { display: none; }
.modal .x {
  position: absolute; top: 16px; right: 16px; width: 28px; height: 28px;
  border: none; border-radius: 50%; background: var(--surface-hover);
  color: var(--text-soft); font-size: 16px; cursor: pointer; display: grid; place-items: center;
}
.modal .x:hover { background: var(--separator-strong); color: var(--text-strong); }
.modal .mtrack { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--c); letter-spacing: .01em; }
.modal .mtrack .dot { width: 9px; height: 9px; border-radius: 3px; background: var(--c); }
.modal h2 { margin-top: 10px; font-size: 21px; font-weight: 650; line-height: 1.32; letter-spacing: -0.02em; color: var(--text-strong); padding-right: 30px; }
.modal .mrow { margin-top: 16px; display: flex; gap: 11px; align-items: flex-start; font-size: 14px; color: var(--text); }
.modal .mrow .mi { width: 18px; flex: 0 0 18px; text-align: center; color: var(--text-faint); font-size: 13px; margin-top: 1px; }
.modal .mrow b { color: var(--text-strong); font-weight: 600; }
.modal .badges { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 7px; }
.badge { font-size: 12px; font-weight: 500; padding: 4px 11px; border-radius: var(--radius-pill); border: 1px solid var(--separator-strong); color: var(--text); }
.badge.open { color: #2fa15a; border-color: rgba(47,161,90,.4); background: rgba(47,161,90,.08); }
.badge.invite { color: #db5793; border-color: rgba(219,87,147,.4); background: rgba(219,87,147,.08); }
.badge.premium { color: #c2952a; border-color: rgba(194,149,42,.45); background: rgba(194,149,42,.10); }
.modal .spk { margin-top: 18px; }
.modal .spk .lab { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 9px; }
.modal .spk .chips { display: flex; flex-wrap: wrap; gap: 7px; }
.modal .spk .chip { font-size: 12.5px; padding: 5px 11px; border-radius: var(--radius-pill); background: var(--surface-hover); color: var(--text); }
.modal .spk .chip.more { cursor: pointer; border: none; font: inherit; font-size: 12.5px; font-weight: 600; color: var(--accent); background: var(--surface-hover); }
.modal .spk .chip.more:hover { background: var(--separator-strong); }
.modal .mdesc { margin-top: 18px; }
.modal .mdesc .lab { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 9px; }
.modal .mdesc p { font-size: 14px; line-height: 1.62; color: var(--text); margin: 0 0 10px; white-space: pre-line; }
.modal .mdesc p:last-child { margin-bottom: 0; }
.modal .mdesc em { font-style: italic; color: var(--text-strong); }
.litem .ldesc { margin-top: 6px; font-size: 12px; line-height: 1.5; color: var(--text-soft); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.mcard .mc-desc { margin-top: 8px; font-size: 12px; line-height: 1.5; color: var(--text-soft); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-align: left; }
.lang-btn { font-size: 13px; font-weight: 700; }
.mlang { border: none; background: var(--separator); color: var(--text); border-radius: var(--radius-pill); font-size: 12px; font-weight: 700; padding: 0 11px; height: 30px; cursor: pointer; }
.modal a.ext {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 20px;
  background: var(--accent); color: #fff; text-decoration: none;
  font-size: 14px; font-weight: 600; padding: 9px 18px; border-radius: var(--radius-pill);
}

/* scrollbars */
.scroll::-webkit-scrollbar, .list::-webkit-scrollbar { width: 11px; height: 11px; }
.scroll::-webkit-scrollbar-thumb, .list::-webkit-scrollbar-thumb {
  background: var(--separator-strong); border-radius: 6px; border: 3px solid var(--surface);
}
.daybar::-webkit-scrollbar { height: 0; }

@media (max-width: 640px) {
  .topbar, .daybar, .legend { padding-left: 14px; padding-right: 14px; }
  .brand .t1 { font-size: 15px; }
}

/* ============================================================
   Mobile — responsive single-column timeline (g0v-inspired)
   ============================================================ */
.mapp { display: flex; flex-direction: column; height: 100%; background: var(--bg); overflow: hidden; }
.mapp.framed {
  max-width: 430px; margin: 0 auto;
  border-left: 1px solid var(--separator-strong);
  border-right: 1px solid var(--separator-strong);
}

.mtopbar {
  flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
  padding: calc(env(safe-area-inset-top, 0px) + 11px) 16px 11px;
  background: var(--surface); border-bottom: 1px solid var(--separator);
}
.mbrand { display: flex; flex-direction: column; gap: 1px; margin-right: auto; min-width: 0; }
.mbrand .mb1 { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-strong); }
.mbrand .mb2 {
  font-size: 11px; color: var(--text-soft);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.micon {
  flex: 0 0 auto; width: 38px; height: 38px; border-radius: 11px; border: none;
  background: var(--surface-hover); color: var(--text); font-size: 17px; cursor: pointer;
  display: grid; place-items: center;
}
.micon:active { background: var(--separator-strong); }
.mtop-actions { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; }
.mtop-actions .mlang { width: 38px; height: 38px; border-radius: 11px; background: var(--surface-hover); padding: 0; }

.mdaystrip {
  flex: 0 0 auto; display: flex; gap: 7px; overflow-x: auto;
  padding: 9px 16px; background: var(--surface);
  border-bottom: 1px solid var(--separator); scrollbar-width: none;
}
.mdaystrip::-webkit-scrollbar { display: none; }
.mday {
  flex: 0 0 auto; min-width: 56px;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  border: 1px solid var(--separator-strong); background: transparent;
  border-radius: 12px; padding: 6px 12px; cursor: pointer; font: inherit; color: var(--text);
  transition: background .14s, border-color .14s;
}
.mday .md-wd { font-size: 11px; color: var(--text-soft); font-weight: 500; }
.mday .md-dt { font-size: 14.5px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
.mday.on { background: var(--accent); border-color: var(--accent); }
.mday.on .md-wd { color: rgba(255,255,255,.85); }
.mday.on .md-dt { color: #fff; }

.mfilterbar {
  flex: 0 0 auto; display: flex; gap: 8px; align-items: center;
  padding: 9px 16px; background: var(--surface-2);
  border-bottom: 1px solid var(--separator);
}
.msearch {
  flex: 1; display: flex; align-items: center; gap: 7px; min-width: 0;
  background: var(--surface-hover); border-radius: 10px; padding: 0 10px; height: 38px;
}
.msearch-i { font-size: 17px; color: var(--text-soft); }
.msearch input {
  flex: 1; min-width: 0; border: none; background: transparent; outline: none;
  font: inherit; font-size: 14px; color: var(--text-strong);
}
.msearch input::placeholder { color: var(--text-faint); }
.msearch-x { border: none; background: none; color: var(--text-soft); font-size: 19px; line-height: 1; cursor: pointer; padding: 0 2px; }
.mfbtn {
  flex: 0 0 auto; height: 38px; padding: 0 15px; border-radius: 10px;
  border: 1px solid var(--separator-strong); background: var(--surface);
  font: inherit; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer;
  white-space: nowrap;
}
.mfbtn.on { background: var(--accent); border-color: var(--accent); color: #fff; }

.mlist {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 44px);
}
.mgroup-h {
  position: sticky; top: 0; z-index: 5;
  display: flex; align-items: center; gap: 10px; padding: 14px 2px 8px;
  background: linear-gradient(var(--bg) 72%, transparent);
}
.mgroup-h .mh-time { font-size: 13px; font-weight: 700; color: var(--text-strong); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
.mgroup-h .mh-line { flex: 1; height: 1px; background: var(--separator); }
.mgroup-h .mh-cnt { font-size: 11px; font-weight: 600; color: var(--text-faint); }

.mcard {
  display: block; width: 100%; text-align: left;
  background: var(--surface); border: 1px solid var(--separator);
  border-left: 3px solid var(--c); border-radius: 13px;
  padding: 11px 13px 12px; margin-bottom: 8px;
  cursor: pointer; font: inherit; color: var(--text-strong);
  -webkit-tap-highlight-color: transparent; transition: transform .12s ease;
}
.mcard:active { transform: scale(.985); }
.mc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.mc-time { font-size: 12.5px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; white-space: nowrap; }
.mc-dur { font-size: 11px; color: var(--text-faint); }
.mc-mk { margin-left: auto; font-size: 11px; opacity: .75; }
.mc-title {
  font-size: 15px; font-weight: 600; line-height: 1.34; letter-spacing: -0.01em;
  color: var(--text-strong); text-wrap: pretty;
  display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden;
}
.mc-meta { margin-top: 8px; display: flex; align-items: center; gap: 9px; min-width: 0; }

<script>

window.SFF_DESC = {"agn90-trusted-data-corridors-how-will-we-get-there-designing-a-roadmap-for-the-future":["Cross-border data flows are the invisible rails powering the digital economy including digital transactions, financial services and digital payments.\n\nYet, there are competing priorities and policies that manage this flow of data across the region.\n\nHow do we bridge these divides and build _trusted data corridors_ that can help unlock the region’s economic potential and allow businesses to innovate, expand and compete while respecting national data rules?\n\nThis interactive, audience hands on deck, 90-minute brainstorming session brings together senior leaders from financial services, fintechs, regulators, and policymakers to go beyond theory and co-create solutions through case studies and small-group problem-solving to identify actionable solutions, and chart the next steps toward seamless, trusted cross-border data transfers in ASEAN and across regions.\n\nJoin us to design the future of trusted cross border data flows to supercharge trade, commerce and financial services. Additional registration is required to participate in this design-thinking workshop. Write to insights@gftn.com if you wish to reserve a spot.","跨境數據流動是驅動數位經濟的隱形軌道，涵蓋數位交易、金融服務與數位支付等各個層面。\n\n然而，在管理區域數據流動方面，各方存在相互競爭的優先考量與政策取向。\n\n我們如何彌合這些分歧，建立_可信賴的數據通道_，從而釋放區域經濟潛力，讓企業得以創新、拓展版圖並提升競爭力，同時尊重各國的數據法規？\n\n這場互動式、全員參與的90分鐘腦力激盪工作坊，匯聚來自金融服務、金融科技、監管機構及政策制定者的資深領袖，超越理論層次，透過案例研究與小組問題解決，共同創建解決方案，找出可付諸實施的行動方案，並規劃推動ASEAN及跨區域無縫、可信賴的跨境數據傳輸的下一步。\n\n誠邀您加入，共同設計可信賴的跨境數據流動的未來，為貿易、商業及金融服務注入強大動能。參與本設計思維工作坊須另行報名。如欲預留名額，請致函 insights@gftn.com。"],"agn103-evolution-vs-reinvention-shaping-the-future-of-global-commerce-powered-by-amazon":["The curation of content and speakers was wholly managed by Amazon and does not reflect the views of the organisers or its staff.\n\nAs global commerce evolves, persistent frictions in cross-border payments continue to hinder SME growth and innovation. This closed-door policy dialogue confronts a critical choice: should we evolve existing rails or reinvent global payments infrastructure altogether? Featuring two lightning talks and a dynamic moderated debate, this session explores competing policy visions – from improving instant payments to enabling stablecoins and programmable finance. Participants will gain insight into real-world challenges, policy trade-offs, and future-ready strategies to foster inclusion, trust, and innovation in global commerce.","本場次的內容策劃與講者遴選由 Amazon 全權負責，不代表主辦方或其工作人員的立場。\n\n隨著全球商業格局持續演變，跨境支付中長期存在的摩擦仍在阻礙 SME 的成長與創新。這場閉門政策對話正面回應一個關鍵抉擇：我們究竟應該升級現有支付軌道，還是徹底重塑全球支付基礎設施？本場次以兩段閃電演講搭配精彩的主題辯論為主軸，探討各方競爭的政策願景——從提升即時支付效能，到推動穩定幣與可程式化金融的落地應用。與會者將深入了解現實挑戰、政策取捨，以及促進全球商業包容性、建立信任、推動創新的前瞻策略。"],"agn111-aifc-connect-singapore-2025":["The curation of content and speakers was wholly managed by AIFC and does not reflect the views of the organisers or its staff.\n\nJoin us at AIFC Connect: Singapore 2025, an exclusive event spotlighting Kazakhstan’s investment potential and financial market opportunities.\n\nExplore the role of the Astana International Financial Centre (AIFC) in attracting global capital, structuring deals, fostering innovation in fintech and digital assets, and supporting foreign investors through world-class legal and regulatory frameworks.\n\nGain firsthand insights from businesses operating within the AIFC and discover current investment opportunities. Discover emerging opportunities across Kazakhstan and Central Asia in asset management, capital markets, VC, fintech and innovation.\n\nAgenda\n\n09:00am – Registration and Welcome coffee\n\n.\n\n09:30am – Opening Remarks\n\nSpeaker: Mr. Askar Kuttykadam, His Excellency Ambassador of the Republic of Kazakhstan to Singapore\n\n.\n\n09:35am – Presentation: AIFC Overview and Key Benefits\n\nSpeaker: Bakhtiyar Tleubekov, Chairman of the Management Board, AIFC Authority\n\n.\n\n09:55am – Keynote: Understanding Astana Financial Services Authority: Overview, Role and Key Functions\n\nSpeaker: Ms. Evgeniya Bogdanova, CEO, AFSA\n\n.\n\n10:05am – Keynote: Kazakhstan economic outlook\n\nSpeaker: Diana Ablyakimova, Foreign Representative in Singapore, Kazakh Invest\n\n.\n\n10:10am – Fireside chat with Quest Ventures - Bridging APAC and Eurasia: Unlocking Growth Through AIFC\n\nSpeakers: Baurzhan Kankin, Chief Clients Officer, AIFC Authority, James Tan, Managing Partner, Quest Ventures\n\n.\n\n10:30am – Keynote: Unique investment opportunities in real assets\n\nSpeaker: Anastasiya Kim, CFO, BI Group South\n\n.\n\n10:50am – Coffee break\n\n.\n\n11:10am – Showcase: The Future of Finance: Exploring Fintech Innovations – Part 1\n\n.\n\n11:50am – Coffee break\n\n.\n\n12:10pm – Showcase: The Future of Finance: Exploring Fintech Innovations – Part 2\n\n.\n\n12:50pm - Closing Remarks\n\nSpeakers: Baurzhan Kankin\n\n.\n\n1:00pm - Networking and Refreshments session\n\n.\n\n2:00pm - Event ends\n\nInterested participants from Insights Forum may register for the event via this link:\n\nFor more information, please visit the event landing page here:","本場次的內容策劃與講者遴選由 AIFC 全權負責，不代表主辦方或其工作人員的立場。\n\n誠邀您蒞臨 AIFC Connect: Singapore 2025，這是一場聚焦哈薩克投資潛力與金融市場機遇的專屬盛會。\n\n探索阿斯塔納國際金融中心（AIFC）在吸引全球資本、構建交易架構、推動金融科技與數位資產創新，以及透過世界級法律與監管框架支持外國投資者方面所扮演的重要角色。\n\n從在 AIFC 運營的企業第一手獲取洞見，發掘當前的投資機會，並探索哈薩克及中亞地區在資產管理、資本市場、創業投資、金融科技與創新領域的新興商機。\n\n議程\n\n上午09:00 – 報到及迎賓咖啡\n\n.\n\n上午09:30 – 開幕致辭\n\n講者：Askar Kuttykadam 先生，哈薩克共和國駐新加坡大使閣下\n\n.\n\n上午09:35 – 簡報：AIFC 概況及主要優勢\n\n講者：Bakhtiyar Tleubekov，AIFC Authority 管理委員會主席\n\n.\n\n上午09:55 – 主題演講：認識阿斯塔納金融服務管理局：概況、職能與主要業務\n\n講者：Evgeniya Bogdanova 女士，AFSA 執行長\n\n.\n\n上午10:05 – 主題演講：哈薩克經濟展望\n\n講者：Diana Ablyakimova，Kazakh Invest 新加坡駐地代表\n\n.\n\n上午10:10 – 與 Quest Ventures 的爐邊對談——連結亞太與歐亞：透過 AIFC 解鎖成長動能\n\n講者：Baurzhan Kankin，AIFC Authority 首席客戶官；James Tan，Quest Ventures 管理合夥人\n\n.\n\n上午10:30 – 主題演講：實體資產的獨特投資機遇\n\n講者：Anastasiya Kim，BI Group South 財務長\n\n.\n\n上午10:50 – 咖啡休息\n\n.\n\n上午11:10 – 展示：金融的未來：探索金融科技創新——第一部分\n\n.\n\n上午11:50 – 咖啡休息\n\n.\n\n下午12:10 – 展示：金融的未來：探索金融科技創新——第二部分\n\n.\n\n下午12:50 – 閉幕致辭\n\n講者：Baurzhan Kankin\n\n.\n\n下午1:00 – 交流聯誼及茶點時間\n\n.\n\n下午2:00 – 活動結束\n\nInsights Forum 有意參加的與會者可透過以下連結報名：\n\n如需更多資訊，請瀏覽活動專頁："],"agn204-invite-only-artificial-intelligence-evaluation-tools-and-governance-frameworks":["The session is intended to provide regulators with an understanding of developments in AI applications and governance in financial services, with a focus on:\n\n•⁠ ⁠Designing a supervisory toolkit for evaluating AI systems in financial institutions.\n\n•⁠ ⁠How AI risks and oversight approaches differ between financial institutions, including use of ‘human-in-the-loop’ processes.\n\n•⁠ ⁠How supervisory approaches can evolve with technological advances.\n\n•⁠ ⁠Examples of effective supervisory practices.","本場次旨在協助監管機構深入了解 AI 在金融服務領域的應用發展與治理現況，重點涵蓋以下議題：\n\n•⁠ ⁠設計評估金融機構 AI 系統的監管工具箱。\n\n•⁠ ⁠不同金融機構在 AI 風險及監管方式上的差異，包括「人工在迴路」流程的應用。\n\n•⁠ ⁠監管方式如何隨技術進步而演進。\n\n•⁠ ⁠有效監管實踐的案例分享。"],"agn72-privacy-and-compliance-in-next-gen-fmi-beyond-the-binary":["Emerging technologies such as Multi-Party Computation (MPC), Zero-Knowledge Proofs (ZKPs), and Trusted Execution Environments (TEEs) are enabling new ways to embed compliance directly into cross-border transactions — without compromising data privacy or increasing operational overhead.\n\nThis session will convene experts from central banks, financial institutions, and technology providers to explore:\n\n• What constitutes a “regulatorily acceptable proof” and how such proofs can be designed for auditability, durability, and policy alignment.\n\n• How programmable compliance can be benchmarked against traditional approaches in terms of efficiency, cost, and effectiveness.\n\n• What codification and design principles are needed to translate legal policies into machine-readable logic while preserving trust and legal defensibility.\n\n• The fundamental tension between compliance needs and stronger privacy guarantees. How are these challenges intensified in cross-border context.\n\n• Regulatory requirements decoded. What are the compliance needs and how to move towards parameterization of compliance.\n\n• Design options, privacy enhancing technologies and maturity levels, current state of the art and evolving trends.","多方安全計算（MPC）、零知識證明（ZKP）以及可信執行環境（TEE）等新興技術，正在開創全新途徑，將合規要求直接嵌入跨境交易之中——既不妥協數據隱私，也不增加營運負擔。\n\n本場次將匯聚來自央行、金融機構及技術服務商的專家，共同探討：\n\n• 何謂「監管可接受的證明」，以及如何設計兼具可稽核性、持久性與政策一致性的證明機制。\n\n• 可程式化合規與傳統合規方式在效率、成本與效能上如何進行基準比較。\n\n• 需要哪些編碼設計原則，才能在維護信任與法律可辯護性的同時，將法律政策轉化為機器可讀的邏輯。\n\n• 合規需求與更強隱私保護之間的根本張力，以及這些挑戰在跨境情境下如何加劇。\n\n• 解碼監管要求：合規需求為何，以及如何朝合規參數化方向邁進。\n\n• 設計選項、隱私增強技術及其成熟度等級、當前最新發展趨勢。"],"agn197-gfin-tokenisation-global-perspectives-on-evolving-frameworks":["Tokenisation is reshaping the way financial markets think about assets, infrastructure, and regulation. This roundtable hosted by GFIN explores the regulatory lens on this transformation, examining the current landscape, the path to mass adoption, and the role global cooperation can play in shaping the future.\n\nObjectives:","代幣化正在重塑金融市場對於資產、基礎設施與監管的思維方式。這場由 GFIN 主辦的圓桌會議，從監管視角出發，審視這場轉型的現況、邁向大規模採用的路徑，以及全球協作在塑造未來方面所能發揮的作用。\n\n目標："],"agn69-build-local-connect-global-balancing-between-local-approaches-and-cross-border-linkages-in-global-dpi-development":["Since 2023, the digital public infrastructure (DPI) movement has gained global momentum, driven by the promise of improving financial inclusion, strengthening public and private service delivery, and enabling innovation. DPI refers to foundational digital systems, such as digital identity, payments, and data exchange, that allow private innovation to flourish securely and efficiently on shared public rails. It is now a central feature of development and governance discourse.\n\nThe infrastructure-first Indian model is the most visible today. Yet Europe, Asia, Africa, and the private sector are charting alternative paths, grounded in local regulatory philosophies, technical architectures, and rollout strategies. At the same time, one of DPI’s greatest promises lies in its ability to scale, connect across borders, and simplify payments, verification, and data flows regionally and even globally.\n\nThis roundtable will tackle the core challenge facing countries that are experimenting with their approaches to DPI: how can technology, policy, and civil society leaders design locally attuned DPI systems that achieve adoption, while ensuring global interoperability and avoiding further fragmentation of the digital economy? Panelists will debate governance models and standards shaping the next generation of DPI, from the global interoperability question to the right public-private balance, and launch a report to frame a path forward.","自2023年以來，數位公共基礎設施（DPI）運動在全球範圍內迅速擴展，其推動力來自於對提升金融普惠性、強化公私部門服務供給及激發創新的美好願景。DPI 是指數位身份、支付及數據交換等基礎數位系統，使私人創新能夠在共用公共軌道上安全、高效地蓬勃發展，如今已成為發展與治理論述的核心議題。\n\n目前最廣為人知的是以基礎設施優先為導向的印度模式。然而，歐洲、亞洲、非洲及私營部門正各自探索替代路徑，這些路徑植根於本地監管哲學、技術架構與推廣策略。與此同時，DPI 最大的潛力之一，在於其跨地區乃至全球範圍內擴展、互聯，以及簡化支付、身份驗證與數據流通的能力。\n\n本圓桌會議將直面各國在探索 DPI 路徑時所面臨的核心挑戰：技術、政策及公民社會的領導者，如何設計出兼顧本地需求的 DPI 系統，在確保全球互通性的同時推動廣泛採用，並避免數位經濟進一步碎片化？與會者將就塑造下一代 DPI 的治理模式與標準展開辯論——從全球互通性問題到公私平衡的最佳取向——並發布一份報告，為未來的發展路徑提供指引。"],"agn104-the-three-transformational-trends-reshaping-digital-finance-powered-by-banking-circle":["The curation of content and speakers was wholly managed by Banking Circle and does not reflect the views of the organisers or its staff.\n\nAs digital assets move from experimentation to infrastructure, this closed-door workshop convenes senior leaders, policymakers, and institutional innovators to examine the next chapter of digital finance. Designed for decision-makers shaping regulatory frameworks, market infrastructure, and institutional strategy, this session will unpack three macro trends that are redefining how capital, liquidity, and trust are built in the digital economy.\n\nWhat to Expect:\n\nThis is not a theoretical discussion. You’ll hear directly from senior executives and policy architects who have led real-world rollouts across tokenization, decentralized infrastructure, and programmable payments. Their insights will be grounded in implementation experience, regulatory engagement, and institutional adoption.\n\n1️⃣ Institutional Tokenization: Unlocking Equity Liquidity\n\nTokenization is enabling fractional ownership and 24/7 trading of traditionally illiquid assets — from private equity to pre-IPO giants like OpenAI. Hear from senior product leads and infrastructure heads who’ve moved from pilot to production, and are reshaping how capital is accessed and governed.\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n\n2️⃣ Decentralized Market Infrastructure\n\nDEX platforms like Aster and Hyperliquid are evolving into programmable liquidity layers. This session explores how decentralized infrastructure is bridging tokenized assets with institutional-grade execution, custody, and compliance — led by founders and trading heads.\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n\n3️⃣ Programmable Payments for Institutions\n\nStablecoin-powered networks like BPN and CPN are transforming cross-border flows. Learn how banks, PSPs, and corporates are deploying programmable money for treasury, FX, and settlement — with insights from global payment architects and regulatory advisors.","本場次的內容策劃與講者遴選由 Banking Circle 全權負責，不代表主辦方或其工作人員的立場。\n\n隨著數位資產從試驗探索走向正式基礎設施，這場閉門工作坊匯聚資深領袖、政策制定者及機構創新者，共同審視數位金融的下一個篇章。本場次專為主導監管框架制定、市場基礎設施建設及機構策略的決策者而設計，將深入剖析三大重塑數位經濟中資本、流動性與信任建構方式的宏觀趨勢。\n\n精彩預告：\n\n這不是一場紙上談兵的討論。您將直接聆聽資深高管與政策架構師的分享——他們曾主導代幣化、去中心化基礎設施及可程式化支付的真實落地專案。他們的洞見來自實施經驗、監管互動以及機構採用的第一線實踐。\n\n1️⃣ 機構代幣化：解鎖股權流動性\n\n代幣化正在實現傳統非流動性資產的碎片化持有與全天候交易——從私募股權到 OpenAI 等 Pre-IPO 巨頭。聆聽已從概念驗證走向正式上線的資深產品主管與基礎設施負責人分享，他們正在重塑資本的取用與治理方式。\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n\n2️⃣ 去中心化市場基礎設施\n\nAster 與 Hyperliquid 等 DEX 平台正演進為可程式化的流動性層。本場次探討去中心化基礎設施如何將代幣化資產與機構級執行、託管及合規能力相互橋接——由創辦人與交易主管共同主導討論。\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n\n3️⃣ 機構可程式化支付\n\nBPN 和 CPN 等穩定幣驅動的網路正在變革跨境資金流動。了解銀行、支付服務商及企業如何將可程式化貨幣應用於財資管理、外匯及結算——由全球支付架構師與監管顧問分享實戰洞見。"],"agn118-the-future-of-marketing-agentic-ai-experience-led-growth-and-the-rise-of-the-performance-marketer-powered-by-adobe":["The curation of content and speakers was wholly managed by Adobe and does not reflect the views of the organisers or its staff.\n\nAs financial institutions navigate a rapidly evolving digital landscape, marketing is undergoing a profound transformation. This session explores how agentic AI, real-time data, and experience-led strategies are reshaping the marketer’s role—from reactive campaign executor to proactive experience orchestrator.","本場次的內容策劃與講者遴選由 Adobe 全權負責，不代表主辦方或其工作人員的立場。\n\n在金融機構加速駕馭瞬息萬變的數位環境之際，行銷正經歷一場深刻的轉型。本場次探討自主代理式 AI、即時數據與體驗驅動策略，如何重塑行銷人的角色——從被動的廣告活動執行者，蛻變為主動的體驗編排者。"],"agn137-agentic-ai-transforming-insurance-powered-by-boston-consulting-group":["The curation of content and speakers was wholly managed by Boston Consulting Group and does not reflect the views of the organisers or its staff.\n\nThis workshop will cover:","本場次的內容策劃與講者遴選由 Boston Consulting Group 全權負責，不代表主辦方或其工作人員的立場。\n\n本工作坊將涵蓋以下主題："],"agn55-invite-only-financial-asset-tokenisation-progress-on-the-development-and-policy-considerations":["The session is intended to provide regulators with an understanding of recent market developments, as well as policy considerations on financial asset tokenisation from a practitioner’s viewpoint.\n\nIt is a joint collaboration between private and public sectors to discuss on potential pathways for responsible innovation and enhance capacity building and information sharing on the adoption of and developments in the asset tokenisation in the capital markets space.","本場次旨在協助監管機構深入了解近期市場發展動態，以及從業者視角對金融資產代幣化的政策考量。\n\n這是一場公私部門的聯合協作，旨在探討負責任創新的可行路徑，並強化資本市場領域資產代幣化採用與發展方面的能力建設與資訊交流。"],"agn70-balancing-integrity-and-inclusion-in-aml-cft-from-standards-to-practice":["With the start of a new round of FATF mutual evaluations earlier this year, and the revised standard on risk-based approach encouraging simplified due diligence for lower risk activities adopted only a few months ago, this is the time to discuss how those standards should be implemented in practice and how to further financial integrity objectives without undermining financial inclusion.\n\nThis roundtable will bring together regulators, providers of financial services and development partners to explore how integrity and inclusion can reinforce each other rather than pull in opposite directions, and how compliance assessment process can be revised to support an approach that ensures that low-income and cross-border users will continue to have untrammeled access to financial service. The session will be interactive with short inputs from speakers, guided discussions, and Q&A, and will focus on practical approaches and opportunities for collaboration.","隨著新一輪 FATF 相互評估於今年初啟動，以及數月前通過的鼓勵對低風險活動採用簡化盡職調查的風險為本方法修訂標準，現正是探討這些標準應如何付諸實踐，以及如何在不損害金融普惠的前提下進一步推進金融誠信目標的最佳時機。\n\n本圓桌會議將匯聚監管機構、金融服務提供商及發展合作夥伴，共同探討誠信與普惠如何相互促進而非相互對立，並研究如何改革合規評估流程，以支持一種確保低收入用戶及跨境用戶持續暢通無阻獲得金融服務的方式。本場次將採互動形式進行，包括講者簡短分享、引導式討論及問答環節，聚焦於務實做法與合作機遇。"],"agn80-guardian-next-generation-capital-markets":["Guardian is driving capital market innovation through various digital asset initiatives, demonstrating measurable benefits in operational efficiency and market access. This roundtable explores how digital assets are scaling liquidity, enhancing collateral management, and increasing asset utility. Through live implementation cases, from tokenised funds to cross-border solutions, this roundtable will highlight how digital asset innovation is transforming traditional market infrastructure and accelerating institutional adoption.","Guardian 正透過多項數位資產計畫推動資本市場創新，在營運效率和市場進入方面展現出顯著成效。本圓桌會議探討數位資產如何擴大流動性、優化抵押品管理並提升資產效用。透過從代幣化基金到跨境解決方案等實際落地案例，本圓桌會議將重點呈現數位資產創新如何改造傳統市場基礎設施，並加速機構採用的步伐。"],"agn51-interconnected-digital-finance-bridging-cross-regulatory-challenges-in-dpi-and-data-sharing":["As digital public infrastructure and data-sharing frameworks scale globally, traditional regulatory models are struggling to keep up. This roundtable, led by the Cambridge Centre for Alternative Finance, examines how regulators can adapt to govern interconnected systems spanning finance, data, cybersecurity and competition, without stifling innovation.","隨著數位公共基礎設施與數據共享框架在全球持續擴展，傳統監管模式正面臨跟上腳步的挑戰。這場由劍橋替代金融中心主持的圓桌會議，探討監管機構如何在不扼殺創新的前提下，因應橫跨金融、數據、網路安全與競爭等多個領域的互聯系統治理挑戰。"],"agn105-advancing-financial-infrastructure-with-cbdcs-a-path-to-resilience-interoperability-and-collaboration-powered-by-giesecke-devrient":["The curation of content and speakers was wholly managed by Giesecke + Devrient and does not reflect the views of the organisers or its staff.\n\nJoin us as we explore the transformative potential of Central Bank Digital Currencies (CBDCs) in shaping a more resilient and collaborative global financial system. This session will delve into the vision of a unified CBDC framework that seamlessly integrates both retail and wholesale CBDCs, ensuring full interoperability with existing infrastructures. We will also examine innovative conceptual solutions for a cohesive digital currency ecosystem. Additionally, the workshop will focus on the pivotal role of wholesale CBDCs in the emerging world of tokenized finance, exploring how to build a robust and sustainable digital asset ecosystem.","本場次的內容策劃與講者遴選由 Giesecke + Devrient 全權負責，不代表主辦方或其工作人員的立場。\n\n誠邀您加入我們，共同探索央行數位貨幣（CBDC）在塑造更具韌性與協作性的全球金融體系方面的變革潛力。本場次將深入探討統一 CBDC 框架的願景——無縫整合零售與批發 CBDC，並確保與現有基礎設施的完全互通。我們也將審視構建完整數位貨幣生態系統的創新概念解決方案。此外，本工作坊將聚焦批發 CBDC 在代幣化金融新興世界中的關鍵角色，探討如何建構穩健且可持續的數位資產生態系統。"],"agn52-from-skills-gap-to-skills-edge-future-proofing-finance":["As rapid technological shifts redefine industries and the nature of work, 6 in 10 workers globally will need to be reskilled or upskilled by 2030. This roundtable brings together industry, academia, and government leaders to identify the critical skills needed across sectors and how to deliver them at speed and scale.","隨著技術快速變革重新定義各行各業及工作本質，全球預計有六成勞工需要在2030年前完成技能再造或技能提升。本圓桌會議匯聚產業界、學術界及政府領袖，共同探討跨行業所需的關鍵技能，以及如何快速且大規模地提供這些培訓。"],"agn171-payments-politics-and-power-cross-border-systems-in-a-fragmented-world":["Cross-border payment systems are increasingly at the mercy of geopolitics and bilateral relations. Countries supporting a BRICS currency have been threatened with tariffs. Concurrently, the US pullback from global trade and the weakening of the dollar will increasingly sharpen debates on the efficiency of dollarization, the risks it poses to sovereignty, and whose interests the global financial system looks to serve. Facing such crossroads, policymakers, technologists, and finance leaders alike must maintain continuing and candid discussion with diverse stakeholders to stay ahead of the shifting landscape in cross-border payments, and share ideas and best practices in adapting to payments politics.\n\nPart 1: How geopolitical risk, tariffs, and sanctions regimes are reshaping cross-border payments, and Asia’s payment corridors.\n\nPart 2: How governments, markets, and technologists might monitor and adapt to rising geopolitical uncertainty.\n\nThis roundtable builds on GFTN's ongoing knowledge and insights. Prepare for the dialogue with these recommended pre-reads:","跨境支付系統日益受到地緣政治與雙邊關係的左右。支持 BRICS 貨幣的國家曾受到關稅威脅。與此同時，美國從全球貿易中的撤退及美元的弱化，將進一步激化各界對美元化效率的辯論，以及其對主權構成的風險，以及全球金融體系究竟服務於誰的利益。面對如此十字路口，政策制定者、技術人員及金融業領袖都必須與多元利害關係人持續坦誠地交流，以掌握跨境支付格局的動態變化，並分享因應支付政治的經驗與最佳實踐。\n\n第一部分：地緣政治風險、關稅與制裁制度如何重塑跨境支付及亞洲支付走廊。\n\n第二部分：政府、市場與技術人員如何監測並適應不斷升高的地緣政治不確定性。\n\n本圓桌會議以 GFTN 持續積累的知識與洞見為基礎。建議在參與對話前閱讀以下推薦前置資料："],"agn71-gl1-dialogue":["Without the development of a common foundational infrastructure, digital asset liquidity will be fragmented amongst different proprietary networks, and digital asset adoption will not scale to the size of traditional finance. There are many differing views on the ways to bridge this gap. Some believe in establishing in one unified ledger, while others look to the global interoperability between different networks. This roundtable will explore the different views on digital asset infrastructure and what makes a successful global digital asset infrastructure.","若缺乏共同的基礎設施，數位資產的流動性將分散在各個封閉的專屬網路之中，數位資產的採用規模也將難以企及傳統金融的體量。關於如何彌合這一差距，各方觀點不一：有人主張建立單一統一帳本，另有人則寄望於不同網路間的全球互通。本圓桌會議將廣泛探討數位資產基礎設施的各種觀點，以及成功的全球數位資產基礎設施的關鍵要素。"],"agn106-your-legacy-core-is-the-ai-bottleneck-powered-by-thought-machine":["The curation of content and speakers was wholly managed by Thought Machine and does not reflect the views of the organisers or its staff.\n\nThis session offers a strategic blueprint for senior banking executives looking to move beyond the AI hype and address the fundamental roadblocks to innovation.\n\nYou will hear how a cloud-native core architecture is the essential prerequisite for achieving the personalised, real-time banking experiences promised by AI.\n\nLearn practical strategies for de-risking core modernisation through iterative steps, enabling your bank to unlock its data, accelerate product velocity, and ensure long-term competitiveness.\n\nJoin us to move past the bottlenecks and discover the strategic foundation for an agile, autonomous banking future.","本場次的內容策劃與講者遴選由 Thought Machine 全權負責，不代表主辦方或其工作人員的立場。\n\n本場次為尋求超越 AI 炒作、直面創新根本障礙的銀行資深高管，提供一份具體可行的策略藍圖。\n\n您將聆聽到：雲端原生核心架構，為何是實現 AI 所承諾的個人化、即時銀行體驗的先決條件。\n\n掌握透過迭代步驟降低核心系統現代化風險的實用策略，協助您的銀行解鎖數據資產、加速產品推出，並確保長期競爭力。\n\n立即加入，突破瓶頸，探索邁向敏捷、自主銀行未來的策略根基。"],"agn79-leveraging-data-innovation-to-support-access-to-finance":["Led by BIIA, with insights from the International Committee on Credit Reporting (ICCR), this roundtable will showcase the critical role of data in supporting access to finance, with a particular emphasis on the role of credit reporting systems as foundational infrastructure for well-functioning financial markets.\n\nThe discussion will draw on the ICCR’s recent publication, The Use of Alternative Data in Credit Risk Assessment: Opportunities, Risks and Challenges (2025), which examines how alternative data sources are increasingly being integrated into credit risk models. The report highlights the opportunities these data sources create for expanding financial inclusion, the risks that must be managed, and the policy actions needed to unlock their potential.\n\nThe session will follow the flow of the report, with discussants:\n\n• Exploring examples of alternative data being applied in practice, and the ways in which credit bureaus and business information providers are enabling their use.\n\n• Showcasing integration models that combine traditional and alternative data to strengthen credit assessment and improve SME and consumer access to finance.\n\n• Highlighting collaboration between incumbent credit reporting systems, innovative fintech players, and regulators in building effective data ecosystems.\n\n• Discussing policy developments and recommendations for regulators to balance innovation with consumer protection, transparency, and systemic trust.\n\nBy weaving together insights from credit bureaus, fintech innovators, and policymakers, the roundtable will demonstrate how data innovation can be harnessed responsibly to close persistent gaps in access to finance, particularly for SMEs and underserved communities.","本圓桌會議由 BIIA 主持，並融入國際信用報告委員會（ICCR）的洞見，旨在呈現數據在支持金融服務普及方面的關鍵作用，尤其著重於信用報告系統作為健全金融市場基礎設施的核心地位。\n\n討論將參考 ICCR 近期發布的報告《替代數據在信用風險評估中的應用：機遇、風險與挑戰》（2025年），該報告審視了替代數據來源如何日益融入信用風險模型。報告指出這些數據來源在擴大金融普惠方面的機遇、必須妥善管理的風險，以及釋放其潛力所需的政策行動。\n\n本場次將依循報告脈絡展開，與談人將：\n\n• 探討替代數據在實務中的應用案例，以及信用評估機構和商業資訊提供商如何推動其應用。\n\n• 展示結合傳統數據與替代數據的整合模型，以強化信用評估並改善 SME 及消費者的融資取得。\n\n• 彰顯現有信用報告系統、創新金融科技業者與監管機構在建立有效數據生態系統方面的協作。\n\n• 探討監管政策發展及建議，協助監管機構在創新、消費者保護、透明度與系統性信任之間取得平衡。\n\n透過整合信用評估機構、金融科技創新者及政策制定者的洞見，本圓桌會議將展示如何負責任地運用數據創新，縮小金融服務普及的長期缺口，尤其惠及 SME 及未被充分服務的群體。"],"agn216-institutional-digital-assets-in-the-spotlight":["The curation of content and speakers was wholly managed by Solana, Linux Foundation Decentralized Trust, Talos and Taxbit and does not reflect the views of the organisers or its staff.\n\nThe digital asset landscape is rapidly transitioning from a speculative frontier to a bedrock of global finance.\n\nThis spotlight convenes senior leaders to explore the critical pivot points driving institutional adoption. We will unpack how the Tokenization of Real World Assets (RWA) is bridging traditional capital markets with blockchain infrastructure. The session will also dive into the Institutional adoption of blockchain infrastructure—examining governance, security, and scalability requirements. Finally, the spotlight will address innovation in Market Structure, Trading, and Liquidity, and the necessary regulatory & compliance infrastructure the new systems requires to support a fully digitized and interconnected financial ecosystem.\n\nAgenda:\n\n2:00pm Opening Remarks by GFTN\n\nSpeaker: Gabriel Lee, Head of Customer Success, GFTN\n\n•\n\n2:05pm Keynote from Solana: Internet Capital Markets\n\nSpeaker: Lu Yin, Head of APAC, Solana Foundation\n\n•\n\n2:20pm Panel 1: The Digital Asset Infrastructure Revolution Powered by Linux Foundation Decentralized Trust\n\nSpeakers: Javier Garcia, Head of Digital Assets & Tokenisation, Kaleido (Moderator), Delane Foo, APAC Regional Managing Director, Nethermind, Daniela Brabosa, Executive Director, LF Decentralized Trust\n\n•\n\n2:45pm Panel 2: Tokenization of Real-World Assets\n\nSpeakers: Stefan Grasmann, Group Head of Thought Leadership & Chief of Blockchain, Zühlke (Moderator), Mathias Imbach, Co-founder & Group Chief Executive Officer, Sygnum, Moses Lee, Head of APAC, Anchorage Digital\n\n•\n\n3:10pm Panel 3: Market Structure, Trading, and Liquidity Powered by Talos\n\nSpeakers: Kirit Bhatia, Chief Digital Assets Officer, Banking Circle, Alfonse Mandese, Global Head of Revenue, Talos, Jessica Wu, Head of APAC, Bitpanda Technology Solutions\n\n•\n\n3:35pm Panel 4: Regulatory Horizons & Compliance Innovation Powered by Taxbit.\n\nSpeakers: Ceridwen Choo, CEO, Cleanverse Interanational\n\n•\n\n3:55pm Closing Remarks by GFTN\n\nSpeaker: Gabriel Lee, Head of Customer Success, GFTN","本場次的內容策劃與講者遴選由 Solana、Linux Foundation Decentralized Trust、Talos 及 Taxbit 全權負責，不代表主辦方或其工作人員的立場。\n\n數位資產領域正快速從投機性前沿地帶轉型為全球金融的重要基石。\n\n本焦點場次匯聚資深領袖，共同探索驅動機構採用的關鍵轉折點。我們將深入解析真實世界資產（RWA）代幣化如何橋接傳統資本市場與區塊鏈基礎設施。本場次也將深入探討機構對區塊鏈基礎設施的採用——審視治理、安全性與可擴展性要求。最後，焦點場次將聚焦市場結構、交易及流動性的創新，以及新型系統所需的監管與合規基礎設施，以支持完全數位化且相互連結的金融生態系統。\n\n議程：\n\n下午2:00 GFTN 開幕致辭\n\n講者：Gabriel Lee，GFTN 客戶成功主管\n\n•\n\n下午2:05 Solana 主題演講：網際網路資本市場\n\n講者：Lu Yin，Solana Foundation 亞太區主管\n\n•\n\n下午2:20 第一場圓桌：數位資產基礎設施革命，由 Linux Foundation Decentralized Trust 主辦\n\n講者：Javier Garcia，Kaleido 數位資產與代幣化主管（主持人）；Delane Foo，Nethermind 亞太區域董事總經理；Daniela Brabosa，LF Decentralized Trust 執行董事\n\n•\n\n下午2:45 第二場圓桌：真實世界資產代幣化\n\n講者：Stefan Grasmann，Zühlke 集團思想領導力主管暨區塊鏈長（主持人）；Mathias Imbach，Sygnum 共同創辦人暨集團執行長；Moses Lee，Anchorage Digital 亞太區主管\n\n•\n\n下午3:10 第三場圓桌：市場結構、交易及流動性，由 Talos 主辦\n\n講者：Kirit Bhatia，Banking Circle 首席數位資產官；Alfonse Mandese，Talos 全球營收主管；Jessica Wu，Bitpanda Technology Solutions 亞太區主管\n\n•\n\n下午3:35 第四場圓桌：監管前景與合規創新，由 Taxbit 主辦\n\n講者：Ceridwen Choo，Cleanverse International 執行長\n\n•\n\n下午3:55 GFTN 閉幕致辭\n\n講者：Gabriel Lee，GFTN 客戶成功主管"],"agn76-the-fintech-formula-building-competitive-and-connected-ecosystems":["As FinTech enters a new era defined by regulatory maturity, interoperability demands, and capital discipline, the formula for building thriving ecosystems is being rewritten. This strategic roundtable brings together former policymakers, founders, investors, and ecosystem leaders to explore how three foundational technologies - AI, Tokenization and Quantum Computing - can be harnessed to build competitive and connected FinTech hubs. Participants will exchange perspectives that will redefine what success looks like in 2025, from attracting capital, strengthening capability building, and designing the next-generation of sandboxes to support cross-sector innovation.\n\nThis roundtable builds on GFTN's ongoing knowledge and insights. Prepare for the dialogue with these recommended pre-reads:","隨著金融科技步入由監管成熟度、互通性需求與資本紀律共同定義的新時代，打造蓬勃生態系統的方程式正在被重新書寫。這場策略性圓桌會議匯聚前政策制定者、創辦人、投資人及生態系統領袖，共同探討如何善用 AI、代幣化與量子計算三大基礎技術，構建具競爭力且緊密連結的金融科技樞紐。與會者將交流觀點，重新定義2025年的成功標準——從吸引資本、強化能力建設，到設計支持跨行業創新的下一代沙盒機制。\n\n本圓桌會議以 GFTN 持續積累的知識與洞見為基礎。建議在參與對話前閱讀以下推薦前置資料："],"agn122-our-sector-our-products-our-responsibility-addressing-the-risks-of-financial-abuse":["The curation of content and speakers was wholly managed by International Finance Corporation and does not reflect the views of the organisers or its staff.\n\nThis session marks the first public release of findings from an IFC-led survey across eight banks in Asia and the Pacific, where 45% of bank employees reported witnessing financial abuse in their communities. These insights—gathered from over 7,000 bank staff across ten countries—offer a rare and urgent look into how financial abuse is playing out in real time, and how banking products and systems are being misused to cause harm.\n\nFor banks and regulators, financial abuse is emerging as a critical frontier—one that intersects with regulatory responsibility, institutional trust, and inclusive economic participation. The cost of inaction is multifaceted: absorbing preventable loan defaults, incurring operational inefficiencies, risking reputational damage, and ultimately failing to protect customers and employees from financial harm.\n\nYet when action is taken, financial institutions can strengthen trust and reinforce the integrity of the financial system.\n\nHosted by IFC, this session brings together experts in financial abuse prevention and two banks participating in IFC’s Empower Finance Alliance: Laxmi Sunrise (Nepal) and Commercial Bank (Sri Lanka), to explore how the financial sector is stepping up through policy, practice, and product design to address financial abuse. It will examine how institutions can move from awareness to action, and how this new data can inform scalable, context-specific solutions.\n\nKey Themes:\n\n·       What the data tells us—and why it matters now\n\n·       How banks are responding through Empower Finance\n\n·       What regulators and financial institutions can do next\n\n·       Why this issue is central to financial inclusion and institutional integrity.","本場次的內容策劃與講者遴選由 International Finance Corporation 全權負責，不代表主辦方或其工作人員的立場。\n\n本場次標誌著一項由 IFC 主導、橫跨亞太八家銀行調查結果的首次公開發布，調查顯示45%的銀行員工曾目睹所在社區中的金融剝削事件。這些洞見蒐集自十個國家逾7,000名銀行員工，對金融剝削的實際發生狀況，以及銀行產品與系統如何被濫用於造成傷害，提供了難得一見的迫切視角。\n\n對於銀行和監管機構而言，金融剝削正在成為一個關鍵前沿議題——它與監管責任、機構公信力及包容性經濟參與交織在一起。不作為的代價是多方面的：承擔可避免的貸款違約損失、承受營運效率低落的問題、面臨聲譽受損的風險，以及最終未能保護客戶與員工免受財務損害。\n\n然而，當金融機構採取行動時，便能強化信任，進而鞏固金融體系的誠信。\n\n本場次由 IFC 主辦，匯聚金融剝削防制專家，以及兩家參與 IFC Empower Finance Alliance 的銀行——Laxmi Sunrise（尼泊爾）與 Commercial Bank（斯里蘭卡）——共同探討金融業如何透過政策、實踐與產品設計強化應對金融剝削的能力。本場次將審視機構如何從提高認知走向付諸行動，以及這些最新數據如何指引可規模化、因地制宜的解決方案。\n\n核心議題：\n\n·       數據告訴我們什麼——以及為何現在正是關注的時機\n\n·       銀行如何透過 Empower Finance 採取行動\n\n·       監管機構與金融機構的下一步\n\n·       為何這一議題是金融普惠與機構誠信的核心所在"],"agn127-trust-is-good-verification-is-better-applying-verifiable-org-id-in-a-border-agnostic-economy-powered-by-gleif":["The curation of content and speakers was wholly managed by GLEIF and does not reflect the views of the organisers or its staff.\n\nFinalists in the GLEIF Global Hackathon will present and discuss applications of digital organizational identity and it role in supporting interoperable markets in digital assets and data sharing.\n\nExperts will discuss the architectures of different identity and trust schemes for Digital Public Infrastructure, in a border agnostic world.","本場次的內容策劃與講者遴選由 GLEIF 全權負責，不代表主辦方或其工作人員的立場。\n\nGLEIF 全球黑客松的決賽入圍者將發表並討論數位組織身份的應用案例，以及其在支持數位資產與數據共享互通市場方面所扮演的角色。\n\n專家將探討在無邊界世界中，數位公共基礎設施各種身份認證與信任機制的架構設計。"],"agn53-breaking-barriers-united-cross-border-efforts-to-fight-financial-crime":["Financial crime poses a significant threat to the global economy, requiring international cooperation to effectively detect and prevent activities such as fraud across borders. However, differences in legal frameworks, sovereignty concerns, and data privacy laws pose challenges to such collaborative efforts. The objective of this session is to explore strategies for advancing cross-border financial crime detection and to examine how innovative technologies can facilitate more effective prevention efforts.","金融犯罪對全球經濟構成重大威脅，必須藉助國際合作才能有效偵測並遏止跨境詐欺等犯罪行為。然而，法律框架的差異、主權顧慮及數據隱私法規，為這類協作努力帶來重重挑戰。本場次旨在探討推進跨境金融犯罪偵測的策略，並審視創新技術如何促成更有效的預防行動。"],"agn81-digital-money-adoption-and-regulation-strategies-for-commercial-banks-and-fintechs":["Dive into the future of finance in this roundtable which brings together regulators, banks, and fintechs to unpack the transformative potential of digital money. Drawing on findings from Project Guardian's FX Workstream and Project Orchid, we will explore how stablecoins, tokenised bank liabilities, CBDCs and shared ledger technology is set to revolutionise the way we think about money.","在這場圓桌會議中，深入探索金融的未來，匯聚監管機構、銀行及金融科技業者，共同解構數位貨幣的變革潛力。本場次將汲取 Project Guardian 外匯工作組及 Project Orchid 的研究成果，探討穩定幣、代幣化銀行負債、CBDC 及共用帳本技術如何革新我們對貨幣的思維。"],"agn82-the-next-wave-of-innovations-for-merchant-payments":["Merchant payments are entering a new era of transformation. After decades of progress in card acceptance, QR interoperability, and e-commerce enablement, the next wave of innovation is shifting toward embedded payments, instant settlement, and data-driven merchant services.\n\nFrom small neighbourhood shops to global online platforms, merchants are demanding more than just payment acceptance — they want integrated solutions that combine payments with inventory, logistics, and customer insights.\n\nAt the same time, new players and regulatory frameworks are reshaping the competitive landscape. Regional payment networks like NETS and PayNet are pioneering interoperability and cross-border linkages, while global ecosystems such as Amazon, UnionPay, Ant International, and PayPal are redefining how merchants interact with customers at scale.\n\nThis panel explores how these innovations are evolving, where the next opportunities lie, and how collaboration can unlock new value for merchants of all sizes.","商戶支付正邁入新一輪轉型時代。在數十年來的收單發展、QR Code 互通及電商支援建設之後，下一波創新浪潮正轉向嵌入式支付、即時結算及數據驅動的商戶服務。\n\n從街角小店到全球線上平台，商戶的需求不再僅限於收款——他們需要整合支付、庫存、物流與客戶洞察的一體化解決方案。\n\n與此同時，新興業者與監管框架正在重塑競爭格局。NETS 和 PayNet 等區域支付網路引領互通性與跨境連結的創新，而 Amazon、UnionPay、Ant International 及 PayPal 等全球生態系統正在重新定義商戶與顧客大規模互動的方式。\n\n本場次探討這些創新如何持續演進、下一個機遇在哪裡，以及協作如何為各規模商戶創造全新價值。"],"agn217-malaysia-in-the-spotlight-accelerating-southeast-asias-digital-finance-leap-powered-by-faom":["The curation of content and speakers was wholly managed by FAOM and does not reflect the views of the organisers or its staff.\n\nMalaysia has long distinguished itself with the aspiration of being \"Truly Asia\" - a unique blend of diverse cultures and an open economy. As global financial markets navigate a new cycle of uncertainty, this blend positions Malaysia to offer a distinct, stable proposition for investors and institutions.\n\nMalaysia's value proposition is defined by three factors: a sizable and open market, a demonstrated willingness to adopt technology, and a highly-skilled workforce. This combination makes it a significant hub for building and scaling new-age businesses.\n\nThe Malaysia Spotlight, powered by FAOM, gathers senior leaders from Malaysia’s Banking, Insurance, Regulatory, Investing, and Fintech sectors. This spotlight will offer an in-depth examination of the country's strategic advantages, providing data and perspectives on why it is an optimal location for regional growth.\n\nJoin us to explore tangible opportunities for investors, businesses, and financial institutions operating across Asia.\n\nAgenda:\n\n4:30pm - Reception & Registration\n\n4:45pm - Opening Remarks by FAOM\n\n5:00pm - Keynote\n\n5:15pm - Panel: Payments to Prosperity: Unlocking the Value of DPI for Inclusive Growth\n\n5:45pm - Panel: Where Fintech rubber hits the road - Why Malaysia is Truly Asia for Fintechs\n\n6:15pm - Q&A\n\n6:30pm - Event close","本場次的內容策劃與講者遴選由 FAOM 全權負責，不代表主辦方或其工作人員的立場。\n\n馬來西亞長期以「真正的亞洲」自我定位——融合多元文化與開放經濟的獨特組合。在全球金融市場面對新一輪不確定性之際，這一組合使馬來西亞得以為投資者與金融機構提供獨特且穩定的價值主張。\n\n馬來西亞的競爭優勢由三大要素定義：規模可觀的開放市場、對技術採用的高度積極性，以及技能精良的勞動力。這一組合使其成為打造並擴展新世代企業的重要樞紐。\n\n由 FAOM 主辦的馬來西亞焦點場次，匯聚馬來西亞銀行、保險、監管、投資及金融科技領域的資深領袖。本場次將深入剖析馬來西亞的戰略優勢，提供數據與觀點，闡明其為何是區域佈局的最佳落地地點。\n\n誠邀您加入，探索在亞洲各地運營的投資者、企業及金融機構的實質商機。\n\n議程：\n\n下午4:30 – 茶敘與報到\n\n下午4:45 – FAOM 開幕致辭\n\n下午5:00 – 主題演講\n\n下午5:15 – 圓桌討論：從支付到繁榮——釋放 DPI 對包容性成長的價值\n\n下午5:45 – 圓桌討論：金融科技落地實踐——為何馬來西亞是金融科技業者的真正亞洲選擇\n\n下午6:15 – 問答環節\n\n下午6:30 – 活動結束"],"agn95-networking-drinks-bayview-foyer-powered-by-hitachi":["Wrap up your day with networking drinks at the Bayview Foyer available for all Insights Forum delegates, powered by Hitachi. Keep the conversations going and meet new faces from the forum.","在 Hitachi 贊助下，於 Bayview Foyer 舉辦的交流酒會為所有 Insights Forum 與會者畫下充實的一天。讓對話延續，結識論壇的新朋友。"],"agn175-closed-door-launch-of-ccaf-women-regulators-network-wrn":["In 2022, CCAF launched the Regulator Knowledge Exchange (RKE) as a peer-led, community-driven digital platform to support exchange of knowledge and collaboration among financial sector authorities globally. Since then the RKE has almost 3,000 users from 300+ organisations from 140 countries - with women making up 45% of those users. In recognition of this progress, CCAF has established the Women Regulators Network at the Regulator Knowledge Exchange (WRN@RKE). This has been designed to elevate and empower women working in financial regulation and policymaking.  The WRN@RKE aims to amplify women’s voices, support their leadership, and foster inclusive financial systems through collaboration, capacity building, knowledge exchange and advocacy.\n\nThis breakfast event will celebrate the launch and include a keynote address and a panel discussion from global leaders who will speak on the future of financial inclusion and gender equity as well as the persistent gaps in financial inclusion. The launch will be attended by financial sector authorities and by global influencers.\n\nThe Cambridge Centre for Alternative Finance is a Knowledge Partner for the Insights Forum.","2022年，CCAF推出了監管知識交流平台（Regulator Knowledge Exchange，RKE），這是一個由同儕主導、社群驅動的數位平台，旨在支持全球金融監管機構之間的知識交流與合作。迄今為止，RKE已累積來自140個國家、逾300個機構的近3,000名使用者，其中女性佔45%。為肯定這一進展，CCAF在RKE平台上正式成立了女性監管者網絡（Women Regulators Network at the Regulator Knowledge Exchange，WRN@RKE），旨在提升並賦能在金融監管與政策制定領域工作的女性。WRN@RKE致力於放大女性的聲音、支持女性領導力，並透過合作、能力建構、知識交流與倡議，推動建立更具包容性的金融體系。\n\n此次早餐活動將慶祝網絡的正式啟動，包含主題演講及由全球領袖主持的小組討論，議題涵蓋金融包容性與性別平等的未來，以及金融包容性方面持續存在的落差。活動將邀請金融監管機構及全球具影響力的人士共同出席。\n\nCambridge Centre for Alternative Finance（CCAF）是Insights Forum的知識夥伴。"],"agn64-stablecoin-collapse-tsunami-systemic-risk-contagion-and-the-future-of-digital-finance":["The stablecoin ecosystem, currently valued in the hundreds of billions, is built on the promise of stability. But what if that promise shatters? The Insights Forum together with the Black Swan Insight, convenes an exclusive roundtable to confront a truly controversial scenario: the sudden, catastrophic collapse of a major, USD-backed stablecoin. This isn't just about crypto; it's a systemic risk that could send shockwaves through traditional finance, threaten payment systems, and challenge the very notion of financial stability in a globally interconnected system.\n\nWe've invited regulators, policymakers, stablecoin providers, blockchain platforms, banks, and payment system providers because this is a must-attend discussion for those at the sharp end of managing systemic risk. Beyond identifying the scenarios of the unfolding looming threat, we will explore unforeseen opportunities that could emerge from such a disruption.\n\nThe implications are real, immediate, and potentially transformative. Be prepared for a sharp discussion that will shape the future of finance. This pivotal conversation lays the groundwork for the Black Swan Summit, where we will go deeper into the critical digital financial infrastructure and other emerging risks.","穩定幣生態系統目前市值已達數千億美元，其核心承諾在於「穩定」。但若這一承諾突然崩潰，將會發生什麼？Insights Forum攜手Black Swan Insight，召集一場獨家圓桌論壇，正面迎接一個極具爭議性的情境：一個主要美元支撐穩定幣的突然性災難性崩潰。這不僅僅是加密貨幣的問題，更是一場可能波及傳統金融、衝擊支付體系，並挑戰全球高度互聯系統下金融穩定性的系統性風險。\n\n我們邀請了監管機構、政策制定者、穩定幣發行商、區塊鏈平台、銀行及支付系統提供商共同參與，這是所有身處系統性風險管理最前線者不可錯過的討論。除了識別這場潛在危機的各種情境，我們亦將探討此類衝擊可能帶來的意想不到的機遇。\n\n這些影響是真實的、迫切的，且可能具有深遠的變革意義。請準備好迎接一場塑造金融未來的深度對話。這場關鍵討論將為Black Swan Summit奠定基礎，屆時我們將更深入探討關鍵數位金融基礎設施及其他新興風險。"],"agn160-greenovation-in-aseans-built-sector-driving-collaborative-strategies-and-actionable-outcomes":["As ASEAN’s real estate sector continues its journey towards net zero, regulators, developers, financiers, and solution providers must work together to scale the most effective strategies for decarbonising commercial projects across the region. This session will spotlight actionable and innovative approaches to reduce both operational and Scope 3 emissions, while aligning incentives across developers, landlords, and tenants.","隨著ASEAN房地產業持續邁向淨零目標，監管機構、開發商、金融業者與解決方案提供商必須攜手合作，擴大推廣區域內商業項目脫碳的最有效策略。本場次將聚焦於可落地執行的創新方法，以降低營運排放及範疇三排放，同時協調開發商、業主與租戶之間的利益誘因。"],"agn248-connecting-europes-financial-ecosystem-gftn-point-zero-forum-and-finmonda-in-action":["Join this session to explore how GFTN Europe connects financial institutions, policymakers, and technology leaders to shape the future of finance across the continent.\n\nDiscover how to engage directly with European regulators and financial leaders through collaborative initiatives and policy dialogues. Learn about participation opportunities at Point Zero Forum 2026 in Zurich, the global platform driving innovation at the intersection of finance and technology.\n\nExperience Finmonda in action — our new digital platform designed to enable real-time collaboration, project tracking, and impact measurement across the financial ecosystem.","加入本場次，探索GFTN Europe如何連結金融機構、政策制定者與科技領袖，共同塑造歐洲金融的未來。\n\n了解如何透過合作倡議與政策對話，直接與歐洲監管機構及金融領袖建立連結。掌握2026年於蘇黎世舉辦的Point Zero Forum的參與機會，這是引領金融與科技交匯創新的全球旗艦平台。\n\n親身體驗Finmonda的實際運作——我們全新推出的數位平台，專為實現整個金融生態系統中的即時協作、專案追蹤與影響衡量而設計。"],"agn62-next-gen-financial-services-industry-ai-adoption-the-rise-of-ai-agents":["Join a dynamic mix of financial industry leaders, technologists and regulators to discuss the upcoming global trends, use cases and risks in AI-in-finance adoption as well as a possible roadmap to guide the pervasive but safe adoption of AI across the financial sector.","加入金融業領袖、科技專家與監管機構的跨界對話，共同探討AI在金融領域應用的全球趨勢、應用場景與潛在風險，以及如何制定一套可行的路線圖，引導AI在整個金融業中廣泛且安全地落地應用。"],"agn56-impact-of-us-stablecoin-and-crypto-regulations-on-global-token-payment-providers":["Many are watching digital asset regulatory developments in the US with great interest, particularly in crypto-based payment tokens such as stablecoins. Stablecoins' usage as digital payment tokens with value stabilising mechanisms for instance is gaining traction just as the U.S. seeks to clarify definitions and tighten obligations with the passing of the GENIUS Act in July 2025.\n\nFinalised details of the Act are expected by January 2027. While the market could expect this to spur further interest in crypto assets, particularly stablecoins, it also asks the important questions of “can stablecoins be supervised at scale?” and how the Act will influence product design, and reserve and redemption rules, among other things. As rules around cryptoassets are being clarified around the world, this coincides with banks piloting tokenised deposits, raising fresh questions about proportionate regulatory treatment, coexistence and interoperability.\n\nThis roundtable brings regulators and token payment providers, including stablecoin issuers, together for a frank examination on the impact of US regulatory clarity on stablecoins and crypto assets, and how other global regulatory regimes are aligned or diverged in practice. This session will also look at the appropriate responses to further promote regulatory alignment and cooperation to ensure the safe and secure cross-border use of stablecoins and other digital assets.","目前，業界正高度關注美國數位資產監管的最新動向，尤其是針對穩定幣等加密貨幣支付代幣的相關法規。以穩定幣作為具備價值穩定機制的數位支付代幣，其應用正日益普及；與此同時，美國於2025年7月通過《GENIUS法案》，試圖釐清定義、強化義務要求。\n\n該法案的最終細節預計於2027年1月前確定。市場預期此舉將進一步刺激加密資產（尤其是穩定幣）的市場興趣，但同時也引發了重要問題：「穩定幣能否實現規模化監管？」以及該法案將如何影響產品設計、儲備及贖回規則等。隨著全球各地對加密資產的監管規則逐步明朗，銀行也正試點代幣化存款，進一步引發了關於相稱性監管待遇、共存與互通性等新問題。\n\n本次圓桌論壇將匯聚監管機構及包括穩定幣發行商在內的代幣支付服務商，坦誠評估美國在穩定幣及加密資產方面監管明朗化的影響，以及全球其他監管制度與之的異同。本場次亦將探討促進監管協調與合作的適切回應措施，以確保穩定幣及其他數位資產的跨境使用安全可靠。"],"agn173-the-next-frontier-of-cross-border-digital-finance-building-trusted-inclusive-and-interoperable-payment-ecosystems":["Cross-border digital payments are now a frontline issue for regulators, financial institutions, and fintechs alike. With trade flows expanding, SMEs digitalising and consumers demanding seamless access to global commerce, the stakes have never been higher. Yet persistent barriers from fragmented infrastructure and regulatory divergence to fraud and trust gaps still slow adoption and create uneven access, especially for underserved communities and SMEs.\n\nThis roundtable convenes regulators, financial institutions and leading fintechs to map out the next evolution of cross-border finance. This discussion will highlight interoperability, responsible innovation and financial inclusion as the core drivers shaping tomorrow's digital corridors.","跨境數位支付如今已成為監管機構、金融機構與金融科技業者共同面對的前線議題。隨著貿易流量擴大、SME加速數位化，以及消費者對無縫接入全球商業的需求日益強烈，各方面臨的壓力從未如此之大。然而，從基礎設施碎片化、監管分歧，到詐欺風險與信任落差等長期存在的障礙，仍在拖緩採用步伐，並為弱勢群體及SME造成不均等的接入機會。\n\n本次圓桌論壇匯聚監管機構、金融機構及領先金融科技業者，共同繪製跨境金融的下一步演進藍圖。討論將聚焦於互通性、負責任的創新與金融包容性，以此作為塑造未來數位走廊的核心驅動力。"],"agn150-faster-cheaper-smarter-redefining-cross-border-payments-in-the-digital-age-powered-by-swift":["The curation of content and speakers was wholly managed by Swift and does not reflect the views of the organisers or its staff.\n\nHow can the industry meet customers’ increasing expectations for speed, cost, transparency, and user experience?\n\nAs customers increasingly demand faster transfers, lower costs, greater transparency, and seamless digital experiences, providers face mounting pressure to innovate. This panel session will bring together experts from across the payments ecosystem to explore the evolving landscape of cross-border transactions. They will look behind the latest data for speed, identify current pain points; and provide actionable insights on what needs to change when it comes to technology, regulation, standards and infrastructure, to ensure cross-border payments are as seamless as domestic ones.","本場次的內容策劃與講者邀請全由Swift負責，不代表主辦單位或其工作人員的立場。\n\n金融業如何滿足客戶對速度、成本、透明度與使用者體驗日益提升的期望？\n\n隨著客戶對更快匯款速度、更低成本、更高透明度與無縫數位體驗的需求持續攀升，服務提供商承受著日益沉重的創新壓力。本場小組討論將匯聚支付生態系統各方專家，深入探討跨境交易的演變格局。他們將解讀最新速度數據背後的深層邏輯，指出當前痛點，並就科技、法規、標準與基礎設施等層面提出切實可行的洞見，以期使跨境支付達到與境內支付同等流暢的水準。"],"agn174-japan-in-the-spotlight-connecting-financial-corridors-across-asia":["Latest Update :\n\nGlobal finance is being reshaped by digital innovation, evolving regulations, and surging cross-border investment flows. As markets become more interconnected yet face periodic fragmentation from geopolitical shifts, leading economies are seeking to balance resilience with openness.\n\nJapan stands at the crossroads of Asia's financial future. By combining robust governance with market-driven innovation, Japan is building seamless networks that link Tokyo, ASEAN, and beyond. Through advanced regulatory frameworks for digital assets and strategic cross-border partnerships, Japan is setting the pace for Asia's financial transformation.\n\nThis special spotlight brings together senior leaders from Japan's banking, insurance, regulatory, and digital asset sectors to explore Japan's leadership role in driving regional integration, pioneering digital finance frameworks, and connecting financial corridors that unlock new opportunities for investors, businesses, and institutions across Asia.\n\nAgenda:\n\n10:30am - Welcome Note and Musical Performance\n\n10:35am - Opening Remarks by Japan Financial Services Agency (JFSA)\n\n10:45am - Keynote - \"Why Japan Now?\"\n\n11:05am - Panel: The Leadership role of Japan in a Rising Asia\n\n11:35am - Panel: How Japan is leading the revolution in Digital Assets across borders\n\n12:00pm - Panel: Connecting Financial Corridors from Japan\n\n12:25pm - Closing Remarks by GFTN","最新消息：\n\n數位創新的浪潮、監管環境的演變，以及跨境投資流量的激增，正深刻重塑全球金融格局。在各市場加速互聯互通之際，地緣政治的波動也帶來週期性的碎片化風險，促使各主要經濟體積極尋求在韌性與開放之間取得平衡。\n\n日本站在亞洲金融未來的十字路口。透過將穩健的治理機制與市場驅動的創新相結合，日本正構建起連結東京、ASEAN及更廣泛地區的無縫金融網絡。憑藉先進的數位資產監管框架與戰略性的跨境合作夥伴關係，日本正引領亞洲金融轉型的步伐。\n\n本場特別聚焦論壇將匯聚日本銀行業、保險業、監管機構及數位資產領域的高階領袖，共同探討日本在推動區域整合、引領數位金融框架創新，以及構建跨境金融走廊以為全亞洲投資者、企業和機構開拓新機遇方面的領導角色。\n\n議程：\n\n上午10:30 – 歡迎致詞及音樂表演\n\n上午10:35 – 日本金融廳（JFSA）開幕致詞\n\n上午10:45 – 主題演講——「為何是日本？為何是現在？」\n\n上午11:05 – 小組討論：日本在崛起的亞洲中的領導角色\n\n上午11:35 – 小組討論：日本如何引領跨境數位資產革命\n\n中午12:00 – 小組討論：從日本出發，連結全球金融走廊\n\n下午12:25 – GFTN閉幕致詞"],"agn130-inside-the-institutional-shift-breaking-news-in-digital-assets-powered-by-kaleido":["The curation of content and speakers was wholly managed by Kaleido and does not reflect the views of the organisers or its staff.\n\nAs digital assets go mainstream, institutions are racing to modernise the rails of finance. Join Sophia Lopez, Javier Garcia and Conan French for a deep dive into the technologies and standards behind the next wave of tokenised deposits, programmable payments, and interoperable networks that are redefining market infrastructure across the globe.","本場次的內容策劃與講者邀請全由Kaleido負責，不代表主辦單位或其工作人員的立場。\n\n隨著數位資產逐步進入主流，各機構正競相現代化金融基礎架構。誠邀您與Sophia Lopez、Javier Garcia及Conan French一同深入探討支撐下一波代幣化存款、可程式化支付與互通網絡的技術與標準，這些創新正在重新定義全球的市場基礎設施。"],"agn78-sme-banking-leaders-league-from-groundbreaking-to-game-changing":["Following the successful discussion of the SME Banking Leaders’ League in the Global SME Finance Forum in Johannesburg, the Singapore edition at the Insights Forum will continue to shape actionable recommendations on the future of SME financial services to refine and globalise the League’s agenda.\n\nThe SME Banking Leaders league is an ongoing group of leaders who form a recently created thinktank led by SME Finance Forum members. Objective would be for the recommendations to be taken forward by the core league and turn into an actionable plan with key milestones agreed.\n\n1. Access to Markets – From Trade Corridors to Digital Marketplaces\n\n2. Access to Skills – Digital Fluency and AI Readiness\n\n3. Access to Finance – New Instruments and new players","繼在約翰尼斯堡舉辦的Global SME Finance Forum中SME Banking Leaders' League的成功討論之後，新加坡版本的Insights Forum將延續這一勢頭，進一步深化對SME金融服務未來發展的可行性建議，以完善並拓展聯盟的全球議程。\n\nSME Banking Leaders League是一個由SME Finance Forum成員主導、近期成立的智庫性質的持續性領袖小組。其目標是推動核心聯盟成員將各項建議轉化為具體行動計劃，並達成關鍵里程碑的共識。\n\n1. 市場准入——從貿易走廊到數位市場\n\n2. 技能獲取——數位素養與AI應用準備度\n\n3. 融資獲取——新型金融工具與新興市場參與者"],"agn77-building-global-ai-competencies-in-financial-services":["The roundtable will focus on discussing key use cases across the financial sector and identifying the underlying common AI components, such as AI models and guardrails. We will explore how different financial institutions could collaborate to build shared AI components for the sector. These common components could enable financial institutions to build their own AI applications more efficiently whilst focusing on differentiated services. This ecosystem approach will reduce duplicate efforts across the industry and speed up the AI adoption.","本次圓桌論壇將聚焦於探討金融業各領域的關鍵應用場景，並識別其背後共通的AI核心組件，例如AI模型與護欄機制。我們將探索不同金融機構如何協作，共同建構業界共享的AI基礎組件。這些通用組件能幫助各金融機構更高效地開發自有AI應用，同時專注於差異化服務的打造。這種生態系統化的方式將減少業界重複投入，並加速AI在整個行業中的採用。"],"agn73-advancing-cross-border-dlt-infrastructure-through-shared-governance-interoperability-and-roadmaps":["Over the past ten years, cross-border distributed ledger technology (DLT) has emerged as a viable next-generation solution for financial market infrastructure (FMI), offering advancements in real-time settlement, improved efficiencies and cost-savings, global integration, and financial innovation. Yet, despite its promise, DLT has yet to fundamentally transform today’s financial markets, and has remained limited to niche pilots and production deployments.\n\nFollowing a roundtable identifying the key hurdles DLT faces today at the Point Zero Forum 2025, this session aims to move the conversation forward by developing shared roadmaps for the systemic adoption of DLT as FMI across major European financial centres. The conversation could cover:\n\n• The roles that public and private financial institutions as well as technology providers will play in a DLT-world\n\n• The institutional arrangements that could drive coordinated adoption of DLT, from collective governance bodies, à la Swift, to the development of shared, cross-border sandboxes\n\n• The interoperability standards and approaches to DLT that can achieve industry-wide buy-in and enable collective movement towards FMI\n\n• The technical playbooks and roadmaps that will support financial institutions in progressing along their DLT journeys, from identifying low-hanging use cases to scaling successful pilots and partnering with other institutions","過去十年間，跨境分散式帳本技術（DLT）已作為金融市場基礎設施（FMI）的下一代可行方案嶄露頭角，在即時結算、效率提升與成本節省、全球整合及金融創新等方面展現出顯著優勢。然而，儘管前景可期，DLT尚未從根本上變革當今的金融市場，其應用仍局限於利基型試驗及小規模生產部署。\n\n繼Point Zero Forum 2025的圓桌論壇識別出DLT當前所面臨的主要障礙後，本場次旨在推進對話，為歐洲各主要金融中心系統性採用DLT作為FMI制定共同路線圖。討論議題可能涵蓋：\n\n• 在DLT生態中，公共及私人金融機構以及科技服務商各自扮演的角色\n\n• 能夠推動DLT協調採用的制度安排，包括類似Swift的集體治理機構，以及跨境共享沙盒的建立\n\n• 能夠獲得業界廣泛認可並推動整體向FMI邁進的DLT互通性標準與方法\n\n• 支持金融機構推進DLT落地的技術手冊與路線圖，涵蓋從識別低垂果實用例，到擴大成功試點規模及與其他機構建立合作夥伴關係等各個層面"],"agn159-securing-the-future-of-finance-real-time-collaboration-against-illicit-activity-in-the-digital-asset-ecosystem":["Illicit crypto flows are growing more complex and AML playbooks need to keep up. This roundtable with global crypto platforms, financial institutions, blockchain intelligence and regulators tackles the real-world risks, gaps and investigations shaping the response to financial crime today.\n\nThe conversation will explore:","非法加密貨幣資金流動日趨複雜，AML應對策略必須與時俱進。本次圓桌論壇匯聚全球加密平台、金融機構、區塊鏈情報機構及監管機構，共同面對當今金融犯罪應對工作中的真實風險、現有缺口與調查挑戰。\n\n討論將深入探討："],"agn243-tyme-group-investor-update-powered-by-tyme-group":["The curation of content and speakers was wholly managed by Tyme Group and does not reflect the views of the organisers or its staff.\n\nRecognised by TIME as one of the 100 Most Influential Companies in 2025, Tyme Group’s meteoric customer growth and solid progress towards profitability are underpinned by a technology-led strategy and long-term vision for digital banking. Join us as we share our journey so far and our outlook for the decade ahead. This session comprises a presentation of our latest results, strategic highlights and market insights.","本場次的內容策劃與講者邀請全由Tyme Group負責，不代表主辦單位或其工作人員的立場。\n\nTyme Group曾獲TIME評選為2025年度全球百大最具影響力企業之一，其客戶規模的快速增長及穩健的盈利進程，均奠基於以科技為核心的戰略佈局與對數位銀行業的長遠願景。誠邀您加入我們，分享迄今為止的發展歷程及對未來十年的展望。本場次將包含最新業績報告、戰略亮點及市場洞察。"],"agn63-quantum-roadmaps-to-resilience-navigating-risk-architecting-ultimate-advantage-in-finance":["As quantum disruption approaches, the financial sector must act now to secure encryption, talent, and regulatory alignment. This roundtable brings together quantum experts, regulators and financial leaders to map practical strategies for post-quantum transition, addressing cryptographic threats, operational readiness, and global standards.","隨著量子運算時代的臨近，金融業必須立即採取行動，確保加密安全、儲備人才並達成監管對齊。本次圓桌論壇匯聚量子技術專家、監管機構與金融領袖，共同規劃後量子轉型的實務策略，應對密碼學威脅、提升運營準備度，並推動全球標準的制定。"],"agn183-uk-singapore-ai-in-finance-cross-regional-ai-growth":["This roundtable aims to improve the regulatory enablement of AI in Finance in the UK and Singapore. As global thought-leaders, The Financial Conduct Authority and the Monetary Authority of Singapore have various industry initiatives which enable and encourage th
