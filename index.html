e safe adoption of AI in the financial sector. The discussion, involving policymakers and industry leaders, will reflect on these initiatives and explore how regulators can go further in promoting innovation in their markets. It will also explore how the two regulators can collaborate to strengthen ties between the UK and Singaporean markets by providing safe avenues for firms to experiment cross-border. Senior discussants from the MAS and the FCA will facilitate the discussion, drawing from the expertise of leading players in the field from both countries.","本次圓桌論壇旨在改善英國與新加坡在AI金融應用方面的監管賦能環境。作為全球思想領袖，英國金融行為監管局（Financial Conduct Authority，FCA）與新加坡金融管理局（Monetary Authority of Singapore，MAS）已推出多項業界計劃，以促進並鼓勵金融業安全採用AI。本次討論將匯聚政策制定者與業界領袖，回顧既有計劃的成效，並探討監管機構如何進一步推動各自市場的創新。討論亦將探索兩大監管機構如何透過合作，為企業提供安全的跨境試驗渠道，從而深化英國與新加坡市場之間的聯繫。MAS及FCA的高階與會代表將主持本次討論，汲取兩國業界領先企業的專業見解。"],"agn83-public-blockchains-in-banking-building-trust-in-decentralised-infrastructure":["As banks explore using public blockchains for tokenised deposits, stablecoins, and digital assets, new challenges arise: decentralised governance, protocol changes, and the absence of a clear accountable counterparty. This session will convene blockchain protocol developers and institutional partners to examine how banks can gain confidence in settlement, design contingency plans for governance risk, and build operational resilience on decentralised infrastructure. The conversation will focus on continuity, migration, and trust; moving beyond regulation to practical mitigation strategies that enable safe adoption at scale.\n\nTopics for discussion include:\n\nThis session is Part 1 of a 2-part series on Public Blockchains in Banking. Read more about Part 2 of the discussion here.","隨著銀行業探索將公鏈用於代幣化存款、穩定幣及數位資產，新的挑戰隨之而來：去中心化治理、協議變更，以及缺乏明確且可問責的對口方。本場次將召集區塊鏈協議開發者與機構合作夥伴，探討銀行如何建立對結算的信心、設計治理風險的應急方案，並在去中心化基礎設施上建構運營韌性。討論將聚焦於業務連續性、遷移策略與信任建立，超越法規合規層面，深入探討能夠支持規模化安全應用的實務風險緩解策略。\n\n討論議題包括：\n\n本場次為「公鏈在銀行業中的應用」兩部分系列討論的第一部分。請參閱此處了解第二部分的詳細資訊。"],"agn110-thailand-in-focus-aseans-growth-engine-for-the-digital-future-powered-by-krungsri-finnovate":["The curation of content and speakers was wholly managed by Krungsri Finnovate and does not reflect the views of the organisers or its staff.\n\nAs ASEAN advances its digital and economic integration, Thailand is emerging as a strategic bridge connecting innovation, policy, and cross-border finance. Supported by a progressive regulatory environment led by the Bank of Thailand and advanced digital infrastructure such as PromptPay, the country has become a hub for inclusive innovation and regional financial connectivity.\n\nThis session brings together leading ecosystem enablers, financial institutions, and startups to explore how collaboration, forward-looking policy dialogue, and innovation are accelerating ASEAN’s next wave of digital and sustainable growth. The discussion will spotlight Thailand’s evolving fintech landscape and its growing role in shaping a trusted and connected regional digital economy.\n\nAgenda:\n\n1:30 pm – Welcome Note\n\n1.35 pm – Keynote: “Thailand’s Role in ASEAN’s Digital Future”\n\n1.45 pm – Panel: “Thailand in Focus: ASEAN’s Growth Engine for the Digital Future”\n\n2.25 pm – Closing Remarks","本場次的內容策劃與講者邀請全由Krungsri Finnovate負責，不代表主辦單位或其工作人員的立場。\n\n隨著ASEAN推進數位與經濟整合，泰國正逐漸成為連結創新、政策與跨境金融的戰略樞紐。在泰國銀行（Bank of Thailand）推動的進步型監管環境以及PromptPay等先進數位基礎設施的支撐下，泰國已成為包容性創新與區域金融互聯的重要據點。\n\n本場次匯聚領先的生態系統推動者、金融機構與新創企業，共同探討合作、前瞻性政策對話與創新如何加速ASEAN下一波數位與永續發展浪潮。討論將聚焦泰國金融科技生態的演進，以及其在塑造值得信賴、高度互聯的區域數位經濟中日益重要的角色。\n\n議程：\n\n下午1:30 – 歡迎致詞\n\n下午1:35 – 主題演講：「泰國在ASEAN數位未來中的角色」\n\n下午1:45 – 小組討論：「聚焦泰國：ASEAN數位未來的成長引擎」\n\n下午2:25 – 閉幕致詞"],"agn255-cross-border-payments-instant-settlement-leveraging-stablecoins-blockchain-powered-by-xweave":["The curation of content and speakers was wholly managed by XWeave and does not reflect the views of the organisers or its staff.\n\nAs cross-border transactions grow increasingly complex, inefficiencies in existing payment rails continue to slow global commerce. This workshop explores how Project BLOOM is bringing industry leaders together to advance the future of payments through blockchain and stablecoin infrastructure - enabling faster, lower-cost, and fully auditable cross-border settlement.\n\nParticipants will:\n\nJoin us to uncover how next-generation payment infrastructure can reshape global financial connectivity.","本場次的內容策劃與講者邀請全由XWeave負責，不代表主辦單位或其工作人員的立場。\n\n隨著跨境交易日趨複雜，現有支付軌道的低效問題持續阻礙全球商業的流轉。本次工作坊探討Project BLOOM如何匯聚業界領袖，透過區塊鏈與穩定幣基礎設施共同推動支付的未來——實現更快速、更低成本且完全可稽核的跨境結算。\n\n參與者將：\n\n加入我們，探索次世代支付基礎設施如何重塑全球金融互聯互通。"],"agn245-empowering-businesses-in-the-onchain-economy-how-coinbase-is-modernising-finance-for-smes-startups-and-enterprise-powered-by-coinbase":["The curation of content and speakers was wholly managed by Coinbase and does not reflect the views of the organisers or its staff.\n\nAs global payments, payroll, and treasury operations evolve, businesses of every size are seeking faster, more inclusive, and compliant ways to move money. This workshop explores how Coinbase Business enables companies to leverage stablecoins and digital assets for real-world use cases: cross-border payments, global talent payouts, and digital asset management. Join us for a walkthrough of the product to see how modern firms can thrive onchain.","本場次的內容策劃與講者邀請全由Coinbase負責，不代表主辦單位或其工作人員的立場。\n\n隨著全球支付、薪資發放及財務管理業務持續演進，各規模企業都在尋求更快速、更具包容性且合規的資金流動方式。本次工作坊探討Coinbase Business如何幫助企業將穩定幣與數位資產應用於真實場景：跨境支付、全球人才薪酬發放及數位資產管理。誠邀您參與產品實機演示，了解現代企業如何在鏈上蓬勃發展。"],"agn59-moving-from-hype-to-impact-preparing-for-an-agentic-future":["Agentic AI is poised to radically transform financial services. From customer support bots that anticipate needs to autonomous financial advisors, the rise of agentic capabilities will reshape how value is created and how risks are managed. Many institutions are experimenting with agentic AI in innovation labs and pilots, exploring use cases from AI-powered financial planning to KYC automation. Yet most remain at an early stage, with limited integration into core operations, highlighting the gap between promise and impact. Closing this gap requires not only technical progress, but also robust governance frameworks, shared standards, and supervisory clarity that can scale across the industry.\n\nThis roundtable convenes senior leaders across financial institutions, regulators, and fintechs to explore how the sector can prepare for responsible adoption of agentic AI. While the potential benefits are significant, so too are the challenges: establishing transparent standards for safety and accountability, building governance structures that evolve with technology, and aligning supervisory expectations to mitigate new risks. The session will chart pathways for moving beyond experimentation towards standards-driven, governed, and trusted deployment of agentic AI in financial services.","智能體AI（Agentic AI）即將從根本上變革金融服務業。從能夠預判需求的客服機器人，到自主運作的金融顧問，智能體能力的崛起將重塑價值創造的方式與風險管理的模式。許多機構正在創新實驗室與試點專案中探索智能體AI的應用場景，從AI驅動的財務規劃到KYC自動化，範疇廣泛。然而，大多數機構仍處於早期階段，與核心業務的整合程度有限，這凸顯了潛力與實際影響之間的落差。彌合這一落差，不僅需要技術的持續進步，更需要健全的治理框架、共同標準，以及能夠在整個行業中規模化落地的監管明確性。\n\n本次圓桌論壇匯聚金融機構、監管機構及金融科技業者的高階領袖，共同探討業界如何為負責任地採用智能體AI做好準備。潛在效益固然巨大，挑戰同樣不容忽視：建立透明的安全與問責標準、構建能與技術同步演進的治理架構，以及協調監管預期以降低新興風險。本場次將為業界從實驗性探索邁向以標準為導向、受治理約束且值得信賴的智能體AI規模化部署繪製路徑。"],"agn158-tokenised-money-across-borders-regulatory-pathways-and-global-interoperability":["As tokenised money moves from pilot to cross-border deployment, this roundtable convenes global regulators, industry leaders and standard setters to address the regulatory pathways needed for safe and interoperable adoption. Drawing on new insights from CCAF’s forthcoming report, the session explores how programmability, interoperability, and governance are reshaping the global financial architecture.","隨著代幣化貨幣從試點走向跨境部署，本次圓桌論壇匯聚全球監管機構、業界領袖及標準制定者，共同探討實現安全、可互通採用所需的監管路徑。結合CCAF即將發布報告的最新研究洞察，本場次深入探討可程式化、互通性與治理機制如何重塑全球金融架構。"],"agn107-making-tokenized-assets-legally-enforceable-across-chains-powered-by-axelar":["The curation of content and speakers was wholly managed by Axelar and does not reflect the views of the organisers or its staff.\n\nSubtitle:\n\nBridging law, code and interoperability to build institutional trust in tokenized markets.\n\nDescription:\n\nAs institutions accelerate tokenization, legal enforceability has become the missing pillar for scale. This session shows how enforceable terms—ownership rights, transfer restrictions, compliance obligations—can “travel” with tokenized products that gain global distribution, aligning legal reality with technical execution. Participants will learn practical patterns to embed assent, governance and remedies into onchain workflows and see how technology can support issuance, servicing and compliant distribution for multi-chain products. Participants will engage one another in a practical workshop for designing strategies that legal, risk and product teams can adopt.\n\nKey Themes:\n\n\\- Enforceability as the foundation for institutional tokenization\n\n\\- Legal interoperability that moves with the asset through diverse, onchain liquidity pools\n\n\\- Consent, governance and auditability built into transactions\n\n\\- DAMA 2 for issuance, servicing and distribution of compliant tokenized funds\n\n\\- Axelar as connectivity + attestation for enforceable, cross-chain products","本場次的內容策劃與講者邀請全由Axelar負責，不代表主辦單位或其工作人員的立場。\n\n副標題：\n\n橋接法律、程式碼與互通性，在代幣化市場中建立機構信任。\n\n介紹：\n\n隨著機構加速推進代幣化，法律可執行性已成為規模化落地不可或缺的關鍵支柱。本場次展示如何使可執行條款——包括所有權、轉讓限制及合規義務——隨代幣化產品在全球流通，確保法律現實與技術執行高度一致。參與者將學習如何將同意機制、治理架構與救濟方式嵌入鏈上流程的實務模式，並了解技術如何支持多鏈產品的發行、服務及合規分發。本場次還將引導參與者開展實作工作坊，共同設計法律、風控及產品團隊可採用的落地策略。\n\n核心主題：\n\n\\- 可執行性作為機構級代幣化的基礎\n\n\\- 隨資產穿越多元鏈上流動性池流轉的法律互通性\n\n\\- 內建於交易流程中的同意機制、治理架構與可稽核性\n\n\\- 用於合規代幣化基金發行、服務及分發的DAMA 2框架\n\n\\- Axelar作為可執行跨鏈產品的連接層與認證機制"],"agn237-the-end-of-data-sharing-a-new-paradigm-for-open-data-powered-by-terminal-3":["The curation of content and speakers was wholly managed by Terminal 3 and does not reflect the views of the organisers or its staff.\n\nAs data becomes increasingly fragmented and regulated, the traditional model of sharing and centralizing information is reaching its limits. This workshop introduces a next-generation framework for collaboration without compromising privacy or compliance.","本場次的內容策劃與講者邀請全由Terminal 3負責，不代表主辦單位或其工作人員的立場。\n\n隨著資料日益碎片化且受到嚴格監管，傳統的資料共享與集中化模式已逼近其極限。本次工作坊將介紹一套下一代協作框架，在不妥協隱私保護或合規要求的前提下實現資料協同。"],"agn239-ethereum-in-the-spotlight":["The curation of content and speakers was wholly managed by Ethereum and does not reflect the views of the organisers or its staff.\n\nAs Ethereum matures into critical public infrastructure, governments and institutions are recognizing the legitimacy and resilience of open networks. This spotlight session gathers senior leaders to define how Ethereum can responsibly power the next generation of finance, identity, privacy, and digital infrastructure.\n\nAgenda:\n\n3:00pm - Welcome Address by President of Ethereum Foundation, Aya Miyaguchi\n\n3:10pm - Keynote: Ethereum: The Coordination layer of the Internet and why It matters now by Mo Jalil (APAC Enterprise Lead at EF)\n\n3:30pm - Session 1: Governance & Policy by Tju Liang Chua (EF Legal Counsel)\n\n4:05pm - Session 2: Institutional Privacy & Security by Paul Brody (EY Blockchain Lead)\n\n4:40pm - Coffee Break\n\n4:50pm - Session 3: Breakout sessions (Stablecoins, Policy, Adoption, Talent)\n\nSmall roundtable discussions designed to move from ideas to action: each table focuses on key blockers, quick wins, and long-term opportunities.\n\n5:30pm - Session 4: Synthesis & the Future of Talent\n\n5:55pm - Closing Remarks","本場次的內容策劃與講者邀請全由Ethereum負責，不代表主辦單位或其工作人員的立場。\n\n隨著Ethereum逐步成熟為關鍵的公共基礎設施，各國政府與機構正日益認可開放網絡的正當性與韌性。本場聚焦論壇匯聚高階領袖，共同探討Ethereum如何負責任地驅動下一代金融、身份認證、隱私保護與數位基礎設施的發展。\n\n議程：\n\n下午3:00 – Ethereum Foundation主席Aya Miyaguchi致歡迎詞\n\n下午3:10 – 主題演講：「Ethereum：網際網路的協調層及其當下的重要性」，由Mo Jalil（EF亞太區企業負責人）主講\n\n下午3:30 – 第一場：治理與政策，由Tju Liang Chua（EF法律顧問）主持\n\n下午4:05 – 第二場：機構隱私與安全，由Paul Brody（EY區塊鏈負責人）主持\n\n下午4:40 – 茶歇\n\n下午4:50 – 第三場：分組討論（穩定幣、政策、採用、人才）\n\n以小型圓桌討論形式推動從想法到行動的落地：每桌聚焦關鍵阻礙、快速突破點及長遠機遇。\n\n下午5:30 – 第四場：綜合討論與人才發展的未來\n\n下午5:55 – 閉幕致詞"],"agn119-redefining-corporate-cas-the-digital-bank-blueprint-for-smarter-business-banking-powered-by-nucleus-software":["As corporate clients demand faster, smarter, and more connected banking experiences, banks must rethink their Current Account and Savings (CAS) offerings. This workshop, led by Anshul Khare, Head – Sales (Middle East), Nucleus Software, explores how a digital-first CAS blueprint can empower banks to deliver intelligent cash management, personalized digital experiences, and seamless integration across ecosystems. Discover how modern platforms, API-led architecture, and real-time analytics can redefine corporate banking for the next decade.","隨著企業客戶對更快速、更智能、更高度整合的銀行體驗需求持續攀升，銀行必須重新思考其企業往來帳戶與儲蓄（CAS）產品的設計。本次工作坊由Nucleus Software中東區銷售主管Anshul Khare主持，探討數位優先的CAS藍圖如何賦能銀行，實現智能化現金管理、個人化數位體驗，以及跨生態系統的無縫整合。了解現代平台、API導向架構與即時分析如何重新定義未來十年的企業銀行服務。"],"agn157-ai-governance-stability-and-competitive-dynamics-aligning-priorities-for-safe-and-effective-ai-adoption":["This high-level interactive discussion, hosted by the World Economic Forum (Forum) and the Cambridge Centre for Alternative Finance (CCAF), will convene financial regulators, industry leaders, and AI providers to explore how governance gaps, emerging stability risks, and shifting competitive dynamics are reshaping financial services.\n\nDrawing on preliminary insights from ongoing CCAF and Forum research on AI adoption in financial services globally, the discussion will gather regional perspectives from regulators and market participants to help inform and guide financial market participants on their AI journey. Outcomes will directly feed into impact studies and policy recommendations for safe and effective AI deployment and scaling in the global financial services sector.","本場高階互動討論由世界經濟論壇（Forum）與Cambridge Centre for Alternative Finance（CCAF）聯合主辦，匯聚金融監管機構、業界領袖及AI服務提供商，共同探討治理缺口、新興穩定性風險以及競爭格局的轉變如何重塑金融服務業。\n\n本次討論將借助CCAF與世界經濟論壇就全球金融服務AI應用的最新研究初步洞察，廣泛徵集監管機構與市場參與者的區域視角，為金融市場參與者的AI發展之路提供指引。討論成果將直接納入影響力研究，並轉化為在全球金融服務業安全且有效地部署及擴大AI應用的政策建議。"],"agn84-unicorn-roundtable-scaling-innovation-for-sustainable-growth-bridging-fintech-ecosystems-across-borders":["A roundtable to explore how innovation can foster further FinTech growth, the role of regulators in enabling scalable success, and how cross-border collaboration can unlock new opportunities for FinTech unicorns in Singapore, the UK, and beyond.\n\nDiscussion topics:","本次圓桌論壇探討創新如何進一步推動金融科技的成長，監管機構在賦能可擴展成功方面所扮演的角色，以及跨境協作如何為新加坡、英國及其他地區的金融科技獨角獸開拓新機遇。\n\n討論議題："],"agn200-risk-to-resilience-strategies-for-fintech-driven-sme-finance":["Small and medium-sized enterprises (SMEs) are the backbone of economic growth, yet they remain underserved by traditional finance. Fintechs and digital lenders are stepping in to close this gap with innovative, data-driven lending models — but they face a critical challenge: managing the higher perceived risk of SME borrowers, especially in emerging markets or sectors with limited credit histories.\n\nCredit guarantee institutions can be game changers in this space. By sharing or absorbing part of the default risk, they enable fintech lenders to extend financing to more SMEs, on better terms, and at greater scale. This session will explore how risk mitigation tools — from partial credit guarantees to portfolio insurance and other risk mitigation tools — can empower fintechs to expand their reach, offer affordable pricing, and unlock inclusive growth.\n\nJoin industry leaders, fintech innovators, and guarantee providers as we discuss:","中小企業（SME）是經濟成長的重要支柱，卻長期未能獲得傳統金融的充分服務。金融科技業者與數位放貸機構正以創新的數據驅動放貸模式填補這一缺口——然而他們面臨一項關鍵挑戰：如何管理 SME 借款人相對較高的感知風險，尤其是在新興市場或信用紀錄不足的產業中。\n\n信用保證機構在此領域具有改變遊戲規則的潛力。透過分擔或承擔部分違約風險，信用保證機構能讓金融科技放貸業者以更優惠的條件、更大的規模，將融資延伸至更多 SME。本場次將探討各類風險緩解工具——從部分信用保證、投資組合保險到其他風險管理工具——如何賦能金融科技業者擴大服務範圍、提供具競爭力的定價，並推動普惠式成長。\n\n誠邀產業領袖、金融科技創新者與保證機構代表共同參與，深入討論："],"agn61-public-blockchains-in-banking-technology-risks-and-token-design-for-safety-and-resilience":["Financial institutions exploring public blockchains must grapple with technology risks that go beyond governance: consensus vulnerabilities, validator concentration, custody failures, and migration challenges. This roundtable will examine how token design can embed safety, integrity, interoperability, and usability into blockchain-based payments. Drawing on the Global Blockchain Business Council’s risk mitigation framework and MIT DCI/J.P. Morgan’s latest research on payment token design, the discussion will identify concrete safeguards and operational practices that can make public blockchain adoption safe, resilient, and institution-ready.\n\nThe conversation will focus on concrete design and operational safeguards banks should demand when engaging with public blockchain-based assets.\n\nPre-read materials:\n\nThis session is Part 2 of a 2-part series on Public Blockchains in Banking. Read more about Part 1 of the discussion here.","金融機構在探索公有區塊鏈時，必須面對超越治理範疇的技術風險：共識機制漏洞、驗證節點過度集中、託管失敗，以及遷移挑戰。本圓桌論壇將探討如何透過代幣設計，將安全性、完整性、互通性與易用性內建於區塊鏈支付系統之中。討論將援引 Global Blockchain Business Council 的風險緩解框架，以及 MIT DCI 與 J.P. Morgan 最新的支付代幣設計研究成果，以確立具體的保護措施與操作實務，使公有區塊鏈的採用更安全、更具韌性，並符合機構需求。\n\n本次對話將聚焦於金融機構在接觸公有區塊鏈資產時，應要求具備哪些具體的設計與操作保護機制。\n\n預讀資料：\n\n本場次為「銀行業公有區塊鏈」兩部曲系列的第二場。請點此閱讀第一場討論的詳細內容。"],"agn133-harnessing-ai-and-quantum-computing-transforming-the-future-landscape-of-financial-services-brought-to-you-by-hsbc":["The curation of content and speakers was wholly managed by HSBC and does not reflect the views of the organisers or its staff.\n\nThis session brings together industry leaders and experts to provide valuable insights into the future of finance, driven by the convergence of AI, digital assets and quantum technologies. Through each focused segment, participants will gain a deeper understanding of how HSBC is harnessing cutting-edge innovation to drive smarter, more resilient solutions for clients. It will explore how the business landscape evolves as Agentic AI becomes mainstream, provide an understanding of digital money, dive into the transformative potential of quantum computing across industries and highlight how frontier technologies will work together to create new opportunities and reshape business models. Attendees can expect to learn from industry experts and HSBC leaders on how these technologies are evolving from concept to real-world application, and what opportunities they unlock for the next generation.","本場次之內容策劃與講者邀請全程由 HSBC 主導，不代表主辦單位或其工作人員之立場。\n\n本場次匯聚產業領袖與專家，就 AI、數位資產與量子技術融合所驅動的金融未來，提供深度洞見。透過各聚焦主題，與會者將深入了解 HSBC 如何善用尖端創新，為客戶打造更智慧、更具韌性的解決方案。本場次將探討 Agentic AI 成為主流後商業生態的演變、數位貨幣的本質、量子運算在各行業的變革潛力，並說明前沿技術如何協同創造新機遇、重塑商業模式。與會者將從產業專家與 HSBC 領袖的分享中，了解這些技術如何從概念走向實際應用，以及它們為下一個世代所開啟的無限可能。"],"agn215-closed-door-cocktails-and-connections-brought-to-you-by-hsbc-and-british-high-commission-singapore":["This by-invite only networking cocktail event brings together policymakers, financial services leaders, and technology innovators from markets including ASEAN, India, the Middle East, Singapore, the US, and the UK. Designed to broaden international networks and foster meaningful connections, it promises an evening of impactful dialogue and collaboration.","本場次為僅限受邀者參加的社交雞尾酒會，匯聚來自 ASEAN、印度、中東、新加坡、美國及英國等市場的政策制定者、金融服務領袖與科技創新者。活動旨在拓展國際人脈、促進深度連結，為賓客帶來一個充滿影響力對話與跨界合作的精彩夜晚。"],"agn234-networking-drinks-bayview-foyer":["Wrap up your day with networking drinks at the Bayview Foyer available for all Insights Forum delegates. Keep the conversations going and meet new faces from the forum.","在 Bayview Foyer 的交流酒會中結束您的充實一天，所有 Insights Forum 代表均可參加。把握機會延續精彩對話，結識來自論壇的新夥伴。"],"agnd59-welcome-to-singapore-fintech-festival-2025":["Join us as we kick off SFF 2025 on the Festival Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the future of FinTech.","歡迎蒞臨 Festival Stage，與我們共同揭開 SFF 2025 的序幕，精彩對話、突破性思維與引領金融科技未來的卓越聲音將在此交匯。"],"agnd345-a-decade-of-fintech-impact-on-financial-services-and-regulation":["In this session, Dr Weber will examine how fintech has redefined the global financial landscape, the regulatory responses it has spurred, and how the next wave of technological and policy developments will shape the future of financial services.","本場次中，Weber 博士將深入剖析金融科技如何重塑全球金融格局、各地監管機構的因應之道，以及下一波技術革新與政策發展將如何型塑金融服務的未來走向。"],"agnd720-finmonda-demo":["Witness the start of the new digital GFTN Solution: FinMonda. From market intelligence, strategy creation and collaboration, GFTN now provides a unique digital solution for the network.","見證 GFTN 全新數位解決方案 FinMonda 的誕生。從市場情報、策略制定到協同合作，GFTN 現為網絡成員提供獨一無二的數位化解決方案。"],"agnd351-banking-leadership-in-the-digital-age":["With over four decades of leadership in banking and community, Wee Ee Cheong, Deputy Chairman and CEO of UOB, has helped shape Singapore’s role in global finance. As the steward of one of Southeast Asia’s leading regional banks and the custodian of a multigenerational enterprise, he opens #SFF2025 with insights on innovation, leadership and culture in navigating transformation in the digital age.","大華銀行（UOB）副主席兼執行長黃一宗擁有逾四十年的銀行業與社區領導經驗，深刻影響了新加坡在全球金融體系中的地位。身為東南亞領先區域銀行的掌舵者，以及跨世代企業的守護人，他將在 #SFF2025 開幕時，分享在數位時代中駕馭轉型浪潮的創新心法、領導智慧與企業文化。"],"agnd344-fireside-chat-with-dpm-gan-kim-yong":["In a fireside chat moderated by DBS CEO Tan Su Shan, DPM will speak on broad themes relating to navigating global economic realignments, the impact of technology on the global economy and people, and the evolving role of governments and central banks.","本場爐邊對談由 DBS 執行長陳素珊主持，副總理顏金勇將就因應全球經濟格局重塑、科技對全球經濟與民眾的影響，以及政府與央行角色的演變等宏觀議題，分享其深度見解。"],"agnd721-next-gen-leaders-ama-session-1":["This AMA session offers an open, conversational platform for Next Gen Leaders to engage directly with leading experts in fintech and digital finance. It aims to provide participants with a rare opportunity to ask candid questions, gain real-world insights, and explore emerging trends shaping the industry. By fostering authentic dialogue between rising talent and established thought leaders, the session seeks to deepen understanding of leadership and innovation while inspiring participants to navigate their own paths in the evolving financial landscape.\n\nPlease note that is this an exclusive, closed-door session for the inaugural cohort of Next Gen Leaders. This session is not open to public. To learn more about the programme, visit the website here.","本場 AMA 問答環節提供開放、對話式的平台，讓 Next Gen Leaders 學員得以直接與金融科技及數位金融領域的頂尖專家互動交流。本場次旨在為學員創造難得的機會，讓他們能坦誠提問、汲取實戰洞見，並探索正在重塑產業的新興趨勢。透過促進新秀人才與資深意見領袖之間的真實對話，本場次致力深化對領導力與創新的理解，激勵學員在持續演進的金融生態中開創自身的精彩旅程。\n\n請注意，本場次為首屆 Next Gen Leaders 學員的專屬閉門活動，不對外開放。如需進一步了解此計畫，請造訪官方網站。"],"agnd452-internet-capital-markets-powered-by-solana":["Internet Capital Markets (ICM) represents Solana’s vision for a financial system where assets, payments, and markets operate natively on open, high-performance blockchains. In this model, blockchain becomes a unified financial layer for the internet, enabling capital to move as freely as information. Solana’s technology powers real-time trading and settlement at scale, creating a global, efficient, and inclusive digital marketplace.","Internet Capital Markets（ICM）代表 Solana 對未來金融體系的願景——資產、支付與市場原生運行於開放、高效能的區塊鏈之上。在此模型中，區塊鏈成為網際網路的統一金融基礎層，使資本能像資訊一樣自由流通。Solana 的技術支援大規模即時交易與結算，打造出一個全球性、高效且普惠的數位市場。"],"agnd582-future-of-finance-at-the-intersection-of-geopolitics-technology-and-markets":["Join George Lee, co-head of the Goldman Sachs Global Institute, as he explains how the intersection of geopolitics, advanced technology and markets is shaping the future of finance.\n\nGeorge will lean on insights gathered during his career where he advised some of the biggest tech companies: Microsoft, Apple, Alphabet, Meta, Tesla, Adobe, Baidu, eBay, Atlassian, Uber, Dropbox and Cloudflare. Additionally, as co-CIO, George helped to set technology strategy and policy for Goldman Sachs and managed a global workforce of engineers.","誠邀您聆聽 Goldman Sachs Global Institute 聯席主管 George Lee 分析地緣政治、先進技術與市場的交匯如何塑造金融業的未來。\n\nGeorge 將援引其職涯中為多家科技巨頭提供顧問服務的豐富洞見，合作對象涵蓋 Microsoft、Apple、Alphabet、Meta、Tesla、Adobe、Baidu、eBay、Atlassian、Uber、Dropbox 及 Cloudflare。此外，身為前聯席技術長（co-CIO），George 曾主導 Goldman Sachs 的技術策略與政策制定，並統籌管理全球工程師團隊。"],"agnd453-the-shape-of-money-how-embedded-finance-is-powering-the-next-gen-of-digital-banking-powered-by-fiserv":["Consumers expect seamless financial experiences within their everyday digital journeys. Embedded finance is no longer a trend, it's a strategic imperative.\n\nDiscover how financial institutions, fintechs, and non-financial brands can deliver real-time, financial services within digital ecosystems.\n\nExplore how Fiserv is unlocking innovation, speed, and scalability for financial experiences.","消費者期待在日常數位旅程中享有無縫的金融體驗。嵌入式金融已不再只是趨勢，而是戰略層面的必然選擇。\n\n探索金融機構、金融科技業者與非金融品牌如何在數位生態系統中提供即時金融服務。\n\n了解 Fiserv 如何為金融體驗解鎖創新能量、加速落地並實現規模化擴展。"],"agnd411-emirates-nbd-x-singapore-ecosystem-a-blueprint-for-fintech-growth-powered-by-emirates-nbd":["FinTech innovation thrives on collaboration and investment. Neeraj Makin, Group Head of Strategy & Venture Capital at Emirates NBD, will share how the bank partners with Singapore’s FinTechs - from AI compliance with Silent Eight to cross-border payments with Nium, payee verification with IPID, and blockchain settlement with Partior - and leverages venture capital to deepen ties and drive long-term growth.","FinTech 創新的蓬勃發展有賴合作與投資的共同驅動。Emirates NBD 集團策略與創業投資主管 Neeraj Makin 將分享該銀行如何與新加坡的 FinTech 生態系統深度合作——從與 Silent Eight 協作的 AI 合規應用、與 Nium 攜手的跨境支付、與 IPID 合作的收款方驗證，到與 Partior 共建的區塊鏈結算——並透過創業投資深化夥伴關係、推動長期成長。"],"agnd346-geopolitics-can-finance-and-technology-support-globalisation-amid-fragmentation":["This panel explores the role of finance and technology in enabling collaborations between countries as they navigate a changing geopolitical landscape amidst rising global tensions. Discussion will focus on preserving cooperation, building trust and creating fair rules to ensure shared economic growth and stability across nations in an interconnected world. Discussants will explore practical strategies in support of globalisation & strengthening multilateralism for a more inclusive and peaceful future.","本場次深入探討在全球局勢日趨緊張、地緣政治格局加速演變之際，金融與科技如何支持各國之間的合作。討論將聚焦於維護合作共識、建立互信基礎，以及制定公平規則，以確保各國在相互依存的世界中共享經濟成長與穩定。與談者將探索支持全球化、強化多邊主義的務實策略，共同邁向更具包容性與和平的未來。"],"agnd454-trustworthy-and-governed-agentic-ai-for-the-enterprise-powered-by-pega":["As AI evolves into autonomous agents, strong governance is vital especially in regulated sectors like finance, healthcare, and government. This session shares key principles for responsible agentic AI, using Pega’s 40+ years of award winning expertise to balance innovation with accountability.","隨著 AI 演進為自主代理系統，健全的治理機制愈顯關鍵，在金融、醫療與政府等受監管的行業中尤為如此。本場次分享負責任的 Agentic AI 核心原則，借助 Pega 逾四十年屢獲殊榮的深厚專業積累，在創新與問責之間取得最佳平衡。"],"agnd722-meet-alfin-your-intelligent-insights-engine-for-the-financial-industry":["ALFIN is more than an AI intelligence engine, it's the central brain for financial intelligence. It’s the outcome of ten years of industry innovation, collective intelligence, and relentless refinement. Join us at this session to learn more about how ALFIN can help you turn ideas into intelligence.","ALFIN 不僅是一個 AI 智慧引擎，更是金融情報的核心大腦。它是十年產業創新、集體智慧與持續精進的結晶。歡迎蒞臨本場次，深入了解 ALFIN 如何協助您將想法轉化為真正的洞察力。"],"agnd412-ai-driven-credit-evolution-beyond-forecasting-powered-by-finvolution":["AI is reshaping credit finance by moving beyond traditional forecasting to support smarter, faster decision-making. This session explores how AI and LLMs enhance user growth, fraud detection, risk assessment, and intelligent operations—driving greater accuracy, efficiency, and strategic decision power in consumer finance.","AI 正在重塑信貸金融，突破傳統預測的框架，支援更智慧、更快速的決策。本場次探討 AI 與大型語言模型（LLM）如何強化用戶成長、詐欺偵測、風險評估與智慧化營運，從而在消費金融領域大幅提升準確性、效率與策略決策能力。"],"agnd455-one-year-on-boost-banks-journey-and-lessons-for-aspiring-digital-banks-powered-by-boost":["One year in, Sheyantha reflects on what it truly takes to build a digital bank, from strategy and structure to the partnerships that drive growth.\n\nThis session shares lessons from Boost Bank’s first year, highlighting how embedded banking, collaboration, and purpose have shaped its evolution and offer insights for aspiring digital bank applicants.","一年過去，Sheyantha 回顧建立一家數位銀行的真實歷程——從策略規劃與組織架構，到驅動成長的關鍵夥伴關係。\n\n本場次分享 Boost Bank 首年的經驗與啟示，深入說明嵌入式銀行服務、協同合作與使命導向如何型塑其發展軌跡，並為有志申請數位銀行牌照者提供寶貴的實戰借鏡。"],"agnd413-unlocking-operational-efficiency-with-agentic-genai-in-financial-services-powered-by-amdocs":["As financial institutions strive to cut costs, boost agility, and meet growing regulatory demands, operational efficiency is now critical. This keynote explores how Agentic GenAI is redefining enterprise performance—enabling autonomous, intelligent decision-making, streamlining operations end-to-end, and driving secure, scalable, and responsible AI adoption.","在金融機構積極降低成本、提升靈活度並因應日益嚴格的監管要求之際，營運效能已成為核心競爭要素。本場主題演講探討 Agentic GenAI 如何重新定義企業績效——透過自主、智慧化的決策機制，實現端對端營運流程的精簡，並推動安全、可擴展且負責任的 AI 導入。"],"agnd347-the-global-policy-dialogue-towards-the-next-decade-of-transformation-and-new-financial-corridors":["Policymakers stand at the forefront of profound shifts as new developments and financial corridors are increasingly being driven by AI, tokenization and quantum technologies. This session will feature the perspectives of global policymakers on how they are preparing for new transformations that balance innovation with stability, while shaping resilient frameworks for a rapidly evolving global financial system.","政策制定者正站在深刻變革的最前沿——由 AI、代幣化與量子技術驅動的新發展與金融走廊正加速成形。本場次匯聚全球政策制定者，分享他們如何為即將到來的變革做好準備，在創新與穩定之間取得平衡，同時為快速演進的全球金融體系構建具韌性的監管框架。"],"agnd456-accelerating-enterprise-ai-how-financial-services-reshapes-and-connects-powered-by-infosys":["As financial institutions evolve from digital-first to AI-native, they’re embedding AI into core operations – from product development to marketing and risk. This shift drives exponential value and reimagines ecosystems, forging data partnerships that transcend boundaries and help shape a broader, interconnected Data & AI Economy.","隨著金融機構從數位優先邁向 AI 原生，AI 正深度融入核心業務——從產品開發、行銷到風險管理。這一轉變創造了指數級的價值，並重塑生態系統格局，催生出跨越邊界的數據合作夥伴關係，共同構建更廣泛、相互連結的數據與 AI 經濟體。"],"agnd724-finmonda-demo":["Witness the start of the new digital GFTN Solution: FinMonda. From market intelligence, strategy creation and collaboration, GFTN now provides a unique digital solution for the network","見證 GFTN 全新數位解決方案 FinMonda 的誕生。從市場情報、策略制定到協同合作，GFTN 現為網絡成員提供獨一無二的數位化解決方案"],"agnd414-behind-the-curtain-building-agentic-ai-systems-in-real-world-projects-powered-by-z%C3%BChlke":["Agentic AI is starting to deliver real impact, but building it reliably remains challenging. This session shares practical lessons from real-world implementation, covering what makes LLM systems robust in production, how evaluation can be harder than expected, and why data quality drives success.\n\nGain an inside look into bringing agentic AI to life in practice and the future of this technology.","Agentic AI 開始展現真實成效，但要穩健地落地實作仍充滿挑戰。本場次分享來自真實專案的實戰經驗，涵蓋：如何讓 LLM 系統在生產環境中保持穩健、評估工作為何往往比預期更加複雜，以及為何數據品質是決定成敗的關鍵。\n\n深入了解如何在實務中將 Agentic AI 從構想付諸實現，以及這項技術的未來發展方向。"],"agnd502-charting-your-next-exit-an-investor-founder-workshop":["In today’s evolving market, strategic exits are vital for realizing returns and sustaining investor confidence. This SVCA workshop equips venture capitalists and growth investors with actionable insights on timing, structuring, and executing exits,from trade sales to IPOs. Participants will hear from seasoned investors who have navigated successful deals and gain practical perspectives on maximizing value.\n\nRegister here.","在當今持續演變的市場環境中，策略性退出對於實現投資回報、維繫投資人信心至關重要。本場由 SVCA 主辦的工作坊為創業投資人與成長型投資者提供可落地執行的洞見，涵蓋退出時機的選擇、交易架構的設計，以及從策略出售到首次公開發行（IPO）的完整執行流程。與會者將聆聽深具經驗的投資人分享成功交易的實戰歷程，獲取最大化價值的務實觀點。\n\n立即報名。"],"agnd557-ethereums-next-chapter-leadership-finance-and-the-future-of-decentralised-infrastructure":["In this fireside chat, Aya Miyaguchi, President of the Ethereum Foundation, will discuss the evolution of the Foundation and lessons from her leadership journey so far, as well as the future outlook of decentralised finance.","本場爐邊對談將由 Ethereum Foundation 主席 Aya Miyaguchi 主講，分享 Ethereum Foundation 的演進歷程、她在領導旅程中的寶貴體悟，以及去中心化金融的未來展望。"],"agnd457-x-stars-ai-ecosystem-shaping-the-next-decade-in-auto-finance-powered-by-x-star":["Join the CTO of X Star Technology, Mr. Michael Jia to discover how X Star’s AI-powered platform is transforming auto finance from slow, fragmented processes into a swift, intelligent ecosystem.\n\nWe'll unveil a breakthrough Agentic AI model, which executes decisions autonomously, and demonstrate how our in-house car dealer platform, Xport, drives revenue and efficiency. Learn how to leverage self-learning intelligence to shape your next decade of growth.","誠邀您聆聽 X Star Technology 技術長 Michael Jia 先生，深入解析 X Star 的 AI 驅動平台如何將汽車金融從繁瑣、分散的流程轉型為快速、智慧的生態系統。\n\n我們將揭示突破性的 Agentic AI 模型——能夠自主執行決策——並展示我們自主研發的汽車經銷商平台 Xport 如何有效提升營收與效率。了解如何善用自我學習智慧，型塑您未來十年的成長格局。"],"agnd415-digitizing-pcaf-implementation-in-practice-powered-by-evercomm":["Financial Institutions are at the frontline of the sustainability transition but confidence is often tested by fragmented data, unverifiable claims and constantly evolving methodologies.\n\nPATHMATCH, a jointly developed digital platform by CTBC Bank and Evercomm, simplifies PCAF implementation, harnessing AI and advanced digitization to manage Scope 3 financed emissions and portfolio transition performance — to strengthen compliance, manage risks, and accelerate sustainable financing with confidence.","金融機構站在永續轉型的最前線，卻常因數據破碎、難以核實的聲明以及不斷演變的方法論而面臨信心考驗。\n\nPATHMATCH 是由中國信託商業銀行（CTBC Bank）與 Evercomm 聯合開發的數位平台，旨在簡化 PCAF 的落地實施，透過 AI 與先進數位化技術管理範疇三（Scope 3）融資排放與投資組合轉型績效——協助金融機構強化合規能力、有效管理風險，並以更高的信心加速推動永續金融。"],"agnd374-ai-driven-business-transformation-in-the-asean-region":["Artificial intelligence is transforming business operations and accelerating innovation across ASEAN. Hear from Oranuch (Mimee) Lerdsuwankij as she draws on her experiences in building regional tech ecosystems to share insights on key adoption trends how Southeast Asian businesses are identifying strategic opportunities, scaling real-world impact, and driving digital growth and competitive advantage through AI.\n\nShe will also discuss how corporates can embark on their AI transformation journey from reimagining workflows and enhancing decision-making to building an AI-first culture that unlocks new business models and sustainable growth","人工智慧正在轉型 ASEAN 各地的企業營運，加速推動創新發展。本場次將由 Oranuch（Mimee）Lerdsuwankij 分享她在建構區域科技生態系統方面的豐富經驗，探討東南亞企業如何把握 AI 帶來的策略機遇、擴大實際應用的影響力，並藉此推動數位成長與競爭優勢。\n\n她也將探討企業如何展開 AI 轉型之旅——從重新設計工作流程、強化決策品質，到打造以 AI 為核心的企業文化，進而開拓全新商業模式，實現永續成長。"],"agnd458-transforming-finance-through-technology-and-collaboration-powered-by-circle":["Join Circle for a dynamic panel with Nium and Visa as we discuss how collaboration between traditional finance and fintech is transforming payments and financial infrastructure. Discover how technology, digital assets, AI, and partnerships drive innovation, resilience, and inclusion in the next generation of financial services.","誠邀您加入 Circle 與 Nium、Visa 共同舉辦的動態圓桌論壇，探討傳統金融與金融科技之間的跨界合作如何重塑支付系統與金融基礎設施。了解科技、數位資產、AI 與夥伴關係如何共同驅動下一代金融服務的創新、韌性與普惠金融發展。"],"agnd416-leading-the-payment-revolution-empowering-global-foreign-trade-powered-by-xtransfer":["Viola Xiao, XTransfer’s Singapore Local CEO, will explore how digital payments are reshaping B2B trade, highlighting AI for real-time compliance and stablecoins for faster, more transparent settlement. She’ll unveil the X-Net White Paper, a unified framework standardising risk control and payments, to advance secure, efficient cross-border transactions in emerging markets and foster collaboration.","XTransfer 新加坡區執行長 Viola Xiao 將探討數位支付如何重塑 B2B 貿易格局，重點介紹 AI 在實時合規審查中的應用，以及穩定幣如何實現更快速、更透明的結算。她將正式發布 X-Net 白皮書——一套統一的風控與支付標準化框架，旨在推動新興市場跨境交易的安全與效率，並促進各方合作。"],"agnd510-beyond-capital-the-next-decade":["Global finance is entering a decisive new phase, defined by technological advancement, evolving market structures, and the reconfiguration of capital across sectors and asset classes. Investors are no longer simply funding growth; they are shaping the foundations of the next generation’s economy—building systems that are digital, adaptive, and long-term in orientation.\n\nThis panel convenes leaders at the forefront of private and institutional investing who have influenced capital markets, alternative asset strategies, and enterprise innovation worldwide. The discussion will explore how global investors are rethinking capital allocation amid rapid technological progress, changing monetary conditions, and the emergence of private credit and secondaries as mainstream asset classes.","全球金融正進入一個決定性的新階段，其特徵在於技術的持續躍進、市場結構的演變，以及資本在各產業與資產類別間的重新配置。投資者不再只是提供成長資金，更在積極塑造下一代經濟的基石——構建數位化、具適應性且著眼長遠的體系。\n\n本場圓桌論壇匯聚私人投資與機構投資領域的頂尖領袖，他們在全球資本市場、另類資產策略與企業創新方面均具有深遠影響力。論壇將深入探討全球投資者如何在技術快速演進、貨幣政策條件轉變，以及私人信貸與二級市場逐漸成為主流資產類別的背景下，重新思考資本配置策略。"],"agnd375-real-time-device-risk-control-for-financial-fraud-defense-powered-by-tencent":["Online financial fraud in Southeast Asia is accelerating with bots and AI deepfakes. David Wang (Tencent Cloud Risk Solutions) will show how real-time device risk control strengthens mobile account protection and CNP payment risk—stopping emulators/overlays, account farms and synthetic IDs while keeping UX fast. We will also show how these signals counter Authorized-Push-Payment (APP) scams and remote-control fraud.","東南亞的網路金融詐欺正因機器人程式與 AI 深偽技術而急遽升溫。Tencent Cloud 風控解決方案的 David Wang 將示範即時裝置風控技術如何強化行動帳戶防護與無卡支付（CNP）的風險管理——有效攔截模擬器、螢幕覆蓋攻擊、帳號農場及合成身分，同時確保使用者體驗流暢不受影響。本場次亦將展示這些技術訊號如何應對授權推送支付（APP）詐騙與遠端控制詐欺。"],"agnd459-securing-tomorrow-preparing-for-an-always-on-ai-powered-future-powered-by-mastercard":["Explore how Mastercard is preparing for a hyper-connected, AI-powered future. This session unpacks the cybersecurity imperatives of 2030—from tokenized identities to proactive defense strategies—and outlines a collaborative roadmap to secure digital ecosystems in an always-on world.","探索 Mastercard 如何為超連結、AI 驅動的未來做好準備。本場次將深入剖析 2030 年的網路安全核心課題——從代幣化身分到主動防禦策略——並勾勒出一份協作路線圖，以確保在全時運行的世界中，數位生態系統的安全無虞。"],"agnd376-industry-powered-learning-closing-the-digital-skills-gap-for-tomorrows-workforce-powered-by-ant-international":["As technological advancements accelerate, the skills gap between what individuals possess and what the digital economy demands continues to grow. 10x1000 Tech for Inclusion addresses this issue by creating an inclusive community where learners worldwide can connect and inspire one another.\n\nThis session will showcase how, by partnering with industry leaders, we develop innovative learning content that combines real-world insights with best practices, equipping learners with essential digital skills and aligning education with the needs of the evolving workforce.","隨著技術進步持續加速，個人技能與數位經濟需求之間的落差也不斷擴大。10x1000 Tech for Inclusion 致力於建構一個具包容性的社群，讓全球學習者能夠相互連結、彼此激勵。\n\n本場次將展示我們如何透過與產業領袖的合作，開發融合實務洞察與最佳實踐的創新學習內容，幫助學習者具備關鍵數位技能，並使教育體系與不斷演進的職場需求緊密接軌。"],"agnd460-transformational-tech-in-finance-powered-by-tencent":["Tencent Palm Solutions introduces Palm Pay, a biometric payment innovation that delivers speed, security, and a seamless experience. Trusted by over 30 million users and early adopters, it showcases how palm recognition enhances daily transactions. Beyond payments, Tencent is extending this technology to redefine digital convenience and trust.","Tencent Palm Solutions 推出 Palm Pay——一項結合速度、安全性與無縫體驗的生物辨識支付創新方案。目前已獲逾 3,000 萬名用戶與早期採用者的信賴，充分展現掌紋識別技術如何提升日常交易體驗。除支付場景外，Tencent 正持續延伸此技術的應用範疇，重新定義數位便利性與信任基礎。"],"agnd418-tokenization-takes-off-singapore-joins-apacs-race-to-full-coverage-by-2027-powered-by-mastercard":["Mastercard is igniting a regional movement to accelerate tokenization and authentication across Asia Pacific, with Singapore among the frontrunners. This session dives into a bold ambition: achieving 100% tokenization and authentication in key Southeast Asia markets by 2027.\n\nLearn how tokenization is solving real industry pain points—fraud, friction, and fragmented user experiences—and hear directly from a digital wallet and a leading merchant already seeing the benefits. Whether you're in issuance, acceptance, digital wallets, or tech, this is your chance to understand what’s happening, what’s working, and how to plug into a transformation that’s reshaping payments.","Mastercard 正在引領一場區域性運動，加速推動亞太地區的代幣化與身分驗證，新加坡位居先行者之列。本場次聚焦一項宏大目標：在 2027 年前於東南亞主要市場實現 100% 代幣化與身分驗證覆蓋率。\n\n了解代幣化如何解決業界的實際痛點——詐欺、摩擦，以及破碎的使用者體驗——並直接聆聽數位錢包業者與領先商家分享已實際感受到的效益。無論您身處發卡、收單、數位錢包或科技領域，本場次都是深入了解現況、掌握成效，並融入這場重塑支付產業轉型的最佳機會。"],"agnd338-uk-sg-development-announcement":["Join this session for a new and exciting UK-SG financial sector development.","加入本場次，見證英國與新加坡金融業之間全新且令人期待的合作發展宣布。"],"agnd245-welcome-to-founders-stage-day-1-the-capital-providers-day":["The Capital Providers Day - The Resilience Playbook: Thriving in the Age of AI-Driven Reset\n\nJoin us as we kick off the day's sessions on the Founders Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the next wave of entrepreneurship.","資本提供者日——韌性手冊：在 AI 驅動重置時代中脫穎而出\n\n歡迎蒞臨 Founders Stage 開幕場次，精彩內容涵蓋深度對話、突破性理念，以及引領下一波創業浪潮的傑出聲音。"],"agnd461-epos-360-one-app-to-start-grow-and-scale-your-business-powered-by-ant-international":["The EPOS 360 app transforms the way SMEs in Singapore manage banking, payments, and growth—empowering them through every phase of their journey, from incorporating a business and growing locally to international expansion. In just five minutes, businesses can onboard effortlessly and tap into a suite of Banking, Loans, Payments, and Digital Solutions designed to fuel their success.","EPOS 360 應用程式徹底改變新加坡 SME 管理銀行、支付與業務成長的方式，全面賦能企業在每個發展階段的需求——從公司設立、本地擴張到國際拓展。企業只需五分鐘即可輕鬆完成上線，並使用涵蓋銀行、貸款、支付與數位解決方案的完整套件，全力驅動業務成功。"],"agnd301-welcome-to-futurematters-stage-day-1":["The FutureMatters Stage is a dedicated stage designed to foster interactive and thought-provoking conversations around potential futures, emerging signals, and long-term trends that will define the next decade.\n\nPanelists will explore which of today’s long-term trends will continue to ripple forward into the next decade, and which will fizzle out as mere fads; tee up the weak signals that the audience should pay closer attention to in the coming years; and explore how to manage the unexpected. Expect conversations that are rooted in deep systems analysis yet engaged with uncomfortable unknowns.","FutureMatters Stage 是一個專屬舞台，致力於促進圍繞潛在未來情境、新興訊號及將定義未來十年之長期趨勢的互動式深度對話。\n\n與談者將探討當今的長期趨勢中，哪些將持續影響未來十年，哪些又只是曇花一現的潮流；挖掘值得觀眾持續關注的微弱訊號；並探索如何應對無法預料的變局。對話以深度系統分析為根基，同時正視那些令人不安的未知數。"],"agnd419-beyond-silos-the-new-ai-operating-system-for-banking-powered-by-perfios":["Today's banks run on a patchwork of systems, creating friction and missed opportunities. This session presents a blueprint for a unified future. Discover how a single, intelligent OS can connect the entire customer journey, from onboarding to collections, to drive unprecedented efficiency and sustainable growth for the decade ahead.","當今銀行業依賴拼湊式系統運作，造成重重摩擦與機會流失。本場次將提出一份邁向統一未來的藍圖。探索單一智慧作業系統如何串聯完整的客戶旅程——從開戶到催收——進而在未來十年實現前所未有的效率提升與永續成長。"],"agnd157-connecting-markets-open-and-interoperable-networks":["The future of digital money stands at a crossroads, with divergent approaches threatening to create fragmented markets, limiting its potential. In this session, Leong Sing Chiong, Deputy Managing Director of the Monetary Authority of Singapore discusses the creation of open and interoperable networks to enable the cooperative global development of a tokenised financial system.","數位貨幣的未來正站在十字路口，各方分歧的發展路徑恐將造成市場碎片化，限制其潛力的充分發揮。本場次由新加坡金融管理局（MAS）副局長梁新強探討如何建立開放且具互通性的網路，以推動代幣化金融體系的全球協作發展。"],"agnd354-c-suite-insights-roadmap-for-ai-in-financial-services":["This panel convenes transformative leaders who have shaped capital markets, alternative asset strategies, and entrepreneurship ecosystems across global and regional corridors. It explores how global investment leaders are rethinking capital allocation amid rising global uncertainty, shifting policy priorities, and the acceleration of innovation across emerging sectors.","本場圓桌論壇匯聚具有變革影響力的領袖，他們在全球與區域範疇內推動了資本市場、另類資產策略及創業生態系統的發展。論壇將探討全球投資領袖如何在全球不確定性上升、政策優先順序轉變，以及新興領域創新加速的背景下，重新審視資本配置策略。"],"agnd246-vc-keynote-how-ai-is-separating-the-zombies-from-the-future-unicorns":["Why this matters now?\n\nFor VCs, the focus isn't just on new deals. AI is a double-edged sword creating immense challenges within their existing portfolio. They are now forced to perform \"Portfolio Triage\" - making hard decisions about which legacy SaaS companies are now \"zombies\" in the face of AI disruption and which ones can be saved with more capital and strategic guidance. Simultaneously, they face a new level of \"LP Scrutiny.\" Limited Partners are no longer just asking about financial returns; they are demanding to see a coherent AI strategy across the entire portfolio and asking tough questions about governance and risk.\n\nWhat you'll walk away with:\n\nActionable strategies for portfolio management and LP relations. Founders will learn how VCs are handling the difficult task of steering growth of their portfolio companies in the \"catch me if you can\" speed of AI.","為何此刻格外重要？\n\n對創投（VC）業者而言，挑戰不只來自新投資機會。AI 是一把雙面刃，正在其現有投資組合中製造巨大壓力。業者如今被迫進行「投資組合分流」——就哪些傳統 SaaS 企業已成為 AI 衝擊下的「殭屍公司」、哪些仍可透過追加資本與策略輔導獲救，做出艱難抉擇。與此同時，他們也面臨前所未有的「LP 審查壓力」。有限合夥人（LP）不再只關注財務回報，更要求看到整個投資組合具備一致的 AI 策略，並提出關於治理與風險的犀利問題。\n\n您將帶走的收穫：\n\n投資組合管理與 LP 關係的可執行策略。創業者將了解創投業者如何在 AI「追趕遊戲」的極速節奏中，艱難地引導其投資組合公司的成長之路。"],"agnd462-navigating-the-ai-divide-combating-fatigue-via-shared-sourcing-of-domain-expertise-powered-by-smbc":["While Gen AI has begun reshaping finance and accounting functions, many organisations still face cognitive strain and fragmented outcomes amid the demands of today's rapidly shifting tech landscape.\n\nThis session will explore how collective intelligence assets rooted in years of industry experience empowers enterprises to stay focused, sharpen clarity, reinforce governance, and unlock lasting value.","儘管生成式 AI 已開始重塑金融與會計職能，許多組織在當今瞬息萬變的技術環境下，仍深陷認知過載與成果碎片化的困境。\n\n本場次將探討如何運用植根於多年產業經驗的集體智慧資產，協助企業保持專注、強化清晰度、鞏固治理架構，並創造持久價值。"],"agnd420-bringing-business-onchain-how-crypto-unlock-growth-for-entrepreneurs-powered-by-coinbase":["In today’s financial system, small businesses face barriers like high fees, slow payments, and limited global access. The growing onchain economy offers an alternative, addressing these issues.\n\nThis session explores how crypto and stablecoin payment tools empower businesses to operate with the speed, reach, and efficiency of large enterprises, minus the extra costs.","在當今的金融體系中，小型企業面臨高手續費、支付延遲與全球通道受限等重重障礙。蓬勃發展的鏈上經濟提供了一條替代路徑，有望有效解決上述問題。\n\n本場次探討加密貨幣與穩定幣支付工具如何賦能企業，以媲美大型企業的速度、觸達範圍與效率運營，同時省去額外成本。"],"agnd501-turning-bad-to-good-navigating-down-rounds-an-investor-masterclass":["In the dynamic world of venture investing, founders and investors can be faced with down and challenging situations. Facing these moments head on can turnaround the trajectory of their ventures. This exclusive masterclass delves into navigating the intricacies of Down Rounds, with a focus on Dilution, Structuring, and strategies to address the associated challenges. This session will equip participants with actionable insights on:\n\nRegistration here.","在瞬息萬變的創投世界中，創辦人與投資者都可能面臨下行輪次（Down Round）的艱難時刻。正面迎戰這些挑戰，往往能扭轉企業的發展軌跡。本場獨家大師班深入探討 Down Round 的複雜情境，聚焦稀釋效應、交易結構設計，以及應對相關挑戰的有效策略。本場次將為參與者提供可立即行動的實用洞察：\n\n報名請點此。"],"agnd216-pay-it-forward":["At the heart of SFF is a powerful, interconnected community. \"Pay It Forward\" nurtures the next generation of FinTech leaders through shared knowledge and collaboration.\n\nGain insights from experienced mentors and gain practical advice on building a career in:\n\nCheck out the full list of participating mentors here.\n\nRegister for a 1:1, 20-minute mentorship meeting here. Walk-in meetings not guaranteed.","SFF 的核心在於一個強大而緊密連結的社群。「Pay It Forward」計畫透過知識共享與協作，培育下一代金融科技領袖。\n\n從資深導師處汲取智慧，獲取在以下領域建立職涯的實用建議：\n\n請點此查看完整導師名單。\n\n請點此報名一對一、20 分鐘的導師會議。現場報名名額不保證。"],"agnd602-introducing-the-superior-alternative-to-on-chain-payments-for-institutions":["Contrary to popular belief, there are superior alternatives to stablecoins for institutions wanting to make onchain payments and settlements. Kinexys by J.P.Morgan has been the pioneer for institutional use-cases, leading a number of industry firsts and game-changing solutions.\n\nAs we stand on the threshold of a major leap in institutional finance, this session will offer an exclusive preview of a breakthrough institutional blockchain solution set to transform how institutions move, manage, and innovate their treasury operations. Through live demonstrations and unveiling new capabilities, you’ll experience firsthand the possibilities that lie ahead for secure, real-time financial operations on public blockchains.","與普遍認知相反，對於有意進行鏈上支付與結算的機構而言，穩定幣並非唯一選擇，且存在更優質的替代方案。Kinexys by J.P.Morgan 一直是機構應用場景的先行者，引領了多項業界首創與革命性解決方案的落地。\n\n在機構金融即將迎來重大躍升的關鍵時刻，本場次將提供一項突破性機構區塊鏈解決方案的獨家預覽，這項方案將徹底改變機構進行資金移轉、管理與財資創新的方式。透過現場示範與全新功能的正式發布，您將親身體驗公共區塊鏈上安全、即時金融操作的無限可能。"],"agnd463-ohayo-increasing-global-liquidity-with-tokenized-deposits-in-jpy-powered-by-partior":["The Debate: Is the future of wholesale cross-border settlement tokenized commercial bank deposits? Japan’s pioneering move to integrate its domestic tokenized deposit ecosystem (DCJPY), backed by institutions like MUFG, SBI Corp, Hitachi, Post Bank, NTT Data, and many of the top Japanese FIs and Corporates with Partior, provides a real-world solution.\n\nThe Practical Learning: Go beyond the press release to understand the two-layer interoperability Partior is architecting: connecting Japan's regulated domestic tokenized deposit system (DCJPY) to a global cross-border platform. Attendees will learn the blueprint for achieving 24/7/365 atomic settlement in a highly regulated, G-20 currency.","核心議題：批發跨境結算的未來是代幣化商業銀行存款嗎？日本率先將其國內代幣化存款生態系統（DCJPY）——由三菱日聯金融集團（MUFG）、SBI 集團、日立、郵政銀行、NTT Data 以及眾多日本頂尖金融機構與企業背書——整合至 Partior 平台，提供了一個真實落地的解決方案。\n\n實務深度解析：超越新聞稿層面，深入理解 Partior 正在構建的兩層互通架構：將日本受監管的國內代幣化存款系統（DCJPY）連接至全球跨境平台。與會者將學習如何在高度監管的 G20 貨幣體系下，實現 24/7/365 全天候原子結算的完整藍圖。"],"agnd421-ai-at-work-transforming-crypto-exchanges-and-user-trust-powered-by-okx":["How is AI reshaping the way exchanges operate and the way users experience finance? In this fireside chat, OKX Singapore’s COO and CISO share how AI powers on-chain safety, personalizes trading, and drives smarter compliance — from detecting risk in real time to building human-like assistants that make digital finance intuitive and secure.","AI 如何重塑交易所的運作模式與用戶的金融體驗？在這場爐邊對話中，OKX 新加坡區的 COO 與 CISO 將分享 AI 如何賦能鏈上安全、個人化交易體驗，以及更智慧的合規管理——從即時風險偵測到打造擬人化智慧助手，讓數位金融既直覺又安全。"],"agnd257-vcs-founders-panel-has-ai-fascination-caused-startups-target-vc-pool-to-shrink-or-just-change":["Why this discussion matters now:\n\nThis panel directly addresses the consequences of the current climate: founders must reconsider which VCs they pitch to. Many generalist VCs now apply an \"Investor Filter,\" effectively shrinking the pool for non-AI companies and changing the rules of engagement. This session provides the \"Resilience Playbook\" that founders need to navigate both their own psychology and the new realities of venture capital.\n\nWhat you'll walk away with:\n\nA dual playbook for resilience. Attendees will receive practical strategies for navigating the new funding environment and identifying the right investor partners. Crucially, they will also gain coping mechanisms to endure the psychological marathon of being a founder in transformative times, leaving them feeling empowered, not just validated.","為何此時此刻這場討論格外重要：\n\n本場圓桌論壇直接回應當前環境帶來的現實衝擊：創辦人必須重新評估應向哪些 VC 提案。許多通才型創投業者如今設下「投資人篩選機制」，實際上縮小了非 AI 企業可接觸的資金池，並改變了遊戲規則。本場次將提供創辦人在心理層面與融資現實兩方面都需要的「韌性手冊」。\n\n您將帶走的收穫：\n\n一份雙軌韌性策略。與會者將獲得在全新融資環境中突圍的實用策略，以及識別合適投資夥伴的方法。更關鍵的是，他們將獲得應對創業者心理馬拉松的因應機制——在這個劇烈變革的時代，讓他們帶著力量感，而非僅僅是被認可感離開。"],"agnd105-digital-money-how-forward-looking-institutions-are-managing-risks-and-seizing-opportunities":["As digital money moves from fringe to mainstream, it is increasingly converging with traditional payments and banking, presenting new opportunities and risks for traditional financial institutions and reshaping technology stacks, business models, and institutional strategies.\n\nThis session will convene speakers from forward-looking institutions that are leveraging digital money, programmable payments, and blockchain-based settlement systems to explore:","隨著數位貨幣從邊緣走向主流，它與傳統支付及銀行業的融合日益加深，為傳統金融機構帶來全新機遇與風險，同時也重塑著技術架構、商業模式與機構策略。\n\n本場次將匯聚來自前瞻性機構的講者，共同探討如何運用數位貨幣、可程式化支付與基於區塊鏈的結算系統："],"agnd464-from-secure-to-foundations-to-sustainable-value-creation-a-pragmatic-approach-to-ai-in-finance-powered-by-ant-digital-technologies":["In the GenAI era, finance must deliver three clear values: AI for risk prevention, AI for business growth, and AI for superior user experience. Ant Digital Technologies will unveil a suite of international capabilities for inclusive, cross border finance.\n\nHighlights include the BaiLing Inclusive Finance Large Model with enhanced small language and accessibility features; RealDoc, a next generation document security and intelligent processing solution; and Agentar, our smart agent platform powering AI mobile banking, AI marketing agents, and full scenario digital finance services.","在生成式 AI 時代，金融業必須兌現三大核心價值：以 AI 防範風險、以 AI 驅動業務成長，以及以 AI 提升卓越用戶體驗。Ant Digital Technologies 將正式發布一系列面向全球市場的普惠金融與跨境金融國際化能力。\n\n重點亮點包括：具備增強型小型語言模型與無障礙功能的「百靈普惠金融大模型」；新一代文件安全與智慧處理解決方案 RealDoc；以及我們的智慧代理平台 Agentar，驅動 AI 行動銀行、AI 行銷代理人及全場景數位金融服務。"],"agnd422-redefining-finance-the-rise-of-stablecoins-digital-infrastructure-powered-by-paxos":["Stablecoins are entering a new era—combining fiat stability with blockchain speed to power trading, B2B payments, and remittances. This session explores the infrastructure, regulation, and strategies driving adoption. Discover how stablecoins can reshape finance and benefit your organization.","穩定幣正邁入全新時代——融合法幣的穩定性與區塊鏈的速度，為交易、B2B 支付與匯款提供強大動力。本場次深入探討推動穩定幣採用的基礎設施建設、監管框架與發展策略。了解穩定幣如何重塑金融格局，並為您的組織創造實質效益。"],"agnd350-global-founders-dialogue-a-playbook-for-the-next-decade":["Watch this space for more information!","更多詳情敬請期待！"],"agnd381-the-future-of-wealth-human-trust-meets-intelligent-tools-powered-by-uob":["In today’s AI-driven landscape, with rising regulatory expectations and increasingly sophisticated client needs, UOB Private Bank is leveraging intelligent technologies to empower relationship managers, enhance productivity, and strengthen risk management.\n\nAt SFF2025, we will showcase how AI is being embedded across the bank to deliver smarter client experiences, drive operational efficiency, and uphold robust governance—reflecting our commitment to future-ready, responsible innovation in private banking.","在當今由 AI 驅動的環境中，面對日益嚴格的監管要求與日趨複雜的客戶需求，UOB 私人銀行正積極運用智慧科技，賦能關係經理、提升生產力、強化風險管理。\n\n在 SFF2025，我們將展示 AI 如何深入融入銀行業務各環節，以提供更智慧的客戶體驗、推動營運效率，並維持嚴謹的治理——體現我們對私人銀行業負責任創新、面向未來的堅定承諾。"],"agnd465-finance-rebuilt-digital-foundations-tokenised-futures-powered-by-banking-circle":["Banking Circle’s digital asset experts unpack the re-engineering of finance in a fast-paced Q&A. With 266B real-time transactions and tokenised assets set to hit USD 16T by 2030, digital-first banking is inevitable. Theywill explore banks as tech platforms, digital asset stacks, and trust in a tokenised world- calling for integrated, inclusive finance.","Banking Circle 的數位資產專家以快節奏的問答形式，深入剖析金融體系的重構進程。在即時交易規模達 2,660 億筆、代幣化資產預計於 2030 年前突破 16 兆美元的背景下，數位優先的銀行業發展已是大勢所趨。他們將探討銀行作為科技平台的定位、數位資產技術堆疊，以及代幣化世界中的信任議題，呼籲建構更整合、更具包容性的金融體系。"],"agnd423-stepping-into-payments-of-tomorrow-today-powered-by-visa":["This session will provide an overview of emerging trends in agentic commerce, with a spotlight on Visa's latest product innovations including Visa Pay and Visa Intelligent Commerce.","本場次將概覽代理商務（agentic commerce）的新興趨勢，並重點介紹 Visa 最新的產品創新，包括 Visa Pay 與 Visa Intelligent Commerce。"],"agnd140-challenges-opportunities-and-strategies-for-achieving-payments-interoperability":["Payments experts agree that interoperability is essential for the future — but too often, it's treated as a box to tick after the fact. The result? Fragmented systems, higher costs, and missed opportunities for innovation.\n\nIn this session, senior leaders will confront the real technical, regulatory, and commercial barriers that hold back seamless value exchange, and explore the hidden costs of fragmentation, the strategies that can enable interoperability-by-design and interoperability-by-default, and the new opportunities for growth that can emerge when payments flow freely.","支付專家一致認為，互通性對未來至關重要——然而它往往被視為事後才補上的例行核取項目。結果呢？系統碎片化、成本攀升，創新機會也因此流失。\n\n本場次將邀請資深領袖正面迎戰阻礙無縫價值交換的技術、監管與商業壁壘，探討碎片化的隱性成本、實現「設計即互通」與「預設互通」的策略，以及支付自由流通後所能帶來的全新成長機遇。"],"agnd295-welcome-to-catalyst-stage-day-1":["Young people. Fresh talent. New ideas. The Catalyst Stage is a platform for emerging ideas and bold thinkers on the cusp of overturning orthodoxies and changing the face of finance. \nThis will be a space where the next generation of talent and changemakers take the spotlight, sharing their ideas and solutions that will shape tomorrow. This is where cutting-edge ideas gain industry visibility, with the goal of being adopted and scaled.  \nHere, we will explore how technology, including AI, is transforming work, society, and humanity. Discussions will probe the impact of technology on work, human potential, and wellbeing, pushing boundaries and inviting audiences to see the future from new perspectives – not just from leaders or C-suites, but from new talent, managers, and the youth. \nFinally, it is also a stage of recognition. The stage celebrates the young talent making their mark and the influential female leaders shaping the industry, reinforcing that leadership, vision, and innovation are powered by people as much as by ideas. \nThe Catalyst Stage is where the next wave of talent and ideas ready to shape the future will take the spotlight.","年輕人。新鮮人才。嶄新想法。Catalyst Stage 是一個為新興理念與大膽思想家打造的舞台，這些人正站在顛覆舊有框架、改變金融面貌的前沿。\n本舞台將讓下一代人才與變革推動者站上聚光燈，分享他們塑造未來的想法與解方。這裡是前沿理念獲得產業能見度的地方，目標是促成這些理念被採納並規模化落地。\n在這裡，我們將探討科技（包括 AI）如何改變工作、社會與人類本身。討論將深入科技對工作、人類潛能與身心健康的影響，突破界限，邀請觀眾從全新視角看見未來——不只是高層或 C-suite 的視角，更有新銳人才、中層管理者與年輕世代的聲音。\n最後，這也是一個表彰的舞台。它將致敬正在發光發熱的年輕人才，以及形塑產業的傑出女性領袖，彰顯領導力、願景與創新，既由理念驅動，更由人來實現。\nCatalyst Stage，是下一波準備塑造未來的人才與理念，共同站上聚光燈的地方。"],"agnd302-welcome-to-frontier-stage-day-1":["Join us as we kick off the day's sessions on the Frontier Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the future of FinTech.","歡迎加入 Frontier Stage 的精彩開幕，今日場次匯聚深刻洞見的對話、突破性的理念，以及塑造金融科技未來的啟發性聲音。"],"agnd552-gftn-regional-networking-market-insights-hour-connecting-fintech-ecosystems-around-the-world-africa":["This session brings together key players from the Africa ecosystem including regulators, sponsors, exhibitors, and industry partners to explore opportunities and build meaningful connections.\n\nThe session opens with insights into regional market trends, emerging opportunities, and collaboration themes, followed by an informal networking hour over alcohol where you can foster direct relationships with decision-makers and the GFTN team.\n\nWhether you're exploring market entry, developing strategic partnerships, or identifying investment opportunities, the GFTN Regional Networking Hour provides direct access to the right stakeholders in one collaborative space.\n\nRegister Here","本場次匯聚非洲生態系的核心參與者，包括監管機構、贊助商、展商與產業夥伴，共同探索合作機會、建立有意義的連結。\n\n場次首先將分享區域市場趨勢、新興機遇與合作主題，隨後進入輕鬆的酒會交流時光，讓您與決策者及 GFTN 團隊建立直接關係。\n\n無論您正在評估市場進入策略、發展策略夥伴關係，或尋找投資機會，GFTN 區域交流時光都能讓您在同一協作空間內直接接觸合適的利害關係人。\n\n立即報名"],"agnd322-welcome-to-impact-stage-day-1":["Join us as we kick off the day's sessions on the Impact Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the future of FinTech.","歡迎加入 Impact Stage 的精彩開幕，今日場次匯聚深刻洞見的對話、突破性的理念，以及塑造金融科技未來的啟發性聲音。"],"agnd535-investor-hours-startup-investor-matchmaking":["Investor Hours is your chance to connect directly with the startup community. Founders, secure your pitch spot to showcase your startup to interested investors, gain valuable feedback and explore funding possibilities. Investors, engage with ambitious founders and discover potential investment opportunities. Join us for insightful discussions and meaningful connections that can shape the future of your ventures.\n\nPlease register by 7 November 2025 here. Approved startups and investors will be notified with allocated timeslots.","Investor Hours 是您與新創社群直接對話的絕佳機會。創辦人，請把握投資提案名額，向有興趣的投資人展示您的新創公司，獲取寶貴意見並探索融資可能性。投資人，則可與充滿企圖心的創辦人交流，發掘潛在投資機會。歡迎加入這場富有洞見的對話，建立能影響事業未來發展的深度連結。\n\n請於 2025 年 11 月 7 日前在此完成報名。通過審核的新創公司與投資人將收到時段分配通知。"],"agnd168-debate-the-ai-paradox-augmenting-mankind-or-leading-us-to-obsolescence":["As artificial intelligence becomes increasingly embedded in the workplace, the line between augmentation and automation is blurring. Once hailed as a tool to elevate human potential, AI is now linked to sweeping layoffs and structural workforce shifts, with many roles eliminated and never returning. This session explores the paradox at the heart of AI’s rise: is AI fulfilling its promise to enhance human potential, or is it accelerating our obsolescence?\n \nJoin us as we explore the ethical, economic, and existential implications of intelligent machines, where we’ll ask hard questions about value, dignity, and the meaning of humanity.","隨著人工智慧日益深入職場，增強人類能力與自動化取代之間的界線正逐漸模糊。AI 曾被譽為提升人類潛能的工具，如今卻與大規模裁員和結構性勞動力轉變緊密相連，許多職位一去不返。本場次探討 AI 崛起核心的悖論：AI 是否正在兌現其提升人類潛能的承諾，抑或正在加速人類的淘汰？\n \n歡迎加入我們，探討智慧機器帶來的倫理、經濟與存在層面的深刻意涵，我們將在此提出關於價值、尊嚴與人類意義的根本問題。"],"agnd247-pursuit-of-purpose-beyond-the-clich%C3%A9":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，充滿從未公開的洞見與啟發。傑出的新創創辦人踏上「黃圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd195-ai-pathfinders-in-finance-fx-wealth-management-payments":["Through PathFin.ai, MAS is partnering the financial industry to enable responsible AI adoption while preparing the workforce for evolving roles. This panel discusses real world AI experience reshaping wealth management, risk assessment, and client servicing to agentic payment systems capable of autonomous decision-making.","透過 PathFin.ai，MAS 正與金融業攜手合作，推動負責任的 AI 應用，同時協助人才為不斷演進的職能角色做好準備。本場小組討論將分享 AI 在財富管理、風險評估、客戶服務改造以及具備自主決策能力的代理支付系統等領域的真實落地經驗。"],"agnd243-how-deposits-can-harness-tokenisation":["Deposits are a key pillar of the existing two tier monetary system. With tokenisation of money and assets gathering pace, how do we preserve that role in a tokenised monetary and financial system? How do they fare in comparison to other forms of money such as stablecoins? This opening keynote examines the evolution of the role of deposits, evaluates the case for tokenised deposits continuing to underpin the tokenised monetary system, compares them with alternative forms of money such as stablecoins and provides a vision for how tokenised deposits, working in concert with tokenised central bank money and assets, can transform the monetary and financial system delivering greater efficiency, reduced operational risks, delays and costs, and promote greater financial inclusion.","存款是現有雙層貨幣體系的核心支柱之一。隨著貨幣與資產代幣化進程加速，我們該如何在代幣化的貨幣與金融體系中延續這一角色？與穩定幣等其他貨幣形式相比，存款的競爭力如何？本場開幕主題演講將檢視存款角色的演變，評估代幣化存款繼續支撐代幣化貨幣體系的合理性，並與穩定幣等替代貨幣形式進行比較，同時展望代幣化存款如何與代幣化中央銀行貨幣及資產協同運作，從而改革貨幣與金融體系，帶來更高效率、降低營運風險、縮短延遲與成本，並促進更廣泛的金融普及。"],"agnd262-the-startup-cost-no-one-tells-you-about":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，充滿從未公開的洞見與啟發。傑出的新創創辦人踏上「黃圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd197-future-powered-rails-designing-infrastructure-for-tomorrows-economy":["Tomorrow’s economy will run on next-generation payment rails — faster, smarter, interoperable, and built for a digital-first world.\n \nThe future of payments infrastructure will be defined not by silo systems, but by intelligent, intuitive and interconnected networks that provide seamless and reliable end to end payments. Building these future-powered rails, leveraging on continuous innovation in technology architecture and strategic partnerships will transform how we transfer value globally.\n \nAnt International, PayPal, and Visa will share how they are designing their solutions and distribution channels to become the backbone of tomorrow's digital economy. What network designs and partnerships will shape the future of payments - join us to find out from these payment giants.","明日的經濟將運行在下一代支付軌道上——更快速、更智慧、更具互通性，並為數位優先的世界而生。\n \n未來的支付基礎設施將不再由孤立系統定義，而是由智慧、直覺且相互連結的網路構成，提供無縫且可靠的端到端支付體驗。建構這些未來動力軌道，需要持續的技術架構創新與策略夥伴關係，這將從根本改變我們在全球傳遞價值的方式。\n \nAnt International、PayPal 與 Visa 將分享他們如何設計解決方案與分銷渠道，以成為明日數位經濟的骨幹。哪些網路設計與夥伴關係將形塑支付的未來？歡迎加入，直接聽取這些支付巨頭的見解。"],"agnd248-from-rockets-to-wallets-building-things-that-deserve-to-exist":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，充滿從未公開的洞見與啟發。傑出的新創創辦人踏上「黃圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd249-how-climbing-a-mountain-changed-my-view-on-leadership":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，充滿從未公開的洞見與啟發。傑出的新創創辦人踏上「黃圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd121-transforming-core-banking-with-ai-and-cloud-without-disruption":["As customer expectations evolve and legacy systems hit their limits, financial institutions are embracing AI and cloud to reimagine the heart of their operations: core banking.\n\nThis session brings together technology and transformation leaders to explore how banks are moving from siloed systems to agile, intelligent, and cloud-native infrastructures that can support AI adoption.\n\nLeaders will discuss how to effectively modernise core banking and rearchitect legacy systems without disrupting continuity, navigate multi-cloud strategies in regulated environments, and leverage AI to reshape product, credit, and compliance at scale.","隨著客戶期望不斷演進、舊有系統逐漸觸及極限，金融機構正積極擁抱 AI 與雲端技術，重新想像業務核心：核心銀行系統。\n\n本場次匯聚科技與轉型領袖，探討銀行如何從孤立系統轉型為敏捷、智慧且雲端原生的基礎架構，以支持 AI 應用落地。\n\n領袖們將討論如何有效現代化核心銀行、重構舊有系統而不中斷業務連續性、在受監管環境中駕馭多雲策略，以及如何運用 AI 大規模重塑產品、信貸與合規業務。"],"agnd234-addressing-challenges-in-cross-border-payments-cost-compliance-last-mile-inclusion":["Cross-border payments have seen remarkable progress over the past decade, from mobile wallets to instant payments, QR interoperability, and embedded finance. But unresolved challenges remain. Fragmentation across markets, frictions in cross-border transfers, financial exclusion at the last mile, and the tension between innovation and regulation persist.\n\nThis session brings together leaders shaping the payments landscape to ask the harder questions: What structural bottlenecks have proven hardest to shift? How will the industry reconcile the push for real-time, global connectivity with the reality of local infrastructure, regulation, and financial exclusion? And which unresolved issues today could become tomorrow’s systemic risks if left unaddressed? Join this conversation for a candid look at the road ahead for global payments in the next decade.","過去十年，跨境支付取得了顯著進展，從行動錢包到即時支付、QR 碼互通與嵌入式金融，成果有目共睹。然而，懸而未決的挑戰依然存在：市場間的碎片化、跨境匯款的摩擦、最後一哩路的金融排斥，以及創新與監管之間的張力。\n\n本場次匯聚塑造支付格局的領袖，共同叩問更深層的問題：哪些結構性瓶頸最難突破？業界將如何在追求即時全球連結的同時，面對在地基礎設施、監管現實與金融排斥的制約？當下哪些未解問題，若置之不理，可能演變為明日的系統性風險？歡迎加入這場坦誠對話，直視全球支付未來十年的前行之路。"],"agnd64-global-fintech-hackcelerator-demo-day":["Marking its 10th edition, the Global FinTech Hackcelerator (GFH) continues to identify and support innovative, market-ready solutions addressing real industry challenges. Co-organised by the Global Finance & Technology Network and the Monetary Authority of Singapore, the programme connects promising startups with corporate champions and investors to accelerate adoption and drive impact. Finalists receive guidance from senior industry leaders, opportunities to pilot with leading financial institutions, and the spotlight of the Singapore FinTech Festival stage.","邁入第十屆，Global FinTech Hackcelerator（GFH）持續發掘並支持能解決真實產業挑戰的創新市場就緒解決方案。本計畫由全球金融科技網路與新加坡金融管理局（MAS）共同主辦，將有潛力的新創公司與企業夥伴及投資人媒合，加速方案落地並創造影響力。入圍決賽者將獲得資深產業領袖的指導、與頂尖金融機構的試點合作機會，以及在新加坡金融科技節舞台上大放異彩的曝光機會。"],"agnd252-salims-untold-founder-story":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，充滿從未公開的洞見與啟發。傑出的新創創辦人踏上「黃圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd250-unveiling-its-about-tyme-banking-beyond-borders":["It’s About Tyme is more than a business case study - it’s a blueprint for rebuilding trust in an outdated financial system and demonstrates how an obsessive focus on purpose is the difference between success and capitulation. Come hear how Coen and the Tyme team survived multiple cliff-hanging moments to land every fintech's dream shareholder, Nubank, and capture 20m customers across its two markets.","It's About Tyme 不只是一個商業案例——它是一份重建舊有金融體系信任的藍圖，展示了對使命的高度專注如何成為成功與潰敗之間的關鍵差異。歡迎聆聽 Coen 與 Tyme 團隊如何在一次次危急時刻中堅持下來，最終獲得每位金融科技人夢寐以求的股東 Nubank 的青睞，並在兩個市場中累積 2,000 萬名客戶。"],"agnd731-meet-alfin-your-intelligent-insights-engine-for-the-financial-industry":["ALFIN is more than an AI intelligence engine, it's the central brain for financial intelligence. It’s the outcome of ten years of industry innovation, collective intelligence, and relentless refinement. Join us at this session to learn more about how ALFIN can help you turn ideas into intelligence.","ALFIN 不只是一個 AI 智慧引擎，它是金融智慧的核心大腦。它是十年產業創新、集體智慧與持續精進的成果結晶。歡迎參加本場次，深入了解 ALFIN 如何協助您將想法轉化為洞見。"],"agnd137-iosco-fintech-task-force-the-current-state-of-play-in-crypto-assets-ai-and-financial-asset-tokenisation":["The IOSCO Fintech Task Force (FTF) was established in 2022 to lead IOSCO’s work in developing, overseeing, delivering, and implementing IOSCO’s regulatory agenda with respect to Fintech.\n\nIn 2025, the FTF has been focused on supporting IOSCO’s thematic review assessing the implementation of selected IOSCO’s Policy Recommendations for Crypto-asset and Digital Asset (CDA) markets to address investor protection and market integrity risks in CDA markets, as well as monitoring developments in the financial markets relating to artificial intelligence and financial asset tokenization.\n\nThis panel will discuss key takeaways from the CDA Thematic Review, and the next steps to promote implementation of the CDA Policy Recommendations. It will also provide insights from IOSCO’s analysis on use-cases, risks and challenges associated with the use of artificial intelligence, IOSCO’s recently launched AI second phase work and observations on asset tokenization in capital markets. Finally, this panel will also briefly preview future frontiers for the FTF to explore.","IOSCO 金融科技任務小組（FTF）成立於 2022 年，負責主導 IOSCO 在金融科技領域的監管議程，包括制定、監督、執行與落實相關工作。\n\n2025 年，FTF 的重點工作包括：支持 IOSCO 對部分加密資產與數位資產（CDA）市場政策建議落實情況的主題審查，以評估投資人保護與市場誠信風險；同時持續監察人工智慧及金融資產代幣化在金融市場的最新發展。\n\n本場小組討論將分享 CDA 主題審查的重要結論，以及推動 CDA 政策建議落實的下一步行動。同時將提供 IOSCO 對人工智慧應用場景、風險與挑戰的分析洞見、IOSCO 近期啟動的 AI 第二階段工作，以及資本市場資產代幣化的觀察。最後，本場次亦將簡要預覽 FTF 未來的探索方向。"],"agnd122-how-will-digital-banks-compete-over-the-next-decade-new-propositions-and-customer-segments":["Digital banks are advancing their tech stacks to enhance agility and scale compliance effectively. Emerging technologies like AI, blockchain, and open banking are reshaping operations, enabling personalized services, secure transactions, and seamless integration with financial ecosystems.\n\nOver the next decade, digital banks are poised to challenge and possibly surpass traditional banks in innovation, customer experience, and market presence, marking a significant evolution in the banking landscape.\n\nThis panel will explore the critical next steps in this journey, focusing on technological transformation, regulatory adaptation, and the future competitive dynamics between digital and traditional banks.","數位銀行正積極升級技術堆疊，以提升敏捷性並有效擴展合規能力。AI、區塊鏈與開放銀行等新興技術正在重塑營運模式，使個人化服務、安全交易以及與金融生態系的無縫整合成為可能。\n\n未來十年，數位銀行有望在創新、客戶體驗與市場影響力上挑戰甚至超越傳統銀行，標誌著銀行業格局的重大演進。\n\n本場小組討論將聚焦這段旅程的關鍵下一步，深入探討科技轉型、監管適應，以及數位銀行與傳統銀行之間未來的競爭態勢。"],"agnd313-cbdcs-when-and-whats-required-to-move-from-pilots-to-public-money":["After years of pilots and policy debates, CBDCs are entering a second phase — where the question is no longer if they will exist, but how they can deliver real-world value increasingly moving towards digital money.\n\nAround the world, central banks and market innovators have been developing under-the-radar CBDC use cases that solve immediate challenges in payments, treasury, and financial inclusion.\n\nIn this session, central bank and private sector leaders will discuss the role that wholesale and retail CBDCs will play in the digital money ecosystem, alongside stablecoins, tokenised deposits, and existing rails - from unlocking cross-border wholesale settlement to serving as secure and inclusive public money.","經歷多年試點與政策辯論，CBDC 正進入第二階段——問題已不再是它是否會出現，而是它如何能在數位貨幣加速普及的趨勢下創造真實世界的價值。\n\n在全球各地，各國央行與市場創新者正在悄然推進各類 CBDC 應用場景，以解決支付、國庫管理與金融普及等領域的即時挑戰。\n\n本場次將邀請央行與私部門領袖，共同探討批發型與零售型 CBDC 在數位貨幣生態系中的角色定位——在穩定幣、代幣化存款與現有支付軌道並存的格局下——從解鎖跨境批發結算，到作為安全且具包容性的公共貨幣。"],"agnd251-vcs-founders-panel-ai-first-or-profitability-first-can-founders-really-chase-two-rabbits":["Why this discussion is critical now?\nFounders are feeling a bit lost. Business models that were viable even 2 years ago are now being fundamentally challenged by AI. This creates a powerful \"Imposter Pressure,\" where founders feel compelled by VCs and clients to use the magic word 'AI' to stay relevant. This is compounded by the market's simultaneous, unyielding demand for near-term profitability, catching founders in a difficult strategic bind. Investing heavily in an 'AI-first' strategy can burn significant capital, while a 'profitability-first' approach might mean falling behind technologically. This session validates this dilemma and reframes the conversation toward finding a workable strategy.\n\nWhat you'll walk away with:\nA profound sense of validation that their deepest anxieties are shared and understood. They will leave with the language and mental frameworks to re-contextualise their pressures, moving from a feeling of being \"lost\" to being part of a generation of founders navigating a historic shift.","為何此刻這場討論至關重要？\n創辦人正陷入迷失。即使是兩年前仍可行的商業模式，如今也正被 AI 從根本挑戰。這帶來強烈的「冒牌者壓力」——創辦人感到被 VC 和客戶逼迫，必須在話語中加入「AI」這個魔法詞彙，才能保持市場相關性。這一困境又因市場同步且毫不妥協地要求近期獲利而加劇，讓創辦人陷入艱難的策略兩難：重押「AI 優先」策略可能燒掉大量資本，而「獲利優先」則可能意味著在技術上落於人後。本場次正視這一兩難困境，並將對話引向尋找可行策略的方向。\n\n您將帶走什麼：\n深切的認同感——您最深層的焦慮是被理解和共鳴的。您將帶走語言與心智框架，重新詮釋自身的壓力，從「感到迷失」轉變為「作為一代創辦人，正在共同穿越一場歷史性的變革」的自我認知。"],"agnd597-book-launch-its-about-tyme-banking-beyond-borders":["It’s About Tyme is more than a business case study - it’s a blueprint for rebuilding trust in an outdated financial system and demonstrates how an obsessive focus on purpose is the difference between success and capitulation. Come hear how Coen and the Tyme team survived multiple cliff-hanging moments to land every fintech's dream shareholder, Nubank, and capture 20m customers across its two markets.","It's About Tyme 不只是一個商業案例——它是一份重建舊有金融體系信任的藍圖，展示了對使命的高度專注如何成為成功與潰敗之間的關鍵差異。歡迎聆聽 Coen 與 Tyme 團隊如何在一次次危急時刻中堅持下來，最終獲得每位金融科技人夢寐以求的股東 Nubank 的青睞，並在兩個市場中累積 2,000 萬名客戶。"],"agnd532-synergy-soup-relationships-as-capital-leading-with-candour-care-and-connection":["Beyond resources and markets, relationships are the true currency of growth. Leaders in this session will discuss how candour, trust, and human connection sustain businesses, shape ecosystems, and influence long-term success.\n\nWho Should Join?\n\nFounders, Investors (GP & LP), Operators in Finance, Compliance, and Talent, Ecosystem Leaders\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Vanessa Chin.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","超越資源與市場，關係才是驅動成長的真正貨幣。本場次領袖將探討坦誠、信任與人際連結如何維繫企業、塑造生態系，並影響長期成功。\n\n誰適合參加？\n\n創辦人、投資人（GP 與 LP）、金融/合規/人才領域的運營者、生態系領袖\n\n加入這張圓桌，與同儕共同參與由思想催化師 Vanessa Chin 主持的 60 分鐘深度對話。\n\n瀏覽所有 Synergy Soup 討論主題並登記興趣。"],"agnd530-synergy-soup-collaboration-is-key-for-quantum-computing-in-finance":["Collaboration is key to unlocking the full potential of quantum and AI technologies. This session highlights how startups, investors, and institutions can co-create a global ecosystem that accelerates innovation while enhancing security and growth in the financial sector.\n\nWho Should Join?\n\nStartups, Banks and Insurance Companies\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Lisa Schroeder.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","協作是釋放量子與 AI 技術完整潛力的關鍵。本場次聚焦於新創公司、投資人與機構如何共同打造全球生態系，在加速創新的同時，強化金融業的安全性與成長動能。\n\n適合參與者\n\n新創公司、銀行及保險公司\n\n加入本桌，與同業交流，共同參與由思想催化人 Lisa Schroeder 主持的 60 分鐘對話。\n\n瀏覽所有 Synergy Soup 討論主題並於此登記興趣。"],"agnd534-synergy-soup-the-unseen-architect-of-strategy-how-chiefs-of-staff-shape-outcomes":["Chiefs of Staff play a pivotal role in turning vision into execution, often from behind the scenes. This conversation brings them to the forefront, creating space to share challenges, swap practical strategies, and explore how their influence shapes leadership outcomes and organisational impact.\n\nWho Should Join?\n\nCurrent Chiefs of Staff in FinTechs, Financial Institutions, Tech Companies\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Eelee Lua.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","幕僚長在將願景化為執行成果的過程中扮演關鍵角色，往往在幕後默默發揮影響力。本場對話將他們帶至核心舞台，創造空間讓與會者分享挑戰、交流實務策略，並探討他們的影響力如何形塑領導成效與組織影響力。\n\n適合參與者\n\n現任 FinTech、金融機構及科技公司的幕僚長\n\n加入本桌，與同業交流，共同參與由思想催化人 Eelee Lua 主持的 60 分鐘對話。\n\n瀏覽所有 Synergy Soup 討論主題並於此登記興趣。"],"agnd531-synergy-soup-payment-innovation-utilising-ai-agentic-payments-for-institutional-business":["Agentic payments—autonomous transactions executed by AI agents—are moving from consumer applications into institutional finance. This session explores use cases in B2B payments, cross-border remittances, and liquidity management, and considers the future roadmap for AI agents in payment systems.\n\nWho Should Join?\n\nPayment Services Providers, Banks and Financial Institutions Involved in the Payment Space\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Daniel Lee.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","代理式支付（Agentic Payments）——由 AI 代理自主執行的交易——正從消費端應用邁向機構金融領域。本場次探討其在企業對企業（B2B）支付、跨境匯款及流動性管理方面的應用場景，並展望 AI 代理在支付系統中的未來發展藍圖。\n\n適合參與者\n\n支付服務提供商、涉足支付領域的銀行及金融機構\n\n加入本桌，與同業交流，共同參與由思想催化人 Daniel Lee 主持的 60 分鐘對話。\n\n瀏覽所有 Synergy Soup 討論主題並於此登記興趣。"],"agnd533-synergy-soup-the-future-of-ai-in-banking":["Arti
