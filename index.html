// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
/* ============================================================
   SFF 2025 Agenda — React app (Apple Calendar inspired)
   ============================================================ */
const { useState, useEffect, useMemo, useRef } = React;
const D = window.SFF;
const DESC = window.SFF_DESC || {};

/* ---- language (description EN/ZH), persisted in localStorage ---- */
function useLang() {
  const [lang, setLang] = useState(() => {
    try { return localStorage.getItem("sff-lang") || "en"; } catch (e) { return "en"; }
  });
  const set = (v) => { setLang(v); try { localStorage.setItem("sff-lang", v); } catch (e) {} };
  return [lang, set];
}
/* description text for a slug in the chosen language (falls back to English) */
const descText = (slug, lang) => {
  const d = DESC[slug];
  if (!d) return "";
  return (lang === "zh" ? d[1] : d[0]) || d[0] || "";
};
/* split a paragraph on _emphasis_ markers into React nodes */
const renderEmphasis = (text) =>
  text.split(/_([^_\n]+)_/).map((seg, i) => (i % 2 === 1 ? <em key={i}>{seg}</em> : seg));

/* ---- day metadata (English-first) ---- */
const DAYMETA = {
  d1: { wd: "Mon", date: "Nov 10", label: "Insights Forum", zh: "11/10 一" },
  d2: { wd: "Tue", date: "Nov 11", label: "Insights Forum", zh: "11/11 二" },
  d3: { wd: "Wed", date: "Nov 12", label: "Main Stages", zh: "11/12 三" },
  d4: { wd: "Thu", date: "Nov 13", label: "Main Stages", zh: "11/13 四" },
  d5: { wd: "Fri", date: "Nov 14", label: "Main Stages", zh: "11/14 五" },
};
const ACCESS = {
  O: { en: "Open", zh: "開放參加", cls: "open", mk: "" },
  I: { en: "Invite-Only", zh: "邀請制", cls: "invite", mk: "🔒" },
  P: { en: "Premium", zh: "付費", cls: "premium", mk: "◆" },
};

/* ---- helpers ---- */
const mins = (t) => { const [a, b] = t.split(":").map(Number); return a * 60 + b; };
const pad2 = (n) => String(n).padStart(2, "0");
const clock = (t) => { const [h, m] = t.split(":"); return pad2(+h) + ":" + m; };
const fmtMin = (m) => pad2(Math.floor(m / 60)) + ":" + pad2(m % 60);
const durLabel = (a, b) => {
  const d = mins(b) - mins(a);
  if (d >= 60) { const h = Math.floor(d / 60), mm = d % 60; return h + "h" + (mm ? " " + mm + "m" : ""); }
  return d + "m";
};
const colsOf = (day) => (day.cols === "stages" ? D.STAGES : D.ROOMS);
const fullName = (code) => D.STAGE_FULL[code] || D.ROOM_FULL[code] || code;
const COLS_ALL = [...D.ROOMS, ...D.STAGES];

/* 泛詞：不參與標題/說明評分（仍可參與主題/同義詞比對），避免泛查淹沒 */
const BOT_STOP = new Set(["finance", "financial", "session", "sessions", "singapore", "fintech",
  "future", "digital", "global", "world", "the", "and", "for", "with", "金融", "未來", "場次", "活動"]);

/* CJK 偵測（用於片語子字串比對） */
const HAS_CJK = (s) => /[㐀-鿿]/.test(s);

/* 拆解查詢：raw 全字串 + latin 英數 token 陣列 */
const botTokens = (q) => {
  const raw = (q || "").toLowerCase().trim();
  const latin = raw.split(/[^a-z0-9]+/i).filter((t) => t.length >= 2);
  return { raw, latin };
};

/* 推斷主題：回傳 Map<code, 命中觸發詞數> */
const botTopicHits = (qInfo) => {
  const { raw, latin } = qInfo;
  const latinSet = new Set(latin);
  const hits = new Map();
  for (const code in BOT_SYN) {
    let n = 0;
    for (const trig of BOT_SYN[code]) {
      const isShortLatin = trig.length <= 3 && /^[a-z0-9.]+$/.test(trig);
      const hit = isShortLatin ? latinSet.has(trig) : raw.includes(trig);
      if (hit) n++;
    }
    if (n > 0) hits.set(code, n);
  }
  return hits;
};

/* 對單一場次評分 */
const scoreSession = (s, qInfo) => {
  const { raw, latin, topicHits } = qInfo;
  const code = s[5];
  let score = 0;

  // 主題命中（最高權重）
  if (topicHits.has(code)) score += 50 + 5 * topicHits.get(code);

  // 主題標籤字面（中/英）
  const tp = D.TOPICS[code];
  if (tp) {
    const labelZh = tp[0].toLowerCase(), labelEn = tp[1].toLowerCase();
    if (latin.some((t) => labelEn.includes(t)) || (HAS_CJK(raw) && (labelZh.includes(raw) || raw.includes(labelZh))))
      score += 20;
  }

  // 標題關鍵字（英文 token，去泛詞）
  const title = (s[6] || "").toLowerCase();
  let titleHits = 0;
  for (const t of new Set(latin)) {
    if (t.length >= 3 && !BOT_STOP.has(t) && title.includes(t)) titleHits++;
  }
  score += Math.min(36, titleHits * 12);
  // 標題 CJK 片語
  if (HAS_CJK(raw) && !BOT_STOP.has(raw) && title.includes(raw)) score += 12;

  // 說明關鍵字（兩語都查）
  const desc = ((descText(s[7], "en") || "") + "\n" + (descText(s[7], "zh") || "")).toLowerCase();
  if (desc) {
    let descHits = 0;
    for (const t of new Set(latin)) {
      if (t.length >= 3 && !BOT_STOP.has(t) && desc.includes(t)) descHits++;
    }
    score += Math.min(20, descHits * 5);
    if (HAS_CJK(raw) && !BOT_STOP.has(raw) && desc.includes(raw)) score += 5;
  }

  // 講者
  const spk = (s[8] || []).join(" · ").toLowerCase();
  if (spk) {
    let spkHits = 0;
    for (const t of new Set(latin)) {
      if (t.length >= 3 && spk.includes(t)) spkHits++;
    }
    if (HAS_CJK(raw) && spk.includes(raw)) spkHits++;
    score += Math.min(24, spkHits * 8);
  }

  // Open 場次微調（僅在已有內容匹配時，避免無關場次靠此上榜）
  if (score > 0 && s[4] === "O") score += 1;

  return score;
};

/* 推薦：對全部 5 天場次評分，回傳前 N 名 */
const recommend = (query, N = 6) => {
  const base = botTokens(query);
  if (!base.raw) return { items: [], topicHits: [] };
  const topicHits = botTopicHits(base);
  const qInfo = { ...base, topicHits };
  const scored = [];
  for (const s of D.S) {
    const sc = scoreSession(s, qInfo);
    if (sc > 0) scored.push({ s, sc });
  }
  scored.sort((a, b) => b.sc - a.sc || mins(a.s[2]) - mins(b.s[2]) || a.s[0].localeCompare(b.s[0]));
  return { items: scored.slice(0, N).map((x) => x.s), topicHits: [...topicHits.keys()] };
};

/* assign overlap lanes within a column */
function computeLanes(evs) {
  const sorted = [...evs].sort((a, b) => mins(a[2]) - mins(b[2]) || mins(a[3]) - mins(b[3]));
  const laneEnd = []; const laneOf = new Map();
  sorted.forEach((ev) => {
    let p = laneEnd.findIndex((end) => mins(ev[2]) >= end);
    if (p < 0) { p = laneEnd.length; laneEnd.push(0); }
    laneEnd[p] = mins(ev[3]); laneOf.set(ev, p);
  });
  return { laneOf, count: Math.max(1, laneEnd.length) };
}

function EventChip({ s, lane, lanes, dayStart, pxPerMin, minH, onSelect }) {
  const top = (mins(s[2]) - dayStart) * pxPerMin;
  const h = Math.max(minH, (mins(s[3]) - mins(s[2])) * pxPerMin);
  const lines = Math.max(1, Math.min(6, Math.floor((h - 16) / 15)));
  const mk = ACCESS[s[4]].mk;
  return (
    <div
      className={"ev tk-" + s[5]}
      style={{
        top: top + "px",
        left: `calc(${(lane / lanes) * 100}% + 2px)`,
        width: `calc(${100 / lanes}% - 4px)`,
        "--h": h + "px",
        "--lines": lines,
      }}
      onClick={() => onSelect(s)}
    >
      {mk && <span className="mk">{mk}</span>}
      <span className="etm">{clock(s[2])}</span>
      <span className="ett">{s[6]}</span>

function CalendarView({ day, sessions, hourHeight, colWidth, quarterLines, onSelect }) {
  const pxPerMin = hourHeight / 60;
  const minH = Math.max(20, hourHeight * 0.3);

  const master = colsOf(day);
  const used = master.filter(([k]) => sessions.some((s) => s[1] === k));
  if (!used.length) return <div className="empty">尚無可顯示的場次。</div>;

  const dayStart = Math.floor(Math.min(...sessions.map((s) => mins(s[2]))) / 60) * 60;
  const dayEnd = Math.ceil(Math.max(...sessions.map((s) => mins(s[3]))) / 60) * 60;
  const totalMin = dayEnd - dayStart;
  const bodyH = totalMin * pxPerMin;

  const laneData = {};
  used.forEach(([k]) => { laneData[k] = computeLanes(sessions.filter((s) => s[1] === k)); });

  const hours = [];
  for (let m = dayStart; m <= dayEnd; m += 60) hours.push(m);

  const bg = (() => {
    const layers = [`linear-gradient(var(--separator) 1px, transparent 1px)`];
    const sizes = [`100% ${60 * pxPerMin}px`];
    if (quarterLines) { layers.push(`linear-gradient(var(--hairline) 1px, transparent 1px)`); sizes.push(`100% ${15 * pxPerMin}px`); }
    return { backgroundImage: layers.join(","), backgroundSize: sizes.join(",") };
  })();

  const n = used.length;
  const tpl = `var(--gutter-w) repeat(${n}, minmax(${colWidth}px, 1fr))`;

  return (
    <div className="scroll">
      <div className="cal" style={{ gridTemplateColumns: tpl }}>
        <div className="corner" style={{ gridColumn: 1, gridRow: 1 }} />
        {used.map(([k, name], i) => (
          <div className="colhead" key={"h" + k} style={{ gridColumn: i + 2, gridRow: 1 }}>
            <span className="code">{k}</span>
            <span className="name" title={name}>{name}</span>
          </div>
        ))}
        <div className="gutter" style={{ gridColumn: 1, gridRow: 2, height: bodyH + "px" }}>
          {hours.map((m, i) => (
            <span className="hourlabel" key={m}
              style={{ top: (m - dayStart) * pxPerMin + "px", transform: i === 0 ? "translateY(2px)" : "translateY(-50%)" }}>
              {fmtMin(m)}
            </span>
          ))}
        </div>
        {used.map(([k], i) => {
          const { laneOf, count } = laneData[k];
          return (
            <div className="colbody" key={"b" + k} style={{ gridColumn: i + 2, gridRow: 2, height: bodyH + "px", ...bg }}>
              {sessions.filter((s) => s[1] === k).map((s) => (
                <EventChip key={s[7]} s={s} lane={laneOf.get(s) || 0} lanes={count}
                  dayStart={dayStart} pxPerMin={pxPerMin} minH={minH} onSelect={onSelect} />
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   Mobile — responsive single-column timeline (g0v-inspired)

function useMediaQuery(q) {
  const [m, setM] = useState(() => window.matchMedia(q).matches);
  useEffect(() => {
    const mq = window.matchMedia(q);
    const fn = (e) => setM(e.matches);
    mq.addEventListener("change", fn);
    return () => mq.removeEventListener("change", fn);
  }, [q]);
  return m;
}

/* Swipe-down-to-dismiss for bottom sheets (filter sheet + mobile detail card).
   The drag only starts when the sheet content is scrolled to the top, so it
   never fights with normal scrolling. Release past the threshold (or with a
   quick flick) calls onClose; otherwise it snaps back. */
function useSwipeDismiss(onClose) {
  const ref = React.useRef(null);     // the scrollable sheet element
  const st = React.useRef(null);      // live drag state { y, t, d }
  const [dy, setDy] = useState(0);
  const [dragging, setDragging] = useState(false);

  const onTouchStart = (e) => {
    const el = ref.current;
    if (el && el.scrollTop > 0) { st.current = null; return; }
    st.current = { y: e.touches[0].clientY, t: Date.now(), d: 0 };
    setDragging(true);
  };
  const onTouchMove = (e) => {
    const s = st.current; if (!s) return;
    const el = ref.current;
    if (el && el.scrollTop > 0) { st.current = null; setDy(0); setDragging(false); return; }
    const delta = e.touches[0].clientY - s.y;
    if (delta <= 0) { s.d = 0; setDy(0); return; }
    s.d = delta; setDy(delta);
  };
  const onTouchEnd = () => {
    const s = st.current; if (!s) return;
    const delta = s.d, dt = Date.now() - s.t;
    st.current = null; setDragging(false); setDy(0);
    if (delta > 110 || (delta > 40 && dt < 240)) onClose();
  };

  const style = dragging ? { transform: "translateY(" + dy + "px)", transition: "none" } : undefined;
  return { ref, style, handlers: { onTouchStart, onTouchMove, onTouchEnd } };
}

              <button className={"mcard tk-" + s[5]} key={s[7]} onClick={() => onSelect(s)}>
                <div className="mc-top">
                  <span className="mc-time">{clock(s[2])}–{clock(s[3])}</span>
                  <span className="mc-dur">{durLabel(s[2], s[3])}</span>
                  {acc.mk && <span className="mc-mk">{acc.mk}</span>}
                </div>
                <div className="mc-title">{s[6]}</div>
                <div className="mc-meta">
                  <span className="mc-topic"><span className="dot" />{tp[1]}</span>
                  <span className="mc-room" title={fullName(s[1])}>{s[1]} · {shortRoom(s[1])}</span>
                </div>
                {descText(s[7], lang) && (
                  <div className="mc-desc">{descText(s[7], lang)}</div>
                )}
              </button>
            );
          })}
        </section>
      ))}
    </div>
  );
}

function MobileFilterSheet({ open, onClose, topicList, roomList, topics, rooms, setTopics, setRooms }) {
  const toggle = (set, key, setter) => {
    const n = new Set(set);
    n.has(key) ? n.delete(key) : n.add(key);
    setter(n);
  };
  const drag = useSwipeDismiss(onClose);
  return (
    <div className={"msheet-ov" + (open ? " show" : "")}
      onClick={(e) => { if (e.target.classList.contains("msheet-ov")) onClose(); }}>
      <div className="msheet" ref={drag.ref} style={drag.style} {...drag.handlers}>
        <div className="msheet-grab" />
        <div className="msheet-head">
          <span>篩選議程</span>
          <button className="msheet-clear" onClick={() => { setTopics(new Set()); setRooms(new Set()); }}>清除全部</button>
        </div>
        <div className="msheet-sec">
          <div className="msheet-lab">主題 Topic</div>
          <div className="msheet-chips">
            {topicList.map(([k, v]) => (
              <button key={k} className={"fchip tk-" + k + (topics.has(k) ? " on" : "")}
                onClick={() => toggle(topics, k, setTopics)}>
                <span className="dot" />{v[1]}
              </button>
            ))}
          </div>
        </div>
        <div className="msheet-sec">
          <div className="msheet-lab">場地 Room / Stage</div>
          <div className="msheet-chips">
            {roomList.map(([k, name]) => (
              <button key={k} className={"fchip rchip" + (rooms.has(k) ? " on" : "")}
                onClick={() => toggle(rooms, k, setRooms)}>
                <b>{k}</b> {name.split(" ‧ ")[0]}
              </button>
            ))}
          </div>
        </div>
        <button className="msheet-done" onClick={onClose}>完成</button>
      </div>
    </div>
  );
}

function MobileShell({ framed, t, setTweak, cur, setCur, sel, setSel, search, setSearch, topics, setTopics, rooms, setRooms, filterOpen, setFilterOpen, botOpen, setBotOpen, lang, setLang }) {
  const day = D.DAYS.find((d) => d.k === cur);
  const sessions = useMemo(() => D.S.filter((s) => s[0] === cur), [cur]);
  const activeCount = topics.size + rooms.size + (search.trim() ? 1 : 0);
  const topicList = Object.entries(D.TOPICS);
  const roomList = colsOf(day).filter(([k]) => sessions.some((s) => s[1] === k));

  return (
    <div className={"mapp" + (framed ? " framed" : "")}>
      <header className="mtopbar">
        <div className="mbrand">
          <span className="mb1">SFF 2025 議程</span>
          <span className="mb2">Singapore FinTech Festival · 10–14 Nov</span>
        </div>
        <div className="mtop-actions">
          <button className="mlang" title="說明語言 / Description language"
            onClick={() => setLang(lang === "zh" ? "en" : "zh")}>{lang === "zh" ? "EN" : "中"}</button>
          <button className="micon" title="深色 / 淺色" onClick={() => setTweak("dark", !t.dark)}>{t.dark ? "☀" : "☾"}</button>
        </div>
      </header>

      <div className="mdaystrip">
        {D.DAYS.map((d) => {
          const m = DAYMETA[d.k];
          return (
            <button key={d.k} className={"mday" + (d.k === cur ? " on" : "")} onClick={() => setCur(d.k)}>
              <span className="md-wd">{m.zh.split(" ")[1]}</span>
              <span className="md-dt">{m.date.replace("Nov ", "11/")}</span>
            </button>
          );
        })}
      </div>

      <div className="mfilterbar">
        <div className="msearch">
          <span className="msearch-i">⌕</span>
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="搜尋講題、講者…" />
          {search && <button className="msearch-x" onClick={() => setSearch("")}>×</button>}
        </div>
        <button className={"mfbtn" + (activeCount ? " on" : "")} onClick={() => setFilterOpen(true)}>
          篩選{activeCount ? " · " + activeCount : ""}
        </button>
      </div>

      <MobileView sessions={sessions} search={search} topics={topics} rooms={rooms} onSelect={setSel} lang={lang} />

      {sel && <Modal s={sel} onClose={() => setSel(null)} lang={lang} />}
      <MobileFilterSheet open={filterOpen} onClose={() => setFilterOpen(false)}
        topicList={topicList} roomList={roomList}
        topics={topics} rooms={rooms} setTopics={setTopics} setRooms={setRooms} />

      <TweaksPanel>
        <TweakSection label="外觀 Appearance" />
        <TweakToggle label="深色模式 Dark" value={t.dark} onChange={(v) => setTweak("dark", v)} />
      </TweaksPanel>

      {!botOpen && <BotLauncher lang={lang} onClick={() => setBotOpen(true)} />}
      <ChatBot open={botOpen} mobile={true} lang={lang}
        onClose={() => setBotOpen(false)} onSelect={setSel} />
    </div>
  );
}

/* ============================================================ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "colorIntensity": "tinted",
  "accent": "#0a84ff",
  "hourHeight": 84,
  "colWidth": 150,
  "quarterLines": false
}/*EDITMODE-END*/;

/* ============================================================
   小幫手 Bot — UI 元件
   ============================================================ */

/* 精簡推薦卡（沿用 .litem/.mcard 視覺，點擊呼叫共用 onSelect=setSel） */
function BotCard({ s, lang, onSelect }) {
  const tp = D.TOPICS[s[5]] || ["", ""];
  const acc = ACCESS[s[4]] || {};
  const dm = DAYMETA[s[0]] || {};
  const desc = descText(s[7], lang);
  return (
    <button className={"bot-card tk-" + s[5]} onClick={() => onSelect(s)}>
      <div className="bc-title">{acc.mk ? acc.mk + " " : ""}{s[6]}</div>
      <div className="bc-meta">
        <span className="bc-tk"><span className="dot" />{tp[lang === "zh" ? 0 : 1]}</span>
        <span className="bc-when">{(lang === "zh" ? dm.zh : (dm.wd + " " + dm.date))} · {clock(s[2])}–{clock(s[3])}</span>
        <span className="bc-room">{shortRoom(s[1])}</span>
      </div>
      {desc && <div className="bc-desc">{desc}</div>}
    </button>
  );
}

/* 浮動圓鈕 */
function BotLauncher({ onClick, lang }) {
  const T = BOT_T[lang] || BOT_T.en;
  return (
    <button className="bot-fab" title={T.launch} aria-label={T.launch} onClick={onClick}>
      <span aria-hidden="true">💬</span>
    </button>
  );
}

/* 聊天面板（桌機固定卡片 / 手機 bottom-sheet）。常駐掛載，用 open 控制顯示。 */
function ChatBot({ open, mobile, lang, onClose, onSelect }) {
  const [messages, setMessages] = useState([]);
  const [query, setQuery] = useState("");
  const logRef = useRef(null);
  const inputRef = useRef(null);
  const drag = useSwipeDismiss(onClose);

  // 首次開啟 → 問候
  useEffect(() => {
    if (open && messages.length === 0) {
      setMessages([{ role: "bot", kind: "greet" }]);
    }
    if (open && inputRef.current) {
      setTimeout(() => { try { inputRef.current.focus(); } catch (e) {} }, 60);
    }
  }, [open]);

  // 新訊息 → 捲到底
  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [messages, open]);

  const send = () => {
    const q = query.trim();
    if (!q) {
      setMessages((m) => [...m, { role: "bot", kind: "hint" }]);
      return;
    }
    const { items, topicHits } = recommend(q);
    setMessages((m) => [
      ...m,
      { role: "user", text: q },
      items.length
        ? { role: "bot", kind: "result", items, topicHits }
        : { role: "bot", kind: "nomatch" },
    ]);
    setQuery("");
  };

  const browseTrack = (code) => {
    const { items, topicHits } = recommend(D.TOPICS[code][1]);
    setMessages((m) => [
      ...m,
      { role: "user", text: D.TOPICS[code][lang === "zh" ? 0 : 1] },
      items.length ? { role: "bot", kind: "result", items, topicHits } : { role: "bot", kind: "nomatch" },
    ]);
  };

  const T = BOT_T[lang] || BOT_T.en;
  const trackCodes = Object.keys(D.TOPICS).filter((c) => c !== "OT");

  const renderMsg = (m, i) => {
    if (m.role === "user") return <div className="bot-msg user" key={i}>{m.text}</div>;
    if (m.kind === "greet") return <div className="bot-msg bot" key={i}>{T.greet}</div>;
    if (m.kind === "hint") return <div className="bot-msg bot" key={i}>{T.emptyHint}</div>;
    if (m.kind === "nomatch") return (
      <div className="bot-msg bot" key={i}>
        <div>{T.noMatch}</div>
        <div className="bot-tracks">
          {trackCodes.map((c) => (
            <button className={"bot-track-chip tk-" + c} key={c} onClick={() => browseTrack(c)}>
              <span className="dot" />{D.TOPICS[c][lang === "zh" ? 0 : 1]}
            </button>
          ))}
        </div>
      </div>
    );
    // result
    return (
      <div className="bot-msg bot" key={i}>
        <div className="bot-intro">{botIntro(m.topicHits, m.items.length, lang)}</div>
        <div className="bot-cards">
          {m.items.map((s) => <BotCard key={s[7]} s={s} lang={lang} onSelect={onSelect} />)}
        </div>
      </div>
    );
  };

  const panelProps = mobile
    ? { ref: drag.ref, style: drag.style, ...drag.handlers }
    : {};

  return (
    <div className={"bot-ov" + (open ? " show" : "")} onClick={onClose}>
      <div className="bot-panel" onClick={(e) => e.stopPropagation()} {...panelProps}>
        {mobile && <div className="bot-grab" />}
        <div className="bot-head">
          <div className="bot-head-t">
            <span className="bot-h1">{T.title}</span>
            <span className="bot-h2">{T.sub}</span>
          </div>
          <button className="bot-x" title={T.close} aria-label={T.close} onClick={onClose}>×</button>
        </div>
        <div className="bot-log" ref={logRef}>
          {messages.map(renderMsg)}
        </div>
        <div className="bot-input-row">
          <input
            ref={inputRef}
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") send(); }}
            placeholder={T.placeholder}
          />
          <button className="bot-send" onClick={send}>{T.send}</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [cur, setCur] = useState("d1");
  const [view, setView] = useState("grid");
  const [sel, setSel] = useState(null);
  const [search, setSearch] = useState("");
  const [topics, setTopics] = useState(() => new Set());
  const [rooms, setRooms] = useState(() => new Set());
  const [filterOpen, setFilterOpen] = useState(false);
  const [botOpen, setBotOpen] = useState(false);
  const [lang, setLang] = useLang();
  const forceMobile = useMemo(() => new URLSearchParams(location.search).get("m") === "1", []);
  const isMobile = useMediaQuery("(max-width: 720px)") || forceMobile;

  const day = D.DAYS.find((d) => d.k === cur);
  const sessions = useMemo(() => D.S.filter((s) => s[0] === cur), [cur]);

  useEffect(() => {
    const r = document.documentElement;
    r.setAttribute("data-theme", t.dark ? "dark" : "light");
    r.style.setProperty("--accent", t.accent);
  }, [t.dark, t.accent]);

  if (isMobile) {
    return (
      <MobileShell
        framed={forceMobile}
        t={t} setTweak={setTweak}
        cur={cur} setCur={setCur}
        sel={sel} setSel={setSel}
        search={search} setSearch={setSearch}
        topics={topics} setTopics={setTopics}
        rooms={rooms} setRooms={setRooms}
        filterOpen={filterOpen} setFilterOpen={setFilterOpen}
        botOpen={botOpen} setBotOpen={setBotOpen}
        lang={lang} setLang={setLang}
      />
    );
  }

  return (
    <div className="app" data-ci={t.colorIntensity}>
      <header className="topbar">
        <div className="brand">
          <span className="t1">Singapore FinTech Festival 2025</span>
          <span className="t2">Agenda · 議程 — 10–14 November · Singapore</span>
        </div>
        <div className="seg">
          <button className={view === "grid" ? "on" : ""} onClick={() => setView("grid")}>Calendar</button>
          <button className={view === "list" ? "on" : ""} onClick={() => setView("list")}>List</button>
        </div>
        <button className="icon-btn lang-btn" title="說明語言 Description language：English / 中文"
          onClick={() => setLang(lang === "zh" ? "en" : "zh")}>
          {lang === "zh" ? "EN" : "中"}
        </button>
        <button className="icon-btn" title="切換深色 / 淺色" onClick={() => setTweak("dark", !t.dark)}>
          {t.dark ? "☀" : "☾"}
        </button>
        <a className="reg-btn" href="https://www.fintechfestival.sg/registration" target="_blank" rel="noreferrer">Register</a>
      </header>

      <div className="daybar">
        {D.DAYS.map((d) => {
          const m = DAYMETA[d.k];
          return (
            <button key={d.k} className={"day" + (d.k === cur ? " on" : "")} onClick={() => setCur(d.k)}>
              <span className="dn">{m.wd}</span>
              <span className="dd">{m.date}</span>
              <span className="dl">{m.label}</span>
            </button>
          );
        })}
      </div>

      <div className="legend">
        {Object.entries(D.TOPICS).map(([k, v]) => (
          <span className={"lg tk-" + k} key={k}><span className="dot" />{v[1]}</span>
        ))}
        <span className="sep" />
        <span className="mk">🔒 Invite-Only</span>
        <span className="mk">◆ Premium</span>
      </div>

      {view === "grid"
        ? <CalendarView day={day} sessions={sessions} hourHeight={t.hourHeight}
            colWidth={t.colWidth} quarterLines={t.quarterLines} onSelect={setSel} />
        : <ListView day={day} sessions={sessions} onSelect={setSel} lang={lang} />}

      {sel && <Modal s={sel} onClose={() => setSel(null)} lang={lang} />}

      <TweaksPanel>
        <TweakSection label="外觀 Appearance" />
        <TweakToggle label="深色模式 Dark" value={t.dark} onChange={(v) => setTweak("dark", v)} />
        <TweakColor label="強調色 Accent" value={t.accent}
          options={["#0a84ff", "#1d1d1f", "#2fa15a", "#e2743a", "#6a5ae0"]}
          onChange={(v) => setTweak("accent", v)} />
        <TweakRadio label="色彩濃度 Color" value={t.colorIntensity}
          options={["subtle", "tinted", "vivid"]}
          onChange={(v) => setTweak("colorIntensity", v)} />

        <TweakSection label="網格 Grid" />
        <TweakSlider label="時段高度 Hour height" value={t.hourHeight} min={52} max={150} step={2} unit="px"
          onChange={(v) => setTweak("hourHeight", v)} />
        <TweakSlider label="欄寬 Column width" value={t.colWidth} min={112} max={260} step={2} unit="px"
          onChange={(v) => setTweak("colWidth", v)} />
        <TweakToggle label="15 分鐘格線 Quarter lines" value={t.quarterLines} onChange={(v) => setTweak("quarterLines", v)} />
      </TweaksPanel>

      {!botOpen && <BotLauncher lang={lang} onClick={() => setBotOpen(true)} />}
      <ChatBot open={botOpen} mobile={false} lang={lang}
        onClose={() => setBotOpen(false)} onSelect={setSel} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
