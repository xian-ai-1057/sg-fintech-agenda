<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手機版預覽 · SFF 2025 議程</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
    background: #e8e9ed;
    background-image: radial-gradient(circle at 50% 0%, #f2f3f6, #dadce2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 28px 16px;
  }
  .cap { text-align: center; color: #6b6b73; }
  .cap b { display: block; font-size: 15px; color: #1d1d1f; font-weight: 600; letter-spacing: -0.01em; }
  .cap span { font-size: 12.5px; }
  .phone {
    width: 390px; height: 844px; max-height: calc(100vh - 110px);
    background: #000; border-radius: 52px; padding: 11px;
    box-shadow: 0 2px 6px rgba(0,0,0,.18), 0 30px 70px rgba(0,0,0,.32);
    position: relative; flex: 0 0 auto;
  }
  .notch {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 126px; height: 31px; background: #000; border-radius: 0 0 19px 19px; z-index: 3;
  }
  .screen {
    width: 100%; height: 100%; border-radius: 42px; overflow: hidden; background: #fff;
    display: flex; flex-direction: column;
    padding: 16px 0 18px;
  }
  iframe { width: 100%; flex: 1; min-height: 0; border: 0; display: block; }
</style>
</head>
<body>
  <div class="cap">
    <b>手機版預覽</b>
    <span>實際開啟 index.html 時會依螢幕寬度自動切換版型</span>
  </div>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <iframe src="index.html" title="SFF 2025 Agenda mobile"></iframe>
    </div>
  </div>
</body>
</html>
