<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agenda · Singapore FinTech Festival 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SFF 2025 Agenda — Apple Calendar inspired
   Light + dark themes via CSS custom properties.
   ============================================================ */

:root {
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          "Helvetica Neue", "PingFang TC", "PingFang SC", "Noto Sans TC",
          "Microsoft JhengHei", system-ui, sans-serif;

  /* surfaces */
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface-2: #fbfbfd;
  --surface-hover: #f2f2f5;

  /* text */
  --text-strong: #1d1d1f;
  --text: #43434a;
  --text-soft: #86868b;
  --text-faint: #aeaeb2;

  /* lines */
  --separator: rgba(60, 60, 67, 0.10);
  --separator-strong: rgba(60, 60, 67, 0.18);
  --hairline: rgba(60, 60, 67, 0.07);

  /* interactive */
  --accent: #0a84ff;
  --accent-soft: rgba(10, 132, 255, 0.12);

  /* shape */
  --radius-chip: 7px;
  --radius-card: 16px;
  --radius-pill: 980px;

  /* layout (overridden inline by tweaks) */
  --gutter-w: 60px;
  --head-h: 56px;
  --shadow-pop: 0 1px 2px rgba(0,0,0,.04), 0 12px 40px rgba(0,0,0,.16);
  --shadow-chip: 0 6px 20px rgba(0,0,0,.14);

  color-scheme: light;
}

[data-theme="dark"] {
  --bg: #000000;
  --surface: #1c1c1e;
  --surface-2: #161618;
  --surface-hover: #2a2a2c;

  --text-strong: #f5f5f7;
  --text: #d6d6da;
  --text-soft: #98989d;
  --text-faint: #6c6c70;

  --separator: rgba(120, 120, 128, 0.28);
  --separator-strong: rgba(120, 120, 128, 0.42);
  --hairline: rgba(120, 120, 128, 0.16);

  --accent: #0a84ff;
  --accent-soft: rgba(10, 132, 255, 0.22);

  --shadow-pop: 0 1px 2px rgba(0,0,0,.3), 0 16px 48px rgba(0,0,0,.55);
  --shadow-chip: 0 8px 26px rgba(0,0,0,.5);

  color-scheme: dark;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-strong);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-variant-numeric: tabular-nums;
}
#root { height: 100%; }

/* ---------- track colors ---------- */
.tk-DA { --c: #2f6fe0; }
.tk-NT { --c: #0e9fb3; }
.tk-SF { --c: #df4d47; }
.tk-BG { --c: #c2952a; }
.tk-AQ { --c: #6a5ae0; }
.tk-TT { --c: #db5793; }
.tk-SU { --c: #2fa15a; }
.tk-EE { --c: #e2743a; }
.tk-OT { --c: #8a8a8e; }

/* ============================================================
   App shell
   ============================================================ */
.app { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--separator);
}
.brand { display: flex; flex-direction: column; gap: 1px; margin-right: auto; }
.brand .t1 {
  font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
  color: var(--text-strong);
}
.brand .t2 { font-size: 12px; color: var(--text-soft); letter-spacing: .01em; }

/* segmented control (Apple style) */
.seg {
  display: inline-flex; background: var(--surface-hover);
  border-radius: 9px; padding: 2px; gap: 2px;
}
.seg button {
  font: inherit; font-size: 13px; font-weight: 500;
  border: none; background: transparent; color: var(--text);
  padding: 5px 14px; border-radius: 7px; cursor: pointer;
  transition: background .15s, color .15s; white-space: nowrap;
}
.seg button.on {
  background: var(--surface);
  color: var(--text-strong);
  box-shadow: 0 1px 2px rgba(0,0,0,.12), 0 1px 1px rgba(0,0,0,.04);
}
[data-theme="dark"] .seg button.on { background: #48484a; }

.icon-btn {
  width: 34px; height: 34px; border-radius: 9px; border: none;
  background: var(--surface-hover); color: var(--text);
  cursor: pointer; font-size: 16px; display: grid; place-items: center;
  transition: background .15s;
}
.icon-btn:hover { background: var(--separator-strong); }

.reg-btn {
  font: inherit; font-size: 13px; font-weight: 600;
  background: var(--accent); color: #fff; text-decoration: none;
  padding: 7px 16px; border-radius: var(--radius-pill);
}

/* ---------- day selector ---------- */
.daybar {
  display: flex; align-items: stretch; gap: 8px;
  padding: 12px 24px; background: var(--surface);
  border-bottom: 1px solid var(--separator);
  overflow-x: auto;
}
.day {
  flex: 0 0 auto; min-width: 116px;
  border: 1px solid var(--separator-strong); background: transparent;
  border-radius: 12px; padding: 8px 14px; cursor: pointer; text-align: left;
  font: inherit; color: var(--text); transition: background .15s, border-color .15s;
  display: flex; flex-direction: column; gap: 2px;
}
.day:hover { background: var(--surface-hover); }
.day .dn { font-size: 12px; font-weight: 500; color: var(--text-soft); }
.day .dd { font-size: 16px; font-weight: 600; color: var(--text-strong); letter-spacing: -0.01em; }
.day .dl { font-size: 11px; color: var(--text-soft); }
.day.on {
  background: var(--accent); border-color: var(--accent);
}
.day.on .dn, .day.on .dd, .day.on .dl { color: #fff; }
.day.on .dn, .day.on .dl { color: rgba(255,255,255,.82); }

/* ---------- legend ---------- */
.legend {
  display: flex; flex-wrap: wrap; align-items: center; gap: 7px 16px;
  padding: 10px 24px; background: var(--surface-2);
  border-bottom: 1px solid var(--separator);
  font-size: 12px; color: var(--text-soft);
}
.legend .lg { display: inline-flex; align-items: center; gap: 6px; }
.legend .dot { width: 9px; height: 9px; border-radius: 3px; background: var(--c); display: inline-block; }
.legend .sep { margin-left: auto; }
.legend .mk { display: inline-flex; align-items: center; gap: 5px; }

/* ============================================================
   Calendar (grid) view
   ============================================================ */
.scroll { flex: 1; overflow: auto; background: var(--surface); position: relative; }

.cal { display: grid; position: relative; }

.corner {
  position: sticky; top: 0; left: 0; z-index: 45;
  height: var(--head-h); background: var(--surface);
  border-right: 1px solid var(--separator);
  border-bottom: 1px solid var(--separator-strong);
}
.colhead {
  position: sticky; top: 0; z-index: 30;
  height: var(--head-h); background: var(--surface);
  border-bottom: 1px solid var(--separator-strong);
  border-left: 1px solid var(--separator);
  padding: 8px 10px; display: flex; flex-direction: column; justify-content: center;
  gap: 1px; overflow: hidden;
}
.colhead .code { font-size: 13px; font-weight: 650; color: var(--text-strong); letter-spacing: -0.01em; }
.colhead .name {
  font-size: 11px; color: var(--text-soft); line-height: 1.25;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.gutter {
  position: sticky; left: 0; z-index: 20;
  background: var(--surface);
  border-right: 1px solid var(--separator);
}
.hourlabel {
  position: absolute; right: 8px;
  font-size: 11px; font-weight: 500; color: var(--text-soft);
  letter-spacing: 0.01em;
}

.colbody {
  position: relative;
  border-left: 1px solid var(--separator);
  background-repeat: repeat;
}

/* event chip */
.ev {
  position: absolute;
  height: var(--h);
  border-radius: var(--radius-chip);
  padding: 4px 7px 4px 8px;
  overflow: hidden; cursor: pointer;
  border-left: 3px solid var(--c);
  background: color-mix(in srgb, var(--c) 13%, var(--surface));
  color: var(--text-strong);
  box-shadow: 0 0 0 1px var(--surface);
  transition: box-shadow .14s ease, transform .14s ease;
  display: flex; flex-direction: column; gap: 1px;
}
.ev:hover {
  height: auto; min-height: var(--h);
  z-index: 60; box-shadow: var(--shadow-chip);
  transform: translateY(-1px);
}
.ev .etm {
  font-size: 10.5px; font-weight: 500; color: var(--text-soft);
  white-space: nowrap; line-height: 1.2;
}
.ev .ett {
  font-size: 12px; font-weight: 600; line-height: 1.28; letter-spacing: -0.005em;
  color: var(--text-strong);
  display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden;
  -webkit-line-clamp: var(--lines, 2);
}
.ev:hover .ett { -webkit-line-clamp: unset; }
.ev .mk { position: absolute; top: 4px; right: 5px; font-size: 9.5px; opacity: .8; }

/* color intensity variants */
[data-ci="subtle"] .ev { background: color-mix(in srgb, var(--c) 7%, var(--surface)); }
[data-ci="vivid"]  .ev { background: color-mix(in srgb, var(--c) 24%, var(--surface)); }
[data-ci="vivid"]  .ev .ett { color: color-mix(in srgb, var(--c) 62%, var(--text-strong)); }
[data-ci="vivid"]  .ev .etm { color: color-mix(in srgb, var(--c) 45%, var(--text-soft)); }

.empty {
  padding: 70px 24px; text-align: center; color: var(--text-soft); font-size: 14px;
}

/* ============================================================
   List / Agenda view
   ============================================================ */
.list { flex: 1; overflow: auto; background: var(--bg); }
.list-inner { max-width: 860px; margin: 0 auto; padding: 18px 20px 80px; }

.hourgroup { margin-top: 10px; }
.hourgroup-h {
  position: sticky; top: 0; z-index: 5;
  font-size: 12px; font-weight: 600; color: var(--text-soft);
  letter-spacing: 0.04em; padding: 12px 4px 8px;
  background: linear-gradient(var(--bg) 70%, transparent);
}

.litem {
  display: grid; grid-template-columns: 78px 1fr; gap: 14px;
  background: var(--surface); border: 1px solid var(--separator);
  border-radius: 14px; padding: 13px 16px; margin-bottom: 8px;
  cursor: pointer; transition: border-color .14s, box-shadow .14s, transform .14s;
}
.litem:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); transform: translateY(-1px); }
[data-theme="dark"] .litem:hover { box-shadow: 0 4px 16px rgba(0,0,0,.4); }
.litem .ltime { display: flex; flex-direction: column; gap: 2px; border-left: 3px solid var(--c); padding-left: 10px; }
.litem .ltime .s { font-size: 14px; font-weight: 600; color: var(--text-strong); }
.litem .ltime .e { font-size: 12px; color: var(--text-soft); }
.litem .ltime .dur { font-size: 10.5px; color: var(--text-faint); margin-top: 1px; }
.litem .lbody { min-width: 0; }
.litem .ltitle { font-size: 14.5px; font-weight: 600; line-height: 1.34; letter-spacing: -0.01em; color: var(--text-strong); }
.litem .lmeta { margin-top: 5px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px; font-size: 12px; color: var(--text-soft); }
.litem .lmeta .tk { display: inline-flex; align-items: center; gap: 5px; }
.litem .lmeta .tk .dot { width: 8px; height: 8px; border-radius: 2.5px; background: var(--c); }
.litem .lmeta .room { font-weight: 500; color: var(--text); }
.litem .lspk { margin-top: 6px; font-size: 12px; color: var(--text-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ============================================================
   Modal (event detail popover)
   ============================================================ */
.ov {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.32); backdrop-filter: blur(6px);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 7vh 16px 40px; overflow-y: auto;
  opacity: 0; pointer-events: none; transition: opacity .18s ease;
}
.ov.show { opacity: 1; pointer-events: auto; }
.modal {
  width: 100%; max-width: 540px; background: var(--surface);
  border-radius: var(--radius-card); box-shadow: var(--shadow-pop);
  border-top: 4px solid var(--c);
  padding: 26px 26px 24px; position: relative;
  transform: translateY(10px) scale(.98); transition: transform .2s cubic-bezier(.2,.7,.2,1);
}
.ov.show .modal { transform: none; }
.modal .x {
  position: absolute; top: 16px; right: 16px; width: 28px; height: 28px;
  border: none; border-radius: 50%; background: var(--surface-hover);
  color: var(--text-soft); font-size: 16px; cursor: pointer; display: grid; place-items: center;
}
.modal .x:hover { background: var(--separator-strong); color: var(--text-strong); }
.modal .mtrack { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--c); letter-spacing: .01em; }
.modal .mtrack .dot { width: 9px; height: 9px; border-radius: 3px; background: var(--c); }
.modal h2 { margin-top: 10px; font-size: 21px; font-weight: 650; line-height: 1.32; letter-spacing: -0.02em; color: var(--text-strong); padding-right: 30px; }
.modal .mrow { margin-top: 16px; display: flex; gap: 11px; align-items: flex-start; font-size: 14px; color: var(--text); }
.modal .mrow .mi { width: 18px; flex: 0 0 18px; text-align: center; color: var(--text-faint); font-size: 13px; margin-top: 1px; }
.modal .mrow b { color: var(--text-strong); font-weight: 600; }
.modal .badges { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 7px; }
.badge { font-size: 12px; font-weight: 500; padding: 4px 11px; border-radius: var(--radius-pill); border: 1px solid var(--separator-strong); color: var(--text); }
.badge.open { color: #2fa15a; border-color: rgba(47,161,90,.4); background: rgba(47,161,90,.08); }
.badge.invite { color: #db5793; border-color: rgba(219,87,147,.4); background: rgba(219,87,147,.08); }
.badge.premium { color: #c2952a; border-color: rgba(194,149,42,.45); background: rgba(194,149,42,.10); }
.modal .spk { margin-top: 18px; }
.modal .spk .lab { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 9px; }
.modal .spk .chips { display: flex; flex-wrap: wrap; gap: 7px; }
.modal .spk .chip { font-size: 12.5px; padding: 5px 11px; border-radius: var(--radius-pill); background: var(--surface-hover); color: var(--text); }
.modal a.ext {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 20px;
  background: var(--accent); color: #fff; text-decoration: none;
  font-size: 14px; font-weight: 600; padding: 9px 18px; border-radius: var(--radius-pill);
}

/* scrollbars */
.scroll::-webkit-scrollbar, .list::-webkit-scrollbar { width: 11px; height: 11px; }
.scroll::-webkit-scrollbar-thumb, .list::-webkit-scrollbar-thumb {
  background: var(--separator-strong); border-radius: 6px; border: 3px solid var(--surface);
}
.daybar::-webkit-scrollbar { height: 0; }

@media (max-width: 640px) {
  .topbar, .daybar, .legend { padding-left: 14px; padding-right: 14px; }
  .brand .t1 { font-size: 15px; }
}

/* ============================================================
   Mobile — responsive single-column timeline (g0v-inspired)
   ============================================================ */
.mapp { display: flex; flex-direction: column; height: 100%; background: var(--bg); overflow: hidden; }
.mapp.framed {
  max-width: 430px; margin: 0 auto;
  border-left: 1px solid var(--separator-strong);
  border-right: 1px solid var(--separator-strong);
}

.mtopbar {
  flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
  padding: calc(env(safe-area-inset-top, 0px) + 11px) 16px 11px;
  background: var(--surface); border-bottom: 1px solid var(--separator);
}
.mbrand { display: flex; flex-direction: column; gap: 1px; margin-right: auto; min-width: 0; }
.mbrand .mb1 { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-strong); }
.mbrand .mb2 {
  font-size: 11px; color: var(--text-soft);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.micon {
  flex: 0 0 auto; width: 38px; height: 38px; border-radius: 11px; border: none;
  background: var(--surface-hover); color: var(--text); font-size: 17px; cursor: pointer;
  display: grid; place-items: center;
}
.micon:active { background: var(--separator-strong); }

.mdaystrip {
  flex: 0 0 auto; display: flex; gap: 7px; overflow-x: auto;
  padding: 9px 16px; background: var(--surface);
  border-bottom: 1px solid var(--separator); scrollbar-width: none;
}
.mdaystrip::-webkit-scrollbar { display: none; }
.mday {
  flex: 0 0 auto; min-width: 56px;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  border: 1px solid var(--separator-strong); background: transparent;
  border-radius: 12px; padding: 6px 12px; cursor: pointer; font: inherit; color: var(--text);
  transition: background .14s, border-color .14s;
}
.mday .md-wd { font-size: 11px; color: var(--text-soft); font-weight: 500; }
.mday .md-dt { font-size: 14.5px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
.mday.on { background: var(--accent); border-color: var(--accent); }
.mday.on .md-wd { color: rgba(255,255,255,.85); }
.mday.on .md-dt { color: #fff; }

.mfilterbar {
  flex: 0 0 auto; display: flex; gap: 8px; align-items: center;
  padding: 9px 16px; background: var(--surface-2);
  border-bottom: 1px solid var(--separator);
}
.msearch {
  flex: 1; display: flex; align-items: center; gap: 7px; min-width: 0;
  background: var(--surface-hover); border-radius: 10px; padding: 0 10px; height: 38px;
}
.msearch-i { font-size: 17px; color: var(--text-soft); }
.msearch input {
  flex: 1; min-width: 0; border: none; background: transparent; outline: none;
  font: inherit; font-size: 14px; color: var(--text-strong);
}
.msearch input::placeholder { color: var(--text-faint); }
.msearch-x { border: none; background: none; color: var(--text-soft); font-size: 19px; line-height: 1; cursor: pointer; padding: 0 2px; }
.mfbtn {
  flex: 0 0 auto; height: 38px; padding: 0 15px; border-radius: 10px;
  border: 1px solid var(--separator-strong); background: var(--surface);
  font: inherit; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer;
  white-space: nowrap;
}
.mfbtn.on { background: var(--accent); border-color: var(--accent); color: #fff; }

.mlist {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 44px);
}
.mgroup-h {
  position: sticky; top: 0; z-index: 5;
  display: flex; align-items: center; gap: 10px; padding: 14px 2px 8px;
  background: linear-gradient(var(--bg) 72%, transparent);
}
.mgroup-h .mh-time { font-size: 13px; font-weight: 700; color: var(--text-strong); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
.mgroup-h .mh-line { flex: 1; height: 1px; background: var(--separator); }
.mgroup-h .mh-cnt { font-size: 11px; font-weight: 600; color: var(--text-faint); }

.mcard {
  display: block; width: 100%; text-align: left;
  background: var(--surface); border: 1px solid var(--separator);
  border-left: 3px solid var(--c); border-radius: 13px;
  padding: 11px 13px 12px; margin-bottom: 8px;
  cursor: pointer; font: inherit; color: var(--text-strong);
  -webkit-tap-highlight-color: transparent; transition: transform .12s ease;
}
.mcard:active { transform: scale(.985); }
.mc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.mc-time { font-size: 12.5px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; white-space: nowrap; }
.mc-dur { font-size: 11px; color: var(--text-faint); }
.mc-mk { margin-left: auto; font-size: 11px; opacity: .75; }
.mc-title {
  font-size: 15px; font-weight: 600; line-height: 1.34; letter-spacing: -0.01em;
  color: var(--text-strong); text-wrap: pretty;
  display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden;
}
.mc-meta { margin-top: 8px; display: flex; align-items: center; gap: 9px; min-width: 0; }
.mc-topic { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-soft); font-weight: 500; white-space: nowrap; flex: 0 0 auto; }
.mc-topic .dot { width: 8px; height: 8px; border-radius: 2.5px; background: var(--c); flex: 0 0 auto; }
.mc-room {
  margin-left: auto; flex: 0 1 auto; min-width: 0;
  font-size: 11px; font-weight: 600; color: var(--text);
  background: var(--surface-hover); padding: 2px 8px; border-radius: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.mempty { padding: 76px 30px; text-align: center; color: var(--text); font-size: 15px; line-height: 1.9; }
.mempty span { font-size: 13px; color: var(--text-soft); }

/* filter bottom sheet */
.msheet-ov {
  position: fixed; inset: 0; z-index: 210; background: rgba(0,0,0,.34);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .2s ease;
}
.msheet-ov.show { opacity: 1; pointer-events: auto; }
.msheet {
  width: 100%; max-height: 82vh; overflow-y: auto;
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 8px 18px calc(env(safe-area-inset-bottom, 0px) + 18px);
  box-shadow: var(--shadow-pop);
  transform: translateY(100%); transition: transform .26s cubic-bezier(.2,.7,.2,1);
}
.msheet-ov.show .msheet { transform: none; }
.msheet-grab { width: 38px; height: 5px; border-radius: 3px; background: var(--separator-strong); margin: 6px auto 12px; }
.msheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
/* ============================================================
   SFF 2025 Agenda — React app (Apple Calendar inspired)
   ============================================================ */
const { useState, useEffect, useMemo, useRef } = React;
const D = window.SFF;

/* ---- day metadata (English-first) ---- */
const DAYMETA = {
  d1: { wd: "Mon", date: "Nov 10", label: "Insights Forum", zh: "11/10 一" },
  d2: { wd: "Tue", date: "Nov 11", label: "Insights Forum", zh: "11/11 二" },
  d3: { wd: "Wed", date: "Nov 12", label: "Main Stages", zh: "11/12 三" },
  d4: { wd: "Thu", date: "Nov 13", label: "Main Stages", zh: "11/13 四" },
  d5: { wd: "Fri", date: "Nov 14", label: "Main Stages", zh: "11/14 五" },
};
const ACCESS = {
  O: { en: "Open", zh: "開放參加", cls: "open", mk: "" },
  I: { en: "Invite-Only", zh: "邀請制", cls: "invite", mk: "🔒" },
  P: { en: "Premium", zh: "付費", cls: "premium", mk: "◆" },
};

/* ---- helpers ---- */
const mins = (t) => { const [a, b] = t.split(":").map(Number); return a * 60 + b; };
const pad2 = (n) => String(n).padStart(2, "0");
const clock = (t) => { const [h, m] = t.split(":"); return pad2(+h) + ":" + m; };
const fmtMin = (m) => pad2(Math.floor(m / 60)) + ":" + pad2(m % 60);
const durLabel = (a, b) => {
  const d = mins(b) - mins(a);
  if (d >= 60) { const h = Math.floor(d / 60), mm = d % 60; return h + "h" + (mm ? " " + mm + "m" : ""); }
  return d + "m";
};
const colsOf = (day) => (day.cols === "stages" ? D.STAGES : D.ROOMS);
const fullName = (code) => D.STAGE_FULL[code] || D.ROOM_FULL[code] || code;
const COLS_ALL = [...D.ROOMS, ...D.STAGES];
const shortRoom = (code) => { const f = COLS_ALL.find(([k]) => k === code); return f ? f[1].split(" ‧ ")[0] : code; };

/* assign overlap lanes within a column */
function computeLanes(evs) {
  const sorted = [...evs].sort((a, b) => mins(a[2]) - mins(b[2]) || mins(a[3]) - mins(b[3]));
  const laneEnd = []; const laneOf = new Map();
  sorted.forEach((ev) => {
    let p = laneEnd.findIndex((end) => mins(ev[2]) >= end);
    if (p < 0) { p = laneEnd.length; laneEnd.push(0); }
    laneEnd[p] = mins(ev[3]); laneOf.set(ev, p);
  });
  return { laneOf, count: Math.max(1, laneEnd.length) };
}

/* ============================================================ */
function EventChip({ s, lane, lanes, dayStart, pxPerMin, minH, onSelect }) {
  const top = (mins(s[2]) - dayStart) * pxPerMin;
  const h = Math.max(minH, (mins(s[3]) - mins(s[2])) * pxPerMin);
  const lines = Math.max(1, Math.min(6, Math.floor((h - 16) / 15)));
  const mk = ACCESS[s[4]].mk;
  return (
    <div
      className={"ev tk-" + s[5]}
      style={{
        top: top + "px",
        left: `calc(${(lane / lanes) * 100}% + 2px)`,
        width: `calc(${100 / lanes}% - 4px)`,
        "--h": h + "px",
        "--lines": lines,
      }}
      onClick={() => onSelect(s)}
    >
      {mk && <span className="mk">{mk}</span>}
      <span className="etm">{clock(s[2])}</span>
      <span className="ett">{s[6]}</span>
    </div>
  );
}

function CalendarView({ day, sessions, hourHeight, colWidth, quarterLines, onSelect }) {
  const pxPerMin = hourHeight / 60;
  const minH = Math.max(20, hourHeight * 0.3);

  const master = colsOf(day);
  const used = master.filter(([k]) => sessions.some((s) => s[1] === k));
  if (!used.length) return <div className="empty">尚無可顯示的場次。</div>;

  const dayStart = Math.floor(Math.min(...sessions.map((s) => mins(s[2]))) / 60) * 60;
  const dayEnd = Math.ceil(Math.max(...sessions.map((s) => mins(s[3]))) / 60) * 60;
  const totalMin = dayEnd - dayStart;
  const bodyH = totalMin * pxPerMin;

  const laneData = {};
  used.forEach(([k]) => { laneData[k] = computeLanes(sessions.filter((s) => s[1] === k)); });

  const hours = [];
  for (let m = dayStart; m <= dayEnd; m += 60) hours.push(m);

  const bg = (() => {
    const layers = [`linear-gradient(var(--separator) 1px, transparent 1px)`];
    const sizes = [`100% ${60 * pxPerMin}px`];
    if (quarterLines) { layers.push(`linear-gradient(var(--hairline) 1px, transparent 1px)`); sizes.push(`100% ${15 * pxPerMin}px`); }
    return { backgroundImage: layers.join(","), backgroundSize: sizes.join(",") };
  })();

  const n = used.length;
  const tpl = `var(--gutter-w) repeat(${n}, minmax(${colWidth}px, 1fr))`;

  return (
    <div className="scroll">
      <div className="cal" style={{ gridTemplateColumns: tpl }}>
        <div className="corner" style={{ gridColumn: 1, gridRow: 1 }} />
        {used.map(([k, name], i) => (
          <div className="colhead" key={"h" + k} style={{ gridColumn: i + 2, gridRow: 1 }}>
            <span className="code">{k}</span>
            <span className="name" title={name}>{name}</span>
          </div>
        ))}
        <div className="gutter" style={{ gridColumn: 1, gridRow: 2, height: bodyH + "px" }}>
          {hours.map((m, i) => (
            <span className="hourlabel" key={m}
              style={{ top: (m - dayStart) * pxPerMin + "px", transform: i === 0 ? "translateY(2px)" : "translateY(-50%)" }}>
              {fmtMin(m)}
            </span>
          ))}
        </div>
        {used.map(([k], i) => {
          const { laneOf, count } = laneData[k];
          return (
            <div className="colbody" key={"b" + k} style={{ gridColumn: i + 2, gridRow: 2, height: bodyH + "px", ...bg }}>
              {sessions.filter((s) => s[1] === k).map((s) => (
                <EventChip key={s[7]} s={s} lane={laneOf.get(s) || 0} lanes={count}
                  dayStart={dayStart} pxPerMin={pxPerMin} minH={minH} onSelect={onSelect} />
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================ */
function ListView({ day, sessions, onSelect }) {
  const sorted = useMemo(
    () => [...sessions].sort((a, b) => mins(a[2]) - mins(b[2]) || mins(a[3]) - mins(b[3]) || a[1].localeCompare(b[1])),
    [sessions]
  );
  if (!sorted.length) return <div className="empty">尚無可顯示的場次。</div>;

  // group by start hour
  const groups = [];
  let cur = null;
  sorted.forEach((s) => {
    const hr = Math.floor(mins(s[2]) / 60);
    if (!cur || cur.hr !== hr) { cur = { hr, items: [] }; groups.push(cur); }
    cur.items.push(s);
  });

  return (
    <div className="list">
      <div className="list-inner">
        {groups.map((g) => (
          <div className="hourgroup" key={g.hr}>
            <div className="hourgroup-h">{pad2(g.hr)}:00</div>
            {g.items.map((s) => {
              const room = s[9] || fullName(s[1]);
              const tp = D.TOPICS[s[5]];
              return (
                <div className={"litem tk-" + s[5]} key={s[7]} onClick={() => onSelect(s)}>
                  <div className="ltime">
                    <span className="s">{clock(s[2])}</span>
                    <span className="e">{clock(s[3])}</span>
                    <span className="dur">{durLabel(s[2], s[3])}</span>
                  </div>
                  <div className="lbody">
                    <div className="ltitle">{ACCESS[s[4]].mk ? ACCESS[s[4]].mk + " " : ""}{s[6]}</div>
                    <div className="lmeta">
                      <span className="room">{room}</span>
                      <span className="tk"><span className="dot" />{tp[1]}</span>
                    </div>
                    {s[8] && s[8].length > 0 && (
                      <div className="lspk">{s[8].slice(0, 6).join(" · ")}{s[8].length > 6 ? " …" : ""}</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================================================ */
function Modal({ s, onClose }) {
  useEffect(() => {
    const k = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", k);
    return () => document.removeEventListener("keydown", k);
  }, [onClose]);
  if (!s) return <div className="ov" />;
  const dm = DAYMETA[s[0]];
  const stage = s[9] || "Insights Forum";
  const acc = ACCESS[s[4]];
  const tp = D.TOPICS[s[5]];
  return (
    <div className={"ov show"} onClick={(e) => { if (e.target.classList.contains("ov")) onClose(); }}>
      <div className={"modal tk-" + s[5]}>
        <button className="x" onClick={onClose}>×</button>
        <span className="mtrack"><span className="dot" />{tp[1]} · {tp[0]}</span>
        <h2>{s[6]}</h2>
        <div className="badges">
          <span className="badge" style={{ borderColor: "var(--c)", color: "var(--c)" }}>{stage}</span>
          <span className={"badge " + acc.cls}>{acc.mk} {acc.en} · {acc.zh}</span>
        </div>
        <div className="mrow"><span className="mi">◷</span><span><b>{dm.wd}, {dm.date}</b> &nbsp;{clock(s[2])} – {clock(s[3])} &nbsp;<span style={{ color: "var(--text-soft)" }}>({durLabel(s[2], s[3])})</span></span></div>
        <div className="mrow"><span className="mi">⚲</span><span><b>{s[1]}</b> · {fullName(s[1])}</span></div>
        {s[8] && s[8].length > 0 && (
          <div className="spk">
            <div className="lab">Speakers · 講者 ({s[8].length})</div>
            <div className="chips">{s[8].map((p, i) => <span className="chip" key={i}>{p}</span>)}</div>
          </div>
        )}
        <a className="ext" href={D.U + s[7]} target="_blank" rel="noreferrer">官方場次頁面 Official page ↗</a>
      </div>
    </div>
  );
}

/* ============================================================
   Mobile — responsive single-column timeline (g0v-inspired)
   ============================================================ */
function useMediaQuery(q) {
  const [m, setM] = useState(() => window.matchMedia(q).matches);
  useEffect(() => {
    const mq = window.matchMedia(q);
    const fn = (e) => setM(e.matches);
    mq.addEventListener("change", fn);
    return () => mq.removeEventListener("change", fn);
  }, [q]);
  return m;
}

function MobileView({ sessions, search, topics, rooms, onSelect }) {
  const list = useMemo(() => {
    let arr = sessions;
    if (topics.size) arr = arr.filter((s) => topics.has(s[5]));
    if (rooms.size) arr = arr.filter((s) => rooms.has(s[1]));
    const q = search.trim().toLowerCase();
    if (q) arr = arr.filter((s) =>
      s[6].toLowerCase().includes(q) ||
      shortRoom(s[1]).toLowerCase().includes(q) ||
      (s[8] || []).some((p) => p.toLowerCase().includes(q)));
    return [...arr].sort((a, b) => mins(a[2]) - mins(b[2]) || mins(a[3]) - mins(b[3]) || a[1].localeCompare(b[1]));
  }, [sessions, search, topics, rooms]);

  if (!list.length)
    return <div className="mempty">沒有符合條件的場次<br /><span>試著調整篩選或搜尋關鍵字</span></div>;

  const groups = [];
  let cur = null;
  list.forEach((s) => {
    const hr = Math.floor(mins(s[2]) / 60);
    if (!cur || cur.hr !== hr) { cur = { hr, items: [] }; groups.push(cur); }
    cur.items.push(s);
  });

  return (
    <div className="mlist">
      {groups.map((g) => (
        <section className="mgroup" key={g.hr}>
          <div className="mgroup-h">
            <span className="mh-time">{pad2(g.hr)}:00</span>
            <span className="mh-line" />
            <span className="mh-cnt">{g.items.length} 場</span>
          </div>
          {g.items.map((s) => {
            const tp = D.TOPICS[s[5]];
            const acc = ACCESS[s[4]];
            return (
              <button className={"mcard tk-" + s[5]} key={s[7]} onClick={() => onSelect(s)}>
                <div className="mc-top">
                  <span className="mc-time">{clock(s[2])}–{clock(s[3])}</span>
                  <span className="mc-dur">{durLabel(s[2], s[3])}</span>
                  {acc.mk && <span className="mc-mk">{acc.mk}</span>}
                </div>
                <div className="mc-title">{s[6]}</div>
                <div className="mc-meta">
                  <span className="mc-topic"><span className="dot" />{tp[1]}</span>
                  <span className="mc-room" title={fullName(s[1])}>{s[1]} · {shortRoom(s[1])}</span>
                </div>
              </button>
            );
          })}
        </section>
      ))}
    </div>
  );
}

function MobileFilterSheet({ open, onClose, topicList, roomList, topics, rooms, setTopics, setRooms }) {
  const toggle = (set, key, setter) => {
    const n = new Set(set);
    n.has(key) ? n.delete(key) : n.add(key);
    setter(n);
  };
  return (
    <div className={"msheet-ov" + (open ? " show" : "")}
      onClick={(e) => { if (e.target.classList.contains("msheet-ov")) onClose(); }}>
      <div className="msheet">
        <div className="msheet-grab" />
        <div className="msheet-head">
          <span>篩選議程</span>
          <button className="msheet-clear" onClick={() => { setTopics(new Set()); setRooms(new Set()); }}>清除全部</button>
        </div>
        <div className="msheet-sec">
          <div className="msheet-lab">主題 Topic</div>
          <div className="msheet-chips">
            {topicList.map(([k, v]) => (
              <button key={k} className={"fchip tk-" + k + (topics.has(k) ? " on" : "")}
                onClick={() => toggle(topics, k, setTopics)}>
                <span className="dot" />{v[1]}
              </button>
            ))}
          </div>
        </div>
        <div className="msheet-sec">
          <div className="msheet-lab">場地 Room / Stage</div>
          <div className="msheet-chips">
            {roomList.map(([k, name]) => (
              <button key={k} className={"fchip rchip" + (rooms.has(k) ? " on" : "")}
                onClick={() => toggle(rooms, k, setRooms)}>
                <b>{k}</b> {name.split(" ‧ ")[0]}
              </button>
            ))}
          </div>
        </div>
        <button className="msheet-done" onClick={onClose}>完成</button>
      </div>
    </div>
  );
}

function MobileShell({ framed, t, setTweak, cur, setCur, sel, setSel, search, setSearch, topics, setTopics, rooms, setRooms, filterOpen, setFilterOpen }) {
  const day = D.DAYS.find((d) => d.k === cur);
  const sessions = useMemo(() => D.S.filter((s) => s[0] === cur), [cur]);
  const activeCount = topics.size + rooms.size + (search.trim() ? 1 : 0);
  const topicList = Object.entries(D.TOPICS);
  const roomList = colsOf(day).filter(([k]) => sessions.some((s) => s[1] === k));

  return (
    <div className={"mapp" + (framed ? " framed" : "")}>
      <header className="mtopbar">
        <div className="mbrand">
          <span className="mb1">SFF 2025 議程</span>
          <span className="mb2">Singapore FinTech Festival · 10–14 Nov</span>
        </div>
        <button className="micon" title="深色 / 淺色" onClick={() => setTweak("dark", !t.dark)}>{t.dark ? "☀" : "☾"}</button>
      </header>

      <div className="mdaystrip">
        {D.DAYS.map((d) => {
          const m = DAYMETA[d.k];
          return (
            <button key={d.k} className={"mday" + (d.k === cur ? " on" : "")} onClick={() => setCur(d.k)}>
              <span className="md-wd">{m.zh.split(" ")[1]}</span>
              <span className="md-dt">{m.date.replace("Nov ", "11/")}</span>
            </button>
          );
        })}
      </div>

      <div className="mfilterbar">
        <div className="msearch">
          <span className="msearch-i">⌕</span>
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="搜尋講題、講者…" />
          {search && <button className="msearch-x" onClick={() => setSearch("")}>×</button>}
        </div>
        <button className={"mfbtn" + (activeCount ? " on" : "")} onClick={() => setFilterOpen(true)}>
          篩選{activeCount ? " · " + activeCount : ""}
        </button>
      </div>

      <MobileView sessions={sessions} search={search} topics={topics} rooms={rooms} onSelect={setSel} />

      {sel && <Modal s={sel} onClose={() => setSel(null)} />}
      <MobileFilterSheet open={filterOpen} onClose={() => setFilterOpen(false)}
        topicList={topicList} roomList={roomList}
        topics={topics} rooms={rooms} setTopics={setTopics} setRooms={setRooms} />

      <TweaksPanel>
        <TweakSection label="外觀 Appearance" />
        <TweakToggle label="深色模式 Dark" value={t.dark} onChange={(v) => setTweak("dark", v)} />
      </TweaksPanel>
    </div>
  );
}

/* ============================================================ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "colorIntensity": "tinted",
  "accent": "#0a84ff",
  "hourHeight": 84,
  "colWidth": 150,
  "quarterLines": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [cur, setCur] = useState("d1");
  const [view, setView] = useState("grid");
  const [sel, setSel] = useState(null);
  const [search, setSearch] = useState("");
  const [topics, setTopics] = useState(() => new Set());
  const [rooms, setRooms] = useState(() => new Set());
  const [filterOpen, setFilterOpen] = useState(false);
  const forceMobile = useMemo(() => new URLSearchParams(location.search).get("m") === "1", []);
  const isMobile = useMediaQuery("(max-width: 720px)") || forceMobile;

  const day = D.DAYS.find((d) => d.k === cur);
  const sessions = useMemo(() => D.S.filter((s) => s[0] === cur), [cur]);

  useEffect(() => {
    const r = document.documentElement;
    r.setAttribute("data-theme", t.dark ? "dark" : "light");
    r.style.setProperty("--accent", t.accent);
  }, [t.dark, t.accent]);

  if (isMobile) {
    return (
      <MobileShell
        framed={forceMobile}
        t={t} setTweak={setTweak}
        cur={cur} setCur={setCur}
        sel={sel} setSel={setSel}
        search={search} setSearch={setSearch}
        topics={topics} setTopics={setTopics}
        rooms={rooms} setRooms={setRooms}
        filterOpen={filterOpen} setFilterOpen={setFilterOpen}
      />
    );
  }

  return (
    <div className="app" data-ci={t.colorIntensity}>
      <header className="topbar">
        <div className="brand">
          <span className="t1">Singapore FinTech Festival 2025</span>
          <span className="t2">Agenda · 議程 — 10–14 November · Singapore</span>
        </div>
        <div className="seg">
          <button className={view === "grid" ? "on" : ""} onClick={() => setView("grid")}>Calendar</button>
          <button className={view === "list" ? "on" : ""} onClick={() => setView("list")}>List</button>
        </div>
        <button className="icon-btn" title="切換深色 / 淺色" onClick={() => setTweak("dark", !t.dark)}>
          {t.dark ? "☀" : "☾"}
        </button>
        <a className="reg-btn" href="https://www.fintechfestival.sg/registration" target="_blank" rel="noreferrer">Register</a>
      </header>

      <div className="daybar">
        {D.DAYS.map((d) => {
          const m = DAYMETA[d.k];
          return (
            <button key={d.k} className={"day" + (d.k === cur ? " on" : "")} onClick={() => setCur(d.k)}>
              <span className="dn">{m.wd}</span>
              <span className="dd">{m.date}</span>
              <span className="dl">{m.label}</span>
            </button>
          );
        })}
      </div>

      <div className="legend">
        {Object.entries(D.TOPICS).map(([k, v]) => (
          <span className={"lg tk-" + k} key={k}><span className="dot" />{v[1]}</span>
        ))}
        <span className="sep" />
        <span className="mk">🔒 Invite-Only</span>
        <span className="mk">◆ Premium</span>
      </div>

      {view === "grid"
        ? <CalendarView day={day} sessions={sessions} hourHeight={t.hourHeight}
            colWidth={t.colWidth} quarterLines={t.quarterLines} onSelect={setSel} />
        : <ListView day={day} sessions={sessions} onSelect={setSel} />}

      {sel && <Modal s={sel} onClose={() => setSel(null)} />}

      <TweaksPanel>
        <TweakSection label="外觀 Appearance" />
        <TweakToggle label="深色模式 Dark" value={t.dark} onChange={(v) => setTweak("dark", v)} />
        <TweakColor label="強調色 Accent" value={t.accent}
          options={["#0a84ff", "#1d1d1f", "#2fa15a", "#e2743a", "#6a5ae0"]}
          onChange={(v) => setTweak("accent", v)} />
        <TweakRadio label="色彩濃度 Color" value={t.colorIntensity}
          options={["subtle", "tinted", "vivid"]}
          onChange={(v) => setTweak("colorIntensity", v)} />

        <TweakSection label="網格 Grid" />
        <TweakSlider label="時段高度 Hour height" value={t.hourHeight} min={52} max={150} step={2} unit="px"
          onChange={(v) => setTweak("hourHeight", v)} />
        <TweakSlider label="欄寬 Column width" value={t.colWidth} min={112} max={260} step={2} unit="px"
          onChange={(v) => setTweak("colWidth", v)} />
        <TweakToggle label="15 分鐘格線 Quarter lines" value={t.quarterLines} onChange={(v) => setTweak("quarterLines", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
