ficial intelligence is redefining how banks serve customers, manage risks, and design products. This session explores current applications, future potential, and the challenges of scaling AI responsibly across financial services.\n\nWho Should Join?\n\nLeaders, Scholars, Founders, and Experts in Compliance, Finance, Talent, and Operations\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Prof. Ben Shenglin.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","人工智慧正重新定義銀行服務客戶、管理風險及設計產品的方式。本場次探討 AI 目前的應用現況、未來潛力，以及在金融服務業負責任地規模化 AI 所面臨的挑戰。\n\n適合參與者\n\n合規、財務、人才及營運領域的領導者、學者、創辦人與專家\n\n加入本桌，與同業交流，共同參與由思想催化人 Prof. Ben Shenglin 主持的 60 分鐘對話。\n\n瀏覽所有 Synergy Soup 討論主題並於此登記興趣。"],"agnd551-synergy-soup-digital-assets-laying-out-the-infrastructure-to-build-for-tomorrow":["Custody isn't just infrastructure, it's the bedrock of institutional confidence in digital assets. This session unpacks how secure and compliant custody enables RWA tokenization, institutional adoption, and a new generation of financial products. We'll examine the infrastructure challenges that matter most, rethink trust and governance for blockchain systems, and explore how traditional finance and decentralized technologies are converging to reshape asset management. Throughout, we'll emphasize why security, transparency, and compliance aren't afterthoughts - they're the prerequisites for sustainable blockchain innovation.\n\nWho Should Join?\n\nPayment Services Providers, Banks and Financial Institutions\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Rajesh Sabari.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","託管不只是基礎設施，更是機構對數位資產建立信心的基石。本場次深入剖析安全合規的託管如何推動實體資產代幣化（RWA tokenization）、機構採用，以及新一代金融產品的誕生。我們將聚焦最關鍵的基礎設施挑戰，重新思考區塊鏈系統的信任與治理機制，並探討傳統金融與去中心化技術如何融合，進而重塑資產管理格局。全程我們將強調：安全性、透明度與合規性並非事後補救的措施，而是推動區塊鏈永續創新的先決條件。\n\n適合參與者\n\n支付服務提供商、銀行及金融機構\n\n加入本桌，與同業交流，共同參與由思想催化人 Rajesh Sabari 主持的 60 分鐘對話。\n\n瀏覽所有 Synergy Soup 討論主題並於此登記興趣。"],"agnd167-stocktake-on-digital-sgd-towards-a-common-settlement-asset":["Singapore's drive to modernise its financial infrastructure takes centre stage, with particular focus on the development of the Digital Singapore Dollar infrastructure. The panel examines how the Monetary Authority of Singapore's SGD Testnet is supporting the development of common settlement assets for tokenised assets.","新加坡推動金融基礎設施現代化的努力在此備受矚目，焦點尤其集中於數位新加坡元基礎設施的發展。本場次小組將探討新加坡金融管理局（MAS）的 SGD 測試網如何支持代幣化資產共同結算資產的開發進程。"],"agnd171-digital-wealth-for-an-inclusive-future-how-and-which-technologies-are-driving-transformation-across-the-wealth-continuum":["Wealth tech innovations such as AI-driven platforms, robo-advisors, micro-investing apps and data analytics are enabling broader access to financial advice and investment opportunities -- but how can policymakers, fintech startups, and banks ensure that wealthtech's benefits are distributed equitably, while remaining financially sustainable for service providers?\n\nIn this session, experts will discuss wealth tech’s potential to narrow persistent financial gaps, the unique challenges to inclusion, and actionable strategies for fostering sustainable and equitable financial ecosystems worldwide.","AI 驅動平台、機器人理財顧問、微型投資應用程式及數據分析等財富科技創新，正讓更廣泛的群體得以獲取財務建議與投資機會——但政策制定者、金融科技新創公司與銀行如何確保財富科技的效益能公平分配，同時對服務提供商保持財務上的永續性？\n\n本場次中，專家將探討財富科技縮小長期金融落差的潛力、普惠金融面臨的獨特挑戰，以及促進全球永續且公平金融生態系的可行策略。"],"agnd364-agentic-commerce-solving-for-trust-transparency-and-commercial-models":["Payments, transaction banking, and financial flows are emerging as key frontiers where agentic AI will prove its worth. From intelligent fraud detection and real-time dispute resolution to autonomous merchant onboarding and liquidity optimization, these systems promise to move AI in finance beyond simple automation toward decision-making that learns, adapts, and acts in real time.\n\nThis session brings together leaders from banks, technology, and merchant services to explore how agentic AI is reshaping the transaction stack. What real-world use cases are emerging today? How can trust, transparency, and regulation keep pace with autonomous systems? And how will the business models of banks, merchants, and fintechs evolve when AI starts managing critical flows?","支付、交易銀行業務與金融流動正成為代理式 AI 展現價值的關鍵前沿。從智慧詐欺偵測、即時爭議處理，到自主商家入駐與流動性最佳化，這些系統有望推動金融 AI 超越簡單自動化，邁向能即時學習、適應與決策的境界。\n\n本場次匯聚來自銀行、科技及商家服務領域的領導者，共同探討代理式 AI 如何重塑交易技術堆疊。當今有哪些真實落地的應用場景？信任、透明度與監管如何跟上自主系統的步伐？當 AI 開始管理關鍵金融流動時，銀行、商家與金融科技公司的商業模式將如何演變？"],"agnd253-from-cupcakes-to-global-ceo":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載未曾揭露的洞見與激勵人心的力量。傑出的新創創辦人走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd598-gftn-regional-networking-market-insights-hour-connecting-fintech-ecosystems-around-the-world-middle-east":["This session brings together key players from the Middle East ecosystem including regulators, sponsors, exhibitors, and industry partners to explore opportunities and build meaningful connections.\n\nWhether you're exploring market entry, developing strategic partnerships, or identifying investment opportunities, the GFTN Regional Networking Hour provides direct access to the right stakeholders in one collaborative space.\n\nRegister Here","本場次匯聚中東生態系的重要參與者，包括監管機構、贊助商、參展商及行業夥伴，共同探索商機並建立有意義的連結。\n\n無論您正在評估市場進入策略、發展策略夥伴關係，還是尋找投資機會，GFTN 區域交流市場洞察時光都能在同一個協作空間中，讓您直接接觸到合適的利害關係人。\n\n立即報名"],"agnd254-the-art-of-doing-what-doesnt-make-sense":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載未曾揭露的洞見與激勵人心的力量。傑出的新創創辦人走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd289-protecting-retail-investors-combating-digital-financial-fraud-in-the-modern-era":["In today's rapidly evolving financial landscape, digital technologies are transforming how retail investors interact with financial markets. While this digitalisation creates new opportunities, it also presents unprecedented challenges, particularly in the form of sophisticated online fraud, manipulative practices across platforms and social media, and AI-powered scams.\n\nIOSCO stands at the forefront of addressing these challenges through multiple strategic initiatives, including:\n\nThis panel by the IOSCO Committee on Retail Investors (C8) brings together international regulatory experts to discuss practical solutions and preventive measures in combating digital financial fraud. Speakers will share insights from successful initiatives and explore emerging approaches to protect retail investors in an increasingly complex environment.","在當今瞬息萬變的金融環境中，數位技術正在改變散戶投資人與金融市場互動的方式。數位化在創造新機遇的同時，也帶來了前所未有的挑戰，尤其是複雜的網路詐欺、跨平台與社群媒體的操縱行為，以及 AI 驅動的詐騙手法。\n\nIOSCO 透過多項策略性措施站在應對這些挑戰的最前線，包括：\n\n本場次由 IOSCO 散戶投資人委員會（C8）主辦，匯聚國際監管專家，共同探討打擊數位金融詐欺的實務解決方案與預防措施。演講者將分享成功案例的洞見，並探索保護散戶投資人免受日益複雜環境侵害的新興方法。"],"agnd280-8-things-startups-need-to-know":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional leaders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創辦人故事，滿載未曾揭露的洞見與激勵人心的力量。傑出的領導者走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd329-the-convergence-of-tradfi-and-defi-whats-the-play-and-wheres-the-value":["Traditional banks are venturing into crypto, tokenized assets, and blockchain payments, while DeFi platforms are pursuing banking licenses and regulatory legitimacy -- expanding access to new liquidity pools, blurring the lines between regulated and unregulated capital, and forcing both sides to rethink risk, compliance, and customer engagement.\n\nThis session brings together leaders from both worlds to explore how these ecosystems are merging, the business and regulatory challenges involved, and the emerging hybrid models that could define the next decade of finance.","傳統銀行正積極布局加密貨幣、代幣化資產與區塊鏈支付，而 DeFi 平台則尋求取得銀行牌照與監管合法性——這不僅拓展了進入新流動性池的管道、模糊了受監管與非受監管資本之間的界線，也迫使雙方重新審視風險、合規與客戶互動的方式。\n\n本場次匯聚來自兩個世界的領導者，共同探討這些生態系如何融合、涉及的商業與監管挑戰，以及可能定義未來十年金融格局的新興混合模式。"],"agnd114-impact-of-stablecoins-managing-compliance-and-financial-stability-risks":["2025 may well have been the year of stablecoins, which have increasingly shifted from the periphery of the financial system to the core of institutional finance.\n\nWith stablecoins set to become vital building blocks for global payments and settlement, as well as for linking the worlds of traditional and decentralised finance, this session will convene leaders from both traditional financial institutions and emerging players to explore:","2025 年或許已成為穩定幣之年——它們正日益從金融體系的邊陲移向機構金融的核心。\n\n隨著穩定幣即將成為全球支付與結算的重要基礎建設，並連結傳統金融與去中心化金融的世界，本場次將匯聚傳統金融機構與新興業者的領導者，共同探討："],"agnd255-choosing-difficult-how-founders-take-the-10-chance":["Why do 90% of startups fail? It's not for lack of tactics or strategy or a business model, product-market-fit or funding; it's the lack of a map for the most under-researched yet critical component of that journey: the founder's mind.\n\nFor three years, GFTN’s The Founders Peak stage has carefully built that map. We’ve consciously gone well beyond the pitches to the deepest crevices inside the founders’ mind, to gather the raw, unfiltered psychological data from over 300 founders from across 40+ countries, a cohort that includes over 30 unicorn founders, all with a combined valuation of a staggering $130Bn.\n\nThis hence is not another playbook of fund raising pitches or how to build product. This is the first public preview of a groundbreaking book that codifies 6 predictable, psychological phases of the founder's mental journey.\n\nYou will walk away with a preview of new framework for your own mind, learn how to build mental resilience from those who have been through the fire, and understand first-hand that your struggles are not unique, they are universal.","為什麼 90% 的新創公司以失敗告終？問題不在於缺乏戰術、策略、商業模式、產品市場適配（PMF）或資金；而在於缺少一張最被低估卻至關重要的地圖——創辦人的心理地圖。\n\n三年來，GFTN 的 The Founders Peak 舞台精心建構了這張地圖。我們刻意超越商業簡報的層面，深入創辦人內心最幽微的角落，從橫跨 40 多個國家的逾 300 位創辦人身上蒐集最原始、未經過濾的心理數據。這個群體中包含逾 30 位獨角獸創辦人，合計估值高達驚人的 1,300 億美元。\n\n因此，這不是另一本募資簡報或產品開發指南。這是一本突破性著作的首次公開預覽，該書歸納出創辦人心理旅程中 6 個可預測的心理階段。\n\n您將帶走一套針對自身心理的全新框架預覽，向走過烈火淬鍊的人學習如何建立心理韌性，並親身理解——您所面對的掙扎並非獨特的個人困境，而是所有創辦人共同的普世歷程。"],"agnd312-ai-in-finance-governance-stability-and-the-next-supervisory-frontier":["As AI systems become embedded in risk management, trading, payments, and consumer services, financial authorities and broader public sector players face the challenge of balancing innovation with systemic stability, investor protection and credibility. This dialogue brings together leaders from regulatory authorities and international organisations to explore how national regulators and global standard setters can coordinate to address emerging risks from generative and agentic AI. The discussion will focus on supervisory toolkits, governance expectations, and international cooperation needed to ensure AI enhances resilience rather than creating new vulnerabilities.","隨著 AI 系統深度嵌入風險管理、交易、支付與消費者服務，金融監管機構及更廣泛的公共部門正面臨在創新與系統穩定性、投資人保護及公信力之間取得平衡的挑戰。本次對話匯聚監管機構與國際組織的領導者，共同探討國家監管單位與全球標準制定機構如何協調配合，應對生成式 AI 與代理式 AI 帶來的新興風險。討論將聚焦於監管工具箱、治理期望，以及確保 AI 強化韌性而非製造新漏洞所需的國際合作機制。"],"agnd511-the-real-world-test-for-tech-bridging-the-digital-economys-last-mile-for-the-long-term":["As AI and tokenization transform the foundations of finance, the true test lies in emerging markets, where the convergence of technology is powering payments innovation and creating new models for access, speed, and inclusion. \n\nThis session brings together leaders from blockchain, tech, and digital commerce to explore how open networks, stablecoins, and embedded payments are reshaping how value moves globally and what's needed to ensure these innovations can truly bridge the last mile in the long-term.","隨著 AI 與代幣化技術重塑金融基礎，真正的考驗在新興市場中展開——在那裡，技術融合正驅動支付創新，並創造出提升普及性、速度與普惠金融的全新模式。\n\n本場次匯聚來自區塊鏈、科技與數位商務領域的領導者，共同探討開放網路、穩定幣與嵌入式支付如何重塑全球價值流動的方式，以及長期而言要真正打通「最後一哩路」所需具備的條件。"],"agnd307-rolling-in-the-dpt-stablecoins-risks-and-rewards":["The future of money is no longer theoretical — it is unfolding in real time. Stablecoins have rolled out of the crypto backwaters and into boardrooms and trading floors, with issuers, banks, and regulators now testing them in settlement flows, treasury operations, and even merchant checkout. They promise instant, programmable money for a borderless economy — but they also carry risks that could reshape the foundations of global finance.\n\nCan stablecoins ever be made safe enough for mass retail adoption? Will they undermine banks and CBDCs, or instead become their most powerful complement? Can they unlock trillion-dollar opportunities in B2B settlement and programmable finance, or will they introduce new systemic risks for regulators to solve?\n\nThis is _Rolling in the DPT_, where a giant dice decides which question — risk or reward — the speaker must challenge.\n\nDon’t miss your chance to catch a glimpse of the future of stablecoins and have your burning questions answered by our industry leaders. Will we even out the odds - be there or be square.","貨幣的未來不再只是理論——它正在實時發生。穩定幣已從加密貨幣的邊緣地帶滾入董事會議室與交易大廳，發行方、銀行與監管機構正將其應用於結算流程、資庫操作，甚至商家結帳環節。它們承諾為無國界經濟提供即時、可程式化的貨幣——但同時也帶來可能動搖全球金融基礎的風險。\n\n穩定幣能否真正安全到足以支撐大規模零售採用？它們會削弱銀行與 CBDC，還是反而成為彼此最強大的互補力量？它們能在 B2B 結算與可程式化金融中解鎖數兆美元的商機，還是會為監管機構帶來全新的系統性風險？\n\n這就是 _Rolling in the DPT_ ——一顆巨大骰子決定演講者必須回應的問題：風險還是回報？\n\n別錯過這個一睹穩定幣未來樣貌、由業界領袖現場解答您迫切問題的機會。勝算幾何，親臨現場才知曉。"],"agnd256-vcs-founders-panel-how-do-startups-bridge-the-growing-ai-skills-mismatch-to-survive-and-grow-in-an-ai-first-world":["Why this discussion matters now:\n\nThe rapid rise of AI has created a \"Talent Shock\" within many startups, revealing a critical \"Skills Mismatch\" between their existing team's capabilities and what is needed to compete. Founders are now rushing to find AI-qualified leaders and reorganise their teams. The problem is, most are not AI experts themselves, so they don't know who to hire or how to structure the team for optimal \"AI Readiness.\" This panel demystifies the human capital side of the AI revolution.\n\nWhat you'll walk away with:\n\nAn actionable \"war map\" for talent and organizational design. They will gain the confidence to make critical hiring decisions, restructure their teams effectively, and foster a culture that embraces the new human-machine partnership.","為何此時討論這個議題至關重要：\n\nAI 的快速崛起在許多新創公司中引發了「人才衝擊」，揭示出現有團隊能力與競爭所需條件之間的嚴重「技能落差」。創辦人正爭相尋找具備 AI 資歷的領導者，並重組團隊架構。問題在於，多數創辦人本身並非 AI 專家，因此不知道該招募什麼樣的人，也不清楚如何組建最佳「AI 就緒」的團隊。本場次旨在揭開 AI 革命中人力資本面的神秘面紗。\n\n您將帶走的收穫：\n\n一份可執行的人才與組織設計「作戰地圖」。參與者將建立做出關鍵招募決策的信心，有效重組團隊架構，並培養擁抱新型人機協作夥伴關係的企業文化。"],"agnd553-gftn-regional-networking-market-insights-hour-connecting-fintech-ecosystems-around-the-world-asia":["This session brings together key players from the Asia ecosystem including regulators, sponsors, exhibitors, and industry partners to explore opportunities and build meaningful connections.\n\nThe session opens with insights into regional market trends, emerging opportunities at Japan FinTech Week with FSA and GFTN Forum Japan 2026, followed by an informal networking hour over alcohol where you can foster direct relationships with decision-makers and the GFTN team.\n\nWhether you're exploring market entry, developing strategic partnerships, or identifying investment opportunities, the GFTN Regional Networking Hour provides direct access to the right stakeholders in one collaborative space.\n\nRegister Here","本場次匯聚亞洲生態系的重要參與者，包括監管機構、贊助商、參展商及行業夥伴，共同探索商機並建立有意義的連結。\n\n場次開始時將分享亞洲區域市場趨勢洞察，以及 2026 年 Japan FinTech Week（與 FSA 合辦）及 GFTN Forum Japan 2026 的新興機遇，隨後進入輕鬆的酒敘交流時間，讓您與決策者及 GFTN 團隊建立直接關係。\n\n無論您正在評估市場進入策略、發展策略夥伴關係，還是尋找投資機會，GFTN 區域交流市場洞察時光都能在同一個協作空間中，讓您直接接觸到合適的利害關係人。\n\n立即報名"],"agnd324-impact-stage-day-1-wrap-up":["Watch this space for more information!","更多資訊即將公布，敬請期待！"],"agnd365-frontier-stage-day-1-wrap-up":["Watch this space for more information!","更多資訊即將公布，敬請期待！"],"agnd567-sff-after-hours-boat-quay":["SFF After Hours is open to all SFF attendees. Unwind and connect with industry peers, thought leaders, and innovators along the Singapore River.\n\nFlash your SFF speaker pass to enjoy complimentary drinks and exclusive discounts at bars and restaurants along Boat Quay, by the Singapore River — a networking experience you don't want to miss!","SFF After Hours 開放給所有 SFF 與會者參加。在新加坡河畔放鬆身心，與業界同仁、思想領袖及創新者交流互動。\n\n出示您的 SFF 演講者通行證，即可享受駁船碼頭（Boat Quay）沿岸酒吧與餐廳的免費飲品及專屬折扣——這是一場您絕對不想錯過的交流體驗！"],"agnd314-welcome-to-singapore-fintech-festival-2025-day-2":["Join us as we kick off the day's sessions on the Festival Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the future of FinTech.","歡迎與我們一同在節慶舞台（Festival Stage）揭開今日場次的序幕，匯聚精彩對話、突破性創新思維，以及塑造 FinTech 未來的重磅聲音。"],"agnd172-the-great-leap-forward-from-digital-infrastructure-to-universal-finternet":["Hear from the architect of India’s revolutionary Aadhaar identity system on how the vision was brought to reality, the challenges faced and overcome, the transformative impacts of digital inclusion it enabled, and how it paved the way for future possibilities as Aadhaar’s evolution continues to empower India’s social and financial progress on a global stage.","聆聽印度革命性 Aadhaar 身分識別系統的設計者，分享願景如何化為現實、過程中所面臨並克服的挑戰、數位普惠所帶來的深遠影響，以及 Aadhaar 持續演進如何在全球舞台上持續賦能印度社會與金融發展的未來可能性。"],"agnd725-finmonda-demo":["Witness the start of the new digital GFTN Solution: FinMonda. From market intelligence, strategy creation and collaboration, GFTN now provides a unique digital solution for the network.","見證 GFTN 全新數位解決方案 FinMonda 的誕生。從市場情報、策略制定到協作整合，GFTN 現為其網絡提供獨一無二的數位解決方案。"],"agnd174-global-south-strategies-opportunities-and-unresolved-challenges":["This panel explores strategies to accelerate global financial inclusion by leveraging digital financial services. Focusing on investments in consumer finance sector and partner bank networks, panel participants will consider strategic approaches to overcome barriers for SMEs and underserved communities and drive growth and empower the unbanked.","本場次探討透過數位金融服務加速全球普惠金融的策略。聚焦於消費金融領域與夥伴銀行網絡的投資，小組成員將探討克服 SME 及金融服務不足群體障礙的策略方法，以及推動成長、賦能未銀行化人口的具體路徑。"],"agnd726-next-gen-leaders-ama-session-2":["This AMA session offers an open, conversational platform for Next Gen Leaders to engage directly with leading experts in fintech and digital finance. It aims to provide participants with a rare opportunity to ask candid questions, gain real-world insights, and explore emerging trends shaping the industry. By fostering authentic dialogue between rising talent and established thought leaders, the session seeks to deepen understanding of leadership and innovation while inspiring participants to navigate their own paths in the evolving financial landscape.\n\nPlease note that is this an exclusive, closed-door session for the inaugural cohort of Next Gen Leaders. This session is not open to public. To learn more about the programme, visit the website here.","本場 AMA 問答提供一個開放、對話式的平台，讓 Next Gen Leaders（新生代領導者）得以直接與金融科技及數位金融領域的頂尖專家交流互動。本場次旨在為參與者提供難得的機會，提出真誠的問題、獲取真實世界的洞見，並探索塑造產業未來的新興趨勢。透過促進新興人才與資深思想領袖之間的真實對話，本場次致力於深化對領導力與創新的理解，同時激勵參與者在瞬息萬變的金融環境中開創屬於自己的道路。\n\n請注意，本場次為首屆 Next Gen Leaders 學員的專屬閉門會議，不對外開放。如需進一步了解本計畫，請前往官網查詢。"],"agnd496-bringing-dollars-onchain-how-businesses-use-stablecoins-powered-by-circle":["The curation of content and speakers was wholly managed by Circle and does not reflect the views of the organisers or its staff.\n\nExplore how stablecoins like USDC work under the hood, from its smart contract design and how it settles on chains such as Arc, the economic OS for the internet, to CCTP enabling seamless USDC movement across different blockchains.\n\nDiscover how businesses can easily adopt stablecoin technology using SDKs such as  Stablecoinkit with minimal code.\n\nThis session is presented by:\n\nLocation: Garnet Room 212, Level 2","本場次內容與講者完全由 Circle 負責策劃，不代表主辦單位或其工作人員的立場。\n\n深入了解 USDC 等穩定幣的底層運作機制，包括其智慧合約設計、如何在 Arc（互聯網的經濟作業系統）等區塊鏈上完成結算，以及 CCTP 如何實現 USDC 跨鏈無縫流通。\n\n探索企業如何透過 Stablecoinkit 等 SDK，以極少量的程式碼輕鬆導入穩定幣技術。\n\n本場次由以下單位呈現：\n\n地點：Garnet Room 212，2 樓"],"agnd132-the-fintech-talent-blueprint-navigating-the-new-era-of-fintech-workforce-transformation":["The SFA Page Executive Tech Talent Report is both a strategic guide and an actionable playbook for navigating the next wave of workforce transformation. Grounded in real-time insights from founders, people leaders, educators, and job seekers, it goes beyond data to deliver foresight and practical strategies. From AI-driven job redesign and cross-border talent mobility to evolving compensation models and future-ready skills, this report is packed with actionable recommendations to equip employers, talent, and policymakers to anticipate disruption, close expectation gaps, and seize opportunities in an AI-driven economy.","SFA Page Executive 科技人才報告既是應對新一波人力轉型浪潮的策略指南，也是可付諸實踐的行動手冊。報告以創辦人、人才領導者、教育工作者及求職者的第一手洞察為基礎，超越數據本身，提供前瞻性視野與務實策略。從 AI 驅動的職位重塑、跨境人才流動，到薪酬模式演變與未來所需技能，報告提供大量可行建議，協助雇主、人才及政策制定者預判變革、縮小期望落差，並在 AI 驅動的經濟環境中把握先機。"],"agnd500-global-impact-champions-award":["The Global Impact Champions Awards for Financial Health spotlight fintech innovators driving measurable improvements in people's financial lives. The initiative, launched by GFTN, with H.M. Queen Máxima of the Netherlands, UN Secretary-General’s Special Advocate for Financial Health (UNSGSA), as a Thematic Thought Partner, recognises the Top 3 companies and builds momentum for financial health innovation globally.","金融健康全球影響力冠軍獎項聚焦於在改善民眾金融生活方面帶來可量化成效的金融科技創新者。此項計畫由 GFTN 發起，並邀請荷蘭女王 H.M. Queen Máxima——聯合國秘書長金融健康特別倡導人（UNSGSA）——擔任主題思想夥伴，表彰前三名優秀企業，並在全球推動金融健康創新的發展動能。"],"agnd466-trustworthy-autonomy-balancing-control-and-innovation-with-agentic-ai-in-banking-powered-by-nucleus-software":["Autonomous AI has escalated the stakes in banking. It can mimic human voice, bypass traditional security, and forge identities at quantum speed, making our conventional fraud and security measures obsolete. Without adequate guardrails, we risk losing the foundational trust of our customers. We must find a new equilibrium, leveraging the immense opportunities of Agentic AI while simultaneously building intelligent protections to safeguard customer trust. This talk will outline a strategic approach for harnessing the power of Agentic AI, focusing on how to architect new dynamic safeguards.","自主型 AI 已大幅提高銀行業的風險等級。它能模擬人聲、繞過傳統安全機制，並以量子級速度偽造身份，使既有的防詐與資安措施形同虛設。若缺乏適當的防護機制，我們將面臨失去客戶根本信任的風險。我們必須找到新的平衡點——充分發揮 Agentic AI 的龐大潛力，同時建立智慧型保護機制以守護客戶信任。本場演講將概述駕馭 Agentic AI 的策略方向，重點在於如何建構全新的動態防護架構。"],"agnd68-creating-the-future-of-finance-a-journey-of-innovation-and-collaboration":["Watch this space for more information!","更多資訊即將公布，敬請期待！"],"agnd425-dcjpy-jpy-based-tokenized-deposit-for-the-next-generation-infrastructure":["This session will shine a spotlight on DCJPY, a platform for JPY-based tokenized deposits with a two-tiered structure designed to preserve the benefits of the modern monetary system, facilitating credit creation and elastic supply of money.\n\nSimultaneously, it maximizes the advantages of tokenization and smart contracts. Discover how DCJPY is poised to innovate cross-border transactions and promote the developments of digital asset markets.","本場次將聚焦介紹 DCJPY——一個以日圓計價的代幣化存款平台，採用兩層式架構設計，旨在保留現代貨幣體系的既有優勢，同時促進信用創造與貨幣的彈性供應。\n\n與此同時，DCJPY 充分發揮代幣化與智慧合約的技術優勢。探索 DCJPY 如何引領跨境交易創新，並推動數位資產市場的發展。"],"agnd187-fintech-in-asean-2025-navigating-the-new-realities":["Over the past decade, ASEAN’s FinTech industry has evolved from experimentation to impact - reshaping financial access, inclusion, and innovation across the region. But as the market matures, a new question emerges: _what will define the next decade of growth?_\n\nJoin us for the launch of the FinTech in ASEAN 2025: Navigating the New Realities report, developed in collaboration with UOB, PwC Singapore, and the Singapore FinTech Association. This latest edition dives deep into funding trends, market shifts, and the changing investment landscape that are redefining the FinTech opportunity in ASEAN.\n\nDrawing insights from leading VCs and FinTech founders, the discussion will unpack:\n\nJoin industry leaders as they discuss how FinTech players and investors can navigate the new realities and shape the next chapter of innovation in ASEAN’s digital economy.","過去十年，ASEAN 金融科技產業已從探索試驗邁向實質影響力，重塑了整個區域的金融普及性、普惠程度與創新生態。然而隨著市場日趨成熟，一個新的核心問題浮現：_未來十年的成長將由什麼來定義？_\n\n誠摯邀請您出席《2025 年東南亞金融科技：駕馭新現實》報告發布會。本報告由 UOB、PwC Singapore 及新加坡金融科技協會共同合作編製，深入剖析正在重塑 ASEAN 金融科技機遇的資金趨勢、市場變化與投資格局轉型。\n\n報告援引頂尖創投機構與金融科技創辦人的洞察，探討以下議題：\n\n歡迎與業界領袖共同探討金融科技參與者與投資人如何駕馭新現實，並引領 ASEAN 數位經濟下一章的創新浪潮。"],"agnd468-signals-that-scale-finance-conversations-on-x-powered-by-x":["Every day, X captures the world’s most influential real-time financial conversations and signals that shape perception, sentiment, and strategy.\n\nThis keynote explores insights from the financial conversations on X, and how the combination of X and xAI will be a game-changer to understand market sentiment, influence, and user behaviors at scale to shape the next decade of growth.","每天，X 平台匯聚著全球最具影響力的即時金融對話與訊號，左右著市場認知、情緒走向與投資策略。\n\n本場主題演講將深入探討 X 上金融對話的洞察，以及 X 與 xAI 的結合將如何成為大規模理解市場情緒、影響力與用戶行為的革命性工具，進而形塑未來十年的成長格局。"],"agnd727-meet-alfin-your-intelligent-insights-engine-for-the-financial-industry":["ALFIN is more than an AI intelligence engine, it's the central brain for financial intelligence. It’s the outcome of ten years of industry innovation, collective intelligence, and relentless refinement. Join us at this session to learn more about how ALFIN can help you turn ideas into intelligence.","ALFIN 不僅是一套 AI 智慧引擎，更是金融智識的核心大腦。它是十年產業創新、集體智慧與持續精進的結晶。歡迎蒞臨本場次，深入了解 ALFIN 如何協助您將想法轉化為真知灼見。"],"agnd426-interoperability-without-borders-building-the-next-generation-of-national-payment-schemes-powered-by-pay10":["Fintechs and central banks are redefining collaboration to connect domestic payment schemes into a global, interoperable network.\n\nThis session explores how alignment, shared standards and API-driven innovation can strengthen national rails, preserve sovereignty, and enable seamless, cross-border payments.","金融科技業者與中央銀行正在重新定義合作模式，將國內支付體系串聯成全球可互通的支付網絡。\n\n本場次探討如何透過標準一致化與 API 驅動的創新，強化各國支付軌道、維護金融主權，並實現無縫的跨境支付。"],"agnd355-quantum-frontiers-insights-from-research-business-and-technology-leaders":["Quantum computing is shifting from theoretical promise to viable strategy. Early pilots have shown breakthroughs in risk modelling, portfolio-optimisation, and payments security, raising urgent questions for financial institutions built on trust and cryptography. \n \nBut how do we shift from experiments to an enterprise-wide quantum strategy — before quantum's \"AI moment\"?  \n \nThis session brings together technology leaders, quantum researchers, and financial innovators to explore how first-movers can reap the quantum advantage and gain a competitive edge: from identifying high-value use-cases, building talent pipelines, and eventually integrating quantum capabilities into core tech stacks - while doing so in a quantum-safe way.","量子運算正從理論承諾邁向可行策略。早期試驗已在風險建模、投資組合優化及支付安全方面取得突破性進展，為以信任與密碼學為基礎的金融機構提出了迫切問題。\n \n然而，我們該如何在量子的「AI 時刻」到來之前，從實驗性嘗試升級為全企業量子策略？\n \n本場次匯聚技術領導者、量子研究人員與金融創新者，共同探討先行者如何把握量子優勢、建立競爭護城河：從識別高價值應用場景、培育人才梯隊，到最終將量子能力整合進核心技術架構——並在整個過程中確保量子安全。"],"agnd469-data-ai-powering-fintech-transformation-powered-by-sas":["Ready to see how data and AI drive business impact? Join SAS leaders for a fireside chat packed with transformation stories from across the region, practical insights, and highlights from the SAS-IDC 2025 Data and AI Impact Report. Discover how BFSI leaders and regulators are using AI to tackle critical challenges across financial ecosystems.","準備好見證數據與 AI 如何驅動業務成效了嗎？加入 SAS 領導團隊的爐邊對談，聆聽來自亞太區的轉型實例、獲取實用洞察，並搶先了解 SAS-IDC 2025 年數據與 AI 影響力報告的重點內容。探索 BFSI 領導者與監管機構如何運用 AI 應對金融生態系中的關鍵挑戰。"],"agnd427-virtual-keynote-from-paris-to-singapour-designing-an-innovative-and-interoperable-financial-system":["New technologies – and not only AI – are driving profound changes and challenges, and the financial sector is no exception. In our current environment, payment systems have become more than just a technical issue: they are the cornerstone of our economies’ stability, sovereignty, and a bridge to our economic partners. In this virtual keynote, François Villeroy de Galhau, Banque de France Governor, will give his perspective on how in the short term, interlinking fast payment systems can better connect economic areas and on the medium and long term, innovating in payments and adapting central bank money to the digital age can strengthen sovereignty, financial stability and global integration.","新技術——不僅限於 AI——正推動深刻的變革與挑戰，金融業亦不例外。在當前環境下，支付系統已超越純技術層面的議題：它們是經濟穩定與主權的基石，也是與經濟夥伴互聯互通的橋樑。在這場線上主題演講中，法國央行行長 François Villeroy de Galhau 將分享他的觀點：短期內，如何透過即時支付系統的互聯更緊密地連結各經濟體；中長期而言，支付領域的創新以及將央行貨幣調適至數位時代，將如何強化主權、金融穩定與全球整合。"],"agnd470-making-stablecoins-swipeable-setting-you-up-for-future-success-powered-by-thredd":["This session explores how stablecoins can move beyond wallets to everyday spend via existing card and payment rails. It examines the technical, regulatory, and commercial considerations of enabling stablecoin-funded transactions, and why APAC’s fintech ecosystem is primed to bridge digital assets with real-world payments.","本場次探討穩定幣如何透過現有卡片與支付軌道，從數位錢包延伸至日常消費場景。內容涵蓋啟用穩定幣支付交易的技術、監管與商業考量，以及為何亞太地區的金融科技生態系特別有利於串聯數位資產與現實世界支付。"],"agnd428-rewiring-working-capital-finance-with-ai-powered-by-veefin":["The future of working capital finance is being rewritten by artificial intelligence. Traditional credit assessment, document verification, and risk modeling processes are slow, manual, and data-fragmented—leaving banks unable to serve the full spectrum of their supply chains.\n\nRewiring Working Capital Finance with AI explores how intelligent automation is transforming these bottlenecks into opportunities for speed, accuracy, and scale.","人工智慧正在重寫營運資金融資的未來。傳統的信用評估、文件核驗及風險建模流程緩慢、仰賴人工且數據分散，使銀行無法全面服務供應鏈上的各類客戶。\n\n《AI 重塑營運資金融資》將深入探討智慧自動化如何將這些瓶頸轉化為提升速度、精準度與規模的機遇。"],"agnd527-building-and-scaling-modern-data-architectures-for-fintechs-in-the-ai-era":["Modern fintech growth now relies on data architectures that are robust, secure, and ready for AI at scale. In this session, AWS and Endowus will share practical frameworks for designing and operating AI-enabled data platforms that support rapid innovation, resilience, and compliance in today's competitive financial markets. The presentation will reveal considerations for AI-Ready Data Architecture and using AWS to build a unified Data & AI platform, enabling fast deployment of intelligent financial solutions and empowering their teams to deliver global products while maintaining local regulatory compliance. Attendees will gain actionable insights on leveraging AWS services to drive data quality, accelerate development, and support cost-efficient scaling, essential for Fintech navigating both local and international expansion.\n\nJoin us for a deep dive into the EndowUs journey, exploring key architectural, operational, and strategic decisions behind scaling a leading wealth tech firm worldwide with an AI-ready data foundation.\n\nAgenda: Building AI-Ready Data Architecture with AWS & The Endowus Journey","現代金融科技的成長仰賴穩健、安全且具備 AI 規模化能力的數據架構。本場次中，AWS 與 Endowus 將分享設計和運營 AI 賦能數據平台的實務框架，以支持在當今競爭激烈的金融市場中快速創新、提升韌性並確保合規。演講將揭示 AI 就緒數據架構的關鍵考量，以及如何運用 AWS 建構統一的數據與 AI 平台，加速智慧金融解決方案的部署，並賦能團隊在符合當地監管規範的前提下推出全球產品。與會者將獲得可落地的洞察，了解如何借助 AWS 服務提升數據品質、加快開發速度，並支持具成本效益的規模化——這對於拓展本地及國際業務的金融科技企業至關重要。\n\n歡迎深入探討 Endowus 的發展歷程，了解這家頂尖財富科技公司在 AI 就緒數據基礎之上進行全球擴張背後的關鍵架構、運營與策略決策。\n\n議程：以 AWS 建構 AI 就緒數據架構 & Endowus 發展歷程"],"agnd352-building-an-intelligent-financial-stack":["In just a decade, the financial tech stack has gone from a quiet enabler to the engine of global finance: powering instant payments, reimagined consumer services, and unprecedented financial inclusion.  \nNow, a new innovation cycle is underway. Tomorrow’s Intelligent Financial Engine is emerging, shaped by intelligent agents and embedded AI, next-generation security architectures, and increasingly interoperable financial platforms.  \nHear influential players from banking, finance and technology on how intelligent agents, advanced security frameworks and frontier technologies are retooling their stacks for the decade ahead. Panellists will discuss playbooks, partnerships and architectural choices that will define the next decade of digital finance.","短短十年間，金融科技堆疊已從默默無聞的幕後推手，躍升為全球金融的核心引擎：驅動即時支付、重塑消費者服務，並實現前所未有的金融普惠。\n現在，新一輪創新週期正在展開。明日的「智慧金融引擎」已初見雛形，由智慧代理與嵌入式 AI、新世代安全架構，以及日益互通的金融平台共同塑造。\n聆聽來自銀行、金融與科技領域的重量級玩家，探討智慧代理、先進安全框架與前沿技術如何為未來十年重新升級技術堆疊。與談者將分享定義未來十年數位金融的實戰手冊、夥伴策略與架構抉擇。"],"agnd471-redefining-digital-payments-in-apac-powered-by-j-p-morgan":["Experience the excitement of rapid change in APAC as payments and digital assets reshape business and consumer connections.\n\nJoin J.P. Morgan and Circle to explore innovations driving new possibilities in APAC’s vibrant markets. Discover how seamless transactions and emerging digital asset technologies are creating fresh opportunities and transforming daily experiences.","感受亞太地區快速變革的脈動，支付與數位資產正在重塑企業與消費者的連結方式。\n\n攜手 J.P. Morgan 與 Circle，共同探索驅動亞太活躍市場新可能的創新浪潮。了解無縫交易體驗與新興數位資產技術如何創造嶄新機遇，並轉化日常生活體驗。"],"agnd429-beyond-borders-building-a-payment-infrastructure-for-a-connected-world-powered-by-nets":["This session will examine the role of modern payment infrastructure in an increasingly interconnected world. Explore how seamless cross-border payments can empower small businesses to participate in the digital economy, discuss the challenges around implementation and hear insights on what a more inclusive and efficient global payments ecosystem looks like.","本場次將探討現代支付基礎設施在日益互聯互通的世界中所扮演的角色。深入了解無縫跨境支付如何賦能中小企業參與數位經濟、探討實施過程中的挑戰，並聆聽對於更具包容性與效率的全球支付生態系的前瞻洞察。"],"agnd472-beyond-digital-ai-empowers-finance-powered-by-huawei":["The financial industry has quickly stepped into the AI era, but the journey of adoption and success with AI is uneven across the sector.\n\nJoin Huawei in this discussion as we delve into how to help financial institutions build a synergistic engine of digital and AI flywheels by AI agent-ready infrastructure and platforms, the best agent application practices of leading banks, and how to unlock the full potential of AI and drive substantial gains in productivity.","金融業已迅速邁入 AI 時代，但各機構在 AI 導入與成效方面參差不齊。\n\n加入 Huawei 的討論，深入探討如何協助金融機構建立數位化與 AI 雙輪驅動的協同引擎——涵蓋 AI 代理就緒的基礎設施與平台、領先銀行的最佳代理應用實踐，以及如何釋放 AI 的全面潛力，大幅提升生產力。"],"agnd430-building-a-bank-for-2030-laying-the-case-for-composable-cloud-native-innovation-powered-by-pismo":["Modernization isn’t an if, it’s a when. This presentation shows how a composable, cloud-native core could cut legacy drag, effect speed change, and unlock the potential of new technology like AI. It tackles cloud, control, and culture to provide a framework for the banks to create a foundation that lasts well into the future.","現代化轉型不是「是否要做」的問題，而是「何時做」的問題。本場演講展示可組合式、雲原生核心架構如何降低遺留系統的拖累、加速變革，並釋放 AI 等新技術的潛力。內容涵蓋雲端、管控與文化三大面向，為銀行業提供可支撐未來發展的基礎建設框架。"],"agnd473-quantum-resilient-finance-leading-the-future-of-digital-trust-powered-by-st-engineering":["As quantum computing advances at unprecedented speed, the cryptographic foundations of digital finance face an existential threat. This keynote explores the urgency of quantum readiness, the vulnerabilities in current financial infrastructure, and the strategic imperative to adopt post-quantum cryptography (PQC). From the looming reality of Q-Day to the critical gaps in data protection, we’ll examine how financial institutions can transform risk into resilience.","隨著量子運算以前所未有的速度發展，數位金融的密碼學基礎正面臨生存威脅。本場主題演講探討量子準備的迫切性、現有金融基礎設施的脆弱點，以及採用後量子密碼學（PQC）的策略必要性。從逼近的量子日（Q-Day）現實，到數據保護的關鍵缺口，我們將探討金融機構如何將風險轉化為韌性。"],"agnd431-stablecoin-networks-future-of-cross-border-money-movement-powered-by-tazapay":["Cross-border payments remain trapped in legacy systems built for another era. This session explores how stablecoin networks are redefining global money movement—enabling instant, low-cost, and transparent transfers for businesses and individuals alike. Discover how innovation, compliance, and trust are converging to build the true Internet of Value.","跨境支付至今仍困於為另一個時代所建的遺留系統之中。本場次探討穩定幣網絡如何重新定義全球資金流動——為企業與個人實現即時、低成本且透明的跨境轉帳。了解創新、合規與信任如何共同匯聚，建構真正的「價值互聯網」。"],"agnd353-the-hackers-playbook-from-black-hat-to-white-knight":["Step into the shadowy frontier of tomorrow’s technology with world-renowned ethical hacker Ralph Echemendia. In this riveting keynote, Ralph reveals the hidden dangers lurking behind Artificial Intelligence and Quantum Computing — technologies poised to reshape our world at lightning speed.\n\nDiscover how AI is no longer just a tool but a potential weapon capable of breaking systems, manipulating identities, and automating attacks at machine speed. Learn why quantum computing threatens to render today’s encryption obsolete, and why data collected now could be exploited years from today.\n\nThrough a compelling blend of real-world examples, expert insights, and cinematic visuals, Ralph exposes the convergence of AI and quantum technology — a feedback loop of intelligence that could outpace human comprehension. But it’s not all doom and gloom: this session emphasizes the human responsibility to build ethical, transparent, and secure systems before it’s too late.","隨世界知名道德駭客 Ralph Echemendia 踏入明日科技的幽暗前沿。在這場扣人心弦的主題演講中，Ralph 揭示隱藏在人工智慧與量子運算背後的潛在危機——這兩項技術正以閃電般的速度重塑我們的世界。\n\n了解 AI 如何不再只是工具，更成為一種潛在武器，能夠破壞系統、操縱身份，並以機器速度自動化攻擊。了解量子運算為何威脅使現有加密技術形同廢紙，以及今日收集的數據為何可能在數年後遭到利用。\n\n透過真實案例、專家洞察與電影級視覺效果的精彩融合，Ralph 揭示 AI 與量子技術的交匯——一個可能超越人類理解的智慧回饋迴路。然而這不全是末日預言：本場次強調人類有責任在為時已晚之前，建構符合倫理、透明且安全的系統。"],"agnd474-stablecoins-the-future-of-payments-is-now-powered-by-ripple":["Stablecoins are the new anchor for global commerce–dismantling the friction and complexity of legacy cross-border payments and treasury operations while creating a trusted digital dollar lifeline for the underbanked to drive financial inclusion. We will also explore the role of secure custody & regulatory clarity as the critical foundation for this revolution.","穩定幣是全球商業的新錨點——消除跨境支付與企業資金管理的摩擦與複雜性，同時為無銀行帳戶的弱勢族群提供可信賴的數位美元生命線，推動金融普惠。我們也將探討安全託管與監管明確性如何成為這場革命的關鍵基礎。"],"agnd432-enabling-cross-border-merchant-payments-with-interoperable-wallets-powered-by-terrapay":["Wallets are evolving into gateways for global commerce, yet fragmented rails, regulatory divergence and weak merchant acceptance block scale. We’ll unpack these trends and offer practical fixes - interoperability frameworks, hub-and-spoke rails, EMVCo standards -illustrated by lessons from Alipay×TerraPay corridor pilots.","電子錢包正演變為全球商業的入口，然而碎片化的支付軌道、監管分歧與薄弱的商家受理能力阻礙了規模化發展。我們將深入剖析這些趨勢，並提出實際解方——互通性框架、輻射型支付軌道、EMVCo 標準——並以 Alipay×TerraPay 跨境走廊試驗的經驗教訓為例說明。"],"agnd356-bridging-us-european-and-asian-digital-asset-regulations":["As the U.S. embraces stablecoins and digital assets, regulators worldwide are recalibrating their approaches – from promoting the development of stablecoins backed by local currencies to ramping up existing CBDC and tokenized deposit projects with greater urgency. At stake are multiple competing visions of the future. \n\nThis panel explores how different jurisdictions are responding to the fast-changing world of digital assets, balancing innovation, risk mitigation and cross-border harmonisation - while offering perspectives on the evolving regulatory playbook shaping the future of digital money.","隨著美國積極擁抱穩定幣與數位資產，全球監管機構正重新調整其應對策略——從推動本幣支持的穩定幣發展，到以更大力度加快 CBDC 與代幣化存款項目的落地。各方對未來的競爭性願景正在博弈。\n\n本場圓桌探討不同司法管轄區如何回應快速演變的數位資產世界，在促進創新、降低風險與跨境協調之間尋求平衡——同時提供對形塑數位貨幣未來之監管框架演變的深度觀察。"],"agnd716-financial-health-across-generations-building-pensions-for-the-modern-age":["As one of the winners of Global Impact Champions Awards for Financial Health 2025 organised by GFTN in partnership with UNSGSA, Parul Khanna is sharing about how Universal Pensions is committed to preventing an old-age poverty crisis by enabling nearly 2 billion excluded informal workers to save for retirement.","作為 GFTN 與 UNSGSA 合作舉辦的 2025 年金融健康全球影響力冠軍獎項得主之一，Parul Khanna 將分享 Universal Pensions 如何致力於防範老齡貧困危機，透過賦能近二十億被排除在外的非正規就業工作者得以儲蓄退休金。"],"agnd475-whatsapp-for-business-in-fintech-navigating-apac-with-business-solutions-providers-powered-by-meta":["This session focuses on how Business Solution Providers (BSPs) enable fintech enterprises in the APAC region to effectively utilize WhatsApp for Business.\n\nIt covers how BSPs support adoption, address challenges like security and compliance, showcase innovative use cases, and help navigate the diverse regulatory and cultural landscape of APAC, while also touching on future trends.","本場次聚焦於商業解決方案提供商（BSP）如何協助亞太地區的金融科技企業有效運用 WhatsApp for Business。\n\n內容涵蓋 BSP 如何支援導入、應對安全與合規等挑戰、展示創新應用場景，以及協助企業駕馭亞太地區多元的監管與文化環境，同時展望未來趨勢。"],"agnd316-welcome-to-futurematters-stage-day-2":["The FutureMatters Stage is a dedicated stage designed to foster interactive and thought-provoking conversations around potential futures, emerging signals, and long-term trends that will define the next decade.\n\nPanelists will explore which of today’s long-term trends will continue to ripple forward into the next decade, and which will fizzle out as mere fads; tee up the weak signals that the audience should pay closer attention to in the coming years; and explore how to manage the unexpected. Expect conversations that are rooted in deep systems analysis yet engaged with uncomfortable unknowns.","FutureMatters 舞台是一個專屬平台，旨在促進圍繞潛在未來、新興訊號及未來十年關鍵長期趨勢的互動式深度對話。\n\n與談者將探討當今哪些長期趨勢將持續影響未來十年，哪些又將曇花一現、僅是一時的風潮；點出觀眾未來幾年應密切關注的微弱訊號；並探討如何應對意外情況。對話將紮根於深入的系統分析，同時正視那些令人不安的未知因素。"],"agnd433-transformation-of-digital-payments-landscape-of-india-powered-by-upi-powered-by-npci":["India’s digital payments revolution has transformed how 1.4 billion transact — fast, frictionless, and inclusive. UPI, a homegrown innovation, turned mobile numbers into payment addresses. Now a global benchmark, India’s model shows how digital public infrastructure can empower everyone, everywhere.","印度數位支付革命徹底改變了14億人的交易方式——快速、無摩擦、普惠大眾。UPI作為本土創新，將手機號碼轉化為支付地址。如今已成為全球標竿，印度的模式展示了數位公共基礎設施如何賦能每一個人，無論身處何地。"],"agnd69-welcome-to-founders-stage-day-2-the-policymakers-day":["The Policymakers Day: Governing in the AI Age: Forging Stability and Trust in a Fractured World.\n\nJoin us as we kick off the day's sessions on the Founders Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the next wave of entrepreneurship.","政策制定者日：AI時代的治理——在分裂的世界中鑄就穩定與信任。\n\n歡迎加入 Founders Stage 的一天，精彩對話、突破性理念與啟發人心的聲音將在此交匯，共同塑造下一波創業浪潮。"],"agnd600-rewiring-global-value-chains-the-ai-and-payments-dual-engine":["As AI enhances decision-making and payments become instantaneous, trade networks are being rebuilt around data. This dialogue examines the technologies and policies shaping a more connected and intelligent global economy.","隨著AI提升決策效能、支付趨向即時化，貿易網絡正圍繞數據重新構建。本對話探討塑造更緊密、更智慧的全球經濟的技術與政策走向。"],"agnd476-ai-and-cloud-computing-in-icbc-powered-by-icbc":["Discover how Industrial and Commercial Bank of China (ICBC) is architecting a future-oriented \"Digital-ICBC (D-ICBC)\", powered by a cutting-edge Enterprise AI platform and a massive, highly flexible cloud computing platform. Gain insights into our transformation through compelling case studies: multi-agent collaboration enhancing transaction efficiency, elastic cloud computing supporting the flash sale, and more.","探索中國工商銀行（ICBC）如何打造面向未來的「數字工行（D-ICBC）」，以尖端企業AI平台與龐大、高度靈活的雲端運算平台為驅動力。透過精彩案例深入了解其轉型歷程：多智能體協作提升交易效率、彈性雲端運算支撐秒殺活動等。"],"agnd434-turning-payment-frictions-into-pathways-empowering-smes-in-the-global-economy-powered-by-amazon":["Five years after the G20 roadmap for cross-border payments was released, many SMEs still struggle to pay and get paid across borders. Based on a new 30-country study, Amazon and Nextrade expose the hidden costs of today’s payment rules - delays, documentation, and duplicate compliance - that lock SMEs out of trade.\n\nIn this data-driven session, Amira Karim, Amazon’s Head of Public Policy for Payments & Financial Services, unveils the findings and outlines bold recommendations for building more inclusive, interoperable regulatory frameworks to unlock digital trade and SME growth.","G20跨境支付路線圖發布五年後，許多中小企業（SME）在跨境收付款方面仍面臨重重障礙。根據一項涵蓋30個國家的最新研究，Amazon與Nextrade揭示了現行支付規則隱藏的高昂成本——延遲、繁瑣文件與重複合規要求——正將中小企業排斥在貿易之外。\n\n在這場數據驅動的論壇中，Amazon支付與金融服務公共政策主管Amira Karim將發布研究發現，並提出大膽建議，呼籲建立更具包容性、互通互聯的監管框架，以釋放數位貿易潛力，促進中小企業成長。"],"agnd503-mastering-the-fundraise-from-term-sheets-to-closing-a-startup-masterclass":["Join Carta for an exclusive masterclass on the fundraising journey - from structuring your first round to closing with confidence. Learn how top founders and investors navigate valuations, legal terms, and due diligence to secure capital efficiently in today’s market.\n\nRegistration here.","加入Carta舉辦的獨家大師班，深入了解融資全程——從架構首輪融資到信心滿滿地完成交割。學習頂尖創業者與投資人如何在當今市場環境中高效應對估值、法律條款與盡職調查，順利取得資金。\n\n請於此處報名。"],"agnd218-pay-it-forward":["At the heart of SFF is a powerful, interconnected community. \"Pay It Forward\" nurtures the next generation of FinTech leaders through shared knowledge and collaboration.\n\nGain insights from experienced mentors and gain practical advice on building a career in:\n1. Product and Project Management\n2. Governance, Risk and Compliance\n3. AI & Data\n4. Web3 Builders\n5. Impact Careers (ESG)\n6. Communities, Partnerships and Ecosystems\n\nCheck out the full list of participating mentors here.\nRegister for a 1:1, 20-minute mentorship meeting here. Walk-in meetings not guaranteed.","SFF的核心是一個強大且緊密相連的社群。「Pay It Forward」透過知識共享與協作，培育下一代金融科技領袖。\n\n從資深導師獲取見解，並獲得在以下領域建立職涯的實務建議：\n1. 產品與專案管理\n2. 治理、風險與合規\n3. AI與數據\n4. Web3建設者\n5. 影響力職涯（ESG）\n6. 社群、夥伴關係與生態系\n\n請點此查看參與導師完整名單。\n請於此處報名預約一對一、20分鐘的導師會議。現場候補名額無法保證。"],"agnd258-rethinking-capital-hiring-and-equity":["Join Bhavik Vashi, Managing Director of Carta for Asia Pacific, Middle East & Africa, as he presents data-driven insights into venture capital and equity trends shaping startup ecosystems across emerging markets. This keynote addresses critical questions for both founders and policymakers: How do equity structures differ between regions? What benchmarks should guide funding decisions and policy frameworks?\n\nDrawing from Carta's comprehensive dataset of thousands of startups, Bhavik reveals how founder ownership, investor stakes, and employee equity pools evolve across funding stages - and how APAC, Middle East, and African startups compare to their US counterparts. These trends offer essential guidance for policymakers designing programs to strengthen regional startup ecosystems and for founders navigating strategic equity decisions that will determine their long-term success.","Carta亞太、中東及非洲區董事總經理Bhavik Vashi將帶來數據驅動的洞察，深入剖析塑造新興市場新創生態系的創投與股權趨勢。本場主題演講聚焦創業者與政策制定者共同關心的核心議題：不同地區的股權架構有何差異？哪些基準應指導融資決策與政策框架？\n\n憑藉Carta涵蓋數千家新創公司的完整數據集，Bhavik將揭示創辦人持股比例、投資人股份與員工股權池如何隨融資階段演變——並比較亞太、中東與非洲新創公司與美國同業之間的差異。這些趨勢為政策制定者設計強化區域新創生態系的計畫，以及創業者做出影響長期成功的策略性股權決策，提供了不可或缺的指引。"],"agnd290-the-future-of-stablecoins-decoding-the-genius-act":["By 2025, stablecoins have become a multi-trillion–dollar force at the heart of global finance. With the GENIUS Act in the U.S. providing regulatory clarity for stablecoins and digital assets, institutions are beginning to integrate stablecoins into payments, settlement, and treasury at scale.  \n\nThis session brings together leaders from issuers, global institutions, and innovators to explore the impact of stablecoins and how the technology is expected to shape the coming decade. Discussions will touch on how stablecoins could reshape global financial flows, the unresolved risks and challenges that will hinder stablecoin adoption, from travel rules compliance to operational resilience, and implications for the years to come.","到2025年，穩定幣已成為全球金融核心中規模達數兆美元的重要力量。隨著美國《GENIUS法案》為穩定幣及數位資產提供監管確定性，機構開始大規模將穩定幣整合至支付、清算與資金管理業務中。\n\n本場論壇匯聚發行方、全球機構與創新者的領袖，共同探討穩定幣的影響，以及這項技術預期將如何塑造未來十年的格局。討論將觸及穩定幣可能如何重塑全球資金流動、阻礙穩定幣普及的未解風險與挑戰——從旅行規則合規到營運韌性——以及對未來數年的深遠影響。"],"agnd477-from-chatbot-to-checkout-building-the-open-standard-for-agentic-commerce-powered-by-stripe":["Today's AI agents can reason and act on behalf of users, fundamentally changing the shopping experience. This shift to agentic commerce brings challenges in setting permissions, combating fraud, and building trust.\n\nDiscover how the Agentic Commerce Protocol, co-developed by Stripe and OpenAI, enables businesses to easily and securely build, deploy, and monetize AI agents in this new era.","當今的AI智能體能夠代表用戶進行推理與行動，從根本上改變購物體驗。這種向智能體商務的轉變在權限設定、防範詐欺與建立信任方面帶來新挑戰。\n\n了解由Stripe與OpenAI共同開發的智能體商務協議（Agentic Commerce Protocol）如何在這個新時代中，讓企業輕鬆、安全地構建、部署與商業化AI智能體。"],"agnd435-going-mainstream-stablecoins-are-rewriting-the-corporate-finance-playbook-powered-by-hedera":["Stablecoins, once the quiet workhorse of DeFi and crypto trading, are now going mainstream and coming for your corporate treasury! This session explores how stablecoin payments and issuance, powered by Hedera technology, are reshaping treasury operations, the interplay with tokenized assets, and what this means for your bottom line.","穩定幣曾是DeFi與加密貨幣交易的幕後功臣，如今正走向主流，進軍企業資金管理！本場論壇探討由Hedera技術驅動的穩定幣支付與發行，如何重塑資金管理運作、與代幣化資產的相互影響，以及這對企業財務的實質意義。"],"agnd259-building-in-a-world-of-hardening-digital-borders-and-fractured-ai-policy":["Why this dialogue matters now:\n\nWe are in a period of profound \"Regulatory Divergence.\" The EU is pursuing a comprehensive approach with its AI Act, aiming to create a \"Brussels Effect\" that sets a global standard. The US favours a more market-driven strategy. Singapore champions a collaborative, principles-based model. This panel is critical because every policymaker must navigate this fractured landscape, which is creating new \"Digital Borders\" that challenge cross-border business and data flows.\n\nWhat you'll walk away with:\n\nA crystal-clear understanding of the competing global philosophies on AI regulation. Attendees will gain a strategic map of the international landscape, enabling them to better position their own national strategies and anticipate future cross-border compliance challenges.","為何此刻這場對話至關重要：\n\n我們正處於深刻的「監管分歧」時期。歐盟正以其《AI法案》推行全面性做法，致力打造能引領全球標準的「布魯塞爾效應」。美國傾向更市場導向的策略。新加坡則倡導協作式、以原則為本的模式。本場論壇至關重要，因為每位政策制定者都必須在這個分裂的格局中尋路前行——而這正在形成新的「數位邊界」，對跨境業務與數據流通造成挑戰。\n\n您將帶走什麼：\n\n對全球AI監管競爭理念的清晰認識。與會者將獲得國際格局的戰略地圖，從而更好地定位本國策略，並預見未來的跨境合規挑戰。"],"agnd296-welcome-to-catalyst-stage-day-2":["Young people. Fresh talent. New ideas. The Catalyst Stage is a platform for emerging ideas and bold thinkers on the cusp of overturning orthodoxies and changing the face of finance. \nThis will be a space where the next generation of talent and changemakers take the spotlight, sharing their ideas and solutions that will shape tomorrow. This is where cutting-edge ideas gain industry visibility, with the goal of being adopted and scaled.\nHere, we will explore how technology, including AI, is transforming work, society, and humanity. Discussions will probe the impact of technology on work, human potential, and wellbeing, pushing boundaries and inviting audiences to see the future from new perspectives – not just from leaders or C-suites, but from new talent, managers, and the youth. \nFinally, it is also a stage of recognition. The stage celebrates the young talent making their mark and the influential female leaders shaping the industry, reinforcing that leadership, vision, and innovation are powered by people as much as by ideas. \nThe Catalyst Stage is where the next wave of talent and ideas ready to shape the future will take the spotlight.","年輕人才。新鮮創意。嶄新思維。Catalyst Stage是新興想法與大膽思考者的舞台，他們正站在顛覆傳統、改變金融面貌的前沿。\n此處將是下一代人才與變革推動者綻放光芒的空間，分享塑造未來的理念與解決方案。這裡讓前沿想法獲得產業關注，目標在於推動採用與規模化。\n在這裡，我們將探索包括AI在內的技術如何轉化工作、社會與人類。對話將深入技術對工作、人類潛能與福祉的影響，突破界限，邀請觀眾從全新視角——不僅是領導者或高管，更是新興人才、中層管理者與青年——展望未來。\n最後，這也是一個表彰的舞台。舞台上將慶祝那些留下印記的年輕人才，以及塑造產業的傑出女性領袖，強化領導力、遠見與創新同樣由人驅動，一如由理念驅動。\nCatalyst Stage是下一波準備塑造未來的人才與想法大放異彩之處。"],"agnd385-seamless-asia-the-next-chapter-in-payments":["Asia’s FinTech leaders are redefining the global payments landscape through speed, interoperability, and inclusion. This session gathers experts the ecosystem to discuss how they are connecting consumers, SMEs, and markets across borders - and what’s next for Asia’s digital payments journey.","亞洲金融科技領袖正透過速度、互通性與普惠金融，重新定義全球支付格局。本場論壇匯聚生態系專家，探討如何跨越邊界連結消費者、中小企業與市場，以及亞洲數位支付旅程的下一步。"],"agnd478-from-scepticism-to-impact-driving-dbs-ai-transformation-journey-powered-by-dbs":["As AI usage accelerates, this session will explore the human-first approach of shifting mindsets and driving adaptability across the organisation to deliver positive impact.\n\nWe will look into the importance of matching AI fluency with human literacy to enhance the customer experience in wealth management and banking.","隨著AI應用加速普及，本場論壇將探討以人為本的方法——如何轉變思維模式，推動全組織的適應能力，從而產生積極影響。\n\n我們將深入探討AI流暢度與人文素養相輔相成的重要性，以提升財富管理與銀行業務的客戶體驗。"],"agnd235-the-decade-ahead-the-industry-leaders-perspective-on-blue-oceans-and-black-swans":["With constrained growth and economic shocks becoming the new normal, how can leaders navigate the headwinds and tailwinds of change?\n\nIn this not to be missed session, we will garner insights from industry leaders on what we can expect in 2026 and beyond, from the biggest new opportunities to the harshest challenges. Which areas of financial services or applications of tech are the best bets? What are the next set of black swan events that we can expect? Are there opportunities that could arise from a crisis?","當受限的成長與經濟衝擊成為新常態，領導者如何駕馭變局的逆風與順風？\n\n在這場不容錯過的論壇中，我們將從行業領袖處獲取洞見，了解2026年及以後的展望——從最大的新機遇到最嚴峻的挑戰。金融服務中哪些領域或技術應用最值得押注？下一波黑天鵝事件將在何處出現？危機之中是否孕育著機遇？"],"agnd728-meet-alfin-your-intelligent-insights-engine-for-the-financial-industry":["ALFIN is more than an AI intelligence engine, it's the central brain for financial intelligence. It’s the outcome of ten years of industry innovation, collective intelligence, and relentless refinement. Join us at this session to learn more about how ALFIN can help you turn ideas into intelligence.","ALFIN不僅是一個AI智能引擎，更是金融智慧的核心大腦。它是十年產業創新、集體智慧與持續精進的成果結晶。加入本場論壇，深入了解ALFIN如何協助您將想法轉化為真知灼見。"],"agnd436-from-insight-to-impact-agentic-ai-that-drives-real-results-in-finance-powered-by-dyna-ai":["In the era of autonomous intelligence, Agentic AI goes beyond insights to deliver real impact—boosting decisions, driving growth, and creating advantages. This session showcases practical AI applications solving challenges and achieving tangible results in finance.","在自主智能的時代，智能體AI超越洞察，直接創造實質影響——強化決策、驅動成長、建立競爭優勢。本場論壇展示AI在金融領域解決實際挑戰、達成可量化成果的實踐應用。"],"agnd479-from-anonymity-to-accountability-web3s-defining-migration-powered-by-cleanverse":["The next era of digital finance is migrating from anonymity to accountability. As Web3 matures, institutions and innovators are moving toward interoperable, compliant ecosystems where identity and value flow transparently. Explore how governance evolves beyond legacy rails to enable AI agents and tokenized assets to operate under one accountable framework — paving the way for institutional Web3 adoption.","數位金融的下一個時代正從匿名走向問責。隨著Web3日趨成熟，機構與創新者正向互通互聯、合規的生態系邁進，讓身份與價值得以透明流通。探索治理如何超越既有軌道演進，使AI智能體與代幣化資產能在統一的問責框架下運作——為機構級Web3採用鋪路。"],"agnd437-budget-better-spend-smarter-the-new-money-inights-experience-powered-by-ocbc":["Discover the new Money In$ights - designed to help you take control of your money with smart budgeting, spending insights, and personalized recommendations.\n\nLearn how to track trends, manage budgets, and optimize your finances effortlessly. Join us to see how this tool can empower your financial journey.","探索全新的Money In$ights——專為協助您掌控財務而設計，提供智慧預算規劃、消費洞察與個人化建議。\n\n了解如何輕鬆追蹤趨勢、管理預算並優化財務。加入我們，看看這項工具如何賦能您的財務旅程。"],"agnd303-welcome-to-frontier-stage-day-2":["Join us as we kick off the day's sessions on the Frontier Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the future of FinTech.","歡迎加入 Frontier Stage 的一天，精彩對話、突破性理念與啟發人心的聲音將在此交匯，共同塑造金融科技的未來。"],"agnd599-gftn-regional-networking-market-insights-hour-connecting-fintech-ecosystems-around-the-world-india":["This session brings together key players from the India ecosystem including regulators, sponsors, exhibitors, and industry partners to explore opportunities and build meaningful connections.\n\nThe session opens with insights into regional market trends, emerging opportunities, and collaboration themes, followed by an informal networking hour where you can foster direct relationships with decision-makers and the GFTN team.\n\nWhether you're exploring market entry, developing strategic partnerships, or identifying investment opportunities, the GFTN Regional Networking Hour provides direct access to the right stakeholders in one collaborative space.\n\nRegister Here","本場論壇匯聚印度生態系的關鍵參與者，包括監管機構、贊助商、參展商與產業夥伴，共同探索機遇、建立有意義的連結。\n\n論壇以區域市場趨勢、新興機遇與合作主題的洞察揭開序幕，隨後進入非正式交流環節，讓您與決策者及GFTN團隊建立直接關係。\n\n無論您正在探索市場進入策略、發展策略夥伴關係，或尋找投資機遇，GFTN區域交流時光提供在同一協作空間直接接觸適當利害關係人的機會。\n\n請點此報名"],"agnd323-welcome-to-impact-stage-day-2":["Join us as we kick off the day's sessions on the Impact Stage, featuring insightful conversations, groundbreaking ideas, and inspiring voices shaping the future of FinTech.","歡迎加入 Impact Stage 的一天，精彩對話、突破性理念與啟發人心的聲音將在此交匯，共同塑造金融科技的未來。"],"agnd536-investor-hours-investor-hours-startup-meets-investor-reception":["Investor Hours is your chance to connect directly with the startup community. Founders, secure your pitch spot to showcase your startup to interested investors, gain valuable feedback and explore funding possibilities. Investors, engage with ambitious founders and discover potential investment opportunities. Join us for insightful discussions and meaningful connections that can shape the future of your ventures.\n\nPlease register by 7 November 2025 here. Approved startups and investors will be notified with allocated timeslots.","Investor Hours是您直接與新創社群建立連結的絕佳機會。創業者，請搶先鎖定您的提案名額，向有興趣的投資人展示您的新創公司，獲取寶貴意見並探索融資可能性。投資人，與充滿抱負的創業者互動，發掘潛在投資機遇。加入我們，展開富有洞見的討論，建立能夠影響您事業未來的深度連結。\n\n請於2025年11月7日前於此處完成報名。獲批准的新創公司與投資人將收到分配時段通知。"],"agnd131-blockchain-guardians-programme-graduation":["Organised by GFTN and supported by Banking Circle, Crypto.com, Safeheron and TRM Labs, the Blockchain Guardians Programme aims to nurture the next generation of fintech leaders by equipping them with digital assets savviness and a robust compliance mindset. \n\nOver the course of 12 weeks, 30 students from across tertiary institutions in Singapore completed a TRM Academy online certificate, received mentorship from experienced Web3 and digital assets leaders, and engaged in industry immersion activities hosted by our partners.\n\nJoin us in celebrating the achievements of our 30 graduating students.","區塊鏈守護者計畫由GFTN主辦，並獲得Banking Circle、Crypto.com、Safeheron及TRM Labs支持，旨在培育下一代金融科技領袖，為其提供數位資產知識與穩健的合規思維。\n\n歷時12週，來自新加坡各大專院校的30名學生完成了TRM Academy線上認證課程，接受資深Web3與數位資產領袖的導師指導，並參與由合作夥伴主辦的產業沉浸式活動。\n\n誠邀您一同慶祝30位畢業生的傑出成就。"],"agnd712-surviving-hypergrowth":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心挑選的創業者故事，滿載鮮為人知的洞見與啟發。傑出的新創公司創辦人走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd151-collaborating-for-cyber-resilience-how-financial-institutions-can-manage-ai-risks":["The threat landscape in financial services is evolving as AI-powered cyber-crimes give rise to synthetic identity frauds, scams and more sophisticated forms of threats.\n\nHow can banks, technology platforms and fintechs collaborate to adequately strengthen cyber safeguards against financial crimes and enhance the sector's overall integrity to fortify the financial system?  In this session, panelists will explore how emerging technologies and approaches can fortify the financial landscape, and what long-term cyber strategies will look like for finance in the coming years.","隨著AI驅動的網路犯罪催生合成身份詐欺、詐騙及更複雜形式的威脅，金融服務業的威脅格局正持續演變。\n\n銀行、科技平台與金融科技公司如何攜手合作，充分強化對抗金融犯罪的網路防護，並全面提升行業整體誠信，以鞏固金融體系？在本場論壇中，與談者將探討新興技術與方法如何強化金融格局，以及金融業未來數年的長期網路安全策略。"],"agnd107-digital-personalised-and-global-emerging-models-and-trends-in-wealth-management":["Wealth management has undergone a profound transformation. Digital-first platforms, AI-driven advisory, and alternative investment marketplaces are reshaping how individuals and institutions access, grow, and protect their assets. At the same time, traditional banks are integrating these innovations into their global offerings to meet evolving client expectations for personalization, accessibility, and cross-border solutions.\n\nThis session brings together leaders from digital wealth platforms, private market innovators, and global banks, to explore how the next generation of wealth management is being built. Discussions will examine emerging business models, the convergence of technology and human advisory, and forward-looking trends in client behavior, regulatory landscapes, and financial inclusion.","財富管理正在經歷深刻變革。數位優先平台、AI驅動的顧問服務與另類投資市場正重塑個人與機構獲取、增值及保護資產的方式。與此同時，傳統銀行也將這些創新整合進全球服務，以滿足客戶對個人化、便利性與跨境解決方案日益提升的期望。\n\n本場論壇匯聚數位財富平台、私人市場創新者與全球銀行的領袖，共同探討下一代財富管理的建構方向。討論將聚焦新興商業模式、科技與人工顧問服務的融合，以及客戶行為、監管格局與普惠金融的前瞻趨勢。"],"agnd736-fintech-and-sustainability-seizing-emerging-business-opportunities-from-lithuania":["In times of uncertainty and geopolitical tensions around the globe, it is more important than ever to enhance economic competitiveness. There is no better way to achieve this than through digitisation and the green transition. The financial sector should play both an intermediary and catalytic role in enabling this economic transformation.\n\nFintech is already revolutionising financial services, while green finance is emerging as a key enabler. Combining fintech and green finance could create innovative financing mechanisms for a cleaner economy, a more sustainable way of doing business, and ensure both economic growth and societal prosperity.","在全球充滿不確定性與地緣政治緊張局勢的時代，提升經濟競爭力比以往任何時候都更為重要。而數位化轉型與綠色轉型，正是實現這一目標的最佳途徑。金融業在推動此一經濟轉型過程中，應同時扮演中介與催化劑的角色。\n\nFintech 已在革新金融服務，而綠色金融亦逐漸成為關鍵推動力。將 Fintech 與綠色金融結合，有望為更潔淨的經濟體系創造創新融資機制，形塑更永續的商業模式，並同時確保經濟成長與社會繁榮。"],"agnd265-the-best-leaders-are-scared":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心甄選的創辦人故事，飽含未曾公開的洞見與啟發。傑出的新創創辦人走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd294-leveraging-emerging-technologies-to-enhance-supervisory-functions-of-central-banks-and-financial-authorities":["This session explores how innovations like (generative) AI or digital twins are transforming supervisory practices and emphasize the importance of enhanced collaboration among central banks to stay at the forefront of technological developments.\nPanelists will showcase use cases derived from a recent hackathon, a network meeting and a new project conducted for central banks and financial authorities.","本場次探討生成式 AI、數位孿生等創新技術如何轉變監理實務，並強調各央行加強合作以掌握技術發展前沿的重要性。\n與談人將展示源自近期黑客松、網絡會議及央行與金融主管機關專案的實際應用案例。"],"agnd263-managing-euphoria-and-terror-a-founders-guide-to-staying-sane":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心甄選的創辦人故事，飽含未曾公開的洞見與啟發。傑出的新創創辦人走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd241-scaling-onchain-designing-the-human-layer-of-web3":["As Web3 matures, it’s becoming clear that building great protocols is only half the battle. The real challenge lies in building the people side of the ecosystem, navigating how to enter, transition, lead, and scale teams, culture, and ways of working in a decentralized world.\n \nThis session brings together leaders from across Web3 who are actively shaping the human infrastructure behind the technology. We’ll dive into how they foster connection, build inclusive and resilient teams, and develop talent in an industry defined by rapid change and global dispersion.\n \nWe’ll also explore how Web2-native professionals are forming a vital cohort as they converge with Web3-native talent to co-create the future—what’s working, what’s tricky, and what it really takes to grow a strong human foundation in this evolving space.\n \nIf you're curious about the people side of Web3 and how to scale it right, this is the conversation you won’t want to miss.","隨著 Web3 日趨成熟，建構優秀的協議顯然只是成功的一半。真正的挑戰在於打造生態系統的人才面向——如何進入、轉型、領導，以及在去中心化的世界中擴展團隊、文化與工作方式。\n \n本場次匯聚 Web3 各領域的領導者，他們正積極構建技術背後的人才基礎設施。我們將深入探討他們如何促進連結、建立多元且具韌性的團隊，以及在一個以快速變化與全球分散為特徵的產業中培育人才。\n \n我們也將探討 Web2 背景的專業人士如何與 Web3 原生人才共同匯聚，形成不可或缺的重要族群，攜手共創未來——哪些做法有效、哪些充滿挑戰，以及在這個持續演進的空間中，真正奠定強大人才基礎究竟需要什麼。\n \n若您對 Web3 的人才面向及如何正確擴展深感興趣，這是一場不容錯過的對話。"],"agnd310-being-underestimated-is-a-founders-superpower":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心甄選的創辦人故事，飽含未曾公開的洞見與啟發。傑出的新創創辦人走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd194-bloom-borderless-liquid-open-online-multi-currency":["This panel will explore the future of finance enabled by well regulated stablecoins and tokenised bank liabilities. The panelists will discuss real-world use cases, and how digital money can complement existing financial infrastructures, making cross-border money transfers cheaper, faster and safer.","本場小組討論將探索由監管完善的穩定幣與代幣化銀行負債所開創的金融未來。與談人將討論實際應用場景，以及數位貨幣如何與現有金融基礎設施相輔相成，使跨境資金轉移更便宜、更快速、更安全。"],"agnd117-achieving-100-financial-health-partnerships-business-models-and-innovation":["What if every person, everywhere, had the tools to thrive financially — not just to survive? As countries around the world make huge leaps in improving financial inclusion, the next benchmark for inclusive growth is financial health.\n\nThis requires leaders to work towards a vision where individuals and businesses can not only access financial services, such as InsurTech, WealthTech, and sustainable financing, but use them to build resilience, manage risks, and seize opportunities.\n\nThis high-powered session will gather senior leaders to explore what a roadmap for 100% financial health worldwide will look like, exploring cross-border partnerships that will make it a reality; the business models that will support underserved segments; and the technological innovations that will pave the way for meaningful financial well-being.","如果世界各地的每一個人都擁有在財務上蓬勃發展的工具——不只是勉強維持生計，而是真正茁壯——那會是什麼樣的世界？隨著世界各國在改善金融普惠方面取得重大進展，下一個包容性成長的基準正是金融健康。\n\n這需要領導者致力於一個願景：讓個人與企業不僅能獲得 InsurTech、WealthTech 及永續融資等金融服務，更能藉此建立韌性、管理風險、把握機會。\n\n本場高規格論壇將匯聚資深領導者，共同探討全球實現 100% 金融健康的路線圖——涵蓋使其成真的跨境夥伴關係、支持弱勢族群的商業模式，以及為有意義的金融福祉鋪路的技術創新。"],"agnd266-policymaking-at-the-speed-of-ai-is-it-time-to-change-how-policies-are-made-and-how-to-get-there":["Why this discussion matters now:\n\nThe current policymaking framework has, in many cases, outlived its usability for emerging tech. The traditional multi-year process of drafting laws is simply too slow, creating a significant \"Pacing Problem\" where technology out-evolves the rules that govern it. This is forcing a global rethink toward \"Agile Governance,\" where techniques like regulatory sandboxes and public-private consortiums are no longer just experiments but essential tools for modern governance.\n\nWhat you'll walk away with:\n\nA practical guide to the new tools of modern policymaking. Attendees will learn about the most successful international examples of agile governance and how they might adapt these new playbooks - from sandboxes to new public-private partnership models - to their own jurisdictions.","為何此刻這場討論至關重要：\n\n現行政策制定框架在許多情況下已不足以應對新興技術的發展。傳統的多年期立法起草流程太過緩慢，造成嚴重的「步調問題」——技術的演進速度已超越了規範它的法規。這正迫使全球重新思考，轉向「敏捷治理」，讓監理沙盒、公私部門聯盟等機制不再只是實驗，而成為現代治理不可或缺的工具。\n\n您將獲得的收穫：\n\n一份現代政策制定新工具的實用指南。與會者將學習最成功的國際敏捷治理案例，以及如何將這些新方法——從沙盒到新型公私夥伴關係模式——因地制宜地應用於自己的管轄區。"],"agnd730-finmonda-demo":["Witness the start of the new digital GFTN Solution: FinMonda. From market intelligence, strategy creation and collaboration, GFTN now provides a unique digital solution for the network","親身見證全新數位 GFTN 解決方案 FinMonda 的誕生。從市場情報、策略制定到協作共創，GFTN 現提供一套獨特的數位解決方案，服務整個網絡。"],"agnd293-technical-showcase-tokenised-money-and-the-future-of-cross-border-transactions":["This session presents a working prototype that brings together three foundational building blocks of the future financial market infrastructure:\n\nTogether, these components demonstrate how real-time, cross-border payments can be made secure, compliant, and efficient, while retaining policy control and regulatory visibility","本場次展示一套可運行的原型，整合了未來金融市場基礎設施的三大核心構成要素：\n\n這些元件共同展示了如何讓即時跨境支付更安全、合規且高效，同時保有政策管控與法規透明度。"],"agnd717-polyfintech100-api-hackathon-grand-finals-opening-address":["Organised by PolyFinTech100, a pan-poly initiative comprising all five local polytechnics in Singapore, and supported by the Monetary Authority of Singapore (MAS), to develop and nurture fintech talent.\n\nThe four category champions will be pit against each other in this exciting Grand Finals to win the title of Grand Champion.\n\nInsurTech: Teen Titans (Ngee Ann Polytechnic)\nIntelligent Banking: Quantara (Ngee Ann Polytechnic)\nPayTech: Cashless Crusaders (Nanyang Polytechnic)\nSmart Wealth Management: A Group of Very Stern Bears (Ngee Ann Polytechnic)","本活動由 PolyFinTech100 主辦——這是一項涵蓋新加坡五所本地理工學院的跨院校計畫，並獲新加坡金融管理局（MAS）支持，旨在培育 Fintech 人才。\n\n四個類別冠軍將在這場精彩的總決賽中一較高下，角逐總冠軍殊榮。\n\nInsurTech：Teen Titans（義安理工學院）\n智慧銀行：Quantara（義安理工學院）\nPayTech：Cashless Crusaders（南洋理工學院）\n智慧財富管理：A Group of Very Stern Bears（義安理工學院）"],"agnd130-polyfintech100-api-hackathon-grand-finals":["Organised by PolyFinTech100, a pan-poly initiative comprising all five local polytechnics in Singapore, and supported by the Monetary Authority of Singapore (MAS), to develop and nurture fintech talent.\n\nThe four category champions will be pit against each other in this exciting Grand Finals to win the title of Grand Champion.\n\nInsurTech: Teen Titans (Ngee Ann Polytechnic)\nIntelligent Banking: Quantara (Ngee Ann Polytechnic)\nPayTech: Cashless Crusaders (Nanyang Polytechnic)\nSmart Wealth Management: A Group of Very Stern Bears (Ngee Ann Polytechnic)","本活動由 PolyFinTech100 主辦——這是一項涵蓋新加坡五所本地理工學院的跨院校計畫，並獲新加坡金融管理局（MAS）支持，旨在培育 Fintech 人才。\n\n四個類別冠軍將在這場精彩的總決賽中一較高下，角逐總冠軍殊榮。\n\nInsurTech：Teen Titans（義安理工學院）\n智慧銀行：Quantara（義安理工學院）\nPayTech：Cashless Crusaders（南洋理工學院）\n智慧財富管理：A Group of Very Stern Bears（義安理工學院）"],"agnd286-global-liquidity-through-digital-money-reshaping-treasury-settlement-and-payments-infrastructure":["As global commerce accelerates and digital finance infrastructure evolves, financial institutions and corporates are reimagining how liquidity can be managed, accessed, and mobilised across borders and time zones.\n\nThis panel will explore how tokenised money and digital assets are reducing trapped capital and enabling programmable liquidity; how payments innovation is reshaping treasury operations; how liquidity strategies are evolving in tandem with the changing payments stack and what the advancement of tokenised money means for fiat currencies, government bonds, AML frameworks, and the wider financial system.","隨著全球商業加速發展、數位金融基礎設施持續演進，金融機構與企業正重新思考如何跨越邊境與時區管理、獲取及調動流動性。\n\n本場小組討論將探討：代幣化貨幣與數位資產如何減少閒置資金並實現可程式化流動性；支付創新如何重塑資金管理運作；流動性策略如何隨支付架構的變革而同步演進；以及代幣化貨幣的發展對法定貨幣、政府公債、AML 框架及更廣泛金融體系的意義。"],"agnd136-fintech-for-longevity-transforming-insurance-pensions-and-long-term-capital":["As populations age, insurers and pension funds play a growing role in securing retirement income and channeling long-term capital into the economy. At the same time, fintech, AI, and digital infrastructure are reshaping how these institutions manage risk, design products, and reach underserved segments.\n\nThis session explores how innovation can help build more inclusive, resilient, and sustainable long-term finance systems. Leaders from insurance, pensions, and policy will discuss how technology can support better life outcomes, new investment models, and the next generation of longevity-focused financial products.","隨著人口老齡化，保險公司與退休基金在保障退休收入、引導長期資本進入經濟體系方面扮演著日益重要的角色。與此同時，Fintech、AI 與數位基礎設施正在重塑這些機構管理風險、設計產品及觸及弱勢族群的方式。\n\n本場次探討創新如何助力建構更具包容性、韌性與永續性的長期金融體系。來自保險、退休基金與政策領域的領導者將討論科技如何支持更佳的生活成果、新型投資模式，以及下一代以長壽為核心的金融產品。"],"agnd538-synergy-soup-ai-regtech-creating-a-better-world-for-consumers-businesses-and-regulators":["As artificial intelligence reshapes compliance, RegTech is moving from concept to practice. This roundtable will examine how AI-driven tools are helping businesses and regulators reduce friction, increase transparency, and deliver better outcomes—while navigating accountability in highly regulated environments.\n\nWho Should Join?\n\nAnyone in Financial Services, FinTech, RegTech or Risk & Compliance\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Peter Deans.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","隨著人工智慧重塑合規生態，RegTech 正從概念走向實踐。本場圓桌會議將探討 AI 驅動工具如何協助企業與監管機構降低摩擦、提升透明度、創造更佳成果——同時在高度監管的環境中妥善應對問責課題。\n\n適合參與者：\n\n任何金融服務、FinTech、RegTech 或風險與合規領域的從業人員\n\n加入本桌，與同儕交流，參與由思想催化人 Peter Deans 主持的 60 分鐘對話。\n\n瀏覽所有 Synergy Soup 討論主題並在此登記您的興趣。"],"agnd539-synergy-soup-ai-enhancing-or-eroding-lives-navigating-trade-offs-for-human-centric-growth":["AI is no longer optional—it is reshaping products, risk management, and client experience. Yet critical questions remain: What trade-offs should leaders consider? Who should own accountability? This roundtable tackles the hidden dilemmas and cultural shifts in AI adoption, with a focus on real-world Singaporean use cases.\n\nWho Should Join?\n\nC‑Suite, Digital & Innovation Heads, Talent Leaders, Policy & Thought-Leaders\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Rachie Hui.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","AI 已不再是選項——它正在重塑產品、風險管理與客戶體驗。然而關鍵問題仍然存在：領導者應考量哪些取捨？問責應由誰承擔？本場圓桌會議正面應對 AI 導入中隱藏的兩難困境與文化轉變，並聚焦於新加坡的實際應用案例。\n\n適合參與者：\n\nC 層主管、數位與創新主管、人才主管、政策制定者與思想領袖\n\n加入本桌，與同儕交流，參與由思想催化人 Rachie Hui 主持的 60 分鐘對話。\n\n瀏覽所有 Synergy Soup 討論主題並在此登記您的興趣。"],"agnd541-synergy-soup-from-comfort-to-courage-your-dream-awaits":["Stepping out of one’s comfort zone can be transformative. This talk shares a personal journey of overcoming setbacks to build a thriving business, offering practical strategies for turning fear into action and pursuing meaningful, sustainable careers.\n\nWho Should Join?\n\nYoung Professionals, Aspiring Content Creators, Career Changers, Expats & Immigrants, Anyone Seeking Growth\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Marion Mueller.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","跨越舒適圈往往能帶來深刻的轉變。本場演講分享一段克服挫折、打造蓬勃事業的個人旅程，提供將恐懼化為行動、追求有意義且永續職涯的實用策略。\n\n適合參與者：\n\n年輕專業人士、有志內容創作者、轉換跑道者、海外人士與移民，以及任何尋求成長的人\n\n加入本桌，與同儕交流，參與由思想催化人 Marion Mueller 主持的 60 分鐘對話。\n\n瀏覽所有 Synergy Soup 討論主題並在此登記您的興趣。"],"agnd542-synergy-soup-stablecoins-today-and-tomorrow":["From regulatory debates to new use cases, stablecoins continue to evolve. This discussion examines where stablecoins are headed, comparing approaches across markets, unpacking risks and opportunities, and drawing on insights from both industry practitioners and leading academics.\n\nWho Should Join?\n\nBank & Financial Institution Executives, Regulators & Policy Makers, Technology Companies & Vendors, Startup Founders\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Daniel Liebau.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","從監管爭議到新興應用場景，穩定幣持續演進。本場討論審視穩定幣的未來走向，比較不同市場的發展路徑，剖析風險與機遇，並匯集業界實務人士與頂尖學者的洞見。\n\n適合參與者：\n\n銀行與金融機構高管、監管機關與政策制定者、科技公司與供應商、新創創辦人\n\n加入本桌，與同儕交流，參與由思想催化人 Daniel Liebau 主持的 60 分鐘對話。\n\n瀏覽所有 Synergy Soup 討論主題並在此登記您的興趣。"],"agnd540-synergy-soup-ecosystem-approach-to-battling-scams-and-frauds":["Digital scams across ASEAN are growing more sophisticated, eroding trust and inflicting financial and social harm. This session explores how banks, telcos, social media platforms, governments, and regulators can work together in a multi-lateral, ecosystem-based approach to strengthen scam management and protect consumers.\n\nWho Should Join?\n\nRegulators, Banks, Payment Providers and Operators, Including the Soon to Launch Nexus Platform\n\nJoin this table and connect with peers in this 60-min conversation led by Thought Catalyst, Prof. Chia Tek Yew.\n\nBrowse all Synergy Soup discussion topics and register your interest here.","ASEAN 各地的數位詐騙手法日益複雜，正在侵蝕社會信任，造成財務與社會損害。本場次探討銀行、電信業者、社群媒體平台、政府與監管機構如何透過多邊的生態系統合作方式，強化詐騙管理機制並保護消費者。\n\n適合參與者：\n\n監管機關、銀行、支付提供商與營運商，包括即將上線的 Nexus 平台\n\n加入本桌，與同儕交流，參與由思想催化人 Prof. Chia Tek Yew 主持的 60 分鐘對話。\n\n瀏覽所有 Synergy Soup 討論主題並在此登記您的興趣。"],"agnd554-gftn-regional-networking-market-insights-hour-connecting-fintech-ecosystems-around-the-world-china":["This session brings together key players from the China ecosystem including regulators, sponsors, exhibitors, and industry partners to explore opportunities and build meaningful connections.\n\nThe session opens with insights into regional market trends, emerging opportunities, and collaboration themes, followed by an informal networking hour where you can foster direct relationships with decision-makers and the GFTN team.\n\nWhether you're exploring market entry, developing strategic partnerships, or identifying investment opportunities, the GFTN Regional Networking Hour provides direct access to the right stakeholders in one collaborative space.\n\nRegister Here","本場次匯聚來自中國生態系統的關鍵參與者，包括監管機構、贊助商、展商與產業夥伴，共同探索機遇、建立實質連結。\n\n場次開場將分享區域市場趨勢、新興機遇與合作主題，隨後進入非正式交流時間，讓您與決策者及 GFTN 團隊建立直接關係。\n\n無論您正探索市場進入、發展策略夥伴關係，還是尋找投資機會，GFTN 區域交流時間都能讓您在同一個協作空間中直接接觸到合適的利益相關方。\n\n立即報名"],"agnd270-the-guts-to-change-from-village-roots-to-global-impact":["Incredible Hand-Picked Founder Stories Packed With Untold Insights and Inspiration. Exceptional start-up founders take the \"yellow circle\" to open up about their personal struggles and challenges, so that these stories may be a source of learning, encouragement, and inspiration for other entrepreneurs.","精心甄選的創辦人故事，飽含未曾公開的洞見與啟發。傑出的新創創辦人走上「黃色圓圈」，坦誠分享個人的掙扎與挑戰，讓這些故事成為其他創業者學習、鼓勵與啟發的來源。"],"agnd185-unlocking-new-markets-and-liquidity-for-europe-asia":["This panel brings together distinguished policymakers and leading figures from global financial institutions to share how digital assets are transforming cross-border finance in Europe and Asia. The discussion centers on regulatory innovation, technology adoption, and collaborative market infrastructure that can unlock new opportunities for both markets.","本場小組討論匯聚傑出的政策制定者與全球金融機構的領導人物，共同分享數位資產如何轉變歐亞跨境金融。討論聚焦於監管創新、技術導入，以及能為兩大市場開創新機遇的協作市場基礎設施。"],"agnd320-ai-that-delivers-creating-client-value-while-ensuring-responsible-wealth-management":["AI is transforming wealth management, but the real challenge will lie in turning sophisticated technology into measurable client value and en
